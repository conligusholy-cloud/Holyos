<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vytvoření areálu — Správa areálů</title>
  <base href="../../">
  <link rel="stylesheet" href="css/dashboard.css">
  <script type="module" crossorigin src="/assets/vytvoreni-arealu-simulace-DyrPOVB9.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="modulepreload" crossorigin href="/assets/sidebar-BRsKpUMS.js">
  <link rel="modulepreload" crossorigin href="/assets/persistent-storage-C49qMWAO.js">
</head>
<body>

<!-- SIDEBAR -->
<aside id="sidebar" class="sidebar"></aside>

<!-- MAIN -->
<div class="main-wrapper">
  <div class="main-header">
    <h2>Vytvoření areálu</h2>
    <div class="main-header-right">
      <span id="current-date"></span>
    </div>
  </div>
  <div class="main-content">

    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <span style="font-size:14px; color:var(--text2);">Uložené areály</span>
      <a id="btn-new-sim" class="btn btn-primary">+ Nový areál</a>
    </div>

    <div id="sim-list" class="sim-list"></div>

  </div>
</div>

<!-- Confirm Dialog -->
<div id="confirm-dialog" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h3 id="confirm-title">Smazat areál?</h3>
    <p id="confirm-text">Tato akce je nevratná.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeConfirm()">Zrušit</button>
      <button class="btn btn-danger" onclick="doConfirm()">Smazat</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>


</body>
</html>
