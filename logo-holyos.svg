<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B894;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0984E3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B894;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00CEC9;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Icon: Abstract hexagonal "H" mark -->
  <g transform="translate(20, 10)">
    <!-- Outer hexagon -->
    <polygon points="50,2 90,25 90,71 50,94 10,71 10,25" fill="none" stroke="url(#grad2)" stroke-width="3" rx="4"/>

    <!-- Inner geometric pattern - stylized H -->
    <rect x="24" y="24" width="8" height="48" rx="3" fill="url(#iconGrad)" opacity="0.9"/>
    <rect x="68" y="24" width="8" height="48" rx="3" fill="url(#iconGrad)" opacity="0.9"/>
    <rect x="32" y="42" width="36" height="8" rx="3" fill="url(#iconGrad)" opacity="0.9"/>

    <!-- Accent dots -->
    <circle cx="50" cy="20" r="3" fill="#00B894" opacity="0.7"/>
    <circle cx="50" cy="76" r="3" fill="#6C5CE7" opacity="0.7"/>
  </g>

  <!-- Text: HOLYOS -->
  <text x="130" y="68" font-family="'Segoe UI', 'SF Pro Display', -apple-system, Arial, sans-serif" font-size="48" font-weight="700" letter-spacing="4" fill="#E8E8E8">
    HOLY<tspan fill="url(#grad2)">OS</tspan>
  </text>

  <!-- Subtle tagline -->
  <text x="132" y="88" font-family="'Segoe UI', 'SF Pro Display', -apple-system, Arial, sans-serif" font-size="11" font-weight="400" letter-spacing="6" fill="#888888" text-transform="uppercase">
    PRODUCTION MANAGEMENT
  </text>
</svg>