<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nákup a sklad | HOLYOS</title>
  <link rel="icon" type="image/svg+xml" href="../../logo-holyos-icon.svg">
  <base href="../../">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .main-wrapper { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .module-header { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); padding: 28px 32px 20px; display: flex; align-items: center; gap: 16px; }
    .module-header-icon { font-size: 36px; }
    .module-header h1 { font-size: 22px; font-weight: 700; }
    .module-header p { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 2px; }

    .tabs { display: flex; gap: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; flex-wrap: wrap; }
    .tab { padding: 12px 20px; font-size: 13px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .tab:hover { color: var(--text); }
    .tab.active { color: #f59e0b; border-bottom-color: #f59e0b; }

    .stats-bar { display: flex; gap: 16px; padding: 20px 24px; flex-wrap: wrap; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 16px 20px; min-width: 150px; flex: 1; }
    .stat-card .stat-value { font-size: 28px; font-weight: 700; color: #f59e0b; }
    .stat-card .stat-label { font-size: 12px; color: var(--text2); margin-top: 4px; }

    .content { padding: 0 24px 24px; flex: 1; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .toolbar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
    .toolbar input[type="text"], .toolbar input[type="search"] { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; color: var(--text); font-size: 13px; width: 240px; }
    .toolbar input::placeholder { color: var(--text2); }
    .toolbar select { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; }

    .btn { padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
    .btn-primary { background: #f59e0b; color: #000; border-color: #f59e0b; }
    .btn-primary:hover { background: #d97706; }
    .btn-secondary { background: var(--surface2); color: var(--text); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: rgba(239,68,68,0.15); color: #ef4444; border-color: rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }
    .btn-sm { padding: 5px 12px; font-size: 12px; }

    .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .data-table thead { position: sticky; top: 0; z-index: 1; }
    .data-table th { background: var(--surface2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text2); border-bottom: 1px solid var(--border); }
    .data-table td { padding: 10px 14px; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.04); vertical-align: middle; }
    .data-table tr:hover td { background: rgba(245,158,11,0.06); }
    .data-table tr { cursor: pointer; }
    .person-name { font-weight: 600; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 500; }

    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 28px; width: 600px; max-width: 95vw; max-height: 90vh; overflow-y: auto; }
    .modal h2 { font-size: 18px; margin-bottom: 20px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-group { display: flex; flex-direction: column; gap: 4px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label { font-size: 12px; font-weight: 500; color: var(--text2); }
    .form-group input, .form-group select, .form-group textarea { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; color: var(--text); font-size: 13px; font-family: inherit; }
    .form-group textarea { resize: vertical; min-height: 60px; }

    .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }

    .sub-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
    .sub-tab { padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s; }
    .sub-tab:hover { color: var(--text); }
    .sub-tab.active { color: #f59e0b; border-bottom-color: #f59e0b; }
  </style>
  <script src="/js/countries.js"></script>
</head>
<body>
  <div id="sidebar"></div>
  <div class="main-wrapper">
    <div class="module-header">
      <div class="module-header-icon">📦</div>
      <div>
        <h1>Nákup a sklad</h1>
        <p>Dodavatelé, objednávky, sklady, zásoby, pohyby</p>
      </div>
    </div>

    <div class="tabs">
      <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">📊 Přehled</div>
      <div class="tab" data-tab="companies" onclick="switchTab('companies')">🏢 Společnosti</div>
      <div class="tab" data-tab="orders" onclick="switchTab('orders')">📋 Nákupní objednávky</div>
      <div class="tab" data-tab="materials" onclick="switchTab('materials')">📦 Zboží</div>
      <div class="tab" data-tab="stock" onclick="switchTab('stock')">📦 Skladové zásoby</div>
      <div class="tab" data-tab="movements" onclick="switchTab('movements')">🔄 Pohyby</div>
      <div class="tab" data-tab="inventories" onclick="switchTab('inventories')">📋 Inventury</div>
      <div class="tab" data-tab="forecast" onclick="switchTab('forecast')">📈 Výhled nákupu</div>
    </div>

    <div class="stats-bar" id="stats-bar"></div>

    <div class="content">
      <!-- TAB: Dashboard -->
      <div class="tab-content active" id="tab-dashboard">
        <div id="dashboard-content"></div>
      </div>

      <!-- TAB: Společnosti -->
      <div class="tab-content" id="tab-companies">
        <div class="toolbar">
          <input type="text" id="company-search" placeholder="Hledat společnost..." onkeyup="loadCompanies()">
          <select id="company-type-filter" onchange="loadCompanies()">
            <option value="">Všechny typy</option>
            <option value="own">Moje firma</option>
            <option value="supplier">Dodavatelé</option>
            <option value="customer">Odběratelé</option>
            <option value="cooperation">Kooperace</option>
          </select>
          <div style="flex:1"></div>
          <button class="btn btn-primary" onclick="openCompanyModal()">+ Nová společnost</button>
        </div>
        <div id="companies-table"></div>
      </div>

      <!-- TAB: Objednávky -->
      <div class="tab-content" id="tab-orders">
        <div class="sub-tabs">
          <div class="sub-tab active" data-ordertab="all" onclick="switchOrderTab('all')">Všechny</div>
          <div class="sub-tab" data-ordertab="purchase" onclick="switchOrderTab('purchase')">🛒 Nákupní</div>
          <div class="sub-tab" data-ordertab="cooperation" onclick="switchOrderTab('cooperation')">🤝 Kooperační</div>
        </div>
        <div class="toolbar">
          <input type="text" id="order-search" placeholder="Hledat objednávku..." onkeyup="loadOrders()">
          <select id="order-status-filter" onchange="loadOrders()">
            <option value="">Všechny stavy</option>
            <option value="new">Nový</option>
            <option value="quoted">Poptáno</option>
            <option value="ordered">Objednáno</option>
            <option value="confirmed">Potvrzeno</option>
            <option value="delivered">Doručeno</option>
            <option value="cancelled">Zrušeno</option>
          </select>
          <div style="flex:1"></div>
          <button class="btn btn-primary" onclick="openOrderModal()">+ Nová objednávka</button>
        </div>
        <div id="orders-table"></div>
      </div>

      <!-- TAB: Zboží -->
      <div class="tab-content" id="tab-materials">
        <div class="toolbar">
          <input type="text" id="mat-search" placeholder="Hledat zboží (název, kód, klíč. slova)..." onkeyup="loadMaterials()" style="width:280px">
          <select id="mat-type-filter" onchange="loadMaterials()">
            <option value="">Všechny typy</option>
            <option value="material">Materiál</option>
            <option value="product">Výrobek</option>
            <option value="goods">Zboží</option>
            <option value="semi_product">Polotovar</option>
          </select>
          <select id="mat-status-filter" onchange="loadMaterials()">
            <option value="">Všechny stavy</option>
            <option value="active">Aktivní</option>
            <option value="new">Nový</option>
            <option value="first_run">První běh</option>
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px;color:var(--text2);cursor:pointer;">
            <input type="checkbox" id="mat-low-stock" onchange="loadMaterials()"> Pod minimem
          </label>
          <div style="flex:1"></div>
          <button class="btn btn-secondary" onclick="openCSVImport()">📥 Import z CSV</button>
          <button class="btn btn-primary" onclick="openMaterialModal()">+ Nové zboží</button>
        </div>
        <div id="materials-table"></div>
      </div>

      <!-- TAB: Skladové zásoby -->
      <div class="tab-content" id="tab-stock">
        <div class="toolbar">
          <input type="text" id="stock-search" placeholder="Hledat zboží..." oninput="loadStock()">
          <select id="stock-wh-filter" onchange="loadStock()">
            <option value="">Všechny sklady</option>
          </select>
          <div style="flex:1"></div>
          <span id="stock-summary" style="font-size:12px;color:var(--text2);"></span>
        </div>
        <div id="stock-table"></div>
      </div>

      <!-- TAB: Pohyby -->
      <div class="tab-content" id="tab-movements">
        <div class="toolbar">
          <select id="mv-type-filter" onchange="loadMovements()">
            <option value="">Všechny typy</option>
            <option value="receipt">Příjem</option>
            <option value="issue">Výdej</option>
            <option value="transfer">Převod</option>
            <option value="adjustment">Korekce</option>
          </select>
          <select id="mv-wh-filter" onchange="loadMovements()"></select>
          <div style="flex:1"></div>
          <button class="btn btn-primary" onclick="openMovementModal()">+ Nový pohyb</button>
        </div>
        <div id="movements-table"></div>
      </div>

      <!-- TAB: Inventury -->
      <div class="tab-content" id="tab-inventories">
        <div class="toolbar">
          <select id="inv-status-filter" onchange="loadInventories()">
            <option value="">Všechny stavy</option>
            <option value="draft">Připraveno</option>
            <option value="in_progress">Probíhá</option>
            <option value="completed">Dokončeno</option>
          </select>
          <select id="inv-wh-filter" onchange="loadInventories()"></select>
          <div style="flex:1"></div>
          <button class="btn btn-primary" onclick="openInventoryModal()">+ Nová inventura</button>
        </div>
        <div id="inventories-table"></div>
      </div>

      <!-- TAB: Výhled nákupu -->
      <div class="tab-content" id="tab-forecast">
        <div class="toolbar">
          <select id="forecast-status-filter" onchange="renderForecast()">
            <option value="">Všechny stavy</option>
            <option value="critical">🔴 Kritické</option>
            <option value="warning">🟡 Varování</option>
            <option value="ok">🟢 V pořádku</option>
          </select>
          <select id="forecast-horizon" onchange="loadForecast()">
            <option value="30">30 dní</option>
            <option value="60" selected>60 dní</option>
            <option value="90">90 dní</option>
            <option value="180">180 dní</option>
          </select>
          <input type="search" id="forecast-search" placeholder="Hledat materiál..." oninput="renderForecast()">
          <div style="flex:1"></div>
          <button class="btn btn-secondary" onclick="loadForecast()">🔄 Obnovit</button>
        </div>
        <div id="forecast-stats" style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;"></div>
        <div id="forecast-chart-container" style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;max-height:320px;">
          <canvas id="forecast-chart" height="280"></canvas>
        </div>
        <div id="forecast-table"></div>
      </div>
    </div>
  </div>

  <div id="modal-root"></div>

  <script>
    var s = document.createElement('script');
    s.src = '/js/sidebar.js?v=' + Date.now();
    s.onload = function() { renderSidebar('nakup-sklad'); };
    document.head.appendChild(s);
  </script>

  <script>
    // Auth check — pokud není přihlášen, přesměruj na login
    fetch('/api/auth/me', { credentials: 'include' }).then(function(r) {
      if (r.status === 401) {
        window.location.href = '/login.html?redirect=' + encodeURIComponent(window.location.pathname);
      }
    }).catch(function() {});

    // Globální override fetch — vždy posílat auth cookie
    const _origFetch = window.fetch;
    window.fetch = function(url, opts) {
      opts = opts || {};
      opts.credentials = opts.credentials || 'include';
      return _origFetch.call(this, url, opts);
    };

    let companies = [];
    let materials = [];
    let warehouses = [];
    let currentOrderType = '';

    const ORDER_STATUSES = {
      new: { label: 'Nový', color: '#9ca3af' },
      quoted: { label: 'Poptáno', color: '#3b82f6' },
      ordered: { label: 'Objednáno', color: '#8b5cf6' },
      confirmed: { label: 'Potvrzeno', color: '#f59e0b' },
      delivered: { label: 'Doručeno', color: '#10b981' },
      cancelled: { label: 'Zrušeno', color: '#ef4444' },
    };
    const ORDER_TYPES = { purchase: '🛒 Nákupní', sales: '💰 Prodejní', cooperation: '🤝 Kooperační' };
    const COMPANY_TYPES = { own: 'Moje firma', supplier: 'Dodavatel', customer: 'Odběratel', cooperation: 'Kooperace', both: 'Dodavatel/Odběratel' };
    const WH_TYPES = { main: 'Hlavní', raw: 'Suroviny', finished: 'Hotové výrobky', wip: 'Rozpracovaná výroba', external: 'Externí' };
    const MV_TYPES = { receipt: { label: '📥 Příjem', color: '#10b981' }, issue: { label: '📤 Výdej', color: '#ef4444' }, transfer: { label: '🔄 Převod', color: '#3b82f6' }, adjustment: { label: '📝 Korekce', color: '#f59e0b' } };

    // ============================================================
    // TAB SWITCHING
    // ============================================================
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.toggle('active', t.id === 'tab-' + tab));
      if (tab === 'dashboard') loadDashboard();
      if (tab === 'companies') loadCompanies();
      if (tab === 'orders') loadOrders();
      if (tab === 'materials') loadMaterials();
      if (tab === 'stock') { loadStock(); populateStockWhFilter(); }
      if (tab === 'movements') { loadMovements(); populateMovementFilters(); }
      if (tab === 'inventories') { loadInventories(); initInvWhFilter(); }
      if (tab === 'forecast') loadForecast();
    }

    function switchOrderTab(type) {
      document.querySelectorAll('[data-ordertab]').forEach(t => t.classList.toggle('active', t.dataset.ordertab === type));
      currentOrderType = type === 'all' ? '' : type;
      loadOrders();
    }


    // ============================================================
    // STATS & DASHBOARD
    // ============================================================
    async function loadStats() {
      try {
        const res = await fetch('/api/wh/stats');
        const s = await res.json();
        document.getElementById('stats-bar').innerHTML =
          '<div class="stat-card"><div class="stat-value">' + s.companyCount + '</div><div class="stat-label">Společností</div></div>' +
          '<div class="stat-card"><div class="stat-value">' + s.activeOrders + '</div><div class="stat-label">Aktivních objednávek</div></div>' +
          '<div class="stat-card"><div class="stat-value">' + s.totalMaterials + '</div><div class="stat-label">Zboží</div></div>' +
          '<div class="stat-card"><div class="stat-value">' + s.warehouseCount + '</div><div class="stat-label">Skladů</div></div>' +
          '<div class="stat-card"><div class="stat-value" style="color:' + (s.lowStock > 0 ? '#ef4444' : '#10b981') + '">' + s.lowStock + '</div><div class="stat-label">Pod minimem</div></div>' +
          '<div class="stat-card"><div class="stat-value">' + Math.round(s.totalValue).toLocaleString('cs-CZ') + ' Kč</div><div class="stat-label">Hodnota zásob</div></div>';
      } catch(e) { console.error(e); }
    }

    async function loadDashboard() {
      const el = document.getElementById('dashboard-content');
      try {
        const [ordersRes, matsRes, movsRes] = await Promise.all([
          fetch('/api/wh/orders?status=new&type=purchase'), fetch('/api/wh/materials?low_stock=true'), fetch('/api/wh/movements')
        ]);
        const newOrders = await ordersRes.json();
        const lowStock = await matsRes.json();
        const recentMoves = (await movsRes.json()).slice(0, 10);

        let html = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">';

        // New orders
        html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:12px;">📋 Nové nákupní objednávky (' + newOrders.length + ')</h3>';
        if (newOrders.length === 0) {
          html += '<div style="color:var(--text2);font-size:13px;">Žádné nové objednávky</div>';
        } else {
          for (const o of newOrders.slice(0,5)) {
            html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">';
            html += '<span class="person-name">' + o.order_number + '</span>';
            html += '<span style="color:var(--text2);">' + (o.company_name || '—') + '</span>';
            html += '<span style="font-weight:600;">' + (o.total_amount || 0).toLocaleString('cs-CZ') + ' Kč</span>';
            html += '</div>';
          }
        }
        html += '</div>';

        // Low stock alerts
        html += '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:12px;color:' + (lowStock.length > 0 ? '#ef4444' : '#10b981') + ';">⚠️ Pod minimální zásobou (' + lowStock.length + ')</h3>';
        if (lowStock.length === 0) {
          html += '<div style="color:var(--text2);font-size:13px;">Vše je nad minimem ✅</div>';
        } else {
          for (const m of lowStock.slice(0,5)) {
            html += '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px;">';
            html += '<span class="person-name">' + m.name + '</span>';
            html += '<span style="color:#ef4444;font-weight:600;">' + m.current_stock + ' / ' + m.min_stock + ' ' + m.unit + '</span>';
            html += '</div>';
          }
        }
        html += '</div>';

        // Recent movements
        html += '<div style="grid-column:1/-1;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;">';
        html += '<h3 style="font-size:15px;margin-bottom:12px;">🔄 Poslední pohyby</h3>';
        if (recentMoves.length === 0) {
          html += '<div style="color:var(--text2);font-size:13px;">Zatím žádné skladové pohyby</div>';
        } else {
          html += '<table class="data-table"><thead><tr><th>Typ</th><th>Zboží</th><th>Sklad</th><th>Množství</th><th>Datum</th></tr></thead><tbody>';
          for (const mv of recentMoves) {
            const t = MV_TYPES[mv.type] || { label: mv.type, color: '#9ca3af' };
            html += '<tr><td><span class="badge" style="background:' + t.color + '22;color:' + t.color + ';">' + t.label + '</span></td>';
            html += '<td class="person-name">' + (mv.material_name || '—') + '</td>';
            html += '<td>' + (mv.warehouse_name || '—') + '</td>';
            html += '<td style="font-weight:600;">' + mv.quantity + '</td>';
            html += '<td style="color:var(--text2);">' + new Date(mv.created_at).toLocaleString('cs-CZ') + '</td></tr>';
          }
          html += '</tbody></table>';
        }
        html += '</div></div>';
        el.innerHTML = html;
      } catch(e) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📊</div><h3>Dashboard</h3><p>Začněte přidáním společností a zboží.</p></div>'; }
    }

    // ============================================================
    // COMPANIES
    // ============================================================
    async function loadCompanies() {
      const search = document.getElementById('company-search')?.value || '';
      const type = document.getElementById('company-type-filter')?.value || '';
      let url = '/api/wh/companies?';
      if (search) url += 'search=' + encodeURIComponent(search) + '&';
      if (type) url += 'type=' + type;
      try {
        const res = await fetch(url);
        companies = await res.json();
        renderCompanies(companies);
      } catch(e) { console.error(e); }
    }

    function renderCompanies(list) {
      const el = document.getElementById('companies-table');
      if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏢</div><h3>Žádné společnosti</h3><p>Přidejte dodavatele nebo odběratele.</p></div>'; return; }
      let html = '<div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>Název</th><th>IČO</th><th>Typ</th><th>Kontakt</th><th>Splatnost</th><th>Akce</th></tr></thead><tbody>';
      for (const c of list) {
        const typeColor = c.type === 'own' ? '#8b5cf6' : c.type === 'supplier' ? '#f59e0b' : c.type === 'customer' ? '#10b981' : '#3b82f6';
        html += '<tr onclick="openCompanyModal(' + c.id + ')">';
        html += '<td class="person-name">' + c.name + '</td>';
        html += '<td>' + (c.ico || '—') + '</td>';

    async function lookupARES(form) {
      const ico = form.querySelector('[name="ico"]').value.trim();
      if (!ico) { alert('Zadejte IČO'); return; }
      try {
        const res = await fetch('/api/wh/ares/' + ico);
        const data = await res.json();
        if (data.error) { alert(data.error); return; }
        if (data.name) form.querySelector('[name="name"]').value = data.name;
        if (data.dic) form.querySelector('[name="dic"]').value = data.dic;
        if (data.address) form.querySelector('[name="address"]').value = data.address;
        if (data.city) form.querySelector('[name="city"]').value = data.city;
        if (data.zip) form.querySelector('[name="zip"]').value = data.zip;
      } catch(e) { alert('Chyba při vyhledávání v ARES'); }
    }

    async function loadOrders() {

      let url = '/api/wh/orders?';
      if (currentOrderType) url += 'type=' + currentOrderType + '&';
      if (status) url += 'status=' + status + '&';
      if (search) url += 'search=' + encodeURIComponent(search);
      try {
        const res = await fetch(url);
        let orders = await res.json();
        // V této sekci nezobrazujeme prodejní objednávky
        if (!currentOrderType) orders = orders.filter(o => o.type !== 'sales');
        renderOrders(orders);

    // === UPLOAD FOTOGRAFIE ===
    function handlePhotoDrop(e) {
      const files = e.dataTransfer.files;
      if (files.length > 0) uploadPhotoFile(files[0]);
    }

    function handlePhotoSelect(input) {
      if (input.files.length > 0) uploadPhotoFile(input.files[0]);
    }

    async function uploadPhotoFile(file) {
      // Validace
      if (!file.type.startsWith('image/')) { alert('Vyberte obrázek (JPG, PNG, WEBP).'); return; }
      if (file.size > 5 * 1024 * 1024) { alert('Soubor je příliš velký (max 5 MB).'); return; }

      const area = document.getElementById('photo-upload-area');
      const preview = document.getElementById('photo-preview');
      const label = document.getElementById('photo-upload-label');

      // Ukaž loading stav
      if (label) label.innerHTML = '<div style="font-size:13px;color:#eab308;">⏳ Nahrávám...</div>';

      try {
        // Převeď na base64
        const base64 = await fileToBase64(file);
        const base64Data = base64.split(',')[1]; // odstraň data:image/...;base64,

        const res = await fetch('/api/storage/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            file_data: base64Data,
            file_name: file.name,
            file_type: file.type,
            folder: 'photos',
          }),
        });

        if (!res.ok) throw new Error('Upload selhal (' + res.status + ')');
        const data = await res.json();
        const photoUrl = data.url; // /api/storage/files/photos/xxx.jpg

        // Aktualizuj hidden input
        document.getElementById('photo-url-hidden').value = photoUrl;

        // Ukaž náhled
        if (preview) preview.innerHTML = '<img src="' + photoUrl + '" style="max-width:200px;max-height:140px;border-radius:8px;object-fit:cover;">';
        if (label) label.innerHTML = '<div style="font-size:12px;color:#10b981;margin-top:4px;">✅ Nahráno: ' + esc(file.name) + '</div><div style="font-size:11px;color:var(--text2);margin-top:2px;">Klikněte pro nahrazení</div>';
        if (area) area.style.borderColor = '#10b981';
        setTimeout(function() { if (area) area.style.borderColor = 'var(--border)'; }, 2000);

      } catch(e) {
        console.error('Upload error:', e);
        if (label) label.innerHTML = '<div style="font-size:13px;color:#ef4444;">❌ Chyba uploadu: ' + e.message + '</div><div style="font-size:11px;color:var(--text2);margin-top:4px;">Zkuste znovu</div>';
      }
    }

    function fileToBase64(file) {
      return new Promise(function(resolve, reject) {
        var reader = new FileReader();
        reader.onload = function() { resolve(reader.result); };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function esc(s) { if (!s) return ''; var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function saveMaterial(e, id) {
      e.preventDefault();
      const f = new FormData(e.target);
      const d = {};
      for (const [k,val] of f.entries()) d[k] = val;
      // Parse numbers
      const nums = ['unit_price','min_stock','max_stock','weight','alt_unit_coeff','batch_size_min','batch_size_max','batch_size_default','lead_time_days','wait_after_stock_hours','expedition_reserve_days','delivery_tolerance_pct','processed_in_multiples','priority','release_before_dispatch_days','forecast_pct','sort_weight','daily_target','max_acceptable_shelf_life_pct'];
      for (const n of nums) if (d[n] !== undefined) d[n] = parseFloat(d[n]) || 0;
      // Všechny optional FK (pole končící na _id) a datumová pole: "" → null.
      // Prisma neakceptuje prázdný string tam, kde čeká number/null nebo Date/null.
      for (const key of Object.keys(d)) {
        if (d[key] === '' && (key.endsWith('_id') || key.startsWith('valid_'))) {

    function fmtDate(iso) {
      if (!iso) return '—';
      try { return new Date(iso).toLocaleDateString('cs-CZ'); } catch(_) { return iso; }
    }
    function daysUntil(iso) {
      if (!iso) return null;
      const now = new Date();
      const target = new Date(iso);
      const diff = Math.floor((target - now) / (1000 * 60 * 60 * 24));
      return diff;
    }
    function fmtExpires(iso) {
      if (!iso) return '—';
      const d = daysUntil(iso);
      const date = fmtDate(iso);
      if (d == null) return date;
      if (d < 0) return date + ' (prošlá ' + Math.abs(d) + ' d.)';
      if (d <= 30) return date + ' (za ' + d + ' d.)';
      return date;
    }

    function openCSVImport() {
      document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:600px"><h2>📥 Import zboží z CSV</h2>' +
        '<p style="color:var(--text2);font-size:13px;margin-bottom:16px">Nahrajte CSV soubor s materiály. Očekávané sloupce: <code>code, name, type, unit, unit_price, min_stock, category</code></p>' +
        '<input type="file" id="csv-file" accept=".csv,.txt" style="margin-bottom:16px;width:100%">' +
        '<div id="csv-preview" style="max-height:300px;overflow-y:auto;margin-bottom:16px"></div>' +
        '<div class="modal-actions"><button class="btn btn-secondary" onclick="closeModal()">Zrušit</button><button class="btn btn-primary" id="csv-import-btn" onclick="importCSV()" disabled>📥 Importovat</button></div></div></div>';
      document.getElementById('csv-file').addEventListener('change', previewCSV);
    }

    let csvRows = [];
    function previewCSV(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(ev) {
        const lines = ev.target.result.split('\n').filter(l => l.trim());
        if (lines.length < 2) { document.getElementById('csv-preview').innerHTML = '<p style="color:#ef4444">Soubor je prázdný nebo nemá dostatek řádků</p>'; return; }
        const headers = lines[0].split(';').map(h => h.trim().toLowerCase().replace(/"/g, ''));
        csvRows = [];
        for (let i = 1; i < lines.length; i++) {
          const vals = lines[i].split(';').map(v => v.trim().replace(/"/g, ''));
          const row = {};
          headers.forEach((h, idx) => row[h] = vals[idx] || '');
          csvRows.push(row);
        }
        let h = '<table class="data-table"><thead><tr><th>Kód</th><th>Název</th><th>Typ</th><th>Jedn.</th></tr></thead><tbody>';
        csvRows.slice(0, 20).forEach(r => {
          h += '<tr><td style="font-family:monospace;font-size:12px">' + (r.code||'—') + '</td><td>' + (r.name||'—') + '</td><td>' + (r.type||'material') + '</td><td>' + (r.unit||'ks') + '</td></tr>';
        });
        if (csvRows.length > 20) h += '<tr><td colspan="4" style="color:var(--text2)">... a dalších ' + (csvRows.length - 20) + ' řádků</td></tr>';
        h += '</tbody></table>';
        document.getElementById('csv-preview').innerHTML = '<p style="color:var(--text2);font-size:12px;margin-bottom:8px">Náhled (' + csvRows.length + ' řádků):</p>' + h;
        document.getElementById('csv-import-btn').disabled = false;
      };
      reader.readAsText(file);
    }

    async function importCSV() {
      if (!csvRows.length) return;
      if (!confirm('Importovat ' + csvRows.length + ' položek?')) return;
      let imported = 0, errors = 0;
      for (const row of csvRows) {
        try {
          await fetch('/api/wh/materials', {
            method: 'POST', headers: {'Content-Type':'application/json'},
            body: JSON.stringify({
              code: row.code || '', name: row.name || 'Bez názvu', type: row.type || 'material',
              unit: row.unit || 'ks', unit_price: parseFloat(row.unit_price) || 0,
              min_stock: parseFloat(row.min_stock) || 0, category: row.category || 'general', status: 'active',
            })
          });
          imported++;
        } catch(e) { errors++; }
      }
      alert('Import dokončen!\n\nImportováno: ' + imported + (errors ? '\nChyby: ' + errors : ''));
      closeModal(); loadMaterials(); loadStats();
    }

    // ============================================================
    // SKLADOVÉ ZÁSOBY
    // ============================================================
    async function populateStockWhFilter() {
      try {
        const whs = await fetch('/api/wh/warehouses').then(r => r.json());
        const sel = document.getElementById('stock-wh-filter');
        sel.innerHTML = '<option value="">Všechny sklady</option>' +
          whs.map(w => '<option value="' + w.id + '">' + w.name + '</option>').join('');

    async function loadStock() {
      const search = document.getElementById('stock-search')?.value || '';
      const whId = document.getElementById('stock-wh-filter')?.value || '';
      let url = '/api/wh/stock?';
      if (search) url += 'search=' + encodeURIComponent(search) + '&';
      if (whId) url += 'warehouse_id=' + whId;
      try {
        const stock = await fetch(url).then(r => r.json());
        renderStock(stock);
      } catch(e) { console.error(e); }
    }

    function renderStock(list) {
      const el = document.getElementById('stock-table');
      const summary = document.getElementById('stock-summary');

      if (!list.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><h3>Žádné zásoby</h3><p>Na skladu zatím není žádné zboží.</p></div>';
        summary.textContent = '';
        return;
      }

      // Souhrn
      const totalItems = list.length;
      const totalQty = list.reduce((s, i) => s + i.qty, 0);
      const totalValue = list.reduce((s, i) => s + (i.qty * (i.unit_price || 0)), 0);
      summary.textContent = totalItems + ' položek · ' + totalQty.toFixed(0) + ' ks · ' + totalValue.toLocaleString('cs-CZ', { style: 'currency', currency: 'CZK' });

      let html = '<div style="overflow-x:auto;"><table class="data-table"><thead><tr>' +
        '<th>Zboží</th><th>Kód</th><th>Sklad</th><th>Pozice</th><th style="text-align:right;">Množství</th><th>Jedn.</th><th style="text-align:right;">Cena/ks</th><th style="text-align:right;">Hodnota</th>' +
      '</tr></thead><tbody>';

      for (const s of list) {
        const value = (s.qty * (s.unit_price || 0));
        html += '<tr>';
        html += '<td style="font-weight:600;">' + s.material_name + '</td>';
        html += '<td style="font-family:monospace;font-size:12px;color:var(--text2);">' + (s.material_code || '—') + '</td>';
        html += '<td><span class="badge" style="background:#3b82f622;color:#3b82f6;">' + s.warehouse_name + '</span></td>';
        html += '<td style="font-family:monospace;font-size:12px;">' + (s.location_label || '<span style="color:var(--text2);">bez pozice</span>') + '</td>';
        html += '<td style="text-align:right;font-weight:600;">' + s.qty.toFixed(2) + '</td>';
        html += '<td style="color:var(--text2);">' + (s.unit || 'ks') + '</td>';
        html += '<td style="text-align:right;color:var(--text2);">' + (s.unit_price ? s.unit_price.toFixed(2) + ' Kč' : '—') + '</td>';
        html += '<td style="text-align:right;font-weight:500;">' + value.toLocaleString('cs-CZ', { style: 'currency', currency: 'CZK' }) + '</td>';
        html += '</tr>';
      }

      html += '</tbody></table></div>';
      el.innerHTML = html;
    }

    // ============================================================
    // INVENTORY MOVEMENTS
    // ============================================================
    async function loadMovements() {
      const type = document.getElementById('mv-type-filter')?.value || '';
      const wh = document.getElementById('mv-wh-filter')?.value || '';
      let url = '/api/wh/movements?';
      if (type) url += 'type=' + type + '&';
      if (wh) url += 'warehouse_id=' + wh;
      try { const r = await fetch(url); renderMovements(await r.json()); } catch(e) { console.error(e); }

    function renderMovements(list) {
      const el = document.getElementById('movements-table');
      if (!list.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🔄</div><h3>Žádné pohyby</h3><p>Zaznamenejte první příjem nebo výdej.</p></div>'; return; }
      let html = '<div style="overflow-x:auto;"><table class="data-table"><thead><tr><th>Datum</th><th>Typ</th><th>Zboží</th><th>Sklad</th><th>Množství</th><th>Cena/ks</th><th>Poznámka</th></tr></thead><tbody>';
      for (const mv of list) {
        const t = MV_TYPES[mv.type] || { label: mv.type, color: '#9ca3af' };

        html += '<td><span class="badge" style="background:' + t.color + '22;color:' + t.color + ';">' + t.label + '</span></td>';
        html += '<td class="person-name">' + (mv.material_name || '—') + '</td>';
        html += '<td>' + (mv.warehouse_name || '—') + '</td>';
        html += '<td style="font-weight:600;">' + mv.quantity + '</td>';
        html += '<td>' + (mv.unit_price||0).toLocaleString('cs-CZ') + ' Kč</td>';
        html += '<td style="color:var(--text2);">' + (mv.note||'') + '</td></tr>';
      }
      html += '</tbody></table></div>';

        '<form onsubmit="saveMovement(event)"><div class="form-grid">' +
          '<div class="form-group"><label>Typ *</label><select name="type" required>' + typeOpts + '</select></div>' +
          '<div class="form-group"><label>Sklad *</label><select name="warehouse_id" required>' + whOpts + '</select></div>' +
          '<div class="form-group full"><label>Zboží *</label><select name="material_id" required>' + matOpts + '</select></div>' +
          '<div class="form-group"><label>Množství *</label><input type="number" name="quantity" required min="0.01" step="0.01"></div>' +
          '<div class="form-group"><label>Cena/ks</label><input type="number" name="unit_price" step="0.01" value="0"></div>' +

    }

    async function saveMovement(e) {
      e.preventDefault();
      const f = new FormData(e.target);
      const data = {};
      for (const [k,v] of f.entries()) data[k] = v;
      data.material_id = parseInt(data.material_id);
      data.warehouse_id = parseInt(data.warehouse_id);
      data.quantity = parseFloat(data.quantity);
      data.unit_price = parseFloat(data.unit_price) || 0;
      await fetch('/api/wh/movements', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      closeModal(); loadMovements(); loadStats(); loadMaterials();
    }

    // ============================================================
    // INVENTURY
    // ============================================================
    let inventories = [];
    const INV_STATUSES = { draft: { label: 'Připraveno', color: '#64748b' }, in_progress: { label: 'Probíhá', color: '#f59e0b' }, completed: { label: 'Dokončeno', color: '#10b981' } };

    async function loadInventories() {
      const params = new URLSearchParams();
      const st = document.getElementById('inv-status-filter')?.value;
      const wh = document.getElementById('inv-wh-filter')?.value;
      if (st) params.set('status', st);
      if (wh) params.set('warehouse_id', wh);
      const res = await fetch('/api/wh/inventories?' + params);
      inventories = await res.json();
      renderInventories();
    }

    function renderInventories() {
      const el = document.getElementById('inventories-table');
      if (!inventories.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><h3>Žádné inventury</h3><p>Vytvořte první inventuru</p></div>'; return; }
      let h = '<table class="data-table"><thead><tr><th>Název</th><th>Sklad</th><th>Stav</th><th>Položky</th><th>Rozdíl</th><th>Vytvořeno</th><th></th></tr></thead><tbody>';
      for (const inv of inventories) {
        const st = INV_STATUSES[inv.status] || { label: inv.status, color: '#64748b' };
        const progress = inv.items_total ? Math.round(inv.items_counted / inv.items_total * 100) : 0;
        const diff = inv.value_difference ? (inv.value_difference > 0 ? '+' : '') + inv.value_difference.toFixed(2) + ' Kč' : '—';
        const diffColor = inv.value_difference > 0 ? '#10b981' : inv.value_difference < 0 ? '#ef4444' : 'var(--text2)';
        h += '<tr onclick="openInventoryDetail(' + inv.id + ')">' +
          '<td class="person-name">' + (inv.name || '—') + '</td>' +
          '<td>' + (inv.warehouse_name || '—') + '</td>' +
          '<td><span class="badge" style="background:' + st.color + '22;color:' + st.color + '">' + st.label + '</span></td>' +
          '<td>' + inv.items_counted + '/' + inv.items_total + ' <span style="color:var(--text2);font-size:11px">(' + progress + '%)</span></td>' +
          '<td style="color:' + diffColor + ';font-weight:600">' + diff + '</td>' +
          '<td style="color:var(--text2);font-size:12px">' + new Date(inv.created_at).toLocaleDateString('cs-CZ') + '</td>' +
          '<td style="text-align:right">' +
            (inv.status === 'draft' ? '<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();startInventory(' + inv.id + ')">▶ Zahájit</button> ' : '') +
            (inv.status === 'draft' ? '<button class="btn btn-sm btn-danger" onclick="event.stopPropagation();deleteInventory(' + inv.id + ')">✕</button>' : '') +
          '</td></tr>';
      }

      el.innerHTML = h;

    function initInvWhFilter() {
      const sel = document.getElementById('inv-wh-filter');
      if (!sel) return;
      sel.innerHTML = '<option value="">Všechny sklady</option>' + warehouses.map(w => '<option value="' + w.id + '">' + w.name + '</option>').join('');
    }

    function openInventoryModal() {
      const whOpts = warehouses.map(w => '<option value="' + w.id + '">' + w.name + '</option>').join('');
      document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:500px;"><h2>📋 Nová inventura</h2>' +
        '<form onsubmit="saveInventory(event)"><div class="form-grid">' +
          '<div class="form-group full"><label>Název</label><input type="text" name="name" placeholder="Inventura ' + new Date().toLocaleDateString('cs-CZ') + '"></div>' +
          '<div class="form-group"><label>Sklad *</label><select name="warehouse_id" required>' + whOpts + '</select></div>' +
          '<div class="form-group full"><label>Poznámka</label><textarea name="note"></textarea></div>' +
        '</div><div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="closeModal()">Zrušit</button><button type="submit" class="btn btn-primary">Vytvořit</button></div></form></div></div>';
    }

    async function saveInventory(e) {
      e.preventDefault();
      const f = new FormData(e.target);
      const data = { warehouse_id: parseInt(f.get('warehouse_id')), name: f.get('name'), note: f.get('note') };
      await fetch('/api/wh/inventories', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      closeModal(); loadInventories();
    }

    async function startInventory(id) {
      if (!confirm('Zahájit inventuru? Po zahájení se začne počítat.')) return;
      await fetch('/api/wh/inventories/' + id + '/start', { method: 'PUT' });
      loadInventories();
    }

    async function deleteInventory(id) {
      if (!confirm('Smazat inventuru?')) return;
      await fetch('/api/wh/inventories/' + id, { method: 'DELETE' });
      loadInventories();
    }

    async function openInventoryDetail(id) {
      const res = await fetch('/api/wh/inventories/' + id);
      const inv = await res.json();
      const st = INV_STATUSES[inv.status] || { label: inv.status, color: '#64748b' };
      const isActive = inv.status === 'in_progress';
      const isDraft = inv.status === 'draft';
      const isCompleted = inv.status === 'completed';

      let itemsHtml = '';
      if (inv.items && inv.items.length) {
        itemsHtml = '<div style="max-height:400px;overflow-y:auto;margin-top:16px;"><table class="data-table"><thead><tr><th>Zboží</th><th>Kód</th><th>Pozice</th><th>Očekáváno</th><th>Skutečnost</th><th>Rozdíl</th>' + (isActive ? '<th></th>' : '') + '</tr></thead><tbody>';
        for (const it of inv.items) {
          const diffVal = it.actual_qty !== null ? it.difference : null;
          const diffStr = diffVal !== null ? (diffVal > 0 ? '+' : '') + diffVal : '—';
          const diffColor = diffVal > 0 ? '#10b981' : diffVal < 0 ? '#ef4444' : 'var(--text2)';
          const countedBg = it.actual_qty !== null ? 'rgba(16,185,129,0.06)' : '';
          itemsHtml += '<tr style="background:' + countedBg + ';cursor:default">' +
            '<td class="person-name">' + it.material_name + '</td>' +
            '<td style="color:var(--text2);font-size:12px">' + (it.material_code || '') + '</td>' +
            '<td style="font-size:12px">' + (it.location_label || '—') + '</td>' +
            '<td>' + (it.expected_qty != null ? it.expected_qty : 0) + '</td>' +
            '<td style="font-weight:600">' + (it.actual_qty !== null ? it.actual_qty : '<span style="color:var(--text2)">—</span>') + '</td>' +
            '<td style="color:' + diffColor + ';font-weight:600">' + diffStr + '</td>';
          if (isActive) {
            itemsHtml += '<td style="text-align:right"><button class="btn btn-sm btn-secondary" onclick="countItem(' + inv.id + ',' + it.id + ',' + (it.expected_qty || 0) + ',\'' + (it.material_name || '').replace(/'/g, "\\'") + '\',' + (it.actual_qty !== null ? it.actual_qty : 'null') + ')">✏️ Počítat</button></td>';
          }
          itemsHtml += '</tr>';
        }
        itemsHtml += '</tbody></table></div>';
      } else {
        itemsHtml = '<div class="empty-state" style="padding:30px"><div class="empty-icon">📦</div><h3>Žádné položky</h3><p>Přegenerujte položky</p></div>';
      }

      const counted = inv.items ? inv.items.filter(i => i.actual_qty !== null).length : 0;
      const total = inv.items ? inv.items.length : 0;
      const progress = total ? Math.round(counted / total * 100) : 0;
      const totalDiff = inv.items ? inv.items.reduce((s, i) => s + (i.value_difference || 0), 0) : 0;

      let actionsHtml = '<button class="btn btn-secondary" onclick="closeModal()">Zavřít</button>';
      if (isDraft) {
        actionsHtml += ' <button class="btn btn-primary" onclick="closeModal();startInventory(' + inv.id + ')">▶ Zahájit inventuru</button>';
      }
      if (isActive) {
        actionsHtml += ' <button class="btn btn-secondary" onclick="regenerateItems(' + inv.id + ')">🔄 Přegenerovat</button>';
        actionsHtml += ' <button class="btn btn-primary" onclick="completeInventory(' + inv.id + ')" style="background:#10b981;border-color:#10b981">✅ Dokončit</button>';
      }

      document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:800px;">' +
        '<div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:16px;">' +
          '<div><h2 style="margin-bottom:4px">' + (inv.name || 'Inventura') + '</h2>' +
          '<span style="color:var(--text2);font-size:13px">' + (inv.warehouse_name || '') + '</span></div>' +
          '<span class="badge" style="background:' + st.color + '22;color:' + st.color + ';font-size:13px;padding:4px 12px">' + st.label + '</span>' +
        '</div>' +
        '<div style="display:flex;gap:24px;margin-bottom:8px;">' +
          '<div style="font-size:13px"><span style="color:var(--text2)">Postup:</span> <strong>' + counted + '/' + total + '</strong> <span style="color:var(--text2)">(' + progress + '%)</span></div>' +
          '<div style="font-size:13px"><span style="color:var(--text2)">Hodnotový rozdíl:</span> <strong style="color:' + (totalDiff > 0 ? '#10b981' : totalDiff < 0 ? '#ef4444' : 'var(--text)') + '">' + (totalDiff > 0 ? '+' : '') + totalDiff.toFixed(2) + ' Kč</strong></div>' +
        '</div>' +
        (progress > 0 ? '<div style="background:var(--bg);border-radius:6px;height:6px;margin-bottom:12px;overflow:hidden"><div style="background:#f59e0b;height:100%;width:' + progress + '%;border-radius:6px;transition:width 0.3s"></div></div>' : '') +
        (inv.note ? '<div style="color:var(--text2);font-size:12px;margin-bottom:8px">📝 ' + inv.note + '</div>' : '') +
        itemsHtml +
        '<div class="modal-actions">' + actionsHtml + '</div>' +
      '</div></div>';
    }

    function countItem(invId, itemId, expected, matName, currentActual) {
      const currentVal = currentActual !== null && currentActual !== undefined ? currentActual : '';
      document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="max-width:400px;">' +
        '<h2>✏️ Počítání položky</h2>' +
        '<div style="margin-bottom:16px;padding:12px;background:var(--bg);border-radius:8px;">' +
          '<div style="font-weight:600;font-size:14px">' + matName + '</div>' +
          '<div style="color:var(--text2);font-size:13px;margin-top:4px">Očekávané množství: <strong style="color:var(--text)">' + expected + '</strong></div>' +
        '</div>' +
        '<form onsubmit="saveCount(event,' + invId + ',' + itemId + ')">' +
          '<div class="form-group"><label>Skutečné množství *</label><input type="number" name="actual_qty" step="0.01" min="0" required value="' + currentVal + '" autofocus style="font-size:18px;padding:12px;text-align:center"></div>' +
          '<div class="form-group" style="margin-top:8px"><label>Poznámka</label><textarea name="note" rows="2"></textarea></div>' +
          '<div class="modal-actions"><button type="button" class="btn btn-secondary" onclick="openInventoryDetail(' + invId + ')">Zpět</button><button type="submit" class="btn btn-primary">Uložit</button></div>' +
        '</form></div></div>';
      setTimeout(() => { const inp = document.querySelector('input[name="actual_qty"]'); if(inp) inp.focus(); }, 100);
    }

    async function saveCount(e, invId, itemId) {
      e.preventDefault();
      const f = new FormData(e.target);
      const data = { actual_qty: parseFloat(f.get('actual_qty')), note: f.get('note') || '' };
      await fetch('/api/wh/inventory-items/' + itemId, { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify(data) });
      openInventoryDetail(invId);
    }

    async function regenerateItems(id) {
      if (!confirm('Přegenerovat položky? Tím se resetují všechna dosavadní počítání.')) return;
      await fetch('/api/wh/inventories/' + id + '/regenerate', { method: 'POST' });
      openInventoryDetail(id);
    }

    async function completeInventory(id) {
      const apply = confirm('Dokončit inventuru a aplikovat rozdíly do skladu?\n\nStiskněte OK pro aplikování korekčních pohybů,\nnebo Zrušit pro dokončení bez změn.');
      await fetch('/api/wh/inventories/' + id + '/complete', { method: 'PUT', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ apply_differences: apply }) });
      closeModal(); loadInventories(); loadStats();
    }

    // ============================================================
    // VÝHLED NÁKUPU (Forecast)
    // ============================================================
    let _forecastData = null;
    let _forecastChart = null;

    async function loadForecast() {
      const horizon = document.getElementById('forecast-horizon')?.value || 60;
      try {
        const resp = await fetch('/api/wh/forecast?horizon_days=' + horizon, { credentials: 'include' });
        if (!resp.ok) throw new Error('Chyba ' + resp.status);
        _forecastData = await resp.json();
        renderForecastStats();
        renderForecastChart();
        renderForecast();
      } catch (e) {
        console.error('Forecast error:', e);
        document.getElementById('forecast-table').innerHTML = '<p style="color:#ef4444;padding:20px;">Chyba při načítání výhledu: ' + e.message + '</p>';
      }
    }

    function renderForecastStats() {
      if (!_forecastData) return;
      const s = _forecastData.stats;
      document.getElementById('forecast-stats').innerHTML =
        '<div class="stat-card"><div class="stat-value">' + s.total_materials + '</div><div class="stat-label">Materiálů celkem</div></div>' +
        '<div class="stat-card"><div class="stat-value" style="color:#ef4444">' + s.critical + '</div><div class="stat-label">🔴 Kritické</div></div>' +
        '<div class="stat-card"><div class="stat-value" style="color:#f59e0b">' + s.warning + '</div><div class="stat-label">🟡 Varování</div></div>' +
        '<div class="stat-card"><div class="stat-value" style="color:#22c55e">' + s.ok + '</div><div class="stat-label">🟢 V pořádku</div></div>' +
        '<div class="stat-card"><div class="stat-value" style="color:#8b5cf6">' + s.needs_ordering + '</div><div class="stat-label">📦 K objednání teď</div></div>';
    }

    function renderForecastChart() {
      if (!_forecastData) return;
      // Načti Chart.js pokud ještě není
      if (typeof Chart === 'undefined') {
        var script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js';
        script.onload = function() { _drawForecastChart(); };
        document.head.appendChild(script);
      } else {
        _drawForecastChart();
      }
    }

    function _drawForecastChart() {
      if (!_forecastData) return;
      const items = _forecastData.forecast.filter(f => f.status !== 'ok' || f.total_demand > 0).slice(0, 20);
      if (items.length === 0) {
        document.getElementById('forecast-chart-container').innerHTML = '<p style="color:var(--text2);text-align:center;padding:40px;">Žádné materiály s poptávkou v horizontu.</p>';
        return;
      }

      const labels = items.map(i => i.code || i.name.substring(0, 15));
      const stockData = items.map(i => i.current_stock);
      const demandData = items.map(i => i.total_demand);
      const supplyData = items.map(i => i.total_supply);
      const minStockData = items.map(i => i.min_stock);

      if (_forecastChart) _forecastChart.destroy();
      const ctx = document.getElementById('forecast-chart');
      if (!ctx) return;

      _forecastChart = new Chart(ctx, {
        type: 'bar',
        data: {
          labels,
          datasets: [
            { label: 'Aktuální zásoba', data: stockData, backgroundColor: 'rgba(34,197,94,0.7)', borderRadius: 4 },
            { label: 'Plánovaná spotřeba', data: demandData, backgroundColor: 'rgba(239,68,68,0.7)', borderRadius: 4 },
            { label: 'Očekávaný příjem', data: supplyData, backgroundColor: 'rgba(59,130,246,0.7)', borderRadius: 4 },
            { label: 'Minimum', data: minStockData, type: 'line', borderColor: '#f59e0b', borderDash: [5,3], pointRadius: 3, borderWidth: 2, fill: false },
          ],
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: 'top', labels: { color: '#9ca3af', font: { size: 11 } } },
            tooltip: { mode: 'index', intersect: false },
          },
          scales: {
            x: { ticks: { color: '#9ca3af', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { ticks: { color: '#9ca3af' }, grid: { color: 'rgba(255,255,255,0.05)' }, beginAtZero: true },
          },
        },
      });
    }

    function renderForecast() {
      if (!_forecastData) return;
      let items = _forecastData.forecast;

      // Filtr stavu
      const statusFilter = document.getElementById('forecast-status-filter')?.value;
      if (statusFilter) items = items.filter(i => i.status === statusFilter);

      // Filtr hledání
      const search = (document.getElementById('forecast-search')?.value || '').toLowerCase();
      if (search) items = items.filter(i => (i.name + ' ' + i.code + ' ' + (i.supplier || '')).toLowerCase().includes(search));

      const statusColors = { critical: '#ef4444', warning: '#f59e0b', ok: '#22c55e' };
      const statusIcons = { critical: '🔴', warning: '🟡', ok: '🟢' };

      let html = '<table class="data-table"><thead><tr>' +
        '<th>Stav</th><th>Kód</th><th>Materiál</th><th>Dodavatel</th>' +
        '<th style="text-align:right">Zásoba</th><th style="text-align:right">Minimum</th>' +
        '<th style="text-align:right">Poptávka</th><th style="text-align:right">Příjem</th>' +
        '<th style="text-align:right">Projekce</th><th>Lead time</th>' +
        '<th>Objednat do</th><th>Poznámka</th>' +
        '</tr></thead><tbody>';

      if (items.length === 0) {
        html += '<tr><td colspan="12" style="text-align:center;color:var(--text2);padding:32px;">Žádné materiály v tomto filtru</td></tr>';
      }

      items.forEach(item => {
        const projColor = item.projected_stock < 0 ? '#ef4444' : item.projected_stock <= item.min_stock ? '#f59e0b' : '#22c55e';
        const orderDate = item.order_by_date ? new Date(item.order_by_date).toLocaleDateString('cs-CZ') : '—';
        const isOverdue = item.order_by_date && new Date(item.order_by_date) <= new Date();
        const demandDate = item.earliest_demand_date ? new Date(item.earliest_demand_date).toLocaleDateString('cs-CZ') : '';

        // BOM info
        const bomInfo = item.bom_usage.length > 0
          ? item.bom_usage.map(b => b.product + ' (' + b.qty_per_unit + '/' + item.unit + ')').join(', ')
          : '';

        html += '<tr onclick="showForecastDetail(' + item.material_id + ')" style="cursor:pointer">' +
          '<td><span title="' + item.status_label + '">' + statusIcons[item.status] + '</span></td>' +
          '<td style="font-family:monospace;font-size:12px;color:var(--text2)">' + (item.code || '') + '</td>' +
          '<td><strong>' + item.name + '</strong></td>' +
          '<td style="font-size:12px">' + (item.supplier || '<span style="color:var(--text2)">—</span>') + '</td>' +
          '<td style="text-align:right;font-weight:600">' + item.current_stock + ' ' + item.unit + '</td>' +
          '<td style="text-align:right;color:var(--text2)">' + item.min_stock + '</td>' +
          '<td style="text-align:right;color:#ef4444;font-weight:500">' + (item.total_demand > 0 ? '-' + item.total_demand : '0') + '</td>' +
          '<td style="text-align:right;color:#3b82f6">' + (item.total_supply > 0 ? '+' + item.total_supply : '0') + '</td>' +
          '<td style="text-align:right;font-weight:700;color:' + projColor + '">' + item.projected_stock.toFixed(1) + '</td>' +
          '<td style="text-align:center">' + (item.lead_time_days > 0 ? item.lead_time_days + ' d' : '—') + '</td>' +
          '<td style="font-weight:600;' + (isOverdue ? 'color:#ef4444' : '') + '">' + orderDate + (isOverdue ? ' ⚠️' : '') + '</td>' +
          '<td style="font-size:11px;color:var(--text2);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + bomInfo + '">' +
            (bomInfo || (demandDate ? 'Potřeba: ' + demandDate : '')) +
          '</td>' +
        '</tr>';
      });

      html += '</tbody></table>';
      document.getElementById('forecast-table').innerHTML = html;
    }

    function showForecastDetail(materialId) {
      if (!_forecastData) return;
      const item = _forecastData.forecast.find(f => f.material_id === materialId);
      if (!item) return;

      const statusIcons = { critical: '🔴', warning: '🟡', ok: '🟢' };
      let html = '<div class="modal-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;" id="forecast-detail-overlay">' +
        '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;width:560px;max-width:95vw;max-height:85vh;overflow-y:auto;">' +
        '<div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">' +
          '<span style="font-size:20px">' + statusIcons[item.status] + '</span>' +
          '<div style="flex:1"><strong style="font-size:15px">' + item.name + '</strong><br><span style="font-size:12px;color:var(--text2)">' + (item.code || '') + ' · ' + item.status_label + '</span></div>' +
          '<button class="btn btn-sm" onclick="document.getElementById(\'forecast-detail-overlay\').remove()">✕</button>' +
        '</div>' +
        '<div style="padding:16px 20px;">';

      // Přehled čísel
      html += '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:16px;">' +
        '<div style="text-align:center;padding:10px;background:var(--bg);border-radius:8px;"><div style="font-size:20px;font-weight:700;color:#22c55e">' + item.current_stock + '</div><div style="font-size:11px;color:var(--text2)">Zásoba (' + item.unit + ')</div></div>' +
        '<div style="text-align:center;padding:10px;background:var(--bg);border-radius:8px;"><div style="font-size:20px;font-weight:700;color:#ef4444">' + item.total_demand + '</div><div style="font-size:11px;color:var(--text2)">Poptávka</div></div>' +
        '<div style="text-align:center;padding:10px;background:var(--bg);border-radius:8px;"><div style="font-size:20px;font-weight:700;color:#3b82f6">' + item.total_supply + '</div><div style="font-size:11px;color:var(--text2)">Příjem</div></div>' +
      '</div>';

      // Info
      html += '<div style="font-size:13px;margin-bottom:12px;">' +
        '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">Dodavatel</span><span>' + (item.supplier || '—') + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">Min. zásoba</span><span>' + item.min_stock + ' ' + item.unit + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">Lead time</span><span>' + (item.lead_time_days > 0 ? item.lead_time_days + ' dní' : '—') + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)"><span style="color:var(--text2)">Projekce zásoby</span><span style="font-weight:700;color:' + (item.projected_stock < 0 ? '#ef4444' : '#22c55e') + '">' + item.projected_stock.toFixed(1) + ' ' + item.unit + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text2)">Objednat do</span><span style="font-weight:600">' + (item.order_by_date ? new Date(item.order_by_date).toLocaleDateString('cs-CZ') : '—') + '</span></div>' +
      '</div>';

      // Poptávka (demands)
      if (item.demands.length > 0) {
        html += '<h4 style="font-size:13px;color:#ef4444;margin:12px 0 6px;">📤 Poptávka</h4><table class="data-table" style="font-size:12px"><thead><tr><th>Zdroj</th><th style="text-align:right">Množství</th><th>Termín</th></tr></thead><tbody>';
        item.demands.forEach(d => {
          html += '<tr><td>' + d.source + '</td><td style="text-align:right">-' + d.qty + '</td><td>' + (d.date ? new Date(d.date).toLocaleDateString('cs-CZ') : '—') + '</td></tr>';
        });
        html += '</tbody></table>';
      }

      // Příjem (supplies)
      if (item.supplies.length > 0) {
        html += '<h4 style="font-size:13px;color:#3b82f6;margin:12px 0 6px;">📥 Očekávaný příjem</h4><table class="data-table" style="font-size:12px"><thead><tr><th>Zdroj</th><th style="text-align:right">Množství</th><th>Termín</th></tr></thead><tbody>';
        item.supplies.forEach(s => {
          html += '<tr><td>' + s.source + '</td><td style="text-align:right">+' + s.qty + '</td><td>' + (s.date ? new Date(s.date).toLocaleDateString('cs-CZ') : '—') + '</td></tr>';
        });
        html += '</tbody></table>';
      }

      // BOM vazby
      if (item.bom_usage.length > 0) {
        html += '<h4 style="font-size:13px;color:#8b5cf6;margin:12px 0 6px;">🔧 Používá se ve výrobě</h4><table class="data-table" style="font-size:12px"><thead><tr><th>Produkt</th><th>Kód</th><th style="text-align:right">Spotřeba/ks</th></tr></thead><tbody>';
        item.bom_usage.forEach(b => {
          html += '<tr><td>' + b.product + '</td><td style="font-family:monospace">' + b.product_code + '</td><td style="text-align:right">' + b.qty_per_unit + ' ' + item.unit + '</td></tr>';
        });
        html += '</tbody></table>';
      }

      html += '</div></div></div>';
      document.getElementById('modal-root').innerHTML = html;

      // Zavřít klikem na overlay
      document.getElementById('forecast-detail-overlay').addEventListener('mousedown', function(e) {
        if (e.target === this) this.remove();
      });
    }

    // ============================================================
    // HELPERS
    // ============================================================
    function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

    // ============================================================
    // INIT
    // ============================================================
    loadStats();
    loadDashboard();
  </script>
</body>
</html>
