      };
      try {
        const r = await fetch('/api/fleet/vehicles/' + vehicleId + '/damage-events', {

          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }

    // ─── Záložky: Pneu management ──────────────────────────────────────────
    const SEASON_LABEL = { letni: '☀️ Letní', zimni: '❄️ Zimní' };
    // Prahy dezénu — frontend dublikát pro UI výpočty (musí sedět s backendem)
    const TIRE_DEPTH_WARN = {
      letni: { min: 2.0, max: 3.0 },
      zimni: { min: 4.0, max: 5.0 },
    };

    function tireDepthStatus(season, depth) {
      if (depth == null || isNaN(depth)) return { cls: 'badge-none', label: '—', txt: 'var(--text2)' };
      const th = TIRE_DEPTH_WARN[season];
      if (!th) return { cls: 'badge-none', label: depth + ' mm', txt: 'var(--text2)' };
      const d = Number(depth);
      if (d < th.min) return { cls: 'badge-expired', label: d + ' mm', txt: '#ef4444', msg: 'Pod minimem!' };
      if (d <= th.max) return { cls: 'badge-warning', label: d + ' mm', txt: '#f59e0b', msg: 'Pás upozornění' };
      return { cls: 'badge-ok', label: d + ' mm', txt: '#22c55e', msg: 'OK' };
    }

    function currentSeasonCZ() {
      const m = new Date().getMonth() + 1;
      return (m >= 11 || m <= 3) ? 'zimni' : 'letni';
    }

    async function loadTiresTab(vehicleId, panel) {
      panel.innerHTML = '<div class="veh-empty">Načítám pneu…</div>';
      try {
        const [changesResp, stockResp] = await Promise.all([
          fetch('/api/fleet/vehicles/' + vehicleId + '/tire-changes', { headers: authHeaders() }),
          fetch('/api/fleet/vehicles/' + vehicleId + '/tire-stock', { headers: authHeaders() }),
          ensureServiceProviders(), // Adresář firem pro dropdown při zakládání výměny
        ]);
        if (!changesResp.ok) throw new Error('HTTP ' + changesResp.status);
        const changes = await changesResp.json();
        const stock = stockResp.ok ? await stockResp.json() : [];

        const season = currentSeasonCZ();
        const mountedThisSeason = stock.find(t => t.mounted && t.season === season);
        const plannedChange = changes.find(c => c.status === 'planned');
        const totalCost = changes
          .filter(c => c.status === 'done')
          .reduce((s, c) => s + Number(c.cost_service || 0) + Number(c.cost_tires || 0), 0);

        // ─── VARONÍ BLOK
        let warningsHtml = '';
        const warns = [];
        if (!mountedThisSeason) {
          warns.push('Aktuálně je ' + (season === 'zimni' ? 'zimní období (1.11.-31.3.)' : 'letní období (1.4.-31.10.)') + ' a na tomhle voze není nasazena odpovídající sada pneu.');
        }
        for (const t of stock.filter(x => x.mounted)) {
          if (t.tread_depth_mm == null) continue;
          const st = tireDepthStatus(t.season, t.tread_depth_mm);
          if (st.cls === 'badge-warning') {
            warns.push(`${SEASON_LABEL[t.season]} pneu (${t.manufacturer || ''} ${t.model_name || ''}) má dezén ${t.tread_depth_mm} mm — blíží se výměna.`);
          } else if (st.cls === 'badge-expired') {
            warns.push(`❗ ${SEASON_LABEL[t.season]} pneu má dezén ${t.tread_depth_mm} mm, POD MINIMEM ${TIRE_DEPTH_WARN[t.season].min} mm — nutno vyměnit.`);
          }
        }
        if (warns.length) {
          warningsHtml = '<div style="background:rgba(245,158,11,0.1);border:1px solid rgba(245,158,11,0.35);border-radius:10px;padding:12px 14px;margin-bottom:14px;">' +
            '<div style="font-weight:600;color:#f59e0b;font-size:13px;margin-bottom:6px;">⚠️ Upozornění</div>' +
            '<ul style="margin:0;padding-left:18px;font-size:12px;color:var(--text);">' +
              warns.map(w => '<li>' + escHtml(w) + '</li>').join('') +
            '</ul>' +
          '</div>';
        }

        let html = warningsHtml;

        // ─── Statistiky
        html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;">' +
          '<div class="stat-card" style="flex:1;min-width:140px;"><div class="stat-label">Aktuálně nasazeno</div><div class="stat-value" style="font-size:15px;color:' + (mountedThisSeason ? '#22c55e' : '#f59e0b') + ';">' + (mountedThisSeason ? SEASON_LABEL[mountedThisSeason.season] + ' ✓' : 'Chybí sada') + '</div></div>' +
          '<div class="stat-card" style="flex:1;min-width:140px;"><div class="stat-label">Příští plánovaná výměna</div><div class="stat-value" style="font-size:14px;">' + (plannedChange ? fmtDateTime(plannedChange.scheduled_at) : '—') + '</div></div>' +
          '<div class="stat-card" style="flex:1;min-width:140px;"><div class="stat-label">Celkem na pneu</div><div class="stat-value">' + fmtMoney(totalCost) + '</div></div>' +
        '</div>';

        // ─── VÝMĚNY PNEU (plánování + historie)
        html += '<div class="form-section-title">🛞 Výměny pneu</div>';
        html += '<div id="tire-change-form-wrap"></div>';
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<button type="button" class="btn btn-primary btn-sm" onclick="showTireChangeForm(' + vehicleId + ', null)">+ Nová výměna</button>' +
          '<button type="button" class="btn btn-secondary btn-sm" onclick="openProviderDirectoryModal()" title="Spravovat adresář firem">📇 Adresář firem</button>' +
        '</div>';

        if (changes.length === 0) {
          html += '<div class="veh-empty">Zatím žádné výměny pneu.</div>';
        } else {
          html += '<div class="veh-list" style="margin-top:14px;">';
          changes.forEach(c => {
            const st = SERVICE_STATUS[c.status] || { label: c.status, color: 'var(--text2)' };
            const when = c.status === 'planned' ? fmtDateTime(c.scheduled_at) : fmtDateTime(c.done_at || c.scheduled_at);
            const total = Number(c.cost_service || 0) + Number(c.cost_tires || 0);
            const companyName = (c.service_company_ref && c.service_company_ref.name) || c.service_company;
            const branchLabels = (c.branches || [])
              .map(rel => rel && rel.branch ? formatBranchLabel(rel.branch) : null)
              .filter(Boolean);
            const placeStr = branchLabels.length ? branchLabels.join(' + ') : (c.location || '');
            html += '<div class="veh-item" style="flex-wrap:wrap;">' +
              '<div class="icon">' + (c.season === 'zimni' ? '❄️' : '☀️') + '</div>' +
              '<div class="body">' +
                '<div class="title">' + SEASON_LABEL[c.season] + ' výměna <span style="color:' + st.color + ';font-weight:500;font-size:11px;margin-left:6px;">' + st.label + '</span></div>' +
                '<div class="meta">' +
                  when + (companyName ? ' · 🏢 ' + escHtml(companyName) : '') +
                  (placeStr ? ' · 📍 ' + escHtml(placeStr) : '') +
                  (c.km_at_service ? ' · ' + c.km_at_service.toLocaleString('cs-CZ') + ' km' : '') +
                  (c.order_number ? ' · 🧾 ' + escHtml(c.order_number) : '') +
                  (c.cost_service ? ' · úkon ' + fmtMoney(c.cost_service) : '') +
                  (c.cost_tires ? ' · pneu ' + fmtMoney(c.cost_tires) : '') +
                  (total ? ' · celkem ' + fmtMoney(total) : '') +
                '</div>' +
                (c.note ? '<div style="font-size:11px;color:var(--text2);margin-top:3px;font-style:italic;">' + escHtml(c.note) + '</div>' : '') +
              '</div>' +
              '<div class="actions">' +
                (c.invoice_url ? '<a class="dl" href="' + escHtml(c.invoice_url) + '" target="_blank" rel="noopener" title="Otevřít fakturu">📎 Faktura</a>' : '') +
                (c.protocol_url ? '<a class="dl" href="' + escHtml(c.protocol_url) + '" target="_blank" rel="noopener" title="Otevřít protokol / dodací list">📋 Protokol</a>' : '') +
                (c.status === 'planned' ? '<button type="button" class="btn btn-sm btn-primary" onclick="confirmTireChange(' + c.id + ',' + vehicleId + ')" title="Potvrdit provedení">✓ Hotovo</button>' : '') +
                '<button type="button" class="btn btn-sm btn-secondary" onclick="showTireChangeForm(' + vehicleId + ',' + c.id + ')">✏️</button>' +
                '<button type="button" class="btn btn-sm btn-danger" onclick="deleteTireChange(' + c.id + ',' + vehicleId + ')">🗑️</button>' +
              '</div>' +
            '</div>';
          });
          html += '</div>';
        }

        // ─── SKLAD PNEU
        html += '<div class="form-section-title" style="margin-top:24px;">📦 Sklad pneu pro tohle vozidlo</div>';
        html += '<div id="tire-stock-form-wrap"></div>';
        html += '<button type="button" class="btn btn-secondary btn-sm" onclick="showTireStockForm(' + vehicleId + ', null)">+ Přidat pneu</button>';

        if (stock.length === 0) {
          html += '<div class="veh-empty">Žádné pneu naskladněné pro tohle vozidlo.</div>';
        } else {
          html += '<div class="veh-list" style="margin-top:14px;">';
          stock.forEach(t => {
            const st = tireDepthStatus(t.season, t.tread_depth_mm);
            const mountedBadge = t.mounted
              ? '<span class="badge badge-ok" style="margin-left:6px;">NASAZENO</span>'
              : '<span class="badge badge-none" style="margin-left:6px;">ve skladu</span>';
            html += '<div class="veh-item" style="flex-wrap:wrap;">' +
              '<div class="icon">' + (t.season === 'zimni' ? '❄️' : '☀️') + '</div>' +
              '<div class="body">' +
                '<div class="title">' + SEASON_LABEL[t.season] + ' — ' + escHtml((t.manufacturer || '') + ' ' + (t.model_name || '')).trim() + mountedBadge + '</div>' +
                '<div class="meta">' +
                  (t.tire_size ? escHtml(t.tire_size) : '') +
                  (t.dot_code ? ' · DOT ' + escHtml(t.dot_code) : '') +
                  (t.storage_location ? ' · 📦 ' + escHtml(t.storage_location) : '') +
                  ' · dezén: <span style="color:' + st.txt + ';font-weight:600;">' + st.label + '</span>' +
                  (st.msg ? ' (' + st.msg + ')' : '') +
                '</div>' +
              '</div>' +
              '<div class="actions">' +
                '<button type="button" class="btn btn-sm btn-secondary" onclick="showTireStockForm(' + vehicleId + ',' + t.id + ')">✏️</button>' +
                '<button type="button" class="btn btn-sm btn-danger" onclick="deleteTireStock(' + t.id + ',' + vehicleId + ')">🗑️</button>' +
              '</div>' +
            '</div>';
          });
          html += '</div>';
        }

        panel.innerHTML = html;
        window._tireChangesCache = changes;
        window._tireStockCache = stock;
      } catch (e) {
        panel.innerHTML = '<div class="veh-empty">Chyba: ' + escHtml(e.message) + '</div>';
      }
    }

    // ─── Výměny pneu — form
    function showTireChangeForm(vehicleId, changeId) {
      const wrap = document.getElementById('tire-change-form-wrap');
      if (!wrap) return;
      let c = { season:'letni', scheduled_at:'', done_at:'', service_company:'', location:'', cost_service:'', cost_tires:'', invoice_number:'', note:'', status:'planned', km_at_service:'', order_number:'', branches:[] };
      if (changeId) {
        const found = (window._tireChangesCache || []).find(x => x.id === changeId);
        if (found) c = found;
      }
      const seasonOpts = Object.entries(SEASON_LABEL)
        .map(([k, label]) => '<option value="' + k + '"' + (c.season === k ? ' selected' : '') + '>' + label + '</option>').join('');
      const statusOpts = Object.entries(SERVICE_STATUS)
        .map(([k, o]) => '<option value="' + k + '"' + (c.status === k ? ' selected' : '') + '>' + o.label + '</option>').join('');

      const selectedCompanyId = c.service_company_id != null ? c.service_company_id : null;
      const companySelect = serviceProviderSelectHtml('tc-company-id', selectedCompanyId, 'tc');
      const selectedBranchIds = (c.branches || []).map(rel => rel.branch ? rel.branch.id : rel.branch_id).filter(Boolean);
      const branchPicker = branchPickerHtml('tc', selectedCompanyId, selectedBranchIds);

      wrap.innerHTML = '<div class="policy-card">' +
        '<div class="form-grid">' +
          '<div class="form-group"><label>Sezóna *</label><select id="tc-season">' + seasonOpts + '</select></div>' +
          '<div class="form-group"><label>Stav</label><select id="tc-status">' + statusOpts + '</select></div>' +
          '<div class="form-group"><label>Plánovaný termín</label><input type="datetime-local" id="tc-scheduled" value="' + fmtDateTimeInput(c.scheduled_at) + '"></div>' +
          '<div class="form-group"><label>Provedeno (datum + čas)</label><input type="datetime-local" id="tc-done" value="' + fmtDateTimeInput(c.done_at) + '"></div>' +
          '<div class="form-group full"><label>Firma / pneuservis (z adresáře)</label>' + companySelect + '</div>' +
          '<div class="form-group"><label>Stav kilometrů</label><input type="number" id="tc-km" value="' + (c.km_at_service || '') + '" min="0"></div>' +
          '<div class="form-group"><label>Číslo zakázky</label><input type="text" id="tc-order" value="' + escHtml(c.order_number || '') + '" placeholder="např. ZAK-2026-0042"></div>' +
          '<div class="form-group full"><label>Místo výměny (provozovna)</label>' + branchPicker + '</div>' +
          '<div class="form-group full"><label>Volitelně: vlastní popis místa <span style="font-size:11px;color:var(--text2);font-weight:400;">(když firma není v adresáři)</span></label><input type="text" id="tc-location" value="' + escHtml(c.location || '') + '" placeholder="např. Pneuservis Brno, U přejezdu 12"></div>' +
          '<div class="form-group"><label>Cena za úkon (výměna/vyvážení, Kč)</label><input type="number" id="tc-labor" value="' + (c.cost_service || '') + '" step="0.01" min="0"></div>' +
          '<div class="form-group"><label>Cena za pneu (Kč)</label><input type="number" id="tc-tires" value="' + (c.cost_tires || '') + '" step="0.01" min="0"></div>' +
          '<div class="form-group"><label>Číslo faktury</label><input type="text" id="tc-invoice-num" value="' + escHtml(c.invoice_number || '') + '"></div>' +
          '<div class="form-group"><label>Faktura (PDF/obrázek)' + (c.invoice_url ? ' <a href="' + escHtml(c.invoice_url) + '" target="_blank" style="color:#0ea5e9;font-size:11px;">(aktuální ↗)</a>' : '') + '</label><input type="file" id="tc-invoice-file" accept="image/*,application/pdf"></div>' +
          // Protokol / dodací list — analogicky jako faktura. Pokud už existuje, ukážeme odkaz na aktuální.
          '<div class="form-group"><label>Protokol / dodací list (PDF/obrázek)' + (c.protocol_url ? ' <a href="' + escHtml(c.protocol_url) + '" target="_blank" style="color:#0ea5e9;font-size:11px;">(aktuální ↗)</a>' : '') + '</label><input type="file" id="tc-protocol-file" accept="image/*,application/pdf"></div>' +
          '<div class="form-group full"><label>Poznámka</label><textarea id="tc-note">' + escHtml(c.note || '') + '</textarea></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">' +
          '<button type="button" class="btn btn-sm btn-secondary" onclick="cancelTireChangeForm()">Zrušit</button>' +
          '<button type="button" class="btn btn-sm btn-primary" onclick="saveTireChange(' + vehicleId + ',' + (changeId || 'null') + ')">' + (changeId ? 'Uložit změny' : 'Vytvořit výměnu') + '</button>' +
        '</div>' +
      '</div>';
    }

    function cancelTireChangeForm() {
      const wrap = document.getElementById('tire-change-form-wrap');
      if (wrap) wrap.innerHTML = '';
    }

    async function saveTireChange(vehicleId, changeId) {
      const companyIdVal = document.getElementById('tc-company-id').value;
      const data = {
        season: document.getElementById('tc-season').value,
        scheduled_at: document.getElementById('tc-scheduled').value || null,
        done_at: document.getElementById('tc-done').value || null,
        service_company_id: companyIdVal ? parseInt(companyIdVal) : null,
        service_company: null, // text se vygeneruje na serveru z FK
        location: document.getElementById('tc-location').value.trim() || null,
        branch_ids: getSelectedBranchIds('tc'),
        km_at_service: (function () { const v = document.getElementById('tc-km').value; return v ? parseInt(v) : null; })(),
        order_number: document.getElementById('tc-order').value.trim() || null,
        cost_service: (function () { const v = document.getElementById('tc-labor').value; return v ? parseFloat(v) : null; })(),
        cost_tires: (function () { const v = document.getElementById('tc-tires').value; return v ? parseFloat(v) : null; })(),
        invoice_number: document.getElementById('tc-invoice-num').value.trim() || null,
        note: document.getElementById('tc-note').value.trim() || null,
        status: document.getElementById('tc-status').value,
      };
      const fileEl = document.getElementById('tc-invoice-file');
      if (fileEl.files && fileEl.files[0]) {
        const file = fileEl.files[0];
        if (file.size > 20 * 1024 * 1024) { alert('Faktura je větší než 20 MB.'); return; }
        data.invoice_file_data = await fileToBase64(file);
        data.invoice_file_name = file.name;
        data.invoice_mime = file.type || null;
      }
      // Protokol / dodací list — totéž jako faktura, jen do jiných polí.
      const protocolEl = document.getElementById('tc-protocol-file');
      if (protocolEl && protocolEl.files && protocolEl.files[0]) {
        const file = protocolEl.files[0];
        if (file.size > 20 * 1024 * 1024) { alert('Protokol je větší než 20 MB.'); return; }
        data.protocol_file_data = await fileToBase64(file);
        data.protocol_file_name = file.name;
        data.protocol_mime = file.type || null;
      }
      try {
        const url = changeId ? '/api/fleet/tire-changes/' + changeId : '/api/fleet/vehicles/' + vehicleId + '/tire-changes';
        const r = await fetch(url, {
          method: changeId ? 'PUT' : 'POST',
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="tires"]');
        if (panel) await loadTiresTab(vehicleId, panel);
        await loadVehicles();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function confirmTireChange(changeId, vehicleId) {
      if (!confirm('Potvrdit, že výměna byla provedena?')) return;
      try {
        const r = await fetch('/api/fleet/tire-changes/' + changeId + '/confirm', { method: 'POST', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="tires"]');
        if (panel) await loadTiresTab(vehicleId, panel);
        await loadVehicles();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function deleteTireChange(changeId, vehicleId) {
      if (!confirm('Opravdu smazat tuto výměnu?')) return;
      try {
        const r = await fetch('/api/fleet/tire-changes/' + changeId, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="tires"]');
        if (panel) await loadTiresTab(vehicleId, panel);
        await loadVehicles();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Sklad pneu — form
    function showTireStockForm(vehicleId, tireId) {
      const wrap = document.getElementById('tire-stock-form-wrap');
      if (!wrap) return;
      let t = { season:'letni', tire_size:'', manufacturer:'', model_name:'', dot_code:'', tread_depth_mm:'', storage_location:'', mounted:false, purchase_price:'', invoice_number:'', note:'' };
      if (tireId) {
        const found = (window._tireStockCache || []).find(x => x.id === tireId);
        if (found) t = found;
      }
      const seasonOpts = Object.entries(SEASON_LABEL)
        .map(([k, label]) => '<option value="' + k + '"' + (t.season === k ? ' selected' : '') + '>' + label + '</option>').join('');

      wrap.innerHTML = '<div class="policy-card">' +
        '<div class="form-grid">' +
          '<div class="form-group"><label>Sezóna *</label><select id="ts-season">' + seasonOpts + '</select></div>' +
          '<div class="form-group"><label>Rozměr</label><input type="text" id="ts-size" value="' + escHtml(t.tire_size || '') + '" placeholder="205/55 R16 91H"></div>' +
          '<div class="form-group"><label>Výrobce</label><input type="text" id="ts-manuf" value="' + escHtml(t.manufacturer || '') + '" placeholder="Continental"></div>' +
          '<div class="form-group"><label>Model</label><input type="text" id="ts-model" value="' + escHtml(t.model_name || '') + '" placeholder="WinterContact TS870"></div>' +
          '<div class="form-group"><label>DOT kód</label><input type="text" id="ts-dot" value="' + escHtml(t.dot_code || '') + '" placeholder="4322"></div>' +
          '<div class="form-group"><label>Hloubka dezénu (mm)</label><input type="number" id="ts-depth" value="' + (t.tread_depth_mm || '') + '" step="0.1" min="0" max="15"></div>' +
          '<div class="form-group full"><label>Pozice ve skladu</label><input type="text" id="ts-location" value="' + escHtml(t.storage_location || '') + '" placeholder="Regál A3, pozice 14"></div>' +
          '<div class="form-group"><label>Cena pořízení (Kč)</label><input type="number" id="ts-price" value="' + (t.purchase_price || '') + '" step="0.01" min="0"></div>' +
          '<div class="form-group"><label>Číslo faktury</label><input type="text" id="ts-invoice" value="' + escHtml(t.invoice_number || '') + '"></div>' +
          '<div class="form-group full"><label><input type="checkbox" id="ts-mounted"' + (t.mounted ? ' checked' : '') + '> Aktuálně namontováno na voze (toto je NASAZENÁ sada)</label></div>' +
          '<div class="form-group full"><label>Poznámka</label><textarea id="ts-note">' + escHtml(t.note || '') + '</textarea></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">' +
          '<button type="button" class="btn btn-sm btn-secondary" onclick="cancelTireStockForm()">Zrušit</button>' +
          '<button type="button" class="btn btn-sm btn-primary" onclick="saveTireStock(' + vehicleId + ',' + (tireId || 'null') + ')">' + (tireId ? 'Uložit změny' : 'Přidat pneu do skladu') + '</button>' +
        '</div>' +
      '</div>';
    }

    function cancelTireStockForm() {
      const wrap = document.getElementById('tire-stock-form-wrap');
      if (wrap) wrap.innerHTML = '';
    }

    async function saveTireStock(vehicleId, tireId) {
      const data = {
        vehicle_id: vehicleId,
        season: document.getElementById('ts-season').value,
        tire_size: document.getElementById('ts-size').value.trim() || null,
        manufacturer: document.getElementById('ts-manuf').value.trim() || null,
        model_name: document.getElementById('ts-model').value.trim() || null,
        dot_code: document.getElementById('ts-dot').value.trim() || null,
        tread_depth_mm: (function () { const v = document.getElementById('ts-depth').value; return v ? parseFloat(v) : null; })(),
        storage_location: document.getElementById('ts-location').value.trim() || null,
        purchase_price: (function () { const v = document.getElementById('ts-price').value; return v ? parseFloat(v) : null; })(),
        invoice_number: document.getElementById('ts-invoice').value.trim() || null,
        mounted: document.getElementById('ts-mounted').checked,
        note: document.getElementById('ts-note').value.trim() || null,
      };
      try {
        const url = tireId ? '/api/fleet/tire-stock/' + tireId : '/api/fleet/tire-stock';
        const r = await fetch(url, {
          method: tireId ? 'PUT' : 'POST',
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="tires"]');
        if (panel) await loadTiresTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function deleteTireStock(tireId, vehicleId) {
      if (!confirm('Opravdu smazat tuto pneumatiku ze skladu?')) return;
      try {
        const r = await fetch('/api/fleet/tire-stock/' + tireId, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="tires"]');
        if (panel) await loadTiresTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // Quick-create výměny pneu z top-baru
    function openQuickTireChangeModal() {
      if (!vehicles || !vehicles.length) { alert('Nejdřív musí existovat alespoň jedno vozidlo.'); return; }
      const vehicleOpts = vehicles
        .filter(v => v.active !== false)
        .map(v => '<option value="' + v.id + '">' + escHtml((v.license_plate || '—') + ' · ' + (v.model || '') + (v.company ? ' (' + v.company + ')' : '')) + '</option>').join('');
      const seasonOpts = Object.entries(SEASON_LABEL)
        .map(([k, l]) => '<option value="' + k + '"' + (k === currentSeasonCZ() ? ' selected' : '') + '>' + l + '</option>').join('');

      document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="width:620px;">' +
        '<h2>🛞 Nová výměna pneu</h2>' +
        '<div class="form-grid">' +
          '<div class="form-group full"><label>Vozidlo *</label><select id="qt-vehicle">' + vehicleOpts + '</select></div>' +
          '<div class="form-group"><label>Sezóna *</label><select id="qt-season">' + seasonOpts + '</select></div>' +
          '<div class="form-group"><label>Plánovaný termín *</label><input type="datetime-local" id="qt-scheduled"></div>' +
          '<div class="form-group full"><label>Místo / pneuservis</label><input type="text" id="qt-location" placeholder="Pneuservis Brno, Bauerova 10"></div>' +
          '<div class="form-group full"><label>Poznámka</label><textarea id="qt-note" rows="3"></textarea></div>' +
        '</div>' +
        '<div class="modal-actions">' +
          '<button type="button" class="btn btn-secondary" onclick="closeModal()">Zrušit</button>' +
          '<button type="button" class="btn btn-primary" onclick="saveQuickTireChange()">Naplánovat výměnu</button>' +
        '</div>' +
      '</div></div>';
    }

    async function saveQuickTireChange() {
      const vehicleId = parseInt(document.getElementById('qt-vehicle').value);
      const scheduled = document.getElementById('qt-scheduled').value;
      if (!vehicleId || !scheduled) { alert('Vyber vozidlo a termín.'); return; }
      const data = {
        season: document.getElementById('qt-season').value,
        scheduled_at: scheduled,
        location: document.getElementById('qt-location').value.trim() || null,
        note: document.getElementById('qt-note').value.trim() || null,
        status: 'planned',
      };
      try {
        const r = await fetch('/api/fleet/vehicles/' + vehicleId + '/tire-changes', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        closeModal();
        await loadVehicles();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Init ──────────────────────────────────────────────────────────────
    (async function() {
      initCompanyFilter();
      // Otevřít modal vozidla pokud je ?id=X v URL (kliknutí z notifikace)
      await Promise.all([loadDrivers(), loadVehicles(), loadStats()]);
      const params = new URLSearchParams(window.location.search);
      const openId = params.get('id');
      if (openId) openVehicleModal(parseInt(openId));
    })();
  </script>
