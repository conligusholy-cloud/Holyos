<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vozový park | HOLYOS</title>
  <link rel="icon" type="image/svg+xml" href="../../logo-holyos-icon.svg">
  <base href="../../">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .main-wrapper { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .page-header {
      display:flex; align-items:center; gap:12px; padding:20px 24px;
      border-bottom:1px solid var(--border); flex-wrap:wrap;
    }
    .page-header h1 { font-size:18px; font-weight:700; margin:0; }
    .page-header .count { font-size:13px; color:var(--text2); margin-left:4px; }
    .search-box {
      margin-left:auto; padding:8px 14px; background:var(--surface2); color:var(--text);
      border:1px solid var(--border); border-radius:8px; font-size:13px; width:240px;
    }
    .search-box:focus { border-color:var(--accent); outline:none; }

    .content { padding:0 24px 24px; }
    .toolbar { display:flex; gap:12px; margin:16px 0; align-items:center; flex-wrap:wrap; }

    .btn { padding:8px 18px; border-radius:8px; border:1px solid var(--border); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; background:transparent; color:var(--text); }
    .btn-primary { background:#0ea5e9; color:#fff; border-color:#0ea5e9; }
    .btn-primary:hover { background:#0284c7; }
    .btn-secondary { background:var(--surface2); color:var(--text); }
    .btn-secondary:hover { background:var(--border); }
    .btn-danger { background:rgba(239,68,68,0.15); color:#ef4444; border-color:rgba(239,68,68,0.3); }
    .btn-danger:hover { background:rgba(239,68,68,0.25); }
    .btn-sm { padding:5px 12px; font-size:12px; }

    .stats-row { display:grid; grid-template-columns:repeat(auto-fit, minmax(160px, 1fr)); gap:12px; margin-bottom:16px; }
    .stat-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
    .stat-card .stat-label { font-size:11px; color:var(--text2); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:4px; }
    .stat-card .stat-value { font-size:22px; font-weight:700; }
    .stat-card.warn { border-color:rgba(245,158,11,0.3); background:rgba(245,158,11,0.06); }
    .stat-card.warn .stat-value { color:#f59e0b; }
    .stat-card.danger { border-color:rgba(239,68,68,0.3); background:rgba(239,68,68,0.06); }
    .stat-card.danger .stat-value { color:#ef4444; }

    .filters { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .filter-select { padding:6px 10px; background:var(--surface2); color:var(--text); border:1px solid var(--border); border-radius:7px; font-size:12px; }

    .data-table { width:100%; border-collapse:separate; border-spacing:0; }
    .data-table thead { position:sticky; top:0; z-index:1; }
    .data-table th { background:var(--surface2); padding:10px 12px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); border-bottom:1px solid var(--border); }
    .data-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
    .data-table tr:hover td { background:rgba(14,165,233,0.06); }

    .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
    .badge-ok      { background:rgba(34,197,94,0.15); color:#22c55e; }
    .badge-warning { background:rgba(245,158,11,0.18); color:#f59e0b; }
    .badge-expired { background:rgba(239,68,68,0.18); color:#ef4444; }
    .badge-none    { background:rgba(148,163,184,0.15); color:#94a3b8; }
    .badge-cat     { background:rgba(14,165,233,0.15); color:#0ea5e9; }

    .spz { font-family:monospace; font-weight:700; letter-spacing:0.5px; }

    .modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.6); z-index:200; display:flex; align-items:center; justify-content:center; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:14px; padding:28px; width:840px; max-width:95vw; max-height:90vh; overflow-y:auto; }
    .modal h2 { font-size:18px; margin-bottom:20px; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:24px; padding-top:16px; border-top:1px solid var(--border); }

    /* Záložky v modalu */
    .veh-tabs { display:flex; gap:2px; border-bottom:1px solid var(--border); margin-bottom:18px; flex-wrap:wrap; }
    .veh-tab { padding:10px 16px; background:transparent; border:none; color:var(--text2); font-size:13px; font-weight:500; cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color 0.15s, border-color 0.15s; }
    .veh-tab:hover { color:var(--text); }
    .veh-tab.active { color:#a78bfa; border-bottom-color:#a78bfa; }
    .veh-tab-panel { display:none; }
    .veh-tab-panel.active { display:block; }

    /* Upload zone (drag & drop) */
    .veh-upload { border:2px dashed var(--border); border-radius:10px; padding:22px; text-align:center; color:var(--text2); font-size:13px; cursor:pointer; transition:border-color 0.15s, background 0.15s; margin-bottom:12px; }
    .veh-upload:hover, .veh-upload.dragging { border-color:#a78bfa; background:rgba(168,139,250,0.06); color:var(--text); }
    .veh-upload input[type=file] { display:none; }

    /* List dokumentů / pojistek */
    .veh-list { display:flex; flex-direction:column; gap:8px; }
    .veh-item { display:flex; align-items:center; gap:12px; padding:10px 14px; background:var(--bg); border:1px solid var(--border); border-radius:8px; }
    .veh-item .icon { font-size:22px; flex-shrink:0; }
    .veh-item .body { flex:1; min-width:0; }
    .veh-item .title { font-size:13px; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .veh-item .meta { font-size:11px; color:var(--text2); margin-top:2px; }
    .veh-item .actions { display:flex; gap:6px; flex-shrink:0; }
    .veh-item a.dl { color:#0ea5e9; text-decoration:none; font-size:12px; padding:4px 10px; border-radius:6px; border:1px solid rgba(14,165,233,0.3); }
    .veh-item a.dl:hover { background:rgba(14,165,233,0.1); }
    .veh-empty { padding:28px; text-align:center; color:var(--text2); font-size:12px; font-style:italic; }

    /* Policy form (in Pojištění tab) */
    .policy-card { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:14px; margin-bottom:10px; }
    .policy-card header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; }
    .policy-card header .type-badge { padding:3px 10px; border-radius:10px; font-size:11px; font-weight:600; }
    .policy-card header .type-badge.pov { background:rgba(14,165,233,0.18); color:#0ea5e9; }
    .policy-card header .type-badge.havarijni { background:rgba(168,139,250,0.18); color:#a78bfa; }
    .policy-card header .type-badge.jine { background:rgba(148,163,184,0.15); color:#94a3b8; }

    .form-section-title { font-size:13px; font-weight:600; color:var(--text); margin:18px 0 8px; padding-bottom:4px; border-bottom:1px solid var(--border); }
    .form-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .form-group { display:flex; flex-direction:column; gap:4px; }
    .form-group.full { grid-column:1 / -1; }
    .form-group label { font-size:12px; font-weight:500; color:var(--text2); }
    .form-group input, .form-group select, .form-group textarea { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; color:var(--text); font-size:14px; font-family:inherit; line-height:1.4; }
    .form-group textarea { min-height:180px; resize:vertical; padding:14px 16px; font-size:15px; line-height:1.5; }

    .empty-state { text-align:center; padding:60px 20px; color:var(--text2); }
    .empty-state .empty-icon { font-size:48px; margin-bottom:12px; }
    .empty-state h3 { font-size:16px; color:var(--text); margin-bottom:6px; }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="main-wrapper">
    <div class="page-header">
      <span style="font-size:28px;">🚐</span>
      <div>
        <h1>Vozový park <span class="count" id="veh-count"></span></h1>
      </div>
      <input type="text" class="search-box" id="veh-search" placeholder="Hledat SPZ, model, VIN..." oninput="applyFilters()">
      <button class="btn btn-secondary" onclick="checkExpirations()" title="Vytvořit notifikace na blížící se termíny">🔔 Zkontrolovat termíny</button>
      <button class="btn btn-secondary" onclick="openQuickServiceModal()" title="Naplánovat servis pro libovolné vozidlo">🔧 + Nový servis</button>
      <button class="btn btn-secondary" onclick="openQuickTireChangeModal()" title="Naplánovat výměnu pneu">🛞 + Výměna pneu</button>
      <button class="btn btn-secondary" onclick="openQuickDamageModal()" title="Zaznamenat škodní událost">⚠️ + Škodní událost</button>
      <button class="btn btn-primary" onclick="openVehicleModal()">+ Nové vozidlo</button>
    </div>

    <div class="content">
      <!-- Statistiky -->
      <div class="stats-row" id="stats-row"></div>

      <!-- Filtry -->
      <div class="toolbar">
        <div class="filters">
          <select class="filter-select" id="filter-category" onchange="applyFilters()">
            <option value="">Všechny kategorie</option>
            <option>Osobní vůz</option>
            <option>Dodávka</option>
            <option>Nákladní</option>
            <option>Motocykl</option>
            <option>Přívěsný vozík</option>
            <option>Pracovní stroj</option>
            <option>Jiné</option>
          </select>
          <select class="filter-select" id="filter-status" onchange="applyFilters()">
            <option value="">Všechny stavy</option>
            <option value="expired">⚠️ Po termínu</option>
            <option value="warning">🕒 Blíží se termín (≤30 dnů)</option>
            <option value="ok">✅ V pořádku</option>
          </select>
          <select class="filter-select" id="filter-active" onchange="applyFilters()">
            <option value="true">Aktivní</option>
            <option value="false">Vyřazená</option>
            <option value="">Vše</option>
          </select>
          <select class="filter-select" id="filter-company" onchange="applyFilters()">
            <option value="">Všechny firmy</option>
          </select>
        </div>
      </div>

      <div id="vehicles-table"></div>
    </div>
  </div>
  <div id="modal-root"></div>
  <!-- Oddělený root pro modály adresáře firem, aby se mohly stackovat nad detailem vozidla. -->
  <div id="provider-modal-root"></div>

  <script>
    var s = document.createElement('script');
    s.src = 'js/sidebar.js?v=' + Date.now();
    s.onload = function() { renderSidebar('vozovy-park'); };
    document.head.appendChild(s);
  </script>

  <script>
    // ─── Stav ───────────────────────────────────────────────────────────────
    const FINANCING_TYPES = {
      'operativni_leasing': 'Operativní leasing',
      'vlastnictvi_firmy':  'Ve vlastnictví firmy',
      'financni_leasing':   'Finanční leasing',
      'uver':               'Na úvěr',
      'jine':               'Jiné',
    };

    // Firmy vlastnící / provozující vozidla — dropdown v kartě vozu
    // a zobrazení v tabulce jako první sloupec za SPZ.
    const COMPANIES = ['Best Series', 'Špagetka', 'JTP services'];

    let vehicles = [];
    let drivers = [];

    // ─── Helpery ────────────────────────────────────────────────────────────
    function authHeaders() {
      const h = { 'Content-Type': 'application/json' };
      const t = sessionStorage.getItem('token');
      if (t) h['Authorization'] = 'Bearer ' + t;
      return h;
    }

    function fmtDate(d) {
      if (!d) return '—';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return '—';
      return dt.toLocaleDateString('cs-CZ');
    }

    function statusBadge(status, days, date) {
      if (!date) return '<span class="badge badge-none">—</span>';
      if (status === 'expired') return '<span class="badge badge-expired">Po termínu (' + Math.abs(days) + ' dnů)</span>';
      if (status === 'warning') return '<span class="badge badge-warning">' + days + ' dnů</span>';
      if (status === 'ok') return '<span class="badge badge-ok">OK (' + days + ' dnů)</span>';
      return '<span class="badge badge-none">—</span>';
    }

    function escHtml(s) {
      if (s === null || s === undefined) return '';
      return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
    }

    // ─── Načtení dat ────────────────────────────────────────────────────────
    async function loadVehicles() {
      try {
        const params = new URLSearchParams();
        const active = document.getElementById('filter-active').value;
        if (active) params.set('active', active);
        const r = await fetch('/api/fleet/vehicles?' + params.toString(), { headers: authHeaders() });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        vehicles = await r.json();
        // Po načtení dat aplikujeme aktuálně vybrané filtry (kategorie, firma,
        // hledání…), aby se po uložení karty vozu nezobrazila neúplná kategorie
        // „Všechny" a uživatel zůstal v původně vybrané kategorii.
        applyFilters();
      } catch (e) {
        console.error(e);
        document.getElementById('vehicles-table').innerHTML = '<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Nepodařilo se načíst vozidla</h3><p>' + escHtml(e.message) + '</p></div>';
      }
    }

    async function loadDrivers() {
      try {
        const r = await fetch('/api/fleet/drivers', { headers: authHeaders() });
        if (r.ok) drivers = await r.json();
      } catch (e) { console.error(e); }
    }

    async function loadStats() {
      try {
        const r = await fetch('/api/fleet/stats', { headers: authHeaders() });
        if (!r.ok) return;
        const stats = await r.json();
        const expiredSum = stats.insurance.expired + stats.stk.expired + stats.toll.expired;
        const warnSum = stats.insurance.warning + stats.stk.warning + stats.toll.warning;
        const row = document.getElementById('stats-row');
        row.innerHTML =
          '<div class="stat-card"><div class="stat-label">Celkem aktivních</div><div class="stat-value">' + stats.total + '</div></div>' +
          '<div class="stat-card ' + (expiredSum > 0 ? 'danger' : '') + '"><div class="stat-label">Po termínu</div><div class="stat-value">' + expiredSum + '</div></div>' +
          '<div class="stat-card ' + (warnSum > 0 ? 'warn' : '') + '"><div class="stat-label">Blíží se termín (≤30 dní)</div><div class="stat-value">' + warnSum + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">Osobních vozů</div><div class="stat-value">' + (stats.by_category['Osobní vůz'] || 0) + '</div></div>' +
          '<div class="stat-card"><div class="stat-label">Dodávek</div><div class="stat-value">' + (stats.by_category['Dodávka'] || 0) + '</div></div>';
      } catch (e) { console.error(e); }
    }

    // ─── Filtrace a render ──────────────────────────────────────────────────
    function applyFilters() {
      const q = document.getElementById('veh-search').value.toLowerCase();
      const cat = document.getElementById('filter-category').value;
      const st  = document.getElementById('filter-status').value;
      const active = document.getElementById('filter-active').value;
      const company = document.getElementById('filter-company').value;

      let filtered = vehicles.slice();
      if (cat) filtered = filtered.filter(v => v.category === cat);
      if (active !== '') filtered = filtered.filter(v => v.active === (active === 'true'));
      if (company) filtered = filtered.filter(v => v.company === company);
      if (st) filtered = filtered.filter(v => v.insurance_status === st || v.stk_status === st || v.toll_status === st);
      if (q) {
        filtered = filtered.filter(v =>
          (v.license_plate || '').toLowerCase().includes(q) ||
          (v.model || '').toLowerCase().includes(q) ||
          (v.vin || '').toLowerCase().includes(q));
      }
      renderTable(filtered);
    }

    // Naplnit dropdown filter-company podle COMPANIES (jen jednou při init)
    function initCompanyFilter() {
      const sel = document.getElementById('filter-company');
      if (!sel) return;
      COMPANIES.forEach(function (c) {
        const opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        sel.appendChild(opt);
      });
    }

    function renderTable(list) {
      const data = list || vehicles;
      document.getElementById('veh-count').textContent = '(' + data.length + ')';
      const el = document.getElementById('vehicles-table');
      if (!data.length) {
        el.innerHTML = '<div class="empty-state"><div class="empty-icon">🚐</div><h3>Žádná vozidla</h3><p>Přidejte první vozidlo tlačítkem vpravo nahoře.</p></div>';
        return;
      }

      let html = '<table class="data-table"><thead><tr>' +
        '<th>SPZ</th>' +
        '<th>Firma</th>' +
        '<th>Vozidlo</th>' +
        '<th>Řidič</th>' +
        '<th>Kategorie</th>' +
        '<th>POV do</th>' +
        '<th>Stav POV</th>' +
        '<th>STK do</th>' +
        '<th>Stav STK</th>' +
        '<th>Známka do</th>' +
        '<th>Stav známky</th>' +
        '<th>Výměna pneu</th>' +
        '<th>Servis</th>' +
        '<th>Financování</th>' +
        '<th style="width:100px;">Akce</th>' +
      '</tr></thead><tbody>';

      for (const v of data) {
        const driverCell = v.driver
          ? escHtml(v.driver.first_name + ' ' + v.driver.last_name)
          : '<span style="color:var(--text2);font-size:12px;font-style:italic;">+ přiřadit</span>';
        const financing = v.financing_type ? FINANCING_TYPES[v.financing_type] || v.financing_type : (v.financing_owner || '—');
        const companyCell = v.company
          ? '<span class="badge badge-cat" style="background:rgba(168,139,250,0.15);color:#a78bfa;">' + escHtml(v.company) + '</span>'
          : '<span style="color:var(--text2);font-size:12px;font-style:italic;">—</span>';
        // Placeholdery — budou napojené v Fázi 4 (Servis) a Fázi 6 (Pneu management)
        const nextTireCell = v.next_tire_change
          ? fmtDate(v.next_tire_change)
          : '<span style="color:var(--text2);">—</span>';
        const nextServiceCell = v.next_service
          ? fmtDate(v.next_service)
          : '<span style="color:var(--text2);">—</span>';

        html += '<tr style="cursor:pointer;" onclick="openVehicleModal(' + v.id + ')">';
        html += '<td><span class="spz">' + escHtml(v.license_plate || '—') + '</span></td>';
        html += '<td>' + companyCell + '</td>';
        html += '<td style="font-weight:600;">' + escHtml(v.model) + (v.vin ? '<div style="font-size:11px;color:var(--text2);font-family:monospace;">' + escHtml(v.vin) + '</div>' : '') + '</td>';
        html += '<td>' + driverCell + '</td>';
        html += '<td><span class="badge badge-cat">' + escHtml(v.category) + '</span></td>';
        html += '<td>' + fmtDate(v.insurance_to) + '</td>';
        html += '<td>' + statusBadge(v.insurance_status, v.insurance_days, v.insurance_to) + '</td>';
        html += '<td>' + fmtDate(v.stk_valid_to) + '</td>';
        html += '<td>' + statusBadge(v.stk_status, v.stk_days, v.stk_valid_to) + '</td>';
        html += '<td>' + fmtDate(v.toll_sticker_to) + '</td>';
        html += '<td>' + statusBadge(v.toll_status, v.toll_days, v.toll_sticker_to) + '</td>';
        html += '<td>' + nextTireCell + '</td>';
        html += '<td>' + nextServiceCell + '</td>';
        html += '<td style="font-size:12px;color:var(--text2);">' + escHtml(financing) + '</td>';
        html += '<td onclick="event.stopPropagation()">' +
          '<button class="btn btn-sm btn-secondary" onclick="openVehicleModal(' + v.id + ')" title="Upravit">✏️</button> ' +
          '<button class="btn btn-sm btn-danger" onclick="deleteVehicle(' + v.id + ')" title="Smazat">🗑️</button>' +
        '</td>';
        html += '</tr>';
      }
      html += '</tbody></table>';
      el.innerHTML = html;
    }

    // ─── Modal — editace / vytvoření ───────────────────────────────────────
    function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

    async function openVehicleModal(id) {
      let v = {
        license_plate:'', company:'', model:'', vin:'', category:'Osobní vůz', color:'', year:'',
        insurance_from:'', insurance_to:'', insurance_company:'',
        stk_valid_to:'', toll_sticker_to:'',
        financing_type:'', financing_to:'', financing_owner:'',
        disk_size:'', tire_size:'',
        driver_id:'', current_km:'', note:'', active:true,
      };
      if (id) {
        try {
          const r = await fetch('/api/fleet/vehicles/' + id, { headers: authHeaders() });
          if (r.ok) v = await r.json();
        } catch(e) { console.error(e); }
      }

      const catList = ['Osobní vůz','Dodávka','Nákladní','Motocykl','Přívěsný vozík','Pracovní stroj','Jiné'];
      // Když editujeme a kategorie není v seznamu (např. "přívěsný vozík" s malým p), zachovej ji jako volbu.
      if (v.category && !catList.includes(v.category)) catList.push(v.category);
      const catOpts = catList
        .map(c => '<option value="' + c + '"' + (v.category === c ? ' selected' : '') + '>' + c + '</option>').join('');

      const finOpts = '<option value="">— nevybráno —</option>' + Object.entries(FINANCING_TYPES)
        .map(([k,label]) => '<option value="' + k + '"' + (v.financing_type === k ? ' selected' : '') + '>' + label + '</option>').join('');

      const driverOpts = '<option value="">— bez přiřazení —</option>' + drivers.map(d =>
        '<option value="' + d.id + '"' + (v.driver_id === d.id ? ' selected' : '') + '>' +
        escHtml(d.last_name + ' ' + d.first_name) + (d.department ? ' (' + escHtml(d.department.name) + ')' : '') +

          '<div class="form-group"><label>Barva</label><input type="text" name="color" value="' + escHtml(v.color || '') + '"></div>' +
          '<div class="form-group"><label>Rok výroby</label><input type="number" name="year" value="' + (v.year || '') + '" min="1950" max="2100"></div>' +

        '<div class="form-section-title">🛡️ Rychlý přehled POV (detail v záložce Pojištění)</div>' +
        '<div class="form-grid">' +
          '<div class="form-group"><label>Platnost od</label><input type="date" name="insurance_from" value="' + fmtDateInput(v.insurance_from) + '"></div>' +
          '<div class="form-group"><label>Platnost do</label><input type="date" name="insurance_to" value="' + fmtDateInput(v.insurance_to) + '"></div>' +
          '<div class="form-group full"><label>Pojišťovna</label><input type="text" name="insurance_company" value="' + escHtml(v.insurance_company || '') + '"></div>' +
        '</div>' +

        '<div class="form-section-title">🔧 STK a dálniční známka</div>' +
        '<div class="form-grid">' +
          '<div class="form-group"><label>STK platná do</label><input type="date" name="stk_valid_to" value="' + fmtDateInput(v.stk_valid_to) + '"></div>' +
          '<div class="form-group"><label>Dálniční známka do</label><input type="date" name="toll_sticker_to" value="' + fmtDateInput(v.toll_sticker_to) + '"></div>' +
        '</div>' +

        '<div class="form-section-title">💰 Financování</div>' +
        '<div class="form-grid">' +
          '<div class="form-group"><label>Typ financování</label><select name="financing_type">' + finOpts + '</select></div>' +

          '<div class="form-group full"><label>Vlastník / financující subjekt</label><input type="text" name="financing_owner" value="' + escHtml(v.financing_owner || '') + '" placeholder="Best Series s.r.o."></div>' +
        '</div>' +

        '<div class="form-section-title">🛞 Disky a pneu (sklad + výměny v záložce Pneu management)</div>' +
        '<div class="form-grid">' +
          '<div class="form-group full"><label>Disk rozměr</label><input type="text" name="disk_size" value="' + escHtml(v.disk_size || '') + '" placeholder="6,5JX16/ET50"></div>' +
          '<div class="form-group full"><label>Pneu rozměr</label><input type="text" name="tire_size" value="' + escHtml(v.tire_size || '') + '" placeholder="205/55 R16 91H"></div>' +

        '<div class="form-section-title">Ostatní</div>' +

      const subPanelMsg = isNew

      document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal">' +
        '<h2>' + (id ? '✏️ Upravit vozidlo ' + escHtml(v.license_plate || v.model) : '➕ Nové vozidlo') + '</h2>' +
        '<div class="veh-tabs">' + tabNav + '</div>' +
        '<form id="veh-form" onsubmit="saveVehicle(event,' + (id || 'null') + ')">' +
          '<div class="veh-tab-panel active" data-panel="basic">' + basicPanel + '</div>' +
          '<div class="veh-tab-panel" data-panel="documents">' + subPanelMsg + '</div>' +
          '<div class="veh-tab-panel" data-panel="insurance">' + subPanelMsg + '</div>' +
          '<div class="veh-tab-panel" data-panel="service">' + subPanelMsg + '</div>' +
          '<div class="veh-tab-panel" data-panel="tires">' + subPanelMsg + '</div>' +
          '<div class="veh-tab-panel" data-panel="damage">' + subPanelMsg + '</div>' +
          '<div class="modal-actions">' +

      window._currentVehicleId = id || null;

    // Přepnutí mezi záložkami detailu vozu
    function switchVehTab(tabKey, btn) {
      if (btn && btn.disabled) return;
      document.querySelectorAll('.veh-tab').forEach(function (b) { b.classList.toggle('active', b.dataset.tab === tabKey); });
      document.querySelectorAll('.veh-tab-panel').forEach(function (p) { p.classList.toggle('active', p.dataset.panel === tabKey); });

      const vid = window._currentVehicleId;
      if (!vid) return;
      const panel = document.querySelector('.veh-tab-panel[data-panel="' + tabKey + '"]');
      if (!panel) return;
      // Lazy load obsahu jednotlivých záložek
      if (tabKey === 'documents') loadDocumentsTab(vid, panel);
      else if (tabKey === 'insurance') loadInsuranceTab(vid, panel);
      else if (tabKey === 'service') loadServiceTab(vid, panel);
      else if (tabKey === 'damage') loadDamageTab(vid, panel);
      else if (tabKey === 'tires') loadTiresTab(vid, panel);
    }

    async function saveVehicle(e, id) {
      e.preventDefault();
      const f = new FormData(e.target);
      const data = {};
      for (const [k, v] of f.entries()) {
        if (v === '') continue;
        if (k === 'year' || k === 'current_km') data[k] = parseInt(v);
        else if (k === 'driver_id') data[k] = parseInt(v);
        else data[k] = v;
      }
      data.active = e.target.active.checked;

      try {
        const resp = await fetch(id ? '/api/fleet/vehicles/' + id : '/api/fleet/vehicles', {
          method: id ? 'PUT' : 'POST',
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!resp.ok) {
          const err = await resp.json().catch(() => ({}));
          alert('Chyba: ' + (err.error || resp.status) + (err.details ? '\n' + JSON.stringify(err.details.fieldErrors || {}, null, 2) : ''));
          return;
        }
        closeModal();
        await loadVehicles();
        await loadStats();
      } catch (e) {
        console.error(e);
        alert('Chyba při ukládání: ' + e.message);
      }
    }

    async function deleteVehicle(id) {
      if (!confirm('Opravdu smazat toto vozidlo?')) return;
      try {
        const resp = await fetch('/api/fleet/vehicles/' + id, { method: 'DELETE', headers: authHeaders() });
        if (!resp.ok) { const err = await resp.json().catch(() => ({})); alert(err.error || 'Nepodařilo se smazat'); return; }
        await loadVehicles();
        await loadStats();
      } catch (e) { console.error(e); alert('Chyba: ' + e.message); }
    }

    // ─── Notifikace — ruční spuštění kontroly ──────────────────────────────
    async function checkExpirations() {
      try {
        const resp = await fetch('/api/fleet/check-expirations', { method: 'POST', headers: authHeaders(), body: JSON.stringify({ days: 30 }) });
        const result = await resp.json();
        if (resp.ok) {
          alert('✅ Vytvořeno ' + result.notifications_created + ' notifikací.');
        } else {
          alert('Chyba: ' + (result.error || resp.status));
        }
      } catch (e) { alert('Chyba: ' + e.message); }

    // ─── Záložky: Dokumentace ───────────────────────────────────────────────
    // Aktivní výčet typů dokumentů — zobrazuje se v dropdownu při zakládání nového dokumentu.
    const DOC_TYPES = {
      'technicky_prukaz': '📘 Technický průkaz',
      'stk_protokol': '🔧 STK protokol',
      'smlouva': '📝 Smlouva',
      'protokol': '📋 Protokol',
      'jine': '📎 Jiné',
    };
    // Zpětná kompatibilita pro starší záznamy (dropdown už je nenabízí, ale při zobrazení je potřeba popisek).
    const DOC_TYPES_LEGACY = {
      'leasing': '📜 Leasingová smlouva',
    };
    function docTypeLabel(k) { return DOC_TYPES[k] || DOC_TYPES_LEGACY[k] || k; }

    function fileIconForMime(mime) {
      if (!mime) return '📎';
      if (mime.startsWith('image/')) return '🖼️';
      if (mime.includes('pdf')) return '📕';
      if (mime.includes('word') || mime.includes('msword')) return '📄';
      if (mime.includes('sheet') || mime.includes('excel')) return '📊';
      return '📎';
    }

    function fmtSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return Math.round(bytes / 1024) + ' kB';
      return (bytes / 1024 / 1024).toFixed(1) + ' MB';
    }

    // Přečte File objekt jako base64 (bez data: prefixu)
    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const s = String(reader.result || '');
          const comma = s.indexOf(',');
          resolve(comma >= 0 ? s.slice(comma + 1) : s);
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function loadDocumentsTab(vehicleId, panel) {
      panel.innerHTML = '<div class="veh-empty">Načítám dokumenty…</div>';
      try {
        const r = await fetch('/api/fleet/vehicles/' + vehicleId + '/documents', { headers: authHeaders() });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const docs = await r.json();

        // Form wrap (prázdný, naplní se až po kliknutí na "+ Nový dokument")
        let html = '<div id="doc-form-wrap"></div>';
        html += '<button type="button" class="btn btn-primary btn-sm" onclick="showDocumentForm(' + vehicleId + ')">+ Nový dokument</button>';

        html += '<div class="form-section-title" style="margin-top:20px;">Uložené dokumenty (' + docs.length + ')</div>';
        if (docs.length === 0) {
          html += '<div class="veh-empty">Zatím žádné dokumenty.</div>';
        } else {
          html += '<div class="veh-list">';
          docs.forEach(d => {
            const typeLabel = docTypeLabel(d.doc_type);
            const uploaded = d.uploaded_at ? new Date(d.uploaded_at).toLocaleDateString('cs-CZ') : '';
            html += '<div class="veh-item">' +
              '<div class="icon">' + fileIconForMime(d.mime_type) + '</div>' +
              '<div class="body">' +
                '<div class="title">' + escHtml(d.title) + '</div>' +
                '<div class="meta">' + typeLabel + ' · ' + escHtml(d.file_name || '') + ' · ' + fmtSize(d.file_size) + (uploaded ? ' · ' + uploaded : '') + '</div>' +
              '</div>' +
              '<div class="actions">' +
                '<a class="dl" href="' + escHtml(d.file_url) + '" target="_blank" rel="noopener">📎 Zobrazit</a>' +
                '<button type="button" class="btn btn-sm btn-danger" onclick="deleteDocument(' + d.id + ',' + vehicleId + ')">🗑️</button>' +
              '</div>' +
            '</div>';
          });
          html += '</div>';
        }
        panel.innerHTML = html;
      } catch (e) {
        panel.innerHTML = '<div class="veh-empty">Chyba: ' + escHtml(e.message) + '</div>';
      }
    }

    // Inline formulář pro založení nového dokumentu (analogicky k showServiceForm)
    function showDocumentForm(vehicleId) {
      const wrap = document.getElementById('doc-form-wrap');
      if (!wrap) return;
      const typeOpts = Object.entries(DOC_TYPES)
        .map(([k, label]) => '<option value="' + k + '">' + label + '</option>').join('');

      wrap.innerHTML = '<div class="policy-card">' +
        '<div class="form-grid">' +
          '<div class="form-group"><label>Typ dokumentu *</label><select id="doc-type">' + typeOpts + '</select></div>' +
          '<div class="form-group"><label>Název (volitelně)</label><input type="text" id="doc-title" placeholder="např. TP - list A"></div>' +
          '<div class="form-group full"><label>Soubor (PDF / obrázek / Word / Excel) *</label><input type="file" id="doc-file" accept="image/*,application/pdf,.doc,.docx,.xls,.xlsx"></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">' +
          '<button type="button" class="btn btn-sm btn-secondary" onclick="cancelDocumentForm()">Zrušit</button>' +
          '<button type="button" class="btn btn-sm btn-primary" onclick="saveDocument(' + vehicleId + ')">Vytvořit dokument</button>' +
        '</div>' +
      '</div>';
    }

    function cancelDocumentForm() {
      const wrap = document.getElementById('doc-form-wrap');
      if (wrap) wrap.innerHTML = '';
    }

    async function saveDocument(vehicleId) {
      const typeEl = document.getElementById('doc-type');
      const titleEl = document.getElementById('doc-title');
      const fileEl = document.getElementById('doc-file');
      if (!typeEl || !fileEl) return;
      const file = fileEl.files && fileEl.files[0];
      if (!file) { alert('Vyber soubor k nahrání.'); return; }
      if (file.size > 20 * 1024 * 1024) { alert('Soubor je větší než 20 MB.'); return; }
      try {
        const b64 = await fileToBase64(file);
        const docType = typeEl.value;
        const title = (titleEl.value || '').trim() || file.name;
        const r = await fetch('/api/fleet/vehicles/' + vehicleId + '/documents', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({
            doc_type: docType,
            title: title,
            file_data: b64,
            file_name: file.name,
            mime_type: file.type || null,
          }),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="documents"]');
        if (panel) await loadDocumentsTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function deleteDocument(docId, vehicleId) {
      if (!confirm('Opravdu smazat tento dokument?')) return;
      try {
        const r = await fetch('/api/fleet/documents/' + docId, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="documents"]');
        if (panel) await loadDocumentsTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Záložky: Pojištění ────────────────────────────────────────────────
    const POLICY_TYPES = {
      'pov': 'Povinné ručení',
      'havarijni': 'Havarijní pojištění',
      'jine': 'Jiné',
    };

    // Cache naposledy načtených pojistek pro daný detail — využívá showPolicyForm
    // při editaci, aby nemusel znovu dotazovat server.
    let currentPolicies = [];

    async function loadInsuranceTab(vehicleId, panel) {
      panel.innerHTML = '<div class="veh-empty">Načítám pojistky…</div>';
      try {
        const r = await fetch('/api/fleet/vehicles/' + vehicleId + '/policies', { headers: authHeaders() });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const policies = await r.json();
        currentPolicies = policies;

        let html = '<div class="form-section-title">Přidat pojistku</div>';
        html += '<div id="policy-form-wrap"></div>';
        html += '<button type="button" class="btn btn-secondary btn-sm" onclick="showPolicyForm(' + vehicleId + ', null)">+ Nová pojistka</button>';

        html += '<div class="form-section-title" style="margin-top:24px;">Uložené pojistky (' + policies.length + ')</div>';
        if (policies.length === 0) {
          html += '<div class="veh-empty">Zatím žádné pojistky.</div>';
        } else {
          policies.forEach(p => {
            const validFrom = p.valid_from ? new Date(p.valid_from).toLocaleDateString('cs-CZ') : '—';
            const validTo = p.valid_to ? new Date(p.valid_to).toLocaleDateString('cs-CZ') : '—';

            html += '<div class="policy-card">' +
              '<header>' +
                '<span class="type-badge ' + escHtml(p.policy_type) + '">' + (POLICY_TYPES[p.policy_type] || p.policy_type) + '</span>' +
                '<div style="display:flex;gap:6px;">' +
                  // 'Zobrazit' otevře dokument v novém tabu (PDF/obrázek se zobrazí inline);
                  // dříve nadepsáno '📎 Stáhnout' a vypadalo jako force-download.
                  (p.file_url ? '<a class="btn btn-sm btn-secondary" href="' + escHtml(p.file_url) + '" target="_blank" rel="noopener" title="Zobrazit přiložený dokument">👁️ Zobrazit</a>' : '') +
                  // Přejmenováno z '✏️ Upravit' — jasně sdělujeme, že jde i o úpravu uloženého dokumentu (souboru).
                  '<button type="button" class="btn btn-sm btn-secondary" onclick="showPolicyForm(' + vehicleId + ',' + p.id + ')" title="Upravit pojistku včetně uloženého dokumentu">📝 Upravit dokument</button>' +
                  '<button type="button" class="btn btn-sm btn-danger" onclick="deletePolicy(' + p.id + ',' + vehicleId + ')">🗑️</button>' +

              '<div style="font-size:12px;color:var(--text2);">' +

                (p.note ? '<div style="margin-top:6px;"><em>' + escHtml(p.note) + '</em></div>' : '') +

        panel.innerHTML = html;

        panel.innerHTML = '<div class="veh-empty">Chyba: ' + escHtml(e.message) + '</div>';

    }

    function showPolicyForm(vehicleId, policyId) {
      const wrap = document.getElementById('policy-form-wrap');
      if (!wrap) return;

      // Pokud editujeme, najdeme existující pojistku v cache z posledního loadu
      const editing = policyId != null;
      const p = editing ? (currentPolicies.find(x => x.id === policyId) || null) : null;

      const policyTypeOpts = Object.entries(POLICY_TYPES)
        .map(([k, label]) => '<option value="' + k + '"' + (p && p.policy_type === k ? ' selected' : '') + '>' + label + '</option>').join('');

      function toDateInput(d) {
        if (!d) return '';
        const dt = new Date(d);
        if (isNaN(dt.getTime())) return '';
        return dt.toISOString().split('T')[0];
      }
      const valFrom = p && p.valid_from ? toDateInput(p.valid_from) : '';
      const valTo = p && p.valid_to ? toDateInput(p.valid_to) : '';
      const premium = p && p.premium_amount != null ? Number(p.premium_amount) : '';

      const fileInfoHtml = editing && p && p.file_url
        ? '<div class="form-group full" style="font-size:12px;color:var(--text2);">Aktuálně přiložený soubor: <a class="dl" href="' + escHtml(p.file_url) + '" target="_blank" rel="noopener">📎 ' + escHtml(p.file_name || 'stáhnout') + '</a>. Nahrání nového souboru ho nahradí.</div>'
        : '';

      const title = editing ? 'Upravit pojistku' : 'Nová pojistka';
      const submitLabel = editing ? 'Uložit změny' : 'Uložit pojistku';
      const saveArg = editing ? (vehicleId + ',' + policyId) : (vehicleId + ',null');

      wrap.innerHTML = '<div class="policy-card" id="new-policy-card">' +
        '<div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;">' + title + '</div>' +
        '<div class="form-grid">' +
          '<div class="form-group"><label>Typ *</label><select id="p-type">' + policyTypeOpts + '</select></div>' +
          '<div class="form-group"><label>Pojišťovna</label><input type="text" id="p-company" placeholder="Např. Kooperativa" value="' + escHtml(p && p.company_name || '') + '"></div>' +
          '<div class="form-group"><label>Číslo pojistky</label><input type="text" id="p-number" value="' + escHtml(p && p.policy_number || '') + '"></div>' +
          '<div class="form-group"><label>Pojistné (Kč)</label><input type="number" id="p-premium" step="0.01" min="0" value="' + premium + '"></div>' +
          '<div class="form-group"><label>Platnost od</label><input type="date" id="p-from" value="' + valFrom + '"></div>' +
          '<div class="form-group"><label>Platnost do</label><input type="date" id="p-to" value="' + valTo + '"></div>' +
          '<div class="form-group full"><label>Poznámka</label><textarea id="p-note">' + escHtml(p && p.note || '') + '</textarea></div>' +
          fileInfoHtml +
          '<div class="form-group full"><label>' + (editing ? 'Nahradit scan/PDF (volitelné)' : 'Přiložit scan/PDF (volitelné)') + '</label><input type="file" id="p-file" accept="image/*,application/pdf"></div>' +
        '</div>' +
        '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px;">' +
          '<button type="button" class="btn btn-sm btn-secondary" onclick="cancelPolicyForm()">Zrušit</button>' +
          '<button type="button" class="btn btn-sm btn-primary" onclick="savePolicy(' + saveArg + ')">' + submitLabel + '</button>' +
        '</div>' +
      '</div>';
    }

    function cancelPolicyForm() {
      const wrap = document.getElementById('policy-form-wrap');
      if (wrap) wrap.innerHTML = '';
    }

    async function savePolicy(vehicleId, policyId) {
      const data = {
        policy_type: document.getElementById('p-type').value,
        company_name: document.getElementById('p-company').value.trim() || null,
        policy_number: document.getElementById('p-number').value.trim() || null,
        premium_amount: (function () {
          const v = document.getElementById('p-premium').value;
          return v ? parseFloat(v) : null;
        })(),
        valid_from: document.getElementById('p-from').value || null,
        valid_to: document.getElementById('p-to').value || null,
        note: document.getElementById('p-note').value.trim() || null,
      };
      const fileEl = document.getElementById('p-file');
      if (fileEl.files && fileEl.files[0]) {
        const file = fileEl.files[0];
        if (file.size > 20 * 1024 * 1024) { alert('Soubor je větší než 20 MB.'); return; }
        data.file_data = await fileToBase64(file);
        data.file_name = file.name;
        data.mime_type = file.type || null;
      }
      try {
        const editing = policyId != null;
        const url = editing
          ? '/api/fleet/policies/' + policyId
          : '/api/fleet/vehicles/' + vehicleId + '/policies';
        const method = editing ? 'PUT' : 'POST';
        const r = await fetch(url, {
          method,
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="insurance"]');
        if (panel) await loadInsuranceTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function deletePolicy(policyId, vehicleId) {
      if (!confirm('Opravdu smazat tuto pojistku?')) return;
      try {
        const r = await fetch('/api/fleet/policies/' + policyId, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="insurance"]');
        if (panel) await loadInsuranceTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Quick-create servis z hlavního toolbaru ──────────────────────────
    function openQuickServiceModal() {
      if (!vehicles || !vehicles.length) {
        alert('Nejdřív musí existovat alespoň jedno vozidlo.');
        return;
      }
      const vehicleOpts = vehicles
        .filter(v => v.active !== false)
        .map(v => {
          const label = (v.license_plate || '—') + ' · ' + (v.model || '') + (v.company ? ' (' + v.company + ')' : '');
          return '<option value="' + v.id + '">' + escHtml(label) + '</option>';
        }).join('');

      document.getElementById('modal-root').innerHTML = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()"><div class="modal" style="width:620px;">' +
        '<h2>🔧 Nový servis</h2>' +
        '<div class="form-grid">' +
          '<div class="form-group full"><label>Vozidlo *</label><select id="qs-vehicle">' + vehicleOpts + '</select></div>' +
          '<div class="form-group full"><label>Druh servisu *</label><input type="text" id="qs-type" placeholder="např. Pravidelný servis, Výměna oleje"></div>' +
          '<div class="form-group"><label>Plánovaný termín *</label><input type="datetime-local" id="qs-scheduled"></div>' +
          '<div class="form-group"><label>Místo / firma</label><input type="text" id="qs-location" placeholder="Autoservis Novák"></div>' +
          '<div class="form-group full"><label>Poznámka</label><textarea id="qs-note" rows="3"></textarea></div>' +
        '</div>' +
        '<div class="modal-actions">' +
          '<button type="button" class="btn btn-secondary" onclick="closeModal()">Zrušit</button>' +
          '<button type="button" class="btn btn-primary" onclick="saveQuickService()">Vytvořit servis</button>' +
        '</div>' +
      '</div></div>';
    }

    async function saveQuickService() {
      const vehicleId = parseInt(document.getElementById('qs-vehicle').value);
      const serviceType = document.getElementById('qs-type').value.trim();
      const scheduled = document.getElementById('qs-scheduled').value;
      if (!vehicleId || !serviceType) { alert('Vyber vozidlo a zadej druh servisu.'); return; }
      if (!scheduled) { alert('Zadej plánovaný termín.'); return; }
      const data = {
        service_type: serviceType,
        scheduled_at: scheduled,
        location: document.getElementById('qs-location').value.trim() || null,
        note: document.getElementById('qs-note').value.trim() || null,
        status: 'planned',
      };
      try {
        const r = await fetch('/api/fleet/vehicles/' + vehicleId + '/services', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        closeModal();
        await loadVehicles();  // ať se aktualizuje sloupec „Servis"
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Adresář servisních firem (sdíleno se Service i Tire tabem) ────────
    // Cache firem (dodavatelé / servisy) — naplní se z /api/fleet/service-providers.
    // Používá se pro rychlé vyplnění dropdownu "Firma" ve formuláři servisu / pneu.
    window._serviceProvidersCache = null;

    async function ensureServiceProviders(force) {
      if (!force && window._serviceProvidersCache) return window._serviceProvidersCache;
      try {
        const r = await fetch('/api/fleet/service-providers', { headers: authHeaders() });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        window._serviceProvidersCache = await r.json();
      } catch (e) {
        window._serviceProvidersCache = [];
        console.error('Nelze načíst adresář firem:', e);
      }
      return window._serviceProvidersCache;
    }

    function serviceProviderOptionsHtml(selectedId) {
      const providers = window._serviceProvidersCache || [];
      const sel = selectedId != null ? String(selectedId) : '';
      let html = '<option value=""' + (sel === '' ? ' selected' : '') + '>— neuvedeno —</option>';
      providers.forEach(p => {
        html += '<option value="' + p.id + '"' + (String(p.id) === sel ? ' selected' : '') + '>' +
          escHtml(p.name) + (p.ico ? ' (IČ ' + escHtml(p.ico) + ')' : '') +
        '</option>';
      });
      return html;
    }

    // HTML dropdownu + tlačítka "+ Nová firma" pro formulář servisu/pneu.
    // `selectId` je ID selectu (unikátní v rámci stránky), `selectedId` je aktuálně vybrané id nebo null.
    // `branchPickerPrefix` (volitelně) — pokud je předán, při změně firmy se reset/překresli i branch picker s tímto prefixem.
    function serviceProviderSelectHtml(selectId, selectedId, branchPickerPrefix) {
      const onChange = branchPickerPrefix
        ? ' onchange="onCompanyChange(\'' + branchPickerPrefix + '\')"'
        : '';
      return '<div style="display:flex;gap:6px;align-items:stretch;">' +
        '<select id="' + selectId + '" style="flex:1;"' + onChange + '>' + serviceProviderOptionsHtml(selectedId) + '</select>' +
        '<button type="button" class="btn btn-sm btn-secondary" title="Přidat novou firmu do adresáře" ' +
          'onclick="openProviderQuickCreate(\'' + selectId + '\')">+ Nová</button>' +
      '</div>';
    }

    // ─── Branch picker (multi-select provozoven) ────────────────────────────
    // Vrátí seznam aktivních provozoven dané firmy z cache.
    function getBranchesForCompany(companyId) {
      if (!companyId) return [];
      const providers = window._serviceProvidersCache || [];
      const co = providers.find(p => p.id === companyId);
      return (co && Array.isArray(co.branches))
        ? co.branches.filter(b => b.active !== false)
        : [];
    }

    function formatBranchLabel(b) {
      const parts = [];
      if (b.name) parts.push(b.name);
      const addr = [b.address, b.city, b.zip].filter(Boolean).join(', ');
      if (addr) parts.push(addr);
      return parts.join(' — ') || ('Provozovna #' + b.id);
    }

    // HTML pickeru provozoven: dropdown + tlačítko "+ Vybrat" + chips.
    // `prefix` = 's' nebo 'tc' (kvůli unikátním id).
    // `companyId` = aktuálně vybraná firma (nebo null — picker je pak neaktivní).
    // `selectedBranchIds` = pole čísel (id provozoven, které už byly vybrány).
    function branchPickerHtml(prefix, companyId, selectedBranchIds) {
      const sel = (selectedBranchIds || []).map(Number).filter(n => !isNaN(n));
      const branches = getBranchesForCompany(companyId);
      const remaining = branches.filter(b => !sel.includes(b.id));
      let optHtml = '<option value="">— vyber provozovnu —</option>';
      remaining.forEach(b => {
        optHtml += '<option value="' + b.id + '">' + escHtml(formatBranchLabel(b)) + '</option>';
      });
      const chipsHtml = sel.map(bid => {
        const b = branches.find(x => x.id === bid);
        const label = b ? formatBranchLabel(b) : ('Provozovna #' + bid);
        return '<span class="branch-chip" data-bid="' + bid + '" style="display:inline-flex;align-items:center;gap:6px;background:var(--bg2,#f3f4f6);border:1px solid var(--border,#e5e7eb);padding:4px 10px;border-radius:14px;font-size:12px;margin:2px 4px 2px 0;">' +
          '📍 ' + escHtml(label) +
          ' <button type="button" onclick="removeBranchChip(\'' + prefix + '\',' + bid + ')" style="background:none;border:0;cursor:pointer;color:var(--text2,#6b7280);font-size:14px;line-height:1;padding:0;" title="Odebrat">×</button>' +
        '</span>';
      }).join('');
      const isDisabled = !companyId || branches.length === 0;
      const helpHtml = !companyId
        ? '<div style="color:var(--text2,#6b7280);font-size:11px;margin-top:6px;">💡 Nejdřív vyber firmu provádějící servis.</div>'
        : (branches.length === 0
            ? '<div style="color:var(--text2,#6b7280);font-size:11px;margin-top:6px;">⚠️ Tato firma zatím nemá v adresáři žádné provozovny. Otevři 📇 <strong>Adresář firem</strong> a přidej provozovny tlačítkem „+ Přidat".</div>'
            : (remaining.length === 0
                ? '<div style="color:var(--text2,#6b7280);font-size:11px;margin-top:6px;">Všechny provozovny této firmy jsou vybrané.</div>'
                : ''));
      return '<div id="' + prefix + '-branch-picker" data-company-id="' + (companyId || '') + '">' +
        '<div style="display:flex;gap:6px;align-items:stretch;">' +
          '<select id="' + prefix + '-branch-select" style="flex:1;"' + (isDisabled || remaining.length === 0 ? ' disabled' : '') + '>' + optHtml + '</select>' +
          '<button type="button" class="btn btn-sm btn-secondary" onclick="addBranchChip(\'' + prefix + '\')"' + (isDisabled || remaining.length === 0 ? ' disabled' : '') + '>+ Vybrat</button>' +
        '</div>' +
        '<div id="' + prefix + '-branch-chips" data-branch-ids="' + sel.join(',') + '" style="margin-top:6px;min-height:8px;">' + chipsHtml + '</div>' +
        helpHtml +
      '</div>';
    }

    function getSelectedBranchIds(prefix) {
      const chips = document.getElementById(prefix + '-branch-chips');
      if (!chips) return [];
      return (chips.dataset.branchIds || '').split(',').filter(Boolean).map(Number).filter(n => !isNaN(n));
    }

    // Při změně firmy v dropdownu — přečíst nový company id a překreslit picker provozoven.
    // Při změně firmy chipy resetujeme (předchozí výběr patřil jiné firmě).
    function onCompanyChange(prefix) {
      const sel = document.getElementById(prefix + '-company-id');
      const picker = document.getElementById(prefix + '-branch-picker');
      if (!picker) return;
      const newCompanyId = sel && sel.value ? parseInt(sel.value) : null;
      picker.outerHTML = branchPickerHtml(prefix, newCompanyId, []);
    }

    // Přidá vybranou hodnotu z dropdownu do chipů (multi-select „+ Vybrat").
    function addBranchChip(prefix) {
      const sel = document.getElementById(prefix + '-branch-select');
      if (!sel || !sel.value) return;
      const bid = parseInt(sel.value);
      const cur = getSelectedBranchIds(prefix);
      if (cur.includes(bid)) return;
      cur.push(bid);
      const picker = document.getElementById(prefix + '-branch-picker');
      const companyId = picker && picker.dataset.companyId ? parseInt(picker.dataset.companyId) : null;
      picker.outerHTML = branchPickerHtml(prefix, companyId, cur);
    }

    function removeBranchChip(prefix, branchId) {
      const cur = getSelectedBranchIds(prefix).filter(x => x !== branchId);
      const picker = document.getElementById(prefix + '-branch-picker');
      const companyId = picker && picker.dataset.companyId ? parseInt(picker.dataset.companyId) : null;
      picker.outerHTML = branchPickerHtml(prefix, companyId, cur);
    }

    // Otevře modal s rychlým formulářem pro založení firmy — po uložení ji vybere v dropdownu `selectId`.
    function openProviderQuickCreate(selectId) {
      openProviderFormModal(null, async function (created) {
        if (!created) return;
        await ensureServiceProviders(true); // refresh cache
        const sel = document.getElementById(selectId);
        if (sel) {
          sel.innerHTML = serviceProviderOptionsHtml(created.id);
        }
      });
    }

    // Zavře všechny modály adresáře (nezávislé na hlavním modal-root).
    function closeProviderModal() {
      document.getElementById('provider-modal-root').innerHTML = '';
    }

    // Otevře modal s formulářem pro založení/úpravu firmy.
    // `onSaved(company)` se zavolá po úspěšném uložení; může být null.
    function openProviderFormModal(providerId, onSaved) {
      const existing = providerId
        ? (window._serviceProvidersCache || []).find(p => p.id === providerId)
        : null;
      const p = existing || {};
      const title = providerId ? '✏️ Upravit firmu' : '+ Nová firma';
      document.getElementById('provider-modal-root').innerHTML =
        '<div class="modal-overlay" onclick="if(event.target===this)closeProviderModal()">' +
        '<div class="modal" style="width:860px;">' +
          '<h2>' + title + '</h2>' +
          '<div class="form-section-title">Identifikace</div>' +
          '<div class="form-grid">' +
            '<div class="form-group full"><label>Název firmy *</label><input type="text" id="pr-name" value="' + escHtml(p.name || '') + '" placeholder="např. Autoservis Novák s.r.o."></div>' +
            '<div class="form-group"><label>IČ</label><input type="text" id="pr-ico" value="' + escHtml(p.ico || '') + '" placeholder="12345678"></div>' +
            '<div class="form-group"><label>DIČ</label><input type="text" id="pr-dic" value="' + escHtml(p.dic || '') + '" placeholder="CZ12345678"></div>' +
          '</div>' +
          '<div class="form-section-title">Adresa sídla (fakturační)</div>' +
          '<div class="form-grid">' +
            '<div class="form-group full"><label>Ulice a č.p.</label><input type="text" id="pr-address" value="' + escHtml(p.address || '') + '"></div>' +
            '<div class="form-group"><label>Město</label><input type="text" id="pr-city" value="' + escHtml(p.city || '') + '"></div>' +
            '<div class="form-group"><label>PSČ</label><input type="text" id="pr-zip" value="' + escHtml(p.zip || '') + '"></div>' +
          '</div>' +
          renderProviderBranchesSection(p) +
          '<div class="form-section-title">Kontakt a fakturace</div>' +
          '<div class="form-grid">' +
            '<div class="form-group"><label>Kontaktní osoba</label><input type="text" id="pr-contact" value="' + escHtml(p.contact_person || '') + '"></div>' +
            '<div class="form-group"><label>E-mail</label><input type="email" id="pr-email" value="' + escHtml(p.email || '') + '"></div>' +
            '<div class="form-group"><label>Telefon</label><input type="text" id="pr-phone" value="' + escHtml(p.phone || '') + '"></div>' +
            '<div class="form-group"><label>Web</label><input type="text" id="pr-web" value="' + escHtml(p.web || '') + '" placeholder="https://"></div>' +
            '<div class="form-group"><label>Bankovní účet</label><input type="text" id="pr-bank" value="' + escHtml(p.bank_account || '') + '" placeholder="1234567890/0100"></div>' +
            '<div class="form-group"><label>Splatnost (dní)</label><input type="number" id="pr-payment" value="' + (p.payment_terms_days != null ? p.payment_terms_days : 14) + '" min="0" max="365"></div>' +
            '<div class="form-group full"><label>Poznámky</label><textarea id="pr-notes" rows="2">' + escHtml(p.notes || '') + '</textarea></div>' +
          '</div>' +
          '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">' +
            '<button type="button" class="btn btn-secondary" onclick="closeProviderModal()">Zrušit</button>' +
            '<button type="button" class="btn btn-primary" id="pr-save-btn">Uložit firmu</button>' +
          '</div>' +
        '</div></div>';

      document.getElementById('pr-save-btn').addEventListener('click', async () => {
        const name = document.getElementById('pr-name').value.trim();
        if (!name) { alert('Zadej název firmy.'); return; }
        const payment = document.getElementById('pr-payment').value;
        // Provozovny už nejsou součástí formu firmy — řídí se vlastními endpointy
        // (POST/PUT/DELETE /api/fleet/branches). Při ukládání firmy je necháváme být.
        // Legacy pole branch_* na Company necháváme nedotčená (převzala je migrace 2026-04-27).
        const body = {
          name,
          ico: document.getElementById('pr-ico').value.trim() || null,
          dic: document.getElementById('pr-dic').value.trim() || null,
          address: document.getElementById('pr-address').value.trim() || null,
          city: document.getElementById('pr-city').value.trim() || null,
          zip: document.getElementById('pr-zip').value.trim() || null,
          contact_person: document.getElementById('pr-contact').value.trim() || null,
          email: document.getElementById('pr-email').value.trim() || null,
          phone: document.getElementById('pr-phone').value.trim() || null,
          web: document.getElementById('pr-web').value.trim() || null,
          bank_account: document.getElementById('pr-bank').value.trim() || null,
          payment_terms_days: payment ? parseInt(payment) : null,
          notes: document.getElementById('pr-notes').value.trim() || null,
        };
        try {
          const url = providerId
            ? '/api/fleet/service-providers/' + providerId
            : '/api/fleet/service-providers';
          const r = await fetch(url, {
            method: providerId ? 'PUT' : 'POST',
            headers: authHeaders(),
            body: JSON.stringify(body),
          });
          if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
          const saved = await r.json();
          await ensureServiceProviders(true);
          // Pro novou firmu rovnou znovu otevři modal — ať uživatel může přidat provozovny.
          if (!providerId) {
            const note = document.createElement('div');
            note.textContent = '✅ Firma uložena. Můžeš přidat provozovny.';
            openProviderFormModal(saved.id, onSaved);
            return;
          }
          closeProviderModal();
          if (typeof onSaved === 'function') onSaved(saved);
        } catch (e) { alert('Chyba: ' + e.message); }
      });
    }

    // ─── Sekce „Provozovny" v modálu firmy ─────────────────────────────────
    function renderProviderBranchesSection(p) {
      // Pro nově zakládanou firmu (bez ID) provozovny ještě nelze přidat — info hláška.
      if (!p.id) {
        return '<div class="form-section-title">Provozovny (kam jezdíme)</div>' +
          '<div style="color:var(--text2,#6b7280);font-size:13px;background:var(--bg2,#f3f4f6);padding:10px;border-radius:6px;line-height:1.5;">' +
            '💡 Po uložení firmy budeš moci přidávat libovolný počet provozoven (každá s vlastní adresou a kontaktem).' +
          '</div>';
      }
      const branches = (p.branches || []).filter(b => b.active !== false);
      let html = '<div class="form-section-title" style="display:flex;align-items:center;justify-content:space-between;">' +
        '<span>Provozovny (kam jezdíme) — ' + branches.length + '</span>' +
        '<button type="button" class="btn btn-sm btn-primary" onclick="addBranchToProvider(' + p.id + ')">+ Přidat</button>' +
      '</div>';
      if (branches.length === 0) {
        html += '<div style="color:var(--text2,#6b7280);font-size:13px;padding:8px;">Žádné provozovny zatím nejsou. Přidej první kliknutím na +Přidat.</div>';
      } else {
        html += '<div id="provider-branches-list">' + branches.map(renderProviderBranchRow).join('') + '</div>';
      }
      return html;
    }

    function renderProviderBranchRow(b) {
      return '<div class="policy-card" data-branch-id="' + b.id + '" style="margin-bottom:10px;border:1px solid var(--border,#e5e7eb);border-radius:6px;padding:10px;">' +
        '<div class="form-grid">' +
          '<div class="form-group full"><label>Název pobočky</label><input type="text" id="b-name-' + b.id + '" value="' + escHtml(b.name || '') + '" placeholder="např. Pobočka Brno"></div>' +
          '<div class="form-group full"><label>Ulice a č.p.</label><input type="text" id="b-address-' + b.id + '" value="' + escHtml(b.address || '') + '"></div>' +

    // ─── Záložky: Servis ────────────────────────────────────────────────────
    const SERVICE_STATUS = {
      planned: { label: '🕒 Naplánováno', color: '#0ea5e9' },
      done: { label: '✅ Provedeno', color: '#22c55e' },
      cancelled: { label: '❌ Zrušeno', color: '#ef4444' },
    };

    function fmtDateTime(d) {
      if (!d) return '—';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return '—';
      return dt.toLocaleString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function fmtDateTimeInput(d) {
      if (!d) return '';
      const dt = new Date(d);
      if (isNaN(dt.getTime())) return '';
      const pad = n => String(n).padStart(2, '0');
      return dt.getFullYear() + '-' + pad(dt.getMonth() + 1) + '-' + pad(dt.getDate()) + 'T' + pad(dt.getHours()) + ':' + pad(dt.getMinutes());
    }

    function fmtMoney(v) {
      if (v == null) return '—';
      return Number(v).toLocaleString('cs-CZ', { maximumFractionDigits: 2 }) + ' Kč';
    }

    async function loadServiceTab(vehicleId, panel) {
      panel.innerHTML = '<div class="veh-empty">Načítám servisy…</div>';
      try {
        // Paralelně nahrajeme servisy i adresář firem (dropdown ve formuláři)
        const [services] = await Promise.all([
          fetch('/api/fleet/vehicles/' + vehicleId + '/services', { headers: authHeaders() })
            .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); }),
          ensureServiceProviders(),
        ]);

        // Spočítej celkové náklady a počty stavů
        const planned = services.filter(s => s.status === 'planned');
        const done = services.filter(s => s.status === 'done');
        const totalCost = done.reduce((sum, s) => sum + Number(s.cost_labor || 0) + Number(s.cost_parts || 0), 0);

        let html = '<div class="form-section-title">Přehled servisů</div>';
        html += '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;">' +
          '<div class="stat-card" style="flex:1;min-width:140px;"><div class="stat-label">Naplánováno</div><div class="stat-value" style="color:#0ea5e9;">' + planned.length + '</div></div>' +
          '<div class="stat-card" style="flex:1;min-width:140px;"><div class="stat-label">Provedeno</div><div class="stat-value" style="color:#22c55e;">' + done.length + '</div></div>' +
          '<div class="stat-card" style="flex:1;min-width:140px;"><div class="stat-label">Celkem vydáno</div><div class="stat-value">' + fmtMoney(totalCost) + '</div></div>' +
        '</div>';

        html += '<div id="service-form-wrap"></div>';
        html += '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
          '<button type="button" class="btn btn-primary btn-sm" onclick="showServiceForm(' + vehicleId + ', null)">+ Nový servis</button>' +
          '<button type="button" class="btn btn-secondary btn-sm" onclick="openProviderDirectoryModal()" title="Spravovat adresář firem">📇 Adresář firem</button>' +
        '</div>';

        html += '<div class="form-section-title" style="margin-top:20px;">Historie (' + services.length + ')</div>';
        if (services.length === 0) {
          html += '<div class="veh-empty">Zatím žádné servisy.</div>';
        } else {
          html += '<div class="veh-list">';
          services.forEach(s => {
            const st = SERVICE_STATUS[s.status] || { label: s.status, color: 'var(--text2)' };
            const when = s.status === 'planned' ? fmtDateTime(s.scheduled_at) : fmtDateTime(s.done_at || s.scheduled_at);
            const totalSvc = (Number(s.cost_labor || 0) + Number(s.cost_parts || 0));
            // Preferuj aktuální název firmy z FK (přes relation), fallback na denormalizovaný text
            const companyName = (s.service_company_ref && s.service_company_ref.name) || s.service_company;
            // Místa provedení: preferuj M2N branches, fallback na volný text location
            const branchLabels = (s.branches || [])
              .map(rel => rel && rel.branch ? formatBranchLabel(rel.branch) : null)
              .filter(Boolean);
            const placeStr = branchLabels.length
              ? branchLabels.join(' + ')
              : (s.location || '');
            html += '<div class="veh-item" style="flex-wrap:wrap;">' +
              '<div class="icon">🔧</div>' +
              '<div class="body">' +
                '<div class="title">' + escHtml(s.service_type) + ' <span style="color:' + st.color + ';font-weight:500;font-size:11px;margin-left:6px;">' + st.label + '</span></div>' +
                '<div class="meta">' +
                  when + (companyName ? ' · 🏢 ' + escHtml(companyName) : '') +
                  (placeStr ? ' · 📍 ' + escHtml(placeStr) : '') +
                  (s.km_at_service ? ' · ' + s.km_at_service.toLocaleString('cs-CZ') + ' km' : '') +
                  (s.order_number ? ' · 🧾 ' + escHtml(s.order_number) : '') +
                  (totalSvc ? ' · ' + fmtMoney(totalSvc) : '') +
                '</div>' +
                (s.note ? '<div style="font-size:11px;color:var(--text2);margin-top:3px;font-style:italic;">' + escHtml(s.note) + '</div>' : '') +
              '</div>' +
              '<div class="actions">' +
                (s.invoice_url ? '<a class="dl" href="' + escHtml(s.invoice_url) + '" target="_blank" rel="noopener">📎 Faktura</a>' : '') +
                (s.status === 'planned' ? '<button type="button" class="btn btn-sm btn-primary" onclick="confirmService(' + s.id + ',' + vehicleId + ')" title="Potvrdit provedení">✓ Hotovo</button>' : '') +
                '<button type="button" class="btn btn-sm btn-secondary" onclick="showServiceForm(' + vehicleId + ',' + s.id + ')">✏️</button>' +
                '<button type="button" class="btn btn-sm btn-danger" onclick="deleteService(' + s.id + ',' + vehicleId + ')">🗑️</button>' +
              '</div>' +
            '</div>';
          });
          html += '</div>';
        }
        panel.innerHTML = html;
        // Ulož si cache servisů pro případný edit
        window._servicesCache = services;
      } catch (e) {
        panel.innerHTML = '<div class="veh-empty">Chyba: ' + escHtml(e.message) + '</div>';
      }
    }

    function cancelServiceForm() {

    async function saveService(vehicleId, serviceId) {
      const serviceType = document.getElementById('s-type').value.trim();
      if (!serviceType) { alert('Zadej druh servisu.'); return; }
      const companyIdVal = document.getElementById('s-company-id').value;
      const data = {
        service_type: serviceType,
        scheduled_at: document.getElementById('s-scheduled').value || null,
        done_at: document.getElementById('s-done').value || null,
        service_company_id: companyIdVal ? parseInt(companyIdVal) : null,
        service_company: null, // text se doplní na serveru podle FK; pro prázdný výběr zůstává null
        location: document.getElementById('s-location').value.trim() || null,
        branch_ids: getSelectedBranchIds('s'),
        km_at_service: (function () { const v = document.getElementById('s-km').value; return v ? parseInt(v) : null; })(),
        order_number: document.getElementById('s-order').value.trim() || null,
        cost_labor: (function () { const v = document.getElementById('s-labor').value; return v ? parseFloat(v) : null; })(),
        cost_parts: (function () { const v = document.getElementById('s-parts').value; return v ? parseFloat(v) : null; })(),
        invoice_number: document.getElementById('s-invoice-num').value.trim() || null,
        note: document.getElementById('s-note').value.trim() || null,
        status: document.getElementById('s-status').value,
      };
      const fileEl = document.getElementById('s-invoice-file');
      if (fileEl.files && fileEl.files[0]) {
        const file = fileEl.files[0];
        if (file.size > 20 * 1024 * 1024) { alert('Faktura je větší než 20 MB.'); return; }
        data.invoice_file_data = await fileToBase64(file);
        data.invoice_file_name = file.name;
        data.invoice_mime = file.type || null;
      }
      try {
        const url = serviceId
          ? '/api/fleet/services/' + serviceId
          : '/api/fleet/vehicles/' + vehicleId + '/services';
        const r = await fetch(url, {
          method: serviceId ? 'PUT' : 'POST',
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="service"]');
        if (panel) await loadServiceTab(vehicleId, panel);
        // I hlavní stránka chce refresh, ať se aktualizuje sloupec Servis
        await loadVehicles();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function confirmService(serviceId, vehicleId) {
      if (!confirm('Potvrdit, že byl tento servis proveden?')) return;
      try {
        const r = await fetch('/api/fleet/services/' + serviceId + '/confirm', { method: 'POST', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="service"]');
        if (panel) await loadServiceTab(vehicleId, panel);
        await loadVehicles();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function deleteService(serviceId, vehicleId) {
      if (!confirm('Opravdu smazat tento servis?')) return;
      try {
        const r = await fetch('/api/fleet/services/' + serviceId, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="service"]');
        if (panel) await loadServiceTab(vehicleId, panel);
        await loadVehicles();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Záložky: Škodní události ──────────────────────────────────────────
    async function loadDamageTab(vehicleId, panel) {
      panel.innerHTML = '<div class="veh-empty">Načítám škodní události…</div>';
      try {
        const r = await fetch('/api/fleet/vehicles/' + vehicleId + '/damage-events', { headers: authHeaders() });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const events = await r.json();

    async function saveDamageEvent(vehicleId, eventId) {
      const eventDate = document.getElementById('d-date').value;
      const location = document.getElementById('d-location').value.trim();
      if (!eventDate) { alert('Zadej datum a čas události.'); return; }
      if (!location) { alert('Zadej místo události.'); return; }
      const data = {
        event_date: eventDate,
        location: location,
        claim_number: document.getElementById('d-claim').value.trim() || null,
        estimated_damage: (function () { const v = document.getElementById('d-damage').value; return v ? parseFloat(v) : null; })(),
        description: document.getElementById('d-desc').value.trim() || null,
      };
      try {
        const url = eventId ? '/api/fleet/damage-events/' + eventId : '/api/fleet/vehicles/' + vehicleId + '/damage-events';
        const r = await fetch(url, {
          method: eventId ? 'PUT' : 'POST',
          headers: authHeaders(),
          body: JSON.stringify(data),
        });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="damage"]');
        if (panel) await loadDamageTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function deleteDamageEvent(eventId, vehicleId) {
      if (!confirm('Opravdu smazat tuto škodní událost a všechny její dokumenty?')) return;
      try {
        const r = await fetch('/api/fleet/damage-events/' + eventId, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="damage"]');
        if (panel) await loadDamageTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function addDamageDocuments(eventId, fileList, vehicleId) {
      if (!fileList || !fileList.length) return;
      for (const file of Array.from(fileList)) {
        if (file.size > 20 * 1024 * 1024) { alert('Soubor "' + file.name + '" je větší než 20 MB, přeskakuji.'); continue; }
        try {
          const b64 = await fileToBase64(file);
          await fetch('/api/fleet/damage-events/' + eventId + '/documents', {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({
              file_data: b64,
              file_name: file.name,
              mime_type: file.type || null,
              title: file.name,
            }),
          });
        } catch (e) { console.error('Upload error:', e); }
      }
      const panel = document.querySelector('.veh-tab-panel[data-panel="damage"]');
      if (panel) await loadDamageTab(vehicleId, panel);
    }

    async function deleteDamageDocument(docId, vehicleId) {
      if (!confirm('Smazat tento dokument?')) return;
      try {
        const r = await fetch('/api/fleet/damage-documents/' + docId, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) { const err = await r.json().catch(() => ({})); alert('Chyba: ' + (err.error || r.status)); return; }
        const panel = document.querySelector('.veh-tab-panel[data-panel="damage"]');
        if (panel) await loadDamageTab(vehicleId, panel);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // Otevře dokument škodní události v samostatném vyskakovacím okně.
    // Vrací false, aby se zabránilo defaultnímu prokliku linku (když popup projde).
    // Při blokování popupů vrací true a link se otevře v nové záložce (stejně jako faktury v servisu).
    function openDamageDocument(evt, fileUrl, title) {
      if (!fileUrl) return false;
      const w = Math.min(1100, Math.round((window.screen.availWidth || 1200) * 0.85));
      const h = Math.min(800, Math.round((window.screen.availHeight || 900) * 0.85));
      const left = Math.max(0, Math.round(((window.screen.availWidth || 1200) - w) / 2));
      const top = Math.max(0, Math.round(((window.screen.availHeight || 900) - h) / 2));
      const features = 'popup=yes,noopener,noreferrer,width=' + w + ',height=' + h + ',left=' + left + ',top=' + top + ',resizable=yes,scrollbars=yes';
      let win = null;
      try { win = window.open(fileUrl, '_blank', features); } catch (_) { win = null; }
      if (!win) {
        // Popup blokovaný – necháme browser otevřít link v nové záložce (default chování <a target="_blank">)
        return true;
      }
      try { win.document.title = title || 'Dokument škodní události'; } catch (_) { /* cross-origin – ignoruj */ }
      if (evt && evt.preventDefault) evt.preventDefault();
      return false;
    }

    async function saveQuickDamage() {
      const vehicleId = parseInt(document.getElementById('qd-vehicle').value);
      const eventDate = document.getElementById('qd-date').value;
      const location = document.getElementById('qd-location').value.trim();
      if (!vehicleId || !eventDate || !location) { alert('Vyber vozidlo, datum a místo.'); return; }
      const data = {
        event_date: eventDate,
        location: location,
        claim_number: document.getElementById('qd-claim').value.trim() || null,
