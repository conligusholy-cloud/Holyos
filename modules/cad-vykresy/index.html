<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CAD výkresy | HOLYOS</title>
  <link rel="icon" type="image/svg+xml" href="../../logo-holyos-icon.svg">
  <base href="../../">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    .main-wrapper { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }

    .page-header {
      display:flex; align-items:center; gap:12px; padding:20px 24px;
      border-bottom:1px solid var(--border); flex-wrap:wrap;
    }
    .page-header h1 { font-size:18px; font-weight:700; margin:0; }
    .page-header .count { font-size:13px; color:var(--text2); margin-left:4px; }
    .search-box {
      margin-left:auto; padding:8px 14px; background:var(--surface2); color:var(--text);
      border:1px solid var(--border); border-radius:8px; font-size:13px; width:260px;
    }
    .search-box:focus { border-color:var(--accent); outline:none; }

    .btn { padding:8px 16px; border-radius:8px; border:1px solid var(--border); font-size:13px; font-weight:500; cursor:pointer; transition:all 0.15s; display:inline-flex; align-items:center; gap:6px; background:transparent; color:var(--text); }
    .btn-primary { background:#0284c7; color:#fff; border-color:#0284c7; }
    .btn-primary:hover { background:#0369a1; }
    .btn-secondary { background:var(--surface2); color:var(--text); }
    .btn-sm { padding:5px 12px; font-size:12px; }

    .content { display:grid; grid-template-columns: 320px 1fr; gap:0; flex:1; min-height:0; }

    .tree-panel {
      border-right:1px solid var(--border);
      padding:16px 12px; overflow-y:auto;
      background:var(--surface);
    }
    .tree-panel h3 { font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); margin:0 0 10px 4px; }
    .tree-node {
      padding:6px 10px; margin:2px 0; border-radius:6px; cursor:pointer; font-size:13px;
      display:flex; align-items:center; gap:6px; color:var(--text);
    }
    .tree-node:hover { background:var(--surface2); }
    .tree-node.active { background:rgba(2,132,199,0.15); color:#0284c7; font-weight:500; }
    .tree-node.block { padding-left:26px; font-size:12px; color:var(--text2); }
    .tree-node.block.active { color:#0284c7; }
    .tree-expand { width:12px; display:inline-block; text-align:center; color:var(--text2); }
    .tree-count { margin-left:auto; font-size:11px; color:var(--text2); background:var(--surface2); padding:1px 7px; border-radius:10px; }
    .tree-node.active .tree-count { background:rgba(2,132,199,0.25); color:#0284c7; }

    .right-panel { display:flex; flex-direction:column; min-width:0; overflow:hidden; }

    .drawings-list {
      flex:1; overflow-y:auto; padding:16px 20px;
    }
    .drawings-list h2 { font-size:15px; font-weight:600; margin:0 0 12px; }

    .data-table { width:100%; border-collapse:separate; border-spacing:0; }
    .data-table th { background:var(--surface2); padding:10px 12px; text-align:left; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color:var(--text2); border-bottom:1px solid var(--border); }
    .data-table td { padding:10px 12px; font-size:13px; border-bottom:1px solid rgba(255,255,255,0.04); vertical-align:middle; }
    .data-table tr { cursor:pointer; }
    .data-table tr:hover td { background:rgba(2,132,199,0.07); }
    .data-table tr.selected td { background:rgba(2,132,199,0.15); }

    .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:500; }
    .badge-ext-sldprt  { background:rgba(14,165,233,0.15); color:#0ea5e9; }
    .badge-ext-sldasm  { background:rgba(139,92,246,0.15); color:#a78bfa; }
    .badge-ext-slddrw  { background:rgba(245,158,11,0.15); color:#f59e0b; }
    .badge-ext-stl     { background:rgba(34,197,94,0.15); color:#22c55e; }
    .badge-unknown     { background:rgba(239,68,68,0.15); color:#ef4444; }
    .badge-count       { background:var(--surface2); color:var(--text2); }

    .detail-pane {
      border-top:1px solid var(--border);
      height: 45vh;
      overflow-y:auto;
      padding:16px 20px;
      background:var(--surface);
    }
    .detail-pane h2 { font-size:15px; font-weight:600; margin:0 0 8px; }
    .detail-meta { display:grid; grid-template-columns:repeat(auto-fit, minmax(180px, 1fr)); gap:8px 20px; font-size:13px; margin-bottom:16px; }
    .detail-meta div span { color:var(--text2); font-size:11px; text-transform:uppercase; letter-spacing:0.5px; display:block; }
    .config-row {
      border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px;
      background:var(--surface2);
    }
    .config-row header { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
    .config-row h4 { margin:0; font-size:14px; font-weight:600; }
    .config-actions { margin-left:auto; display:flex; gap:6px; }
    .preview-thumb { width:120px; height:auto; border-radius:6px; border:1px solid var(--border); }
    .config-body { display:grid; grid-template-columns:130px 1fr; gap:14px; }
    .prop-list { font-size:12px; line-height:1.6; }
    .prop-list b { color:var(--text2); font-weight:500; margin-right:4px; }

    .bom-table { width:100%; margin-top:10px; font-size:12px; border-collapse:collapse; }
    .bom-table th { text-align:left; color:var(--text2); font-size:10px; text-transform:uppercase; letter-spacing:0.5px; padding:4px 6px; border-bottom:1px solid var(--border); }
    .bom-table td { padding:5px 6px; border-bottom:1px solid rgba(255,255,255,0.04); }

    .empty {
      color:var(--text2); font-style:italic; padding:40px; text-align:center;
    }
    .loader {
      color:var(--text2); padding:40px; text-align:center;
    }
  </style>
</head>
<body>
  <div id="sidebar"></div>
  <div class="main-wrapper">
    <div class="page-header">
      <span style="font-size:26px;">&#128196;</span>
      <div>
        <h1>CAD výkresy <span class="count" id="cad-count"></span></h1>
      </div>
      <input type="text" class="search-box" id="cad-search" placeholder="Hledat podle názvu souboru, titulku…">
      <button class="btn btn-secondary" id="btn-reload" title="Obnovit seznam">&#8635; Obnovit</button>
      <button class="btn btn-primary" id="btn-new-project">+ Nový projekt</button>
    </div>

    <div class="content">
      <!-- Strom projektů -->
      <aside class="tree-panel">
        <h3>Projekty</h3>
        <div id="project-tree" class="loader">Načítám…</div>
      </aside>

      <!-- Pravá strana: seznam + detail -->
      <section class="right-panel">
        <div class="drawings-list">
          <h2 id="drawings-title">Vyber projekt vlevo</h2>
          <div id="drawings-table"></div>
        </div>
        <div class="detail-pane" id="detail-pane">
          <div class="empty">Vyber výkres ze seznamu pro zobrazení detailu.</div>
        </div>
      </section>
    </div>
  </div>

  <script src="js/super-admin-guard.js"></script>
  <script>
    var s = document.createElement('script');
    s.src = 'js/sidebar.js?v=' + Date.now();
    s.onload = function() { renderSidebar('cad-vykresy'); };
    document.head.appendChild(s);
  </script>

  <script>
    // ─── Autentizace ──────────────────────────────────────────────────────────
    // Backend používá httpOnly cookie (nastavena při loginu), sessionStorage.token je jen doplněk.
    // Redirect na login řeší sidebar.js (fetch /api/auth/me → 401).
    const auth = () => {
      const h = { 'Content-Type': 'application/json' };
      const t = sessionStorage.getItem('token');
      if (t) h['Authorization'] = 'Bearer ' + t;
      return h;
    };
    const fetchOpts = (extra) => Object.assign({ credentials: 'include', headers: auth() }, extra || {});

    // ─── Stav ────────────────────────────────────────────────────────────────
    const state = {
      projects: [],
      activeProjectId: null,
      activeBlockId: null,
      drawings: [],
      activeDrawingId: null,
      query: '',
    };

    // ─── Utils ───────────────────────────────────────────────────────────────
    const escapeHtml = s => (s ?? '').toString().replace(/[&<>"]/g,
      c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
    const fmt = d => {
      if (!d) return '—';
      const dt = new Date(d);
      // Datum + čas do minuty — "22. 4. 2026, 10:34"
      return dt.toLocaleString('cs-CZ', {
        day: 'numeric', month: 'numeric', year: 'numeric',
        hour: '2-digit', minute: '2-digit',
      });
    };

    // ─── Načítání ────────────────────────────────────────────────────────────
    async function loadProjects() {
      const res = await fetch('/api/cad/project-blocks', fetchOpts());
      if (!res.ok) throw new Error('Načtení projektů selhalo (' + res.status + ')');
      const data = await res.json();
      state.projects = data.Projects || [];
      renderTree();
    }

    async function loadDrawings() {
      const params = new URLSearchParams();
      if (state.activeProjectId) params.set('projectId', state.activeProjectId);
      if (state.activeBlockId) params.set('blockId', state.activeBlockId);
      if (state.query) params.set('q', state.query);
      params.set('limit', '200');

      const res = await fetch('/api/cad/drawings?' + params, fetchOpts());
      if (!res.ok) throw new Error('Načtení výkresů selhalo');
      state.drawings = await res.json();
      document.getElementById('cad-count').textContent =
        '· ' + state.drawings.length + ' výkresů';
      renderDrawings();
    }

    async function loadDetail(id) {
      state.activeDrawingId = id;
      const pane = document.getElementById('detail-pane');
      pane.innerHTML = '<div class="loader">Načítám detail…</div>';
      const res = await fetch('/api/cad/drawings/' + id, fetchOpts());
      if (!res.ok) { pane.innerHTML = '<div class="empty">Chyba při načítání detailu.</div>'; return; }
      const d = await res.json();
      renderDetail(d);
    }

    // ─── Render: strom projektů ──────────────────────────────────────────────
    function renderTree() {
      const el = document.getElementById('project-tree');
      if (!state.projects.length) {
        el.innerHTML = '<div class="empty">Žádné projekty. Založte první projekt přes <b>+ Nový projekt</b>.</div>';
        return;
      }
      const parts = [];
      // "Vše" - bez filtru
      parts.push(nodeHtml(null, 'Všechny výkresy', '&#128196;', !state.activeProjectId && !state.activeBlockId));

      for (const p of state.projects) {
        const active = state.activeProjectId === p.Id && !state.activeBlockId;
        parts.push('<div class="tree-node' + (active ? ' active' : '') + '" data-project="' + p.Id + '" style="display:flex;align-items:center;gap:6px;">' +
                   '<span class="tree-expand">&#9662;</span>' +
                   '<span style="flex:1;">' + escapeHtml(p.Code) + ' \u00b7 ' + escapeHtml(p.Name) + '</span>' +
                   '<button class="btn-icon-mini" title="Upravit" onclick="event.stopPropagation();openEditProject(' + p.Id + ')" style="background:none;border:none;color:#3b82f6;cursor:pointer;font-size:12px;padding:2px 4px;">\u270f\ufe0f</button>' +
                   '<button class="btn-icon-mini" title="Smazat" onclick="event.stopPropagation();deleteProject(' + p.Id + ')" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:12px;padding:2px 4px;">\ud83d\uddd1\ufe0f</button>' +
                   '</div>');
        // rekurze bloků
        (function walk(blocks, depth) {
          for (const b of blocks || []) {
            const activeB = state.activeBlockId === b.id;
            parts.push('<div class="tree-node block' + (activeB ? ' active' : '') + '" ' +
                       'style="padding-left:' + (26 + depth*14) + 'px" ' +
                       'data-project="' + p.Id + '" data-block="' + b.id + '">' +
                       '&#8226; ' + escapeHtml(b.name) + '</div>');
            if (b.children && b.children.length) walk(b.children, depth + 1);
          }
        })(p.Blocks, 0);
      }
      el.innerHTML = parts.join('');

      el.querySelectorAll('.tree-node').forEach(n => {
        n.addEventListener('click', () => {
          const pid = n.dataset.project ? parseInt(n.dataset.project) : null;
          const bid = n.dataset.block ? parseInt(n.dataset.block) : null;
          state.activeProjectId = pid;
          state.activeBlockId = bid;
          renderTree();
          updateDrawingsTitle();
          loadDrawings();
        });
      });
    }

    function nodeHtml(projectId, name, icon, active) {
      return '<div class="tree-node' + (active ? ' active' : '') + '" ' +
             (projectId ? 'data-project="' + projectId + '"' : '') + '>' +
             '<span class="tree-expand">' + icon + '</span>' +
             '<span>' + escapeHtml(name) + '</span>' +
             '</div>';
    }

    function updateDrawingsTitle() {
      const t = document.getElementById('drawings-title');
      if (state.activeBlockId) {
        const p = state.projects.find(p => p.Id === state.activeProjectId);
        let block = null;
        (function find(bs) {
          for (const b of bs || []) {
            if (b.id === state.activeBlockId) { block = b; return; }
            find(b.children);
          }
        })(p ? p.Blocks : []);
        t.textContent = p && block ? (p.Code + ' — ' + block.name) : 'Výkresy';
      } else if (state.activeProjectId) {
        const p = state.projects.find(p => p.Id === state.activeProjectId);
        t.textContent = p ? (p.Code + ' · ' + p.Name) : 'Výkresy';
      } else {
        t.textContent = 'Všechny výkresy';
      }
    }

    // ─── Render: seznam výkresů ──────────────────────────────────────────────
    function renderDrawings() {
      const el = document.getElementById('drawings-table');
      if (!state.drawings.length) {
        el.innerHTML = '<div class="empty">Žádné výkresy. Pošli je přes desktop klienta (kontextové menu "Odevzdat do výroby").</div>';
        return;
      }
      const rows = state.drawings.map(d => {
        const creatorName = d.creator ? escapeHtml(d.creator.first_name + ' ' + d.creator.last_name) : '<span style="color:var(--text2)">—</span>';
        // 3D viewer tlacitko — otevre prvni konfiguraci s STL rovnou ze seznamu.
        // Kdyz STL neni (stare importy nebo .slddrw), tlacitko se nezobrazi.
        const stlConfig = (d.configurations || []).find(c => c.stl_path);
        const stlTitle = d.file_name + (stlConfig ? (' \u00b7 ' + (stlConfig.config_name || '')) : '');
        const stlThumb = stlConfig && stlConfig.png_path ? ("'/api/cad/assets/" + stlConfig.png_path + "'") : 'null';
        const stlBtn = stlConfig
          ? `<button type="button" class="btn btn-sm" onclick="event.stopPropagation();open3DViewer('${escapeHtml(stlConfig.stl_path)}', '${escapeHtml(stlTitle)}', ${stlThumb})" style="background:rgba(16,185,129,0.12);color:#10b981;border:1px solid rgba(16,185,129,0.35);padding:2px 8px;font-size:10px;margin-left:8px;vertical-align:middle;border-radius:6px;cursor:pointer;" title="Otev\u0159\u00edt 3D n\u00e1hled">&#128302; 3D</button>`
          : '';
        return `
        <tr data-id="${d.id}" class="${d.id === state.activeDrawingId ? 'selected' : ''}">
          <td><span class="badge badge-ext-${escapeHtml(d.extension)}">${escapeHtml(d.extension)}</span></td>
          <td><b>${escapeHtml(d.file_name)}</b>${stlBtn}${d.title ? '<br><span style="color:var(--text2);font-size:12px;">'+escapeHtml(d.title)+'</span>' : ''}</td>
          <td>${d.project ? escapeHtml(d.project.code) : '—'}</td>
          <td>${d.block ? escapeHtml(d.block.name) : '—'}</td>
          <td>v${d.version}</td>
          <td><span class="badge badge-count">${(d.configurations || []).length} konfig.</span></td>
          <td style="white-space:nowrap;" onclick="event.stopPropagation();">${(() => {
            const pdfConfigs = (d.configurations || []).filter(c => c.pdf_path);
            if (pdfConfigs.length === 0) return '<span style="color:var(--text2);">\u2014</span>';
            if (pdfConfigs.length === 1) {
              return '<a href="/api/cad/assets/' + encodeURI(pdfConfigs[0].pdf_path) + '" target="_blank" class="btn btn-sm" style="background:rgba(239,68,68,0.12);color:#ef4444;border-color:rgba(239,68,68,0.3);padding:3px 10px;font-size:11px;text-decoration:none;" title="Otev\u0159\u00edt PDF">\ud83d\udcc4 PDF</a>';
            }
            // Vic konfiguraci — zobraz prvni + badge s poctem dalsich
            return '<a href="/api/cad/assets/' + encodeURI(pdfConfigs[0].pdf_path) + '" target="_blank" class="btn btn-sm" style="background:rgba(239,68,68,0.12);color:#ef4444;border-color:rgba(239,68,68,0.3);padding:3px 10px;font-size:11px;text-decoration:none;" title="Otev\u0159\u00edt PDF konfigurace: ' + escapeHtml(pdfConfigs[0].config_name || '') + '">\ud83d\udcc4 PDF</a>' +
              ' <span class="badge badge-count" title="Dal\u0161\u00ed ' + (pdfConfigs.length - 1) + ' PDF — v detailu">+' + (pdfConfigs.length - 1) + '</span>';
          })()}</td>
          <td style="font-size:12px;">${creatorName}</td>
          <td>${fmt(d.last_import_at)}</td>
          <td style="white-space:nowrap;" onclick="event.stopPropagation();">
            <button class="btn btn-sm" style="background:rgba(59,130,246,0.12);color:#3b82f6;border-color:rgba(59,130,246,0.3);padding:3px 8px;font-size:11px;" onclick="openEditDrawing(${d.id})" title="Upravit">\u270f\ufe0f</button>
            <button class="btn btn-sm btn-danger" style="padding:3px 8px;font-size:11px;margin-left:4px;" onclick="deleteDrawing(${d.id})" title="Smazat">\ud83d\uddd1\ufe0f</button>
          </td>
        </tr>`;
      }).join('');
      el.innerHTML = `
        <table class="data-table">
          <thead><tr>
            <th>Typ</th><th>Soubor</th><th>Projekt</th><th>Blok</th><th>Verze</th>
            <th>Konfig.</th><th>PDF</th><th>Importoval</th><th>Poslední import</th><th>Akce</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
      el.querySelectorAll('tr[data-id]').forEach(tr => {
        tr.addEventListener('click', () => {
          const id = parseInt(tr.dataset.id);
          loadDetail(id);
          el.querySelectorAll('tr').forEach(r => r.classList.remove('selected'));
          tr.classList.add('selected');
        });
      });
    }

    // ─── Edit / Delete vykresu ───────────────────────────────────────────────
    async function deleteDrawing(id) {
      if (!confirm('Opravdu smazat tento v\u00fdkres i se v\u0161emi konfiguracemi?')) return;
      try {
        const res = await fetch('/api/cad/drawings/' + id, { method: 'DELETE' });
        if (!res.ok) { alert('Chyba p\u0159i maz\u00e1n\u00ed'); return; }
        // Uklid state
        state.drawings = state.drawings.filter(d => d.id !== id);
        if (state.activeDrawingId === id) {
          state.activeDrawingId = null;
          document.getElementById('detail-pane').innerHTML = '<div class="empty">Vyber v\u00fdkres ze seznamu pro zobrazen\u00ed detailu.</div>';
        }
        renderDrawings();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    async function openEditDrawing(id) {
      const d = state.drawings.find(x => x.id === id);
      if (!d) return;
      // Nactem bloky pro dropdown
      let blocks = [];
      try {
        const projectId = d.project ? d.project.id : null;
        const br = await fetch('/api/cad/project-blocks', fetchOpts());
        if (br.ok) {
          const bd = await br.json();
          const projects = (bd && bd.Projects) || [];
          const targetProject = projects.find(pp => pp.Id === projectId);
          // Flatten stromove struktury Blocks -> plochy seznam
          const flatten = (arr, depth) => {
            const out = [];
            for (const b of (arr || [])) {
              out.push({ id: b.id, name: '\u00a0\u00a0'.repeat(depth) + b.name });
              if (b.children && b.children.length) out.push(...flatten(b.children, depth + 1));
            }
            return out;
          };
          blocks = targetProject ? flatten(targetProject.Blocks, 0) : [];
        }
      } catch(e) { console.warn('load blocks fail', e); }
      const blockOpts = ['<option value="">\u2014 Bez bloku \u2014</option>']
        .concat(blocks.map(b => '<option value="' + b.id + '"' + (d.block && d.block.id === b.id ? ' selected' : '') + '>' + escapeHtml(b.name) + '</option>'))
        .join('');
      const modalRoot = document.getElementById('modal-root') || (() => { const m = document.createElement('div'); m.id='modal-root'; document.body.appendChild(m); return m; })();
      modalRoot.innerHTML =
        '<div class="modal-overlay" onclick="if(event.target===this)closeDrawingEditModal()" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;">' +
          '<div class="modal" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:560px;max-width:95vw;">' +
            '<h2 style="margin-bottom:16px;">\u270f\ufe0f Upravit v\u00fdkres</h2>' +
            '<form onsubmit="saveDrawingEdit(event,' + id + ')">' +
              '<div class="form-group"><label style="font-size:12px;color:var(--text2);">Soubor</label><div style="padding:6px 0;"><b>' + escapeHtml(d.file_name) + '</b> <span style="color:var(--text2);font-size:11px;">(neupravitelne)</span></div></div>' +
              '<div class="form-group"><label>N\u00e1zev / titulek</label><input type="text" name="title" value="' + escapeHtml(d.title || '') + '" placeholder="Nap\u0159. Hlavn\u00ed r\u00e1m"></div>' +
              '<div class="form-group"><label>Popis</label><textarea name="description" rows="3" placeholder="Intern\u00ed pozn\u00e1mky...">' + escapeHtml(d.description || '') + '</textarea></div>' +
              '<div class="form-group"><label>Blok (skupina)</label><select name="block_id">' + blockOpts + '</select></div>' +
              '<div class="modal-actions" style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">' +
                '<button type="button" class="btn btn-secondary" onclick="closeDrawingEditModal()">Zru\u0161it</button>' +
                '<button type="submit" class="btn btn-primary">Ulo\u017eit</button>' +
              '</div>' +
            '</form>' +
          '</div>' +
        '</div>';
    }

    function closeDrawingEditModal() {
      const m = document.getElementById('modal-root');
      if (m) m.innerHTML = '';
    }

    async function saveDrawingEdit(e, id) {
      e.preventDefault();
      const f = new FormData(e.target);
      const data = {
        title: f.get('title') || null,
        description: f.get('description') || null,
        block_id: f.get('block_id') ? parseInt(f.get('block_id')) : null,
      };
      try {
        const res = await fetch('/api/cad/drawings/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (!res.ok) { alert('Chyba p\u0159i ulo\u017een\u00ed'); return; }
        closeDrawingEditModal();
        await loadDrawings();
        if (state.activeDrawingId === id) loadDetail(id);
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Edit / Delete projektu ──────────────────────────────────────────────
    async function deleteProject(id) {
      const p = state.projects.find(x => x.Id === id);
      if (!p) return;
      const msg = 'Opravdu smazat projekt "' + (p.Code || '?') + ' \u00b7 ' + (p.Name || '') + '"?\n\n\u26a0\ufe0f Smaze se v\u010detne vsech bloku a v\u00fdkresu v projektu.';
      if (!confirm(msg)) return;
      try {
        const res = await fetch('/api/cad/projects/' + id, { method: 'DELETE' });
        if (!res.ok) { alert('Chyba p\u0159i maz\u00e1n\u00ed'); return; }
        if (state.activeProjectId === id) {
          state.activeProjectId = null;
          state.activeBlockId = null;
        }
        await loadProjects();
        await loadDrawings();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    function openEditProject(id) {
      const p = state.projects.find(x => x.Id === id);
      if (!p) return;
      const modalRoot = document.getElementById('modal-root') || (() => { const m = document.createElement('div'); m.id='modal-root'; document.body.appendChild(m); return m; })();
      modalRoot.innerHTML =
        '<div class="modal-overlay" onclick="if(event.target===this)closeProjectEditModal()" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:10000;display:flex;align-items:center;justify-content:center;">' +
          '<div class="modal" style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:520px;max-width:95vw;">' +
            '<h2 style="margin-bottom:16px;">\u270f\ufe0f Upravit projekt</h2>' +
            '<form onsubmit="saveProjectEdit(event,' + id + ')">' +
              '<div class="form-group"><label>K\u00f3d *</label><input type="text" name="code" value="' + escapeHtml(p.Code || '') + '" required placeholder="TEST-01"></div>' +
              '<div class="form-group"><label>N\u00e1zev *</label><input type="text" name="name" value="' + escapeHtml(p.Name || '') + '" required placeholder="Testovac\u00ed projekt"></div>' +
              '<div class="form-group"><label>Z\u00e1kazn\u00edk</label><input type="text" name="customer" value="' + escapeHtml(p.Customer || '') + '" placeholder="Nepovinn\u00e9"></div>' +
              '<div class="modal-actions" style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;">' +
                '<button type="button" class="btn btn-secondary" onclick="closeProjectEditModal()">Zru\u0161it</button>' +
                '<button type="submit" class="btn btn-primary">Ulo\u017eit</button>' +
              '</div>' +
            '</form>' +
          '</div>' +
        '</div>';
    }

    function closeProjectEditModal() {
      const m = document.getElementById('modal-root');
      if (m) m.innerHTML = '';
    }

    async function saveProjectEdit(e, id) {
      e.preventDefault();
      const f = new FormData(e.target);
      const data = {
        code: f.get('code'),
        name: f.get('name'),
        customer: f.get('customer') || null,
      };
      try {
        const res = await fetch('/api/cad/projects/' + id, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
        if (!res.ok) { alert('Chyba p\u0159i ulo\u017een\u00ed'); return; }
        closeProjectEditModal();
        await loadProjects();
      } catch (e) { alert('Chyba: ' + e.message); }
    }

    // ─── Render: detail výkresu ──────────────────────────────────────────────
    function renderDetail(d) {
      const configs = (d.configurations || []).map(c => {
        const png = c.png_path ? `/api/cad/assets/${c.png_path}` : null;
        const pdf = c.pdf_path ? `/api/cad/assets/${c.pdf_path}` : null;
        const props = Object.entries(c.custom_properties || {}).slice(0, 12).map(([k,v]) =>
          `<div><b>${escapeHtml(k)}:</b> ${escapeHtml(v)}</div>`).join('');
        const bom = (c.components || []);
        const bomRows = bom.map(b => `
          <tr>
            <td>${b.is_unknown ? '<span class="badge badge-unknown">nerozpoznáno</span>' : ''} ${escapeHtml(b.name)}</td>
            <td>${b.quantity}</td>
            <td>${escapeHtml(b.configuration || '')}</td>
            <td>${b.material ? escapeHtml(b.material.code + ' · ' + b.material.name) : '—'}</td>
          </tr>`).join('');
        return `
          <div class="config-row">
            <header>
              <h4>${escapeHtml(c.config_name)}</h4>
              <span class="badge badge-count">${c.quantity}×</span>
              ${c.mass_grams ? `<span class="badge badge-count">${(c.mass_grams/1000).toFixed(2)} kg</span>` : ''}
              <div class="config-actions">
                ${pdf ? `<a class="btn btn-sm btn-secondary" href="${pdf}" target="_blank">&#128196; PDF</a>` : ''}
                ${png ? `<a class="btn btn-sm btn-secondary" href="${png}" target="_blank">&#128444;&#65039; Náhled</a>` : ''}
                ${c.stl_path ? `<button type="button" class="btn btn-sm" style="background:rgba(34,197,94,0.15);color:#22c55e;border:1px solid rgba(34,197,94,0.35);" onclick="open3DViewer('${escapeHtml(c.stl_path)}', '${escapeHtml(d.file_name)} — ${escapeHtml(c.config_name)}', ${c.png_path ? "'/api/cad/assets/" + c.png_path + "'" : 'null'})">&#128302; 3D Viewer</button>` : ''}
                ${(c.attachments || []).map(a => `<a class="btn btn-sm btn-secondary" href="/api/cad/assets/${encodeURI(a.path)}" target="_blank" title="${escapeHtml(a.filename)}" style="text-transform:uppercase;font-size:11px;">&#128230; ${escapeHtml(a.kind)}</a>`).join('')}
              </div>
            </header>
            <div class="config-body">
              ${png ? `<img src="${png}" class="preview-thumb" alt="náhled">` : '<div></div>'}
              <div>
                <div class="prop-list">${props || '<i style="color:var(--text2)">bez custom properties</i>'}</div>
                ${bom.length ? `
                  <table class="bom-table">
                    <thead><tr><th>Díl</th><th>ks</th><th>Konfig.</th><th>Materiál (katalog)</th></tr></thead>
                    <tbody>${bomRows}</tbody>
                  </table>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      const pane = document.getElementById('detail-pane');
      pane.innerHTML = `
        <h2>${escapeHtml(d.file_name)} <span class="badge badge-ext-${escapeHtml(d.extension)}">${escapeHtml(d.extension)}</span></h2>
        <div class="detail-meta">
          <div><span>Projekt</span>${d.project ? escapeHtml(d.project.code + ' · ' + d.project.name) : '—'}</div>
          <div><span>Blok</span>${d.block ? escapeHtml(d.block.name) : '—'}</div>
          <div><span>Verze</span>v${d.version}</div>
          <div><span>Typ</span>${escapeHtml(d.extension)}</div>
          <div><span>Importoval</span>${d.creator ? escapeHtml(d.creator.first_name + ' ' + d.creator.last_name) + (d.creator.email ? ' <small style="color:var(--text2);">(' + escapeHtml(d.creator.email) + ')</small>' : '') : '—'}</div>
          <div><span>Vytvořeno</span>${fmt(d.created_at)}</div>
          <div><span>Poslední import</span>${fmt(d.last_import_at)}</div>
          <div><span>Relativní cesta</span>${escapeHtml(d.relative_path || '—')}</div>
          <div><span>Původní cesta</span><code style="font-size:11px;word-break:break-all;">${escapeHtml(d.source_path || '—')}</code></div>
          <div><span>Checksum (SHA256)</span><code style="font-size:10px;color:var(--text2);word-break:break-all;">${escapeHtml(d.checksum || '—')}</code></div>
          ${d.description ? '<div style="grid-column:1/-1;"><span>Popis</span>' + escapeHtml(d.description) + '</div>' : ''}
        </div>
        ${(() => {
          // Kusovnik sekce — prominentni pro sestavy (.sldasm).
          // Scita komponenty napric vsemi konfiguracemi, oddeluje unknown (cervene).
          const isAssembly = (d.extension || '').toLowerCase() === 'sldasm';
          if (!isAssembly) return '';
          const allComps = [];
          for (const c of (d.configurations || [])) {
            for (const comp of (c.components || [])) {
              allComps.push(Object.assign({}, comp, { __configName: c.config_name }));
            }
          }
          if (allComps.length === 0) {
            return '<div style="background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.3);border-left:3px solid #f59e0b;border-radius:8px;padding:14px 18px;margin:16px 0;">' +
              '<strong style="color:#f59e0b;">\u26a0\ufe0f Kusovn\u00edk chyb\u00ed</strong><br>' +
              '<span style="color:var(--text2);font-size:13px;line-height:1.55;">Tento v\u00fdkres je sestava (.sldasm), ale p\u0159i importu z CAD klienta nebyly odesl\u00e1ny ko\u0161enty kusovn\u00edku. ' +
                'P\u0159epo\u0161lete soubor z SolidWorks p\u0159es \u201eOdevzdat do v\u00fdroby\u201c, klient tentokr\u00e1t rozparsuje vnit\u0159n\u00ed referenace.</span>' +
            '</div>';
          }
          const known = allComps.filter(c => !c.is_unknown);
          const unknown = allComps.filter(c => c.is_unknown);
          let rowsHtml = '';
          for (const b of known) {
            rowsHtml += '<tr>' +
              '<td>' + escapeHtml(b.name) + '</td>' +
              '<td style="text-align:right;font-weight:600;">' + (b.quantity || 1) + '\u00d7</td>' +
              '<td style="color:var(--text2);font-size:12px;">' + escapeHtml(b.configuration || '—') + '</td>' +
              '<td>' + (b.material ? '<span style="color:#10b981;font-weight:600">' + escapeHtml(b.material.code) + '</span> \u00b7 ' + escapeHtml(b.material.name) : '<span style="color:var(--text2)">—</span>') + '</td>' +
              '<td style="color:var(--text2);font-size:11px;">' + escapeHtml(b.__configName || '') + '</td>' +
            '</tr>';
          }
          for (const b of unknown) {
            rowsHtml += '<tr style="background:rgba(239,68,68,0.06);">' +
              '<td><span style="background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.35);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;margin-right:6px;">\u26a0 NEROZPOZN\u00c1NO</span>' + escapeHtml(b.name) + '</td>' +
              '<td style="text-align:right;font-weight:600;">' + (b.quantity || 1) + '\u00d7</td>' +
              '<td style="color:var(--text2);font-size:12px;">' + escapeHtml(b.configuration || '—') + '</td>' +
              '<td><span style="color:#ef4444">— Chyb\u00ed v katalogu materi\u00e1l\u016f —</span></td>' +
              '<td style="color:var(--text2);font-size:11px;">' + escapeHtml(b.__configName || '') + '</td>' +
            '</tr>';
          }
          return '<div style="margin:20px 0;padding:18px;background:var(--surface);border:1px solid var(--border);border-radius:12px;">' +
            '<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">' +
              '<h3 style="margin:0;font-size:16px;">\ud83d\uddc2\ufe0f Kusovn\u00edk sestavy</h3>' +
              '<span class="badge badge-count">' + known.length + ' polo\u017eek</span>' +
              (unknown.length ? '<span style="background:rgba(239,68,68,0.15);color:#ef4444;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:700;">\u26a0 ' + unknown.length + ' nerozpozn\u00e1no</span>' : '') +
            '</div>' +
            '<table class="bom-table" style="width:100%;font-size:13px;">' +
              '<thead><tr>' +
                '<th style="text-align:left;">D\u00edl</th>' +
                '<th style="text-align:right;width:60px;">Ks</th>' +
                '<th style="text-align:left;width:120px;">Konfig.</th>' +
                '<th style="text-align:left;">Materi\u00e1l (katalog)</th>' +
                '<th style="text-align:left;width:100px;">Z konfig.</th>' +
              '</tr></thead>' +
              '<tbody>' + rowsHtml + '</tbody>' +
            '</table>' +
          '</div>';
        })()}
        ${configs || '<div class="empty">Bez konfigurací.</div>'}`;
    }

    // ─── Nový projekt ─────────────────────────────────────────────────────────
    async function createProject() {
      const code = prompt('Kód projektu (krátký, např. "2026-04"):');
      if (!code) return;
      const name = prompt('Název projektu:');
      if (!name) return;
      const customer = prompt('Zákazník (volitelné):') || null;
      const res = await fetch('/api/cad/projects', fetchOpts({
        method: 'POST',
        body: JSON.stringify({ code, name, customer }),
      }));
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        alert('Chyba: ' + (err.error || res.status));
        return;
      }
      await loadProjects();
    }

    // ─── Init ─────────────────────────────────────────────────────────────────
    document.getElementById('btn-new-project').addEventListener('click', createProject);
    document.getElementById('btn-reload').addEventListener('click', () => {
  

    // ============================================================
    // 3D WEB VIEWER (Three.js + STLLoader)
    // Lazy-load: Three.js a STL se fetchne teprve pri prvnim otevreni.
    // Server + Holyos = 0 CPU pri rendru. Vse bezi na GPU klienta.
    // Browser cacheuje STL 30 dni (viz Cache-Control na backendu).
    // ============================================================
    let _threeLoaded = false;
    let _three = null;
    let _stlLoader = null;
    let _orbitControls = null;

    async function _ensureThreeLoaded() {
      if (_threeLoaded) return;
      // Tri knihovny z CDN (vsechny ~600 KB gzipped celkem, browser je cacheuje).
      await _loadScript('https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js');
      // STLLoader a OrbitControls v r128 nejsou soucasti three.min.js, stahneme je zvlast
      await _loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/STLLoader.js');
      await _loadScript('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js');
      _three = window.THREE;
      _stlLoader = new _three.STLLoader();
      _threeLoaded = true;
    }

    function _loadScript(url) {
      return new Promise((resolve, reject) => {
        if (document.querySelector('script[src="' + url + '"]')) { resolve(); return; }
        const s = document.createElement('script');
        s.src = url;
        s.onload = resolve;
        s.onerror = () => reject(new Error('Load fail: ' + url));
        document.head.appendChild(s);
      });
    }

    let _viewerAnimId = null;
    let _viewerRenderer = null;

    async function open3DViewer(stlPath, title, thumbnailUrl) {
      const modalRoot = document.getElementById('modal-root') || (() => { const m = document.createElement('div'); m.id='modal-root'; document.body.appendChild(m); return m; })();
      // Nejdrive ukazeme modal s PNG thumbnailem + progress, potom teprve nacteme STL
      const thumbHtml = thumbnailUrl && thumbnailUrl !== 'null'
        ? '<img src="' + thumbnailUrl + '" style="max-width:60%;max-height:60%;object-fit:contain;opacity:0.3;" alt="n\u00e1hled">'
        : '<div style="color:#666;">N\u00e1hled nen\u00ed k dispozici</div>';
      modalRoot.innerHTML =
        '<div id="viewer3d-overlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.92);z-index:10000;display:flex;flex-direction:column;">' +
          '<div style="padding:12px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(0,0,0,0.5);border-bottom:1px solid #333;">' +
            '<div style="color:#fff;font-size:14px;font-weight:600;">\ud83d\udd0d ' + title + '</div>' +
            '<div style="color:#888;font-size:11px;margin-left:auto;margin-right:16px;">My\u0161 = rotace | Scroll = zoom | Prav\u00fd + drag = posun</div>' +
            '<button onclick="close3DViewer()" style="background:rgba(239,68,68,0.15);color:#ef4444;border:1px solid rgba(239,68,68,0.4);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;">\u2715 Zav\u0159\u00edt</button>' +
          '</div>' +
          '<div id="viewer3d-canvas-wrap" style="flex:1;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at center, #1a1a2e 0%, #0a0a1a 100%);">' +
            '<div id="viewer3d-loading" style="position:absolute;z-index:2;text-align:center;color:#fff;">' +
              thumbHtml +
              '<div style="margin-top:16px;font-size:13px;">Na\u010d\u00edt\u00e1m 3D model\u2026</div>' +
              '<div id="viewer3d-progress" style="margin-top:8px;font-size:11px;color:#888;">Stahuji STL</div>' +
            '</div>' +
          '</div>' +
        '</div>';

      try {
        await _ensureThreeLoaded();
        document.getElementById('viewer3d-progress').textContent = 'Stahuji STL\u2026';

        const url = '/api/cad/assets/' + stlPath;
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('STL nenalezen: ' + resp.status);
        const buffer = await resp.arrayBuffer();
        document.getElementById('viewer3d-progress').textContent = 'Parsuji mesh\u2026';

        const geometry = _stlLoader.parse(buffer);
        geometry.computeBoundingBox();
        geometry.computeVertexNormals();

        const wrap = document.getElementById('viewer3d-canvas-wrap');
        const width = wrap.clientWidth, height = wrap.clientHeight;

        const scene = new _three.Scene();
        scene.background = new _three.Color(0x0a0a1a);

        // Zjisti bounding box pro lazy nastaveni kamery + centrum
        const bbox = geometry.boundingBox;
        const center = bbox.getCenter(new _three.Vector3());
        const size = bbox.getSize(new _three.Vector3());
        const maxDim = Math.max(size.x, size.y, size.z);

        const camera = new _three.PerspectiveCamera(50, width / height, maxDim * 0.01, maxDim * 100);
        camera.position.set(center.x + maxDim * 1.8, center.y - maxDim * 1.8, center.z + maxDim * 1.2);
        camera.up.set(0, 0, 1);
        camera.lookAt(center);

        _viewerRenderer = new _three.WebGLRenderer({ antialias: true });
        _viewerRenderer.setSize(width, height);
        _viewerRenderer.setPixelRatio(window.devicePixelRatio || 1);
        wrap.appendChild(_viewerRenderer.domElement);

        // Material — stribrny kov s PBR-like appearance
        const material = new _three.MeshPhongMaterial({
          color: 0xb0b8c5,
          specular: 0xffffff,
          shininess: 100,
          flatShading: false,
        });
        const mesh = new _three.Mesh(geometry, material);
        scene.add(mesh);

        // Osvetleni
        scene.add(new _three.AmbientLight(0x404050, 1.0));
        const key = new _three.DirectionalLight(0xffffff, 0.8);
        key.position.set(maxDim * 2, -maxDim * 2, maxDim * 2);
        scene.add(key);
        const fill = new _three.DirectionalLight(0xaabbff, 0.4);
        fill.position.set(-maxDim, maxDim, maxDim);
        scene.add(fill);

        // Grid na Z=0 pro prostorovou orientaci
        const gridHelper = new _three.GridHelper(maxDim * 3, 20, 0x555555, 0x333333);
        gridHelper.rotation.x = Math.PI / 2;
        gridHelper.position.z = bbox.min.z;
        scene.add(gridHelper);

        // Osa X/Y/Z pro referenci
        const axesHelper = new _three.AxesHelper(maxDim * 0.3);
        scene.add(axesHelper);

        _orbitControls = new _three.OrbitControls(camera, _viewerRenderer.domElement);
        _orbitControls.target.copy(center);
        _orbitControls.enableDamping = true;
        _orbitControls.dampingFactor = 0.1;
        _orbitControls.update();

        // Skry loading overlay, spust animacni smycku
        const loading = document.getElementById('viewer3d-loading');
        if (loading) loading.style.display = 'none';

        function animate() {
          _viewerAnimId = requestAnimationFrame(animate);
          _orbitControls.update();
          _viewerRenderer.render(scene, camera);
        }
        animate();

        // Resize handler
        window.addEventListener('resize', _onViewerResize);

      } catch (e) {
        const loadingEl = document.getElementById('viewer3d-loading');
        if (loadingEl) {
          loadingEl.innerHTML = '<div style="color:#ef4444;padding:40px;">\u26a0\ufe0f Chyba p\u0159i na\u010d\u00edt\u00e1n\u00ed 3D modelu: ' + e.message + '</div>';
        }
        console.error('3D viewer error', e);
      }
    }

    function _onViewerResize() {
      const wrap = document.getElementById('viewer3d-canvas-wrap');
      if (!wrap || !_viewerRenderer) return;
      _viewerRenderer.setSize(wrap.clientWidth, wrap.clientHeight);
    }

    function close3DViewer() {
      if (_viewerAnimId) { cancelAnimationFrame(_viewerAnimId); _viewerAnimId = null; }
      if (_viewerRenderer) { _viewerRenderer.dispose(); _viewerRenderer = null; }
      if (_orbitControls) { _orbitControls.dispose(); _orbitControls = null; }
      window.removeEventListener('resize', _onViewerResize);
      const modalRoot = document.getElementById('modal-root');
      if (modalRoot) modalRoot.innerHTML = '';
    }

    // ESC zavre viewer
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && document.getElementById('viewer3d-overlay')) close3DViewer();
    });

    loadProjects(); loadDrawings();
    });
    let searchTimer = null;
    document.getElementById('cad-search').addEventListener('input', (e) => {
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.query = e.target.value.trim();
        loadDrawings();
      }, 220);
    });

    (async () => {
      try {
        await loadProjects();
        await loadDrawings();
      } catch (e) {
        console.error(e);
        document.getElementById('project-tree').innerHTML =
          '<div class="empty">Chyba: ' + escapeHtml(e.message) + '</div>';
      }
    })();
  </script>
  <div id="modal-root"></div>
</body>
