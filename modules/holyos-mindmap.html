<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HolyOS — Myšlenková mapa</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #222240;
  --text: #e8e8f0;
  --text2: #8888aa;
  --accent: #6c5ce7;
  --blue: #0984e3;
  --green: #00b894;
  --orange: #f59e0b;
  --red: #ef4444;
  --pink: #e84393;
  --cyan: #00cec9;
  --teal: #10b981;
  --purple: #8b5cf6;
  --yellow: #fbbf24;
}
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, #6c5ce7, #0984e3, #00b894);
  padding: 24px 32px;
  display: flex;
  align-items: center;
  gap: 16px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.header h1 { font-size: 24px; font-weight: 700; letter-spacing: 1px; }
.header p { font-size: 13px; opacity: 0.85; }
.header-right { margin-left: auto; display: flex; gap: 10px; }
.header-btn {
  background: rgba(255,255,255,0.15);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  padding: 7px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all 0.2s;
}
.header-btn:hover { background: rgba(255,255,255,0.25); }

/* Controls */
.controls {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 32px;
  background: var(--surface);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-wrap: wrap;
}
.phase-filter {
  display: flex;
  gap: 6px;
}
.phase-btn {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text2);
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: all 0.2s;
}
.phase-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.phase-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.search-box {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}
.search-box input {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text);
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 13px;
  font-family: inherit;
  outline: none;
  width: 220px;
}
.search-box input:focus { border-color: var(--accent); }
.search-box input::placeholder { color: var(--text2); }

/* Layout */
.main {
  display: flex;
  gap: 0;
  min-height: calc(100vh - 120px);
}

/* Left: Mind map tree */
.tree-panel {
  width: 420px;
  flex-shrink: 0;
  overflow-y: auto;
  padding: 20px 0 20px 24px;
  border-right: 1px solid rgba(255,255,255,0.06);
}

/* Right: Detail panel */
.detail-panel {
  flex: 1;
  overflow-y: auto;
  padding: 24px 32px;
}

/* Mind map tree nodes */
.node {
  margin-bottom: 2px;
}
.node-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.15s;
  user-select: none;
  position: relative;
}
.node-header:hover { background: rgba(255,255,255,0.04); }
.node-header.selected { background: rgba(108,92,231,0.15); }

.node-toggle {
  width: 18px;
  height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  color: var(--text2);
  flex-shrink: 0;
  transition: transform 0.2s;
}
.node-toggle.expanded { transform: rotate(90deg); }
.node-toggle.leaf { visibility: hidden; }

.node-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.node-label {
  font-size: 14px;
  font-weight: 500;
  flex: 1;
}
.node-badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  letter-spacing: 0.3px;
}

.node-children {
  margin-left: 24px;
  border-left: 1px solid rgba(255,255,255,0.06);
  padding-left: 8px;
  overflow: hidden;
  transition: max-height 0.3s ease;
}
.node-children.collapsed {
  max-height: 0;
  overflow: hidden;
}

/* Sub-items in tree */
.sub-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 12px 5px 20px;
  font-size: 13px;
  color: var(--text2);
  cursor: pointer;
  border-radius: 6px;
  transition: all 0.15s;
}
.sub-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.sub-item.selected { color: var(--accent); background: rgba(108,92,231,0.1); }
.sub-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* Detail panel content */
.detail-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 60vh;
  color: var(--text2);
  gap: 12px;
}
.detail-empty-icon { font-size: 64px; opacity: 0.3; }
.detail-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
}
.detail-icon {
  width: 56px;
  height: 56px;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
}
.detail-title { font-size: 24px; font-weight: 700; }
.detail-subtitle { font-size: 13px; color: var(--text2); margin-top: 2px; }
.detail-phase-tag {
  display: inline-block;
  padding: 3px 12px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 600;
  margin-left: auto;
}

.detail-section {
  margin-bottom: 24px;
}
.detail-section h3 {
  font-size: 14px;
  font-weight: 600;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  padding-bottom: 6px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.detail-features {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 10px;
}
.feature-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 8px;
  padding: 12px 16px;
  display: flex;
  align-items: flex-start;
  gap: 10px;
  transition: all 0.15s;
}
.feature-card:hover { border-color: rgba(255,255,255,0.12); background: var(--surface2); }
.feature-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  margin-top: 5px;
  flex-shrink: 0;
}
.feature-text { font-size: 13px; line-height: 1.5; }

/* Connections / dependencies */
.connections {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}
.conn-tag {
  background: var(--surface2);
  border: 1px solid rgba(255,255,255,0.08);
  padding: 5px 14px;
  border-radius: 20px;
  font-size: 12px;
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.conn-tag:hover { border-color: var(--accent); color: var(--accent); }

/* Stats cards */
.stats-row {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  margin-bottom: 24px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 10px;
  padding: 14px;
  text-align: center;
}
.stat-val { font-size: 28px; font-weight: 700; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; }

/* Notes textarea */
.notes-area {
  width: 100%;
  min-height: 100px;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 12px;
  color: var(--text);
  font-family: inherit;
  font-size: 13px;
  resize: vertical;
  outline: none;
}
.notes-area:focus { border-color: var(--accent); }
.notes-area::placeholder { color: var(--text2); }
.notes-save {
  margin-top: 8px;
  background: var(--accent);
  border: none;
  color: #fff;
  padding: 6px 16px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

/* Highlight search */
.highlight { background: rgba(251,191,36,0.3); border-radius: 2px; padding: 0 2px; }

/* Applied note items */
.feature-card.from-note {
  border-left: 3px solid #fbbf24;
  background: rgba(251,191,36,0.06);
}
.feature-card.from-note .feature-dot { background: #fbbf24 !important; }
.sub-item.from-note { color: #fbbf24; }
.sub-item.from-note .sub-dot { background: #fbbf24 !important; }
.applied-tag {
  display: inline-block;
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 8px;
  background: rgba(251,191,36,0.2);
  color: #fbbf24;
  margin-left: 6px;
  font-weight: 600;
}
.notes-status {
  font-size: 11px;
  color: var(--text2);
  margin-top: 6px;
}
.notes-status.saved { color: #00b894; }

/* Deploy status dot */
.deploy-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.deploy-dot.full { background: #00b894; box-shadow: 0 0 6px rgba(0,184,148,0.4); }
.deploy-dot.partial { background: #fbbf24; box-shadow: 0 0 6px rgba(251,191,36,0.3); }
.deploy-dot.none { background: rgba(255,255,255,0.12); }

/* Review checkbox */
.review-check {
  width: 15px; height: 15px; border-radius: 3px;
  border: 1.5px solid rgba(255,255,255,0.2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 9px; transition: all 0.15s ease; user-select: none;
}
.review-check:hover { border-color: #0984e3; background: rgba(9,132,227,0.1); }
.review-check.locked {
  background: rgba(9,132,227,0.15); border-color: #0984e3; color: #0984e3;
}
.review-check.locked::after { content: '🔒'; font-size: 8px; }

/* Status tags */
.status-tag {
  display: inline-block; font-size: 9px; padding: 1px 6px; border-radius: 8px;
  margin-left: 6px; font-weight: 600;
}
.status-tag.deployed { background: rgba(0,184,148,0.2); color: #00b894; }
.status-tag.partial { background: rgba(251,191,36,0.2); color: #fbbf24; }
.status-tag.locked { background: rgba(9,132,227,0.15); color: #0984e3; }

/* Feature card locked state */
.feature-card.is-locked {
  border-color: rgba(9,132,227,0.2); background: rgba(9,132,227,0.04);
}

.impl-legend {
  display: flex; align-items: center; gap: 12px; font-size: 11px;
  color: var(--text2); margin-bottom: 8px; flex-wrap: wrap;
}
.impl-legend span { display: flex; align-items: center; gap: 4px; }

/* Apply modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
}
.modal {
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  width: 600px;
  max-width: 90vw;
  max-height: 80vh;
  overflow-y: auto;
  padding: 24px;
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.modal-module {
  margin-bottom: 16px;
  padding: 12px;
  background: var(--surface2);
  border-radius: 8px;
}
.modal-module h4 { font-size: 14px; margin-bottom: 8px; }
.modal-note-line {
  font-size: 13px;
  color: var(--text2);
  padding: 4px 0 4px 12px;
  border-left: 2px solid #fbbf24;
  margin-bottom: 4px;
}
.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 20px;
  justify-content: flex-end;
}
.modal-btn {
  padding: 8px 20px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  font-size: 13px;
  font-family: inherit;
  transition: all 0.2s;
}
.modal-btn.cancel { background: var(--surface2); color: var(--text2); }
.modal-btn.cancel:hover { background: rgba(255,255,255,0.1); }
.modal-btn.confirm { background: #fbbf24; color: #000; border-color: #fbbf24; font-weight: 600; }
.modal-btn.confirm:hover { background: #f59e0b; }
.modal-btn.confirm:disabled { opacity: 0.7; cursor: wait; }
.ai-spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid rgba(0,0,0,0.2); border-top-color: #000;
  border-radius: 50%; animation: spin 0.8s linear infinite;
  vertical-align: middle; margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 900px) {
  .main { flex-direction: column; }
  .tree-panel { width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.06); max-height: 50vh; }
}
@media (max-width: 768px) {
  .header { padding: 14px 16px; }
  .header h1 { font-size: 16px; }
  .header p { font-size: 11px; }
  .phase-tabs { overflow-x: auto; scrollbar-width: none; flex-wrap: nowrap; }
  .phase-tabs::-webkit-scrollbar { display: none; }
  .phase-tab { white-space: nowrap; padding: 5px 12px; font-size: 11px; }
  .detail-panel { padding: 16px; }
  .wizard { width: 100vw; max-width: 100vw; max-height: 100vh; border-radius: 0; top: 0; right: 0; }
  .wizard-body { padding: 14px 16px; }
}

/* Claude deploy buttons */
.btn-claude-module {
  margin-left: auto; padding: 6px 14px; font-size: 12px; font-weight: 600;
  background: linear-gradient(135deg, rgba(108,92,231,0.2), rgba(167,139,250,0.2));
  color: #a78bfa; border: 1px solid rgba(108,92,231,0.4); border-radius: 8px;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
}
.btn-claude-module:hover { background: linear-gradient(135deg, rgba(108,92,231,0.35), rgba(167,139,250,0.35)); }

.btn-claude-feature {
  margin-left: auto; padding: 3px 10px; font-size: 11px;
  background: rgba(108,92,231,0.15); color: #a78bfa;
  border: 1px solid rgba(108,92,231,0.3); border-radius: 6px;
  cursor: pointer; white-space: nowrap; transition: all 0.2s;
}
.btn-claude-feature:hover { background: rgba(108,92,231,0.3); }

.btn-claude-copied {
  background: rgba(0,184,148,0.2) !important; color: #00b894 !important;
  border-color: rgba(0,184,148,0.3) !important;
}

/* Deploy Wizard */
.wizard-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 9999;
  display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
}
.wizard {
  background: var(--surface); border: 1px solid rgba(108,92,231,0.3); border-radius: 16px;
  width: 680px; max-width: 95vw; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.wizard-header {
  padding: 20px 24px; background: linear-gradient(135deg, rgba(108,92,231,0.15), rgba(9,132,227,0.1));
  border-bottom: 1px solid rgba(108,92,231,0.2); flex-shrink: 0;
}
.wizard-header h2 { font-size: 18px; margin-bottom: 4px; }
.wizard-header p { font-size: 13px; color: var(--text2); }
.wizard-body { padding: 20px 24px; overflow-y: auto; flex: 1; }
.wizard-footer {
  padding: 16px 24px; border-top: 1px solid var(--surface2); display: flex; justify-content: space-between;
  align-items: center; flex-shrink: 0;
}
.wizard-steps { display: flex; gap: 8px; margin-bottom: 16px; }
.wizard-step {
  padding: 4px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;
  background: var(--surface2); color: var(--text2); transition: all 0.2s;
}
.wizard-step.active { background: var(--accent); color: #fff; }
.wizard-step.done { background: rgba(0,184,148,0.2); color: #00b894; }

.wiz-context { background: var(--surface2); border-radius: 10px; padding: 14px 16px; margin-bottom: 16px; font-size: 13px; }
.wiz-context-label { font-weight: 600; color: var(--accent); margin-bottom: 6px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
.wiz-context-row { display: flex; gap: 8px; align-items: center; margin-bottom: 4px; }
.wiz-context-row .label { color: var(--text2); min-width: 80px; }

.wiz-q { margin-bottom: 20px; }
.wiz-q label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
.wiz-q .hint { font-size: 12px; color: var(--text2); margin-bottom: 8px; line-height: 1.6; padding: 8px 12px; background: rgba(255,255,255,0.03); border-radius: 6px; border-left: 2px solid rgba(108,92,231,0.3); }
.wiz-q input, .wiz-q textarea, .wiz-q select {
  width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid var(--surface2);
  background: var(--bg); color: var(--text); font-size: 13px; font-family: inherit;
}
.wiz-q textarea { min-height: 60px; resize: vertical; }
.wiz-q input:focus, .wiz-q textarea:focus, .wiz-q select:focus { outline: none; border-color: var(--accent); }

.wiz-rec { background: rgba(108,92,231,0.08); border: 1px solid rgba(108,92,231,0.2); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; }
.wiz-rec-title { font-weight: 600; color: var(--accent); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; }

.wiz-spec { background: var(--bg); border: 1px solid var(--surface2); border-radius: 10px; padding: 14px; font-size: 12px; font-family: 'Consolas', monospace; white-space: pre-wrap; line-height: 1.5; max-height: 400px; overflow-y: auto; }

.wiz-btn { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; transition: all 0.2s; }
.wiz-btn-primary { background: var(--accent); color: #fff; }
.wiz-btn-primary:hover { background: #5b4bd4; }
.wiz-btn-secondary { background: var(--surface2); color: var(--text); }
.wiz-btn-secondary:hover { background: rgba(108,92,231,0.2); }
.wiz-btn-success { background: var(--green); color: #fff; }
.wiz-btn-success:hover { background: #00a383; }

.wiz-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.wiz-chip {
  padding: 4px 10px; border-radius: 14px; font-size: 11px; cursor: pointer;
  border: 1px solid var(--surface2); background: var(--bg); color: var(--text2); transition: all 0.2s;
}
.wiz-chip.selected { border-color: var(--accent); background: rgba(108,92,231,0.15); color: var(--accent); }
.wiz-chip:hover { border-color: var(--accent); }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="/" style="display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);text-decoration:none;color:var(--text2);font-size:18px;transition:all 0.2s;flex-shrink:0;" onmouseover="this.style.background='rgba(255,255,255,0.15)';this.style.color='#fff'" onmouseout="this.style.background='rgba(255,255,255,0.08)';this.style.color='var(--text2)'">&larr;</a>
    <div>
    <h1>HolyOS — Myšlenková mapa</h1>
    <p>Kompletní přehled firemního OS • 12 modulů • 4 fáze realizace</p>
  </div></div>
  <div class="header-right">
    <button class="header-btn" id="btn-apply-notes" onclick="applyAllNotes()" style="background:rgba(251,191,36,0.3);border-color:rgba(251,191,36,0.4);display:none">🤖 Zapracovat poznámky (AI)</button>
    <button class="header-btn" onclick="expandAll()">Rozbalit vše</button>
    <button class="header-btn" onclick="collapseAll()">Sbalit vše</button>
  </div>
</div>

<div class="controls">
  <div class="phase-filter">
    <button class="phase-btn active" data-phase="all" onclick="filterPhase('all', this)">Vše</button>
    <button class="phase-btn" data-phase="1" onclick="filterPhase('1', this)" style="--c:#6c5ce7">Fáze 1 — Jádro</button>
    <button class="phase-btn" data-phase="2" onclick="filterPhase('2', this)">Fáze 2 — Operativa</button>
    <button class="phase-btn" data-phase="3" onclick="filterPhase('3', this)">Fáze 3 — Byznys</button>
    <button class="phase-btn" data-phase="4" onclick="filterPhase('4', this)">Fáze 4 — Inteligence</button>
  </div>
  <div class="search-box">

async function loadFromServer() {
  try {
    const resp = await fetch('/api/mindmap/notes');
    const data = await resp.json();
    state.notes = data.notes || {};
    state.applied = data.applied || {};
    state.featuresOverride = data.featuresOverride || {};
    state.reviewed = data.reviewed || {};

    const allItems = [...DATA.modules, DATA.ai, DATA.tech].filter(Boolean);
    for (const mod of allItems) {
      // If AI has overridden features for this module, use those
      if (state.featuresOverride[mod.id]) {
        mod.features = state.featuresOverride[mod.id];
        // Also update desc/connections if saved
        if (data.descOverride && data.descOverride[mod.id]) mod.desc = data.descOverride[mod.id];
        if (data.connectionsOverride && data.connectionsOverride[mod.id]) mod.connections = data.connectionsOverride[mod.id];
      }
    }
    updateApplyButton();
  } catch (e) {
    console.warn('Cannot load notes from server, using empty:', e);
  }
}

async function saveToServer() {
  state.saving = true;
  try {
    // Only save notes (feature overrides are saved via /api/mindmap/commit)
    await fetch('/api/mindmap/notes', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ notes: state.notes }),
    });
    state.lastSaved = new Date();
  } catch (e) {
    console.error('Failed to save notes:', e);
  }
  state.saving = false;
}

let saveTimer = null;
function debounceSave() {
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveToServer(), 800);
  updateApplyButton();
}

function updateApplyButton() {
  const btn = document.getElementById('btn-apply-notes');
  if (!btn) return;
  // Show button if there are any non-empty notes
  const hasNotes = Object.values(state.notes).some(n => n && n.trim().length > 0);
  btn.style.display = hasNotes ? 'inline-block' : 'none';
}

// AI-detected deployment status for each module's features
// This is a static map — updated when AI analyzes the codebase
const DEPLOY_STATUS = {
  hr: {
    // Top-level features
    0: 'full',    // Evidence lidí ✅
    1: 'full',    // Organizační struktura a role ✅
    2: 'full',    // Docházka ✅ (kiosek, směny, absence, export, přesčasy, dovolené, celozávodní, nastavení)
    3: 'partial', // Pracovní poměry

    '0.0': 'full',    // Lidé obecně — kontakty, dodavatelé, zákazníci ✅

    '2.1': 'full',    // Přesčasy a dovolené ✅ (leave requests, absence types, overtime dashboard, leave balances, company-wide leave, settings)
    '2.2': 'full',    // Přiřazení čipů k zaměstnancům ✅ (chip_card_id pole v person, findPersonByChip)
    '2.3': 'full',    // Export docházkových listů pro účetní ✅ (CSV surová + upravená data, souhrn s přesčasy)
    '3.0': 'none',    // Smlouvy a dokumenty
    '3.1': 'full',    // Začátek a konec pracovního poměru ✅
    '3.2': 'full',    // Definice pracovních pozic ✅
  }
};

function getSubDeployStatus(moduleId, parentIndex, subIndex) {
  const key = parentIndex + '.' + subIndex;
  return (DEPLOY_STATUS[moduleId] && DEPLOY_STATUS[moduleId][key]) || 'none';
}

function getDeployStatus(moduleId, featureIndex) {
  return (DEPLOY_STATUS[moduleId] && DEPLOY_STATUS[moduleId][featureIndex]) || 'none';
}

function isReviewed(moduleId, featureIndex) {
  return !!(state.reviewed[moduleId] && state.reviewed[moduleId][String(featureIndex)]);
}

async function toggleReviewed(moduleId, featureIndex, event) {
  if (event) event.stopPropagation();
  const newVal = !isReviewed(moduleId, featureIndex);
  if (!state.reviewed[moduleId]) state.reviewed[moduleId] = {};
  state.reviewed[moduleId][String(featureIndex)] = newVal;
  renderTree();
  renderDetail();
  try {
    await fetch('/api/mindmap/reviewed', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ moduleId, featureIndex, value: newVal })
    });
  } catch (e) {
    console.warn('Failed to save reviewed status:', e);
  }
}

function getModuleStats(moduleId) {
  const mod = DATA.modules.find(m => m.id === moduleId) || (moduleId === 'ai' ? DATA.ai : null) || (moduleId === 'tech' ? DATA.tech : null);
  if (!mod || !mod.features) return { deployed: 0, partial: 0, locked: 0, total: 0 };
  const total = mod.features.length;
  let deployed = 0, partial = 0, locked = 0;
  for (let i = 0; i < total; i++) {
    const ds = getDeployStatus(moduleId, i);
    if (ds === 'full') deployed++;
    else if (ds === 'partial') partial++;
    if (isReviewed(moduleId, i)) locked++;
  }
  return { deployed, partial, locked, total };
}

// ============================================================
// RENDER TREE
// ============================================================
function renderTree() {
  const tree = document.getElementById('tree');
  let html = '';

  // Core node
  html += renderNode(DATA.core, [
    ...DATA.modules.filter(m => state.phaseFilter === 'all' || String(m.phase) === state.phaseFilter),
    DATA.ai,
    DATA.tech,
  ]);

  tree.innerHTML = html;
}

function featureText(f) { return typeof f === 'object' ? f.text : f; }
function featureIsApplied(f) { return typeof f === 'object' && f.__applied; }

function renderNode(item, children) {
  const hasChildren = children && children.length > 0;
  const isExpanded = state.expanded.has(item.id);
  const isSelected = state.selected === item.id;
  const matchesSearch = !state.search || item.label.toLowerCase().includes(state.search) ||
    (item.features && item.features.some(f => featureText(f).toLowerCase().includes(state.search)));

  if (state.search && !matchesSearch && (!children || !children.some(c =>
    c.label.toLowerCase().includes(state.search) || (c.features && c.features.some(f => featureText(f).toLowerCase().includes(state.search)))
  ))) {
    return '';
  }

  const noteCount = state.notes[item.id] ? state.notes[item.id].trim().split('\n').filter(l => l.trim()).length : 0;
  const phaseTag = item.phase ?
    `<span class="node-badge" style="background:${PHASE_COLORS[item.phase]}22;color:${PHASE_COLORS[item.phase]}">F${item.phase}</span>` : '';
  const noteTag = noteCount > 0 ?
    `<span class="node-badge" style="background:rgba(251,191,36,0.2);color:#fbbf24">📝 ${noteCount}</span>` : '';
  const stats = getModuleStats(item.id);
  let implTag = '';
  if (stats.total > 0) {
    const fullCount = stats.deployed;
    const partialCount = stats.partial;
    const lockCount = stats.locked;
    if (fullCount + partialCount > 0) {
      implTag = `<span class="node-badge" style="background:rgba(0,184,148,0.2);color:#00b894">${fullCount > 0 ? '●' + fullCount : ''}${partialCount > 0 ? ' ◐' + partialCount : ''}</span>`;
    }
    if (lockCount > 0) {
      implTag += `<span class="node-badge" style="background:rgba(9,132,227,0.15);color:#0984e3">🔒${lockCount}</span>`;
    }
  }

  let html = `<div class="node" data-id="${item.id}">`;
  html += `<div class="node-header ${isSelected ? 'selected' : ''}" onclick="selectNode('${item.id}')">`;
  html += `<span class="node-toggle ${hasChildren ? (isExpanded ? 'expanded' : '') : 'leaf'}" onclick="event.stopPropagation(); toggleNode('${item.id}')">▶</span>`;
  html += `<span class="node-icon" style="background:${item.color}22;color:${item.color}">${item.icon}</span>`;
  html += `<span class="node-label">${highlightText(item.label)}</span>`;
  html += phaseTag + implTag + noteTag;
  html += `</div>`;

  if (hasChildren) {
    html += `<div class="node-children ${isExpanded ? '' : 'collapsed'}">`;
    for (const child of children) {
      if (child.features) {
        html += renderNode(child, null);
      }
    }
    html += `</div>`;
  }

  // Show features as sub-items when expanded (supports hierarchical sub-features)
  if (item.features && isExpanded) {
    html += `<div class="node-children">`;
    for (let fi = 0; fi < item.features.length; fi++) {
      const f = item.features[fi];
      const txt = featureText(f);
      const isApplied = featureIsApplied(f);
      const hasSub = typeof f === 'object' && f.sub && f.sub.length;
      const deployS = getDeployStatus(item.id, fi);
      const isLocked = isReviewed(item.id, fi);
      if (state.search && !txt.toLowerCase().includes(state.search)) continue;
      html += `<div class="sub-item ${isApplied ? 'from-note' : ''}" onclick="selectNode('${item.id}')" ${hasSub ? 'style="flex-direction:column;align-items:stretch;"' : ''}>`;
      html += `<div style="display:flex;align-items:center;gap:6px;">`;
      html += `<span class="deploy-dot ${deployS}" title="${deployS === 'full' ? 'Nasazeno' : deployS === 'partial' ? 'Částečně' : 'Nenasazeno'}"></span>`;
      html += `<span style="${isLocked ? 'opacity:0.55;' : ''}">${highlightText(txt)}</span>`;
      if (isLocked) html += `<span style="font-size:10px;opacity:0.5">🔒</span>`;
      html += `</div>`;
      if (hasSub) {
        for (let si = 0; si < f.sub.length; si++) {
          const sub = f.sub[si];
          const subTxt = typeof sub === 'object' ? sub.text : sub;
          const subDeploy = getSubDeployStatus(item.id, fi, si);
          html += `<div style="display:flex;align-items:center;gap:6px;margin-left:18px;font-size:11px;color:var(--text2);margin-top:2px;">`;
          html += `<span class="deploy-dot ${subDeploy}" style="width:6px;height:6px;" title="${subDeploy === 'full' ? 'Nasazeno' : subDeploy === 'partial' ? 'Částečně' : 'Nenasazeno'}"></span>`;
          html += `<span>${highlightText(subTxt)}</span>`;
          html += `</div>`;
        }
      }
      html += `</div>`;
    }
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function highlightText(text) {
  if (!state.search) return text;
  const regex = new RegExp(`(${state.search.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
  return text.replace(regex, '<span class="highlight">$1</span>');
}

function getSelectedItem() {
  let item = DATA.modules.find(m => m.id === state.selected);
  if (!item && state.selected === 'ai') item = DATA.ai;
  if (!item && state.selected === 'tech') item = DATA.tech;

// CLAUDE DEPLOY — copy structured deploy command to clipboard
function buildFeatureClipboard(item, fi) {
  const f = item.features[fi];
  const txt = featureText(f);
  const deployS = getDeployStatus(item.id, fi);
  const statusCz = deployS === 'full' ? 'nasazeno' : deployS === 'partial' ? 'castecne' : 'nenasazeno';
  const conns = (item.connections || []).map(cid => {
    const c = DATA.modules.find(m => m.id === cid);
    return c ? c.label : cid;
  }).join(', ');
  let subText = '';
  if (typeof f === 'object' && f.sub && f.sub.length) {
    subText = '\nPod-funkce:\n' + f.sub.map((s, si) => {
      const st = typeof s === 'object' ? s.text : s;
      const sd = getSubDeployStatus(item.id, fi, si);
      const sdCz = sd === 'full' ? 'nasazeno' : sd === 'partial' ? 'castecne' : 'nenasazeno';
      return '  - ' + st + ' [' + sdCz + ']';
    }).join('\n');
  }
  return `Nasadit: ${item.label} > ${txt}\nStav: ${statusCz}\nFaze: ${item.phase ? PHASE_NAMES[item.phase] : 'N/A'}\nModul: ${item.label} — ${item.desc}\n${subText}\nPropojeni: ${conns}`;
}

function buildModuleClipboard(item) {
  const conns = (item.connections || []).map(cid => {
    const c = DATA.modules.find(m => m.id === cid);
    return c ? c.label : cid;
  }).join(', ');
  const allFeatures = (item.features || []).map((f, fi) => {
    const txt = featureText(f);
    const ds = getDeployStatus(item.id, fi);
    const dsCz = ds === 'full' ? 'nasazeno' : ds === 'partial' ? 'castecne' : 'nenasazeno';
    let line = '- ' + txt + ' [' + dsCz + ']';
    if (typeof f === 'object' && f.sub) {
      f.sub.forEach((s, si) => {
        const st = typeof s === 'object' ? s.text : s;
        const sd = getSubDeployStatus(item.id, fi, si);
        const sdCz = sd === 'full' ? 'nasazeno' : sd === 'partial' ? 'castecne' : 'nenasazeno';
        line += '\n  - ' + st + ' [' + sdCz + ']';
      });
    }
    return line;
  }).join('\n');
  return `Nasadit cely modul: ${item.label}\nFaze: ${item.phase ? PHASE_NAMES[item.phase] : 'N/A'}\nPopis: ${item.desc}\nPropojeni: ${conns}\n\nFunkce:\n${allFeatures}`;
}

function buildSubFeatureClipboard(item, fi, si) {
  const f = item.features[fi];
  const parentTxt = featureText(f);
  const sub = f.sub[si];
  const subTxt = typeof sub === 'object' ? sub.text : sub;
  const subDeploy = getSubDeployStatus(item.id, fi, si);
  const statusCz = subDeploy === 'full' ? 'nasazeno' : subDeploy === 'partial' ? 'castecne' : 'nenasazeno';
  const parentDeploy = getDeployStatus(item.id, fi);
  const parentStatusCz = parentDeploy === 'full' ? 'nasazeno' : parentDeploy === 'partial' ? 'castecne' : 'nenasazeno';
  const conns = (item.connections || []).map(cid => {
    const c = DATA.modules.find(m => m.id === cid);
    return c ? c.label : cid;
  }).join(', ');
  // Include all sibling sub-features for context
  const siblings = f.sub.map((s, idx) => {
    const st = typeof s === 'object' ? s.text : s;
    const sd = getSubDeployStatus(item.id, fi, idx);
    const sdCz = sd === 'full' ? 'nasazeno' : sd === 'partial' ? 'castecne' : 'nenasazeno';
    return '  ' + (idx === si ? '>>> ' : '- ') + st + ' [' + sdCz + ']';
  }).join('\n');
  return `Nasadit: ${item.label} > ${parentTxt} > ${subTxt}\nStav: ${statusCz}\nFaze: ${item.phase ? PHASE_NAMES[item.phase] : 'N/A'}\nModul: ${item.label} — ${item.desc}\nNadrazena funkce: ${parentTxt} [${parentStatusCz}]\nVsechny pod-funkce:\n${siblings}\nPropojeni: ${conns}`;
}

function copyClaudeCommand(text, btnEl) {
  navigator.clipboard.writeText(text).then(() => {
    const orig = btnEl.textContent;
    btnEl.textContent = '\u2705 Zkopírováno!';
    btnEl.classList.add('btn-claude-copied');
    setTimeout(() => {
      btnEl.textContent = orig;
      btnEl.classList.remove('btn-claude-copied');
    }, 2000);
  });
}

    isShifts: t.includes('směn') || t.includes('rozvrh'),
    isHomeOffice: t.includes('home office') || t.includes('homeoffice') || t.includes('z domova'),
    isSalary: t.includes('mzd') || t.includes('výplat') || t.includes('odměn'),
    isContract: t.includes('smlouv') || t.includes('pracovní poměr'),
    isEvaluation: t.includes('hodnocen') || t.includes('výkon'),
    isTraining: t.includes('školen') || t.includes('certifik'),
    isRecruitment: t.includes('nábor') || t.includes('pohovor'),
    isOrgStructure: t.includes('struktur') || t.includes('hierarchi') || t.includes('organiz'),
    isEvidence: t.includes('evidence') || t.includes('databáz'),
    isInvoice: t.includes('faktur') || t.includes('platb'),
    isStock: t.includes('sklad') || t.includes('zásob'),
    isProject: t.includes('projekt') || t.includes('zakázk'),

    parentIsAttendance: path.includes('docházka') || path.includes('příchod'),
    parentIsHR: path.includes('lidé') || path.includes('hr'),
  };

  let questions = [];

  // ====== PŘÍCHODY / ODCHODY ======

        { id: 'kiosk_setup', label: 'Nastavení kiosku / čtečky', hint: '💡 Doporučení: Kiosek = tablet nebo monitor s USB čtečkou u vchodu. Čtečka simuluje klávesnici (HID) — po přiložení čipu pošle ID + Enter. Kolik vstupních bodů potřebujete? Jeden centrální, nebo na každém patře/hale? Potřebujete i mobilní čtečku?', type: 'textarea' },
        { id: 'chip_flow', label: 'Co se stane po přiložení čipu?', hint: '💡 Best practice: Čip → systém rozpozná zaměstnance → zobrazí jméno, foto, aktuální stav (přítomen/nepřítomen) → nabídne akci (příchod/odchod/pauza). Automatická detekce: pokud ještě není příchod, nabídni příchod jako výchozí. Chcete potvrzení, nebo rovnou zapsat?', type: 'textarea' },
        { id: 'forgotten_checkout', label: 'Zapomenutý odchod / chybný záznam', hint: '💡 Častý problém: Zaměstnanec zapomene „odpípnout" odchod. Řešení: automatické uzavření po X hodinách (např. 12h), upozornění vedoucímu o otevřených záznamech, ruční korekce vedoucím v systému. Jak chcete řešit chybné záznamy?', type: 'textarea' },

  if (context.isRecruitment) {
    questions.push(
      { id: 'recruitment_flow', label: 'Náborový proces', hint: '💡 Flow: Požadavek → inzerát → CV → screening → pohovor → nabídka → nástup. Kanban board je nejpřehlednější. Propojení s Jobs.cz/LinkedIn?', type: 'textarea' },
      { id: 'candidate_tracking', label: 'Evidence kandidátů', hint: '💡 GDPR: souhlas, max. 6 měsíců uchovávání. Data: CV, hodnocení, nabídnutý plat, důvod odmítnutí. Talent pool.', type: 'textarea' },
    );
  }

  // ====== ORG STRUKTURA ======
  if (context.isOrgStructure) {
    questions.push(
      { id: 'org_type', label: 'Typ struktury', hint: '💡 Liniová (pyramida, výroba), maticová (oddělení + projekt), plochá (málo úrovní). Jaká je vaše?', type: 'textarea' },
      { id: 'org_rules', label: 'Automatizace', hint: '💡 Org chart propojený s HR daty. Vedoucí = schvalovatel pro své podřízené. Změna pozice → aktualizace oprávnění.', type: 'textarea' },
    );
  }

  // ====== FAKTURACE ======
  if (context.isInvoice) {
    questions.push(
      { id: 'invoice_types', label: 'Typy dokladů', hint: '💡 Vydané, přijaté, zálohové, dobropisy, proforma. EET/KH DPH. Které typy?', type: 'textarea' },
      { id: 'payment', label: 'Platby a párování', hint: '💡 Import bankovních výpisů → automatické párování (VS, částka). Upomínky po splatnosti. QR kód na faktuře.', type: 'textarea' },
    );
  }

  // ====== SKLAD ======
  if (context.isStock) {
    questions.push(
      { id: 'stock_method', label: 'Metoda ocenění', hint: '💡 FIFO (nejběžnější), vážený průměr, pevná cena. Šarže, sériová čísla, expirace?', type: 'textarea' },
      { id: 'stock_structure', label: 'Skladová struktura', hint: '💡 Sklad → Sekce → Regál → Pozice. Více skladů = meziskladové převody. Min/max zásoby → auto upozornění.', type: 'textarea' },
    );
  }

  // ====== PROJEKTY ======
  if (context.isProject) {
    questions.push(
      { id: 'project_types', label: 'Typy projektů', hint: '💡 Šablony podle typu (zakázka, servis, vývoj). Hierarchie: projekt → etapa → úkol. Gantt diagram.', type: 'textarea' },
      { id: 'project_budget', label: 'Rozpočet a controlling', hint: '💡 Plán vs. skutečnost: materiál, práce (hodiny × sazba), subdodávky. Alert při překročení rozpočtu.', type: 'textarea' },
    );
  }

  // ====== EVIDENCE (obecná) ======
  if (context.isEvidence) {
    questions.push(
      { id: 'evidence_fields', label: 'Klíčová data', hint: '💡 Osobní, pracovní, mzdové údaje. GDPR: šifrování citlivých dat, logování přístupů. Které skupiny?', type: 'textarea' },
      { id: 'evidence_lifecycle', label: 'Životní cyklus', hint: '💡 Nástup → zkušební doba → běžný stav → výstup. Onboarding checklist? Připomínky konce zkušební doby?', type: 'textarea' },
    );
  }

  // ====== FALLBACK — nic se nematchlo ======
  if (questions.length === 0) {
    questions.push(
      { id: 'goal', label: 'Jaký problém touto funkcí řešíte?', hint: '💡 Popište konkrétní situaci — co vám dnes chybí, co děláte ručně, kde vznikají chyby. Čím přesnější popis, tím lépe systém navrhneme.', type: 'textarea' },
      { id: 'users', label: 'Kdo bude tuto funkci používat?', hint: '💡 Různí uživatelé potřebují různá rozhraní — vedoucí chce dashboard a schvalování, zaměstnanec chce jednoduchost, účetní chce exporty. Kdo jsou hlavní uživatelé?', type: 'textarea' },
      { id: 'workflow', label: 'Jak má proces fungovat krok po kroku?', hint: '💡 Popište ideální workflow: Kdo začne → co udělá → co se stane → kdo pokračuje → jaký je výstup. Př: „Zaměstnanec podá žádost → vedoucí schválí → HR dostane notifikaci → export do účetnictví."', type: 'textarea' },
    );
  }

  // Vždy na konci: priorita
  questions.push(
    { id: 'priority', label: 'Priorita nasazení', type: 'select', options: ['Vysoká — potřebuji hned', 'Střední — tento týden', 'Nízká — může počkat'] },
    { id: 'extra', label: 'Ještě něco důležitého?', hint: 'Cokoliv dalšího co byste chtěli zmínit — omezení, speciální požadavky, integrace s jiným systémem…', type: 'textarea' },
  );

  return questions;
}

function getRelatedModules(item) {
  const conns = item.connections || [];
  return conns.map(cid => {
    const m = DATA.modules.find(x => x.id === cid);
    return m ? { id: m.id, label: m.label, desc: m.desc, features: m.features } : null;
  }).filter(Boolean);
}

function getDeployedFeaturesSummary() {
  const deployed = [];
  for (const mod of DATA.modules) {
    if (!mod.features) continue;
    mod.features.forEach((f, fi) => {
      const ds = getDeployStatus(mod.id, fi);
      if (ds === 'full' || ds === 'partial') {
        deployed.push({ module: mod.label, feature: featureText(f), status: ds });
      }
    });
  }
  return deployed;
}

function buildRecommendations(item, featureText) {
  const recs = [];
  const related = getRelatedModules(item);
  const deployed = getDeployedFeaturesSummary();
  const t = featureText.toLowerCase();

  // Connection recommendations
  if (related.length > 0) {
    recs.push({
      icon: '🔗',
      title: 'Propojené moduly',
      text: 'Tato funkce by měla zohlednit napojení na: ' + related.map(r => r.label).join(', ') + '. Zvažte sdílení dat a konzistentní UI.'
    });
  }

  // Already deployed features that might be affected
  const relatedDeployed = deployed.filter(d => {
    const dl = d.feature.toLowerCase();
    return (t.includes('docház') && dl.includes('zaměstnan')) ||
           (t.includes('mzd') && (dl.includes('docház') || dl.includes('zaměstnan'))) ||
           (t.includes('faktur') && dl.includes('projekt')) ||
           (t.includes('sklad') && dl.includes('projekt')) ||
           (t.includes('role') && dl.includes('evidence')) ||
           (t.includes('oprávn') && dl.includes('role'));
  });
  if (relatedDeployed.length > 0) {
    recs.push({
      icon: '⚠️',
      title: 'Již nasazené závislosti',
      text: 'Tyto funkce jsou již nasazené a mohou být ovlivněny: ' + relatedDeployed.map(d => d.module + ' → ' + d.feature + ' (' + (d.status === 'full' ? 'plně' : 'částečně') + ')').join('; ')
    });
  }

  // UI consistency
  recs.push({
    icon: '🎨',
    title: 'Konzistence UI',
    text: 'Zachovejte stávající design: tmavý motiv, modální okna pro editaci, tabulky s řazením, sidebar navigace. Stávající styl: var(--accent) #6c5ce7.'
  });

  // Data model
  recs.push({
    icon: '💾',
    title: 'Datový model',
    text: 'Data se ukládají do JSON souboru přes db.js. Nová pole přidejte do příslušné entity. Audit log zachytí všechny změny automaticky.'
  });

  return recs;
}

let wizardState = { step: 0, item: null, featureIndex: null, subIndex: null, answers: {}, level: '' };

function openDeployWizard(level, itemGetter, fi, si) {
  const item = typeof itemGetter === 'function' ? itemGetter() : itemGetter;
  if (!item) return;

  wizardState = { step: 0, item, featureIndex: fi, subIndex: si, answers: {}, level };
  renderWizard();
}

function renderWizard() {
  const { step, item, featureIndex: fi, subIndex: si, level } = wizardState;

  // Determine what we're deploying
  let targetText = '';
  let fullPath = item.label;
  if (level === 'module') {
    targetText = item.label;
  } else if (level === 'feature') {
    const f = item.features[fi];
    targetText = featureText(f);
    fullPath += ' > ' + targetText;
  } else if (level === 'sub') {
    const f = item.features[fi];
    const sub = f.sub[si];
    targetText = typeof sub === 'object' ? sub.text : sub;
    fullPath += ' > ' + featureText(f) + ' > ' + targetText;
  }

  const questions = getQuestionsForFeature(targetText, fullPath, item, fi, si, level);
  const recs = buildRecommendations(item, targetText);
  const related = getRelatedModules(item);
  const totalSteps = 3;

  let html = `<div class="wizard-overlay" onclick="if(event.target===this)closeWizard()">
    <div class="wizard" onclick="event.stopPropagation()">
      <div class="wizard-header">
        <h2>🚀 Průvodce nasazením</h2>
        <p>${fullPath}</p>
      </div>
      <div class="wizard-body">
        <div class="wizard-steps">
          <span class="wizard-step ${step === 0 ? 'active' : step > 0 ? 'done' : ''}">1. Kontext</span>
          <span class="wizard-step ${step === 1 ? 'active' : step > 1 ? 'done' : ''}">2. Upřesnění</span>
          <span class="wizard-step ${step === 2 ? 'active' : ''}">3. Zadání</span>
        </div>`;

  if (step === 0) {
    // Step 1: Context + Recommendations
    const deployStatus = level === 'sub' ? getSubDeployStatus(item.id, fi, si) :
                         level === 'feature' ? getDeployStatus(item.id, fi) : 'none';
    const statusLabel = deployStatus === 'full' ? '🟢 Nasazeno' : deployStatus === 'partial' ? '🟡 Částečně' : '🔴 Nenasazeno';

    html += `<div class="wiz-context">
      <div class="wiz-context-label">Co nasazujeme</div>
      <div class="wiz-context-row"><span class="label">Cíl:</span> <strong>${targetText}</strong></div>
      <div class="wiz-context-row"><span class="label">Modul:</span> ${item.label} — ${item.desc}</div>
      <div class="wiz-context-row"><span class="label">Stav:</span> ${statusLabel}</div>
      <div class="wiz-context-row"><span class="label">Fáze:</span> ${item.phase ? PHASE_NAMES[item.phase] : 'N/A'}</div>
      ${related.length ? '<div class="wiz-context-row"><span class="label">Propojení:</span> ' + related.map(r => r.label).join(', ') + '</div>' : ''}
    </div>`;

    // Show sub-features context if deploying a feature
    if (level === 'feature' && typeof item.features[fi] === 'object' && item.features[fi].sub) {
      html += `<div class="wiz-context" style="margin-top:8px;">
        <div class="wiz-context-label">Pod-funkce</div>`;
      item.features[fi].sub.forEach((s, idx) => {
        const st = typeof s === 'object' ? s.text : s;
        const sd = getSubDeployStatus(item.id, fi, idx);
        const icon = sd === 'full' ? '🟢' : sd === 'partial' ? '🟡' : '🔴';
        html += `<div class="wiz-context-row">${icon} ${st}</div>`;
      });
      html += '</div>';
    }

    // Show all module features if deploying whole module
    if (level === 'module' && item.features) {
      html += `<div class="wiz-context" style="margin-top:8px;">
        <div class="wiz-context-label">Funkce modulu</div>`;
      item.features.forEach((f, idx) => {
        const ds = getDeployStatus(item.id, idx);
        const icon = ds === 'full' ? '🟢' : ds === 'partial' ? '🟡' : '🔴';
        html += `<div class="wiz-context-row">${icon} ${featureText(f)}</div>`;
      });
      html += '</div>';
    }

    // Recommendations
    html += '<div style="margin-top:16px;">';
    for (const r of recs) {
      html += `<div class="wiz-rec"><div class="wiz-rec-title">${r.icon} ${r.title}</div>${r.text}</div>`;
    }
    html += '</div>';

  } else if (step === 1) {
    // Step 2: Questions
    html += `<div style="margin-bottom:16px; padding:12px 16px; background:rgba(108,92,231,0.08); border-left:3px solid #6c5ce7; border-radius:0 8px 8px 0; font-size:13px; line-height:1.6;">
      <strong style="color:#6c5ce7;">💡 Odborný průvodce</strong><br>
      <span style="color:var(--text2);">Každá otázka obsahuje doporučení na základě best practices a české legislativy. Přečtěte si tipy v šedém textu — pomohou vám s rozhodnutím. Vyplňte jen to, co je pro vás relevantní.</span>
    </div>`;
    for (const q of questions) {
      const val = wizardState.answers[q.id] || '';
      html += `<div class="wiz-q"><label>${q.label}</label>`;
      if (q.hint) html += `<div class="hint">${q.hint}</div>`;
      if (q.type === 'textarea') {
        html += `<textarea id="wiz-${q.id}" oninput="wizardState.answers['${q.id}']=this.value">${val}</textarea>`;
      } else if (q.type === 'select') {
        html += `<select id="wiz-${q.id}" onchange="wizardState.answers['${q.id}']=this.value">
          <option value="">— Vyberte —</option>`;
        for (const opt of q.options) html += `<option value="${opt}" ${val === opt ? 'selected' : ''}>${opt}</option>`;
        html += '</select>';
      } else {
        html += `<input type="text" id="wiz-${q.id}" value="${val}" oninput="wizardState.answers['${q.id}']=this.value">`;
      }
      html += '</div>';
    }

  } else if (step === 2) {
    // Step 3: Generated specification
    const spec = generateSpec();
    html += `<div style="margin-bottom:12px; color:var(--text2); font-size:13px;">Zkontrolujte zadání a zkopírujte ho do Claude chatu.</div>
      <div class="wiz-spec" id="wiz-spec-text">${escapeHtml(spec)}</div>`;
  }

  html += `</div>
      <div class="wizard-footer">
        <button class="wiz-btn wiz-btn-secondary" onclick="closeWizard()">Zavřít</button>
        <div style="display:flex;gap:8px;">
          ${step > 0 ? '<button class="wiz-btn wiz-btn-secondary" onclick="wizardState.step--;renderWizard()">← Zpět</button>' : ''}
          ${step < totalSteps - 1
            ? '<button class="wiz-btn wiz-btn-primary" onclick="wizardState.step++;renderWizard()">Další →</button>'
            : '<button class="wiz-btn wiz-btn-success" onclick="copySpec()">📋 Zkopírovat zadání</button>'}
        </div>
      </div>
    </div>
  </div>`;

  let container = document.getElementById('wizard-root');
  if (!container) {
    container = document.createElement('div');
    container.id = 'wizard-root';
    document.body.appendChild(container);
  }
  container.innerHTML = html;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function generateSpec() {
  const { item, featureIndex: fi, subIndex: si, level, answers } = wizardState;
  const related = getRelatedModules(item);
  const deployed = getDeployedFeaturesSummary();

  let targetText = '';
  if (level === 'module') targetText = item.label;
  else if (level === 'feature') targetText = featureText(item.features[fi]);
  else if (level === 'sub') {
    const sub = item.features[fi].sub[si];
    targetText = typeof sub === 'object' ? sub.text : sub;
  }

  let spec = `═══════════════════════════════════════\n`;
  spec += `NASAZENÍ: ${item.label} > ${targetText}\n`;
  spec += `═══════════════════════════════════════\n\n`;

  // Context
  spec += `📦 MODUL: ${item.label}\n`;
  spec += `   ${item.desc}\n`;
  spec += `   Fáze: ${item.phase ? PHASE_NAMES[item.phase] : 'N/A'}\n\n`;

  // What to deploy
  spec += `🎯 CÍL NASAZENÍ:\n`;
  if (level === 'module' && item.features) {
    item.features.forEach((f, idx) => {
      const ds = getDeployStatus(item.id, idx);
      const statusCz = ds === 'full' ? '✅ nasazeno' : ds === 'partial' ? '🟡 částečně' : '🔴 nenasazeno';
      spec += `   ${statusCz} ${featureText(f)}\n`;
      if (typeof f === 'object' && f.sub) {
        f.sub.forEach((s, sIdx) => {
          const sd = getSubDeployStatus(item.id, idx, sIdx);
          const sc = sd === 'full' ? '✅' : sd === 'partial' ? '🟡' : '🔴';
          spec += `      ${sc} ${typeof s === 'object' ? s.text : s}\n`;
        });
      }
    });
  } else if (level === 'feature') {
    const f = item.features[fi];
    spec += `   ${targetText}\n`;
    if (typeof f === 'object' && f.sub) {
      spec += `   Pod-funkce:\n`;
      f.sub.forEach((s, idx) => {
        const sd = getSubDeployStatus(item.id, fi, idx);
        const sc = sd === 'full' ? '✅' : sd === 'partial' ? '🟡' : '🔴';
        spec += `      ${sc} ${typeof s === 'object' ? s.text : s}\n`;
      });
    }
  } else {
    spec += `   ${targetText}\n`;
    spec += `   (součást: ${featureText(item.features[fi])})\n`;
  }
  spec += '\n';

  // User specifications
  const filledAnswers = Object.entries(answers).filter(([k, v]) => v && v.trim());
  if (filledAnswers.length > 0) {
    spec += `📝 SPECIFIKACE OD UŽIVATELE:\n`;
    const questions = getQuestionsForFeature(targetText);
    for (const [key, val] of filledAnswers) {
      const q = questions.find(q => q.id === key);
      spec += `   ${q ? q.label : key}: ${val}\n`;
    }
    spec += '\n';
  }

  // Connected modules
  if (related.length > 0) {
    spec += `🔗 PROPOJENÉ MODULY (zohlednit při implementaci):\n`;
    for (const r of related) {
      spec += `   • ${r.label} — ${r.desc}\n`;
    }
    spec += '\n';
  }

  // Already deployed features for context
  const relevantDeployed = deployed.filter(d => d.status === 'full' || d.status === 'partial');
  if (relevantDeployed.length > 0) {
    spec += `✅ JIŽ NASAZENÉ FUNKCE (kontext pro konzistenci):\n`;
    for (const d of relevantDeployed) {
      spec += `   ${d.status === 'full' ? '✅' : '🟡'} ${d.module} → ${d.feature}\n`;
    }
    spec += '\n';
  }

  // Technical context
  spec += `⚙️ TECHNICKÝ KONTEXT:\n`;
  spec += `   • Server: Node.js (http.createServer), bez frameworku\n`;
  spec += `   • DB: JSON soubor přes db.js, auto-increment ID\n`;
  spec += `   • Frontend: Vanilla JS, inline HTML, tmavý motiv\n`;
  spec += `   • Auth: Session-based, cookie, is_super_admin flag\n`;
  spec += `   • Audit: Automatický log všech změn v db.js\n`;
  spec += `   • Hosting: Railway, persistent volume /app/data\n\n`;

  spec += `💡 POŽADAVKY:\n`;
  spec += `   • Zachovat konzistentní UI s existujícími moduly\n`;
  spec += `   • Všechny CRUD operace musí procházet přes db.js (audit log)\n`;
  spec += `   • API endpointy v server.js, UI v modules/\n`;
  spec += `   • Po dokončení aktualizovat deploy status v myšlenkové mapě\n`;

  return spec;
}

function copySpec() {
  const spec = generateSpec();
  navigator.clipboard.writeText(spec).then(() => {
    const btn = document.querySelector('.wiz-btn-success');
    if (btn) {
      btn.textContent = '✅ Zkopírováno! Vložte do Claude chatu.';
      btn.style.background = '#00b894';
      setTimeout(() => closeWizard(), 2000);
    }
  });
}

function closeWizard() {
  const el = document.getElementById('wizard-root');
  if (el) el.innerHTML = '';
}

      const deployS = getDeployStatus(item.id, fi);
      const isLocked = isReviewed(item.id, fi);
      const deployLabel = deployS === 'full' ? 'Nasazeno' : deployS === 'partial' ? 'Částečně nasazeno' : '';
      html += `<div class="feature-card ${isApplied ? 'from-note' : ''} ${isLocked ? 'is-locked' : ''}" ${hasSub ? 'style="flex-direction:column;align-items:stretch;"' : ''}>
        <div style="display:flex;align-items:center;gap:8px;">
          <span class="review-check ${isLocked ? 'locked' : ''}" onclick="toggleReviewed('${item.id}', ${fi}, event)" title="${isLocked ? 'Zamčeno — klikni pro odemčení' : 'Zkontrolováno? Klikni pro zamčení'}"></span>
          <span class="deploy-dot ${deployS}"></span>
          <span class="feature-text" style="${hasSub ? 'font-weight:600;' : ''}${isLocked ? 'opacity:0.55;' : ''}">${txt}${deployLabel ? '<span class="status-tag deployed">' + deployLabel + '</span>' : ''}${isLocked ? '<span class="status-tag locked">🔒 Zamčeno</span>' : ''}</span>
          <button class="btn-claude-feature" onclick="event.stopPropagation(); openDeployWizard('feature', getSelectedItem, ${fi})">\uD83D\uDCCB Nasadit s Claude</button>
        </div>`;
      if (hasSub) {
        html += `<div style="margin-left:20px;margin-top:6px;display:flex;flex-direction:column;gap:4px;">`;
        for (let si = 0; si < f.sub.length; si++) {
          const sub = f.sub[si];
          const subTxt = typeof sub === 'object' ? sub.text : sub;
          const subDeploy = getSubDeployStatus(item.id, fi, si);
          const subLabel = subDeploy === 'full' ? 'Nasazeno' : subDeploy === 'partial' ? 'Částečně' : '';
          html += `<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);">
            <span class="deploy-dot ${subDeploy}" style="width:6px;height:6px;flex-shrink:0;"></span>
            ${subTxt}${subLabel ? '<span class="status-tag ' + (subDeploy === 'full' ? 'deployed' : 'partial') + '">' + subLabel + '</span>' : ''}
            <button class="btn-claude-feature" style="font-size:10px;padding:2px 7px;" onclick="event.stopPropagation(); openDeployWizard('sub', getSelectedItem, ${fi}, ${si})">\uD83D\uDCCB Nasadit</button>
          </div>`;
        }
        html += `</div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }

  // Connections
  if (item.connections && item.connections.length) {
    html += `<div class="detail-section">
      <h3>Propojení s moduly</h3>
      <div class="connections">`;
    for (const connId of item.connections) {
      const conn = DATA.modules.find(m => m.id === connId) || (connId === 'ai' ? DATA.ai : null);
      if (conn) {
        html += `<span class="conn-tag" onclick="selectNode('${conn.id}')">${conn.icon} ${conn.label}</span>`;
      }
    }
    html += `</div></div>`;
  }

  // Notes
  const currentNotes = state.notes[item.id] || '';
  html += `<div class="detail-section">
    <h3>Poznámky a nápady</h3>
    <p style="font-size:12px;color:var(--text2);margin-bottom:8px">Napište své požadavky přirozeným jazykem. AI je analyzuje a inteligentně restrukturalizuje modul — vytvoří podkategorie, hierarchii a propojení.</p>
    <textarea class="notes-area" id="notes-input" placeholder="Napiš poznámky k tomuto modulu...&#10;Každý řádek = jedna nová položka.&#10;&#10;Příklad:&#10;Přidat sledování přesčasů v reálném čase&#10;Napojení na biometrický terminál" oninput="onNoteInput('${item.id}')">${currentNotes}</textarea>
    <div style="display:flex;align-items:center;gap:12px;margin-top:8px">
      <button class="notes-save" onclick="saveNote('${item.id}')">💾 Uložit</button>
      <span class="notes-status" id="notes-status">${state.lastSaved ? '✓ Uloženo ' + state.lastSaved.toLocaleTimeString('cs-CZ') : ''}</span>
    </div>
  </div>`;

  detail.innerHTML = html;
}

// ============================================================
// ACTIONS
// ============================================================
function selectNode(id) {
  if (state.selected === id) {
    // Already selected — toggle expand/collapse
    if (state.expanded.has(id)) {
      state.expanded.delete(id);
    } else {
      state.expanded.add(id);
    }
  } else {
    // New selection — select and expand
    state.selected = id;
    if (!state.expanded.has(id)) state.expanded.add(id);
  }
  renderTree();
  renderDetail();
}

function toggleNode(id) {
  if (state.expanded.has(id)) {
    state.expanded.delete(id);
  } else {
    state.expanded.add(id);
  }
  renderTree();
}

function expandAll() {
  state.expanded.add('core');
  for (const m of DATA.modules) state.expanded.add(m.id);
  state.expanded.add('ai');
  state.expanded.add('tech');
  renderTree();
}

function collapseAll() {
  state.expanded.clear();
  state.expanded.add('core');
  renderTree();
}

function filterPhase(phase, btn) {
  state.phaseFilter = phase;
  document.querySelectorAll('.phase-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTree();
}

function onSearch(val) {
  state.search = val.toLowerCase();
  if (state.search) expandAll();
  renderTree();
}

function onNoteInput(id) {
  const textarea = document.getElementById('notes-input');
  if (textarea) {
    state.notes[id] = textarea.value;
    debounceSave();
  }
}

function saveNote(id) {
  const textarea = document.getElementById('notes-input');
  if (textarea) {
    state.notes[id] = textarea.value;
    saveToServer().then(() => {
      const status = document.getElementById('notes-status');
      if (status) {
        status.textContent = '✓ Uloženo';
        status.className = 'notes-status saved';
      }
      const btn = document.querySelector('.notes-save');
      if (btn) { btn.textContent = '✓ Uloženo!'; setTimeout(() => btn.textContent = '💾 Uložit', 1500); }
      renderTree(); // update note badges
    });
  }
}

// ============================================================
// APPLY NOTES — AI-powered zapracování poznámek do mapy
// ============================================================
function applyAllNotes() {
  // Collect all modules with non-empty notes
  const notesToApply = [];
  const allItems = [...DATA.modules, DATA.ai, DATA.tech].filter(Boolean);

  for (const item of allItems) {
    const noteText = state.notes[item.id];
    if (!noteText || !noteText.trim()) continue;
    notesToApply.push({ item, noteText: noteText.trim() });
  }

  if (notesToApply.length === 0) return;

  // Show confirmation modal
  const modal = document.getElementById('modal-root');
  let html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  html += '<div class="modal">';
  html += '<h2>🤖 Zapracovat poznámky pomocí AI</h2>';
  html += '<p style="font-size:13px;color:var(--text2);margin-bottom:16px">AI analyzuje vaše poznámky a inteligentně restrukturalizuje příslušné moduly — vytvoří podkategorie, hierarchii a propojení:</p>';

  for (const { item, noteText } of notesToApply) {
    const lines = noteText.split('\n').filter(l => l.trim());
    html += `<div class="modal-module">`;
    html += `<h4>${item.icon} ${item.label}</h4>`;
    for (const line of lines) {
      html += `<div class="modal-note-line">${line}</div>`;
    }
    html += `</div>`;
  }

  html += '<div class="modal-actions">';
  html += '<button class="modal-btn cancel" onclick="closeModal()">Zrušit</button>';
  html += '<button class="modal-btn confirm" id="btn-ai-apply" onclick="confirmApply()">🤖 Zapracovat s AI</button>';
  html += '</div>';
  html += '</div></div>';

  modal.innerHTML = html;
}

// Pending AI results waiting for approval
let pendingAIResults = [];

async function confirmApply() {
  const allItems = [...DATA.modules, DATA.ai, DATA.tech].filter(Boolean);
  const notesToApply = [];

  for (const item of allItems) {
    const noteText = state.notes[item.id];
    if (!noteText || !noteText.trim()) continue;
    notesToApply.push({ item, noteText: noteText.trim() });
  }

  if (notesToApply.length === 0) { closeModal(); return; }

  // Show loading modal
  const modal = document.getElementById('modal-root');
  modal.innerHTML = `<div class="modal-overlay"><div class="modal" style="max-width:700px;">
    <h2>🤖 AI zpracovává poznámky...</h2>
    <div id="ai-progress" style="padding:12px;background:rgba(108,92,231,0.08);border-radius:8px;font-size:13px;">
      <div style="font-weight:600;"><span class="ai-spinner"></span> Analyzuji...</div>
    </div>
  </div></div>`;

  pendingAIResults = [];

  // Call AI for each module
  for (const { item, noteText } of notesToApply) {
    const progressEl = document.getElementById('ai-progress');
    if (progressEl) {
      progressEl.innerHTML = `<div style="font-weight:600;"><span class="ai-spinner"></span> Zpracovávám: ${item.icon} ${item.label}...</div>`;
    }

    try {
      // Mark which features are locked (reviewed) — AI should not modify them
      const lockedFeatures = [];
      if (state.reviewed[item.id]) {
        for (let li = 0; li < (item.features || []).length; li++) {
          if (state.reviewed[item.id][String(li)]) {
            lockedFeatures.push(featureText(item.features[li]));
          }
        }
      }
      const response = await fetch('/api/mindmap/ai-apply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          moduleData: { id: item.id, label: item.label, desc: item.desc, features: item.features, connections: item.connections || [] },
          notes: noteText,
          lockedFeatures,
        }),
      });

      const data = await response.json();
      if (!data.ok || !data.result) throw new Error(data.error || 'Unknown error');

      pendingAIResults.push({
        item,
        noteText,
        result: data.result,
        approved: true, // default to approved
      });
    } catch (e) {
      console.error(`AI apply error for ${item.id}:`, e);
      pendingAIResults.push({ item, noteText, error: e.message, approved: false });
    }
  }

  // Show preview for approval
  showAIPreview();
}

function renderFeatureText(f) {
  if (typeof f === 'string') return f;
  if (typeof f === 'object' && f.text) {
    let t = f.text;
    if (f.sub && f.sub.length) t += ' → ' + f.sub.map(s => typeof s === 'string' ? s : s.text).join(', ');
    return t;
  }
  return JSON.stringify(f);
}

function showAIPreview() {
  const modal = document.getElementById('modal-root');
  let html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
  html += '<div class="modal" style="max-width:800px;">';
  html += '<h2>📋 Náhled změn — schválte před uložením</h2>';
  html += '<p style="font-size:12px;color:var(--text2);margin-bottom:16px;">AI navrhla následující změny. Zaškrtněte moduly, které chcete uložit. Neuložené změny se zahodí.</p>';

  for (let i = 0; i < pendingAIResults.length; i++) {
    const p = pendingAIResults[i];
    if (p.error) {
      html += `<div style="padding:12px;margin-bottom:12px;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);border-radius:8px;">
        <strong>${p.item.icon} ${p.item.label}:</strong> <span style="color:#ef4444;">❌ ${p.error}</span>
      </div>`;
      continue;
    }

    const result = p.result;
    const oldFeatures = p.item.features.map(f => renderFeatureText(f));
    const newFeatures = (result.features || []).map(f => renderFeatureText(f));

    html += `<div style="padding:14px;margin-bottom:12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;">`;
    html += `<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <input type="checkbox" id="approve-${i}" ${p.approved ? 'checked' : ''} onchange="pendingAIResults[${i}].approved=this.checked" style="width:18px;height:18px;accent-color:#6c5ce7;">
      <label for="approve-${i}" style="font-weight:600;font-size:15px;cursor:pointer;">${p.item.icon} ${p.item.label}</label>
    </div>`;

    if (result.changes) {
      html += `<div style="font-size:12px;color:#a78bfa;margin-bottom:10px;font-style:italic;">💡 ${result.changes}</div>`;
    }

    // Side by side diff
    html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">`;

    // OLD
    html += `<div><div style="font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;">Před</div>`;
    html += `<div style="font-size:12px;background:var(--bg);padding:8px;border-radius:6px;max-height:200px;overflow-y:auto;">`;
    for (const f of oldFeatures) {
      html += `<div style="padding:2px 0;color:var(--text2);">• ${f}</div>`;
    }
    html += `</div></div>`;

    // NEW
    html += `<div><div style="font-size:11px;font-weight:600;color:#4ade80;margin-bottom:6px;text-transform:uppercase;">Po změně</div>`;
    html += `<div style="font-size:12px;background:var(--bg);padding:8px;border-radius:6px;max-height:200px;overflow-y:auto;">`;
    for (const f of newFeatures) {
      const isNew = !oldFeatures.includes(f);
      html += `<div style="padding:2px 0;${isNew ? 'color:#4ade80;font-weight:500;' : ''}">• ${f}${isNew ? ' ✨' : ''}</div>`;
    }
    html += `</div></div>`;

    html += `</div></div>`;
  }

  html += '<div class="modal-actions">';
  html += '<button class="modal-btn cancel" onclick="closeModal()">Zrušit vše</button>';
  html += '<button class="modal-btn" onclick="showVersionHistory()" style="background:var(--surface2);color:var(--text);">📜 Historie verzí</button>';
  html += '<button class="modal-btn confirm" onclick="commitApprovedChanges()">✅ Uložit schválené změny</button>';
  html += '</div>';
  html += '</div></div>';
  modal.innerHTML = html;
}

async function commitApprovedChanges() {
  const approved = pendingAIResults.filter(p => p.approved && !p.error);
  if (approved.length === 0) { closeModal(); return; }

  for (const p of approved) {
    const { item, result } = p;

    // Apply to runtime
    if (result.features) item.features = result.features;
    if (result.connections) item.connections = result.connections;
    if (result.desc) item.desc = result.desc;

    // Commit to server (creates version automatically)
    try {
      await fetch('/api/mindmap/commit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          moduleId: item.id,
          features: result.features,
          desc: result.desc || null,
          connections: result.connections || null,
          changes: result.changes || 'AI restrukturalizace',
        }),
      });
    } catch (e) {
      console.error('Commit error:', e);
    }

    // Clear the note locally
    state.notes[item.id] = '';
  }

  // Update local state overrides
  if (!state.featuresOverride) state.featuresOverride = {};
  if (!state.descOverride) state.descOverride = {};
  if (!state.connectionsOverride) state.connectionsOverride = {};
  for (const p of approved) {
    if (p.result.features) state.featuresOverride[p.item.id] = p.result.features;
    if (p.result.desc) state.descOverride[p.item.id] = p.result.desc;
    if (p.result.connections) state.connectionsOverride[p.item.id] = p.result.connections;
  }

  pendingAIResults = [];
  closeModal();
  renderTree();
  renderDetail();
  updateApplyButton();
}

// ============================================================
// VERSION HISTORY
// ============================================================
async function showVersionHistory() {
  try {
    const resp = await fetch('/api/mindmap/versions');
    const versions = await resp.json();

    const modal = document.getElementById('modal-root');
    let html = '<div class="modal-overlay" onclick="if(event.target===this)closeModal()">';
    html += '<div class="modal" style="max-width:600px;">';
    html += '<h2>📜 Historie verzí myšlenkové mapy</h2>';

    if (versions.length === 0) {
      html += '<p style="color:var(--text2);padding:20px 0;text-align:center;">Zatím žádné verze. Verze se vytváří automaticky při každém AI zapracování.</p>';
    } else {
      html += '<div style="max-height:400px;overflow-y:auto;">';
      for (const v of [...versions].reverse()) {
        const d = new Date(v.date);
        const dateStr = d.toLocaleDateString('cs') + ' ' + d.toLocaleTimeString('cs', {hour:'2-digit',minute:'2-digit'});
        html += `<div style="display:flex;align-items:center;gap:12px;padding:10px 12px;border-bottom:1px solid var(--border);">
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:500;">${v.description}</div>
            <div style="font-size:11px;color:var(--text2);">${dateStr} • Verze #${v.id}</div>
          </div>
          <button class="modal-btn" onclick="restoreVersion(${v.id})" style="padding:4px 12px;font-size:12px;background:var(--surface2);color:var(--text);border:1px solid var(--border);border-radius:6px;cursor:pointer;">Obnovit</button>
        </div>`;
      }
      html += '</div>';
    }

    html += '<div class="modal-actions"><button class="modal-btn cancel" onclick="closeModal()">Zavřít</button></div>';
    html += '</div></div>';
    modal.innerHTML = html;
  } catch (e) {
    alert('Chyba načtení historie: ' + e.message);
  }
}

async function restoreVersion(id) {
  if (!confirm('Opravdu obnovit verzi #' + id + '? Aktuální stav bude uložen jako záloha.')) return;
  try {
    const resp = await fetch('/api/mindmap/versions/' + id + '/restore', { method: 'POST' });
    const data = await resp.json();
    if (!data.ok) throw new Error(data.error || 'Failed');
    // Reload everything
    await loadFromServer();
    renderTree();
    renderDetail();
    closeModal();
    alert('Verze #' + id + ' obnovena!');
  } catch (e) {
    alert('Chyba: ' + e.message);
  }
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

// ============================================================
// INIT
// ============================================================
loadFromServer().then(() => {
  renderTree();
  renderDetail();
});
</script>
