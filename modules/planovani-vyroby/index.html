<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plánování výroby | HOLYOS</title>
  <link rel="icon" type="image/svg+xml" href="../../logo-holyos-icon.svg">
  <base href="../../">
  <link rel="stylesheet" href="css/dashboard.css">
  <style>
    /* ============================================================
       Plánování výroby — hustá tabulka ve Factorify stylu
       ============================================================ */
    .main-wrapper { margin-left: var(--sidebar-w); flex: 1; min-height: 100vh; display: flex; flex-direction: column; }
    .page-header {
      display: flex; align-items: center; gap: 12px; padding: 14px 20px;
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .page-header h1 { font-size: 17px; font-weight: 700; margin: 0; }
    .page-header .count { font-size: 12px; color: var(--text2); margin-left: 4px; }

    .content { padding: 0; flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .quick-filters {
      display: flex; gap: 8px; padding: 10px 20px; border-bottom: 1px solid var(--border);
      align-items: center; flex-wrap: wrap; background: var(--surface2);
    }

    .btn {
      padding: 7px 14px; border-radius: 6px; border: 1px solid var(--border);
      font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s;
      display: inline-flex; align-items: center; gap: 5px;
      background: transparent; color: var(--text);
    }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { opacity: 0.9; }
    .btn-secondary { background: var(--surface2); }
    .btn-success { background: #16a34a; color: #fff; border-color: #16a34a; }
    .btn-danger { background: #dc2626; color: #fff; border-color: #dc2626; }
    .btn-sm { padding: 3px 8px; font-size: 11px; }

    .filter-select {
      padding: 6px 10px; background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 6px; font-size: 12px;
    }

    /* === Hustá tabulka ===================================================== */
    .table-wrap {
      flex: 1; overflow: auto; background: var(--surface);
    }
    table.dense {
      width: max-content; min-width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    table.dense thead { position: sticky; top: 0; z-index: 5; }
    table.dense thead tr.head-titles th {
      background: var(--surface2); color: var(--text2);
      font-weight: 600; text-align: left; padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      white-space: nowrap; vertical-align: bottom;
    }
    table.dense thead tr.head-filters th {
      background: var(--surface2); padding: 4px 6px;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }
    table.dense thead tr.head-filters input,
    table.dense thead tr.head-filters select {
      width: 100%; padding: 4px 6px; font-size: 11px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 4px;
      box-sizing: border-box;
    }
    table.dense tbody td {
      padding: 6px 10px; border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      white-space: nowrap; vertical-align: middle;
    }
    table.dense tbody tr:hover td {
      background: rgba(108, 140, 255, 0.05);
    }
    .col-num { text-align: right; font-variant-numeric: tabular-nums; }
    .col-link a { color: #6c8cff; text-decoration: none; }
    .col-link a:hover { text-decoration: underline; }
    .col-actions { text-align: right; white-space: nowrap; }

    /* Boolean cells — zelené/červené pozadí jako ve Factorify */
    .bool-cell {
      text-align: center; font-weight: 700; font-size: 13px;
      padding: 6px 10px;
    }
    .bool-yes { background: rgba(34, 197, 94, 0.18); color: #16a34a; }
    .bool-no  { background: rgba(239, 68, 68, 0.18); color: #dc2626; }
    .bool-na  { color: var(--text2); }

    /* Status badge */
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.4px;
    }
    .badge-planned { background: rgba(108, 140, 255, 0.15); color: #6c8cff; }
    .badge-released { background: rgba(34, 197, 94, 0.15); color: #16a34a; }
    .badge-in_progress { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .badge-paused { background: rgba(160, 160, 160, 0.15); color: #a0a0a0; }
    .badge-done { background: rgba(20, 184, 166, 0.15); color: #14b8a6; }
    .badge-cancelled { background: rgba(239, 68, 68, 0.15); color: #ef4444; }

    /* Empty state */
    .empty-state {
      padding: 64px 24px; text-align: center; color: var(--text2);
    }
    .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }

    /* Modal */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .modal {
      background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
      padding: 22px; min-width: 420px; max-width: 600px; max-height: 90vh; overflow-y: auto;
    }
    .modal h2 { margin: 0 0 14px; font-size: 18px; }
    .modal .form-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
    .modal label { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; letter-spacing: 0.4px; }
    .modal input, .modal select, .modal textarea {
      padding: 9px 11px; background: var(--surface2); color: var(--text);
      border: 1px solid var(--border); border-radius: 7px; font-size: 13px; font-family: inherit;
    }
    .modal textarea { min-height: 60px; resize: vertical; }
    .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 18px; }
  </style>
</head>
<body>

<div id="sidebar"></div>
<div class="main-wrapper">
  <div class="page-header">
    <span style="font-size:22px;">🗂️</span>
    <h1>Plánování výroby <span class="count" id="batchCount"></span></h1>
    <div style="margin-left:auto; display:flex; gap:8px;">
      <button class="btn btn-secondary" onclick="openWorkstationQueue()" title="Vytížení pracovišť — kolik práce čeká">🏭 Vytížení</button>
      <button class="btn btn-secondary" onclick="openAuditLog()" title="Audit log akcí v kioscích za dnešek">📜 Audit</button>
      <button class="btn btn-secondary" onclick="openPurchaseReport()" title="Konsolidovaný nákupní report přes všechny aktivní dávky">📋 Nákupní report</button>
      <button class="btn btn-secondary" onclick="loadAll()">🔄 Obnovit</button>
      <button class="btn btn-primary" onclick="openCreateModal()">+ Nová dávka</button>
    </div>
  </div>

  <div class="content">
    <!-- Rychlé filtry -->
    <div class="quick-filters">
      <select class="filter-select" id="qfStatus" onchange="applyFilters()">
        <option value="">Stav: vše</option>
        <option value="planned">📋 Plánovaná</option>
        <option value="released">✅ Vydaná</option>
        <option value="in_progress">⚙️ Probíhá</option>
        <option value="paused">⏸️ Pauza</option>
        <option value="done">🏁 Hotová</option>
        <option value="cancelled">❌ Zrušená</option>
      </select>
      <select class="filter-select" id="qfType" onchange="applyFilters()">
        <option value="">Typ: vše</option>
        <option value="main">Hlavní</option>
        <option value="feeder">Feeder</option>
        <option value="subassembly">Podsestava</option>
      </select>
      <select class="filter-select" id="qfYear" onchange="applyFilters()">
        <option value="">Rok: vše</option>
      </select>
      <span style="color:var(--text2); font-size:12px; margin-left:auto;" id="lastUpdate"></span>
    </div>

    <!-- Hustá tabulka -->
    <div class="table-wrap" id="tableWrap"></div>
  </div>
</div>

<div id="modalRoot"></div>

<script>
  var s = document.createElement('script');
  s.src = 'js/sidebar.js?v=' + Date.now();
  s.onload = function() { renderSidebar('planovani-vyroby'); };
  document.head.appendChild(s);
</script>

<script>
(function() {
  // ─── Stav ─────────────────────────────────────────────────────────────────
  let allBatches = [];
  let products = [];
  let columnFilters = {}; // key → string (per-column input filter)
  let mrpCache = new Map(); // batch_id → MRP result (lazy fetched)

  // ─── Helpery ──────────────────────────────────────────────────────────────
  function authHeaders() {
    const h = { 'Content-Type': 'application/json' };
    const t = sessionStorage.getItem('token');
    if (t) h['Authorization'] = 'Bearer ' + t;
    return h;
  }

  function escHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return '—';
    return dt.toLocaleDateString('cs-CZ');
  }

  function fmtDateTime(d) {
    if (!d) return '—';
    const dt = new Date(d);
    if (isNaN(dt.getTime())) return '—';
    return dt.toLocaleString('cs-CZ', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
  }

  function statusBadge(status) {
    const labels = {
      planned: 'Plánovaná', released: 'Vydaná', in_progress: 'Probíhá',
      paused: 'Pauza', done: 'Hotová', cancelled: 'Zrušená',
    };
    return `<span class="badge badge-${status}">${labels[status] || status}</span>`;
  }

  function bool(v) {
    if (v === true) return '<div class="bool-cell bool-yes">✓</div>';
    if (v === false) return '<div class="bool-cell bool-no">✗</div>';
    return '<div class="bool-cell bool-na">—</div>';
  }

  function yearFromBatchNumber(bn) {
    const m = (bn || '').match(/^(\d{4})-/);
    return m ? parseInt(m[1], 10) : null;
  }

  // ─── Sloupce ──────────────────────────────────────────────────────────────
  // Definuju seznam sloupců — z toho generuji header + filter řádek + tělo.
  // type: 'text' | 'date' | 'datetime' | 'num' | 'bool' | 'status' | 'link' | 'actions' | 'badge'
  const COLUMNS = [
    { key: 'id',            label: 'Id',                       type: 'num',      get: b => b.id },
    { key: 'batch_number',  label: 'Číslo dávky',              type: 'text',     get: b => b.batch_number },
    { key: 'planned_end',   label: 'Požadovaný termín',        type: 'datetime', get: b => b.planned_end },
    { key: 'released_at',   label: 'Čas uvolnění',             type: 'datetime', get: b => b.status !== 'planned' ? b.updated_at : null },
    { key: 'actual_start',  label: 'Skutečný začátek',         type: 'datetime', get: b => b.actual_start },
    { key: 'actual_end',    label: 'Čas dokončení',            type: 'datetime', get: b => b.actual_end },
    { key: 'product',       label: 'Zboží',                    type: 'link',     get: b => b.product ? { id: b.product.id, code: b.product.code, name: b.product.name } : null },
    { key: 'material_ok',   label: 'Materiál k dispozici',     type: 'bool',     get: b => {
      // F4 MRP — true = vše OK, false = shortage > 0, null = ještě nenačteno
      const m = mrpCache.get(b.id);
      if (m === undefined) return null;
      return m.summary?.all_materials_ok === true;
    } },
    { key: 'bom_ok',        label: 'BOM snapshot',             type: 'bool',     get: b => b.bom_snapshot_id != null },
    { key: 'released',      label: 'Vydaná',                   type: 'bool',     get: b => ['released','in_progress','paused','done'].includes(b.status) },
    { key: 'done',          label: 'Hotová',                   type: 'bool',     get: b => b.status === 'done' },
    { key: 'cancelled',     label: 'Stažena z výroby',         type: 'bool',     get: b => b.status === 'cancelled' },
    { key: 'quantity',      label: 'Množství',                 type: 'num',      get: b => b.quantity },
    { key: 'op_count',      label: 'Operací',                  type: 'num',      get: b => b._count?.batch_operations ?? 0 },
    { key: 'status',        label: 'Stav',                     type: 'badge',    get: b => b.status },
    { key: 'batch_type',    label: 'Typ',                      type: 'text',     get: b => b.batch_type },
    { key: 'priority',      label: 'Priorita',                 type: 'num',      get: b => b.priority },
    { key: 'actions',       label: '',                         type: 'actions',  get: b => b },
  ];

  function renderCell(col, b) {
    const v = col.get(b);
    switch (col.type) {
      case 'num':       return `<td class="col-num">${v != null ? v : '—'}</td>`;
      case 'text': {
        // Speciální zachzení: batch_number se renderuje jako klikatelný link na detail modal
        if (col.key === 'batch_number' && v) {
          return `<td class="col-link"><a href="#" data-detail-id="${b.id}" onclick="event.preventDefault(); window.openBatchDetail(${b.id});" style="font-weight:700;">${escHtml(v)}</a></td>`;
        }
        return `<td>${escHtml(v ?? '—')}</td>`;
      }
      case 'date':      return `<td>${fmtDate(v)}</td>`;
      case 'datetime':  return `<td>${fmtDateTime(v)}</td>`;
      case 'bool':      return `<td style="padding:0;">${bool(v)}</td>`;
      case 'badge':     return `<td>${statusBadge(v)}</td>`;
      case 'link':      return v
        ? `<td class="col-link"><a href="modules/pracovni-postup/detail.html?id=${v.id}" title="${escHtml(v.name)}">${escHtml(v.code)} <span style="color:var(--text2)">${escHtml((v.name || '').slice(0,40))}</span></a></td>`
        : `<td>—</td>`;
      case 'actions': {
        const buttons = [];
        const opCount = v._count?.batch_operations ?? 0;
        if (opCount === 0) buttons.push(`<button class="btn btn-sm btn-secondary" data-action="gen-ops" data-id="${v.id}" title="Vygenerovat BatchOperation z postupu produktu">⚙️ Generuj op.</button>`);
        buttons.push(`<button class="btn btn-sm btn-secondary" data-action="mrp" data-id="${v.id}" title="MRP — kontrola materiálu pro tuto dávku">📊 MRP</button>`);
        buttons.push(`<button class="btn btn-sm btn-secondary" data-action="pre-pick" data-id="${v.id}" title="Pre-pick — návrh transferů materiálu na pracoviště">🚚 Pre-pick</button>`);
        if (opCount > 0 && v.status !== 'done' && v.status !== 'cancelled') buttons.push(`<button class="btn btn-sm btn-secondary" data-action="schedule" data-id="${v.id}" title="Naplánovat časy operací (planned_start/end)">📅 Naplánuj</button>`);
        if (v.status === 'planned') buttons.push(`<button class="btn btn-sm btn-success" data-action="release" data-id="${v.id}" title="Vydat do výroby">▶ Vydat</button>`);
        if (v.status === 'released' || v.status === 'in_progress') buttons.push(`<button class="btn btn-sm btn-secondary" data-action="pause" data-id="${v.id}" title="Pozastavit">⏸️</button>`);
        if (v.status === 'paused') buttons.push(`<button class="btn btn-sm btn-success" data-action="resume" data-id="${v.id}" title="Obnovit">▶ Obnovit</button>`);
        if (['planned', 'released', 'paused'].includes(v.status)) buttons.push(`<button class="btn btn-sm btn-secondary" data-action="cancel" data-id="${v.id}" title="Zrušit (cancelled)">✗ Zrušit</button>`);
        if (v.status !== 'done' && v.status !== 'cancelled') buttons.push(`<button class="btn btn-sm btn-danger" data-action="delete" data-id="${v.id}" title="Smazat">🗑️</button>`);
        return `<td class="col-actions">${buttons.join(' ')}</td>`;
      }
      default: return `<td>${escHtml(v ?? '')}</td>`;
    }
  }

  function cellFilterMatches(col, b, filterValue) {
    if (!filterValue) return true;
    const fv = String(filterValue).toLowerCase().trim();
    const v = col.get(b);
    if (col.type === 'bool') {
      // ✓ / ano / yes / true → true; ✗ / ne / no / false → false; — / na → null
      if (['✓','y','ano','yes','true','1'].includes(fv)) return v === true;
      if (['✗','n','ne','no','false','0'].includes(fv)) return v === false;
      return true;
    }
    if (col.type === 'link') return v && (`${v.code} ${v.name}`.toLowerCase().includes(fv));
    if (col.type === 'num') return String(v).includes(fv);
    if (col.type === 'date' || col.type === 'datetime') {
      return v && fmtDateTime(v).toLowerCase().includes(fv);
    }
    if (col.type === 'badge') return String(v ?? '').toLowerCase().includes(fv);
    return String(v ?? '').toLowerCase().includes(fv);
  }

  // ─── Načtení dat ──────────────────────────────────────────────────────────
  async function loadAll() {
    try {
      const r = await fetch('/api/production/batches', { headers: authHeaders() });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      allBatches = await r.json();
      populateYearFilter();
      applyFilters();
      document.getElementById('lastUpdate').textContent = 'Aktualizováno ' + new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    } catch (e) {
      document.getElementById('tableWrap').innerHTML =
        `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Nepodařilo se načíst dávky</h3><p>${escHtml(e.message)}</p></div>`;
    }
  }

  function populateYearFilter() {
    const sel = document.getElementById('qfYear');
    const cur = sel.value;
    const years = new Set();
    allBatches.forEach(b => {
      const y = yearFromBatchNumber(b.batch_number);
      if (y) years.add(y);
    });
    const sorted = Array.from(years).sort().reverse();
    sel.innerHTML = '<option value="">Rok: vše</option>' + sorted.map(y => `<option value="${y}">${y}</option>`).join('');
    sel.value = cur;
  }

  // ─── Filtrace + render ────────────────────────────────────────────────────
  function applyFilters() {
    const status = document.getElementById('qfStatus').value;
    const type = document.getElementById('qfType').value;
    const year = document.getElementById('qfYear').value;

    let filtered = allBatches;
    if (status) filtered = filtered.filter(b => b.status === status);
    if (type) filtered = filtered.filter(b => b.batch_type === type);
    if (year) filtered = filtered.filter(b => yearFromBatchNumber(b.batch_number) === parseInt(year, 10));

    // Per-column inline filtry
    for (const col of COLUMNS) {
      const fv = columnFilters[col.key];
      if (fv) filtered = filtered.filter(b => cellFilterMatches(col, b, fv));
    }

    document.getElementById('batchCount').textContent = filtered.length === allBatches.length
      ? `(${allBatches.length})` : `(${filtered.length}/${allBatches.length})`;
    renderTable(filtered);
  }

  function renderTable(batches) {
    if (allBatches.length === 0) {
      document.getElementById('tableWrap').innerHTML =
        `<div class="empty-state"><div class="empty-icon">📭</div><h3>Žádné dávky</h3><p>Vytvoř první dávku tlačítkem „+ Nová dávka".</p></div>`;
      return;
    }

    const titles = COLUMNS.map(c => `<th>${escHtml(c.label)}</th>`).join('');
    const filters = COLUMNS.map(c => {
      if (c.type === 'actions') return '<th></th>';
      const cur = escHtml(columnFilters[c.key] || '');
      return `<th><input type="text" data-fkey="${c.key}" value="${cur}" placeholder=""></th>`;
    }).join('');

    const rows = batches.map(b => {
      const cells = COLUMNS.map(c => renderCell(c, b)).join('');
      return `<tr>${cells}</tr>`;
    }).join('');

    document.getElementById('tableWrap').innerHTML = `
      <table class="dense">
        <thead>
          <tr class="head-titles">${titles}</tr>
          <tr class="head-filters">${filters}</tr>
        </thead>
        <tbody>${rows || `<tr><td colspan="${COLUMNS.length}" class="empty-state">Žádné dávky neodpovídají filtru.</td></tr>`}</tbody>
      </table>`;

    // Per-column input listeners
    document.querySelectorAll('input[data-fkey]').forEach(inp => {
      inp.addEventListener('input', e => {
        columnFilters[e.target.dataset.fkey] = e.target.value;
        applyFilters();
      });
    });

    // Action button listeners
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', handleAction);
    });
  }

  // ─── Akce ─────────────────────────────────────────────────────────────────
  async function handleAction(e) {
    e.stopPropagation();
    const btn = e.currentTarget;
    const action = btn.dataset.action;
    const id = parseInt(btn.dataset.id, 10);
    btn.disabled = true;
    try {
      if (action === 'release') {
        const r = await fetch(`/api/production/batches/${id}/release`, { method: 'POST', headers: authHeaders() });
        if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
      } else if (action === 'pause' || action === 'resume' || action === 'cancel') {
        if (action === 'cancel' && !confirm('Opravdu zrušit tuto dávku? (status → cancelled, neumaže — pro úplné smazání použij 🗑️)')) {
          btn.disabled = false; return;
        }
        const r = await fetch(`/api/planning/batches/${id}/${action}`, { method: 'POST', headers: authHeaders() });
        if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
      } else if (action === 'delete') {
        if (!confirm('Smazat tuto dávku včetně operací a logů?')) { btn.disabled = false; return; }
        const r = await fetch(`/api/production/batches/${id}`, { method: 'DELETE', headers: authHeaders() });
        if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
      } else if (action === 'gen-ops') {
        const r = await fetch(`/api/planning/batches/${id}/generate-operations`, {
          method: 'POST', headers: authHeaders(), body: JSON.stringify({ initial_status: 'ready' }),
        });
        if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
        const result = await r.json();
        if (result.skipped) alert(`Operace už existují (${result.existing_count}).`);
      } else if (action === 'mrp') {
        const r = await fetch(`/api/planning/batches/${id}/mrp`, { headers: authHeaders() });
        if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
        const mrp = await r.json();
        mrpCache.set(id, mrp);
        renderMrpModal(mrp);
        applyFilters(); // re-render aby boolean Materiál k dispozici se updatlo
        btn.disabled = false;
        return; // bez loadAll() — žádné mutace
      } else if (action === 'pre-pick') {
        const r = await fetch(`/api/planning/batches/${id}/pre-pick`, { headers: authHeaders() });
        if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
        const pp = await r.json();
        renderPrePickModal(pp);
        btn.disabled = false;
        return;
      } else if (action === 'schedule') {
        const r = await fetch(`/api/planning/batches/${id}/schedule`, { method: 'POST', headers: authHeaders() });
        if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
        const result = await r.json();
        if (result.warning) alert('⚠️ ' + result.warning);
        else alert(`📅 Naplánováno ${result.operations_scheduled} operací\nZačátek: ${new Date(result.plan_start).toLocaleString('cs-CZ')}\nKonec: ${new Date(result.plan_end).toLocaleString('cs-CZ')}\nCelkem ${result.total_minutes} minut`);
      }
      await loadAll();
    } catch (err) {
      alert('Chyba: ' + err.message);
      btn.disabled = false;
    }
  }

          <tbody>${audit.logs.slice(0, 30).map(l => `

  async function reloadAuditLog() {
    const from = document.getElementById('al-from').value;
    const to = document.getElementById('al-to').value;
    const action = document.getElementById('al-action').value;
    const params = new URLSearchParams();
    if (from) params.set('from', from);
    if (to) params.set('to', to);
    if (action) params.set('action', action);
    document.getElementById('al-content').innerHTML = 'Načítám…';
    try {
      const r = await fetch('/api/planning/audit-log?' + params.toString(), { headers: authHeaders() });
      if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
      const log = await r.json();
      renderAuditLog(log);
    } catch (e) {
      document.getElementById('al-content').innerHTML = `<div style="color:#ef4444">Chyba: ${escHtml(e.message)}</div>`;
    }
  }
  window.reloadAuditLog = reloadAuditLog;

    const byPerson = summary.by_person || [];

    const actionIcon = {
      start: '▶', pause: '⏸', resume: '▶', done: '✓', problem: '⚠️', comment: '💬',
    };

      start: '#6c8cff', pause: '#a0a0a0', resume: '#22c55e',
      done: '#14b8a6', problem: '#ef4444', comment: '#f59e0b',
    };

      return `
        <div style="background:var(--surface2); border-radius:8px; padding:10px 14px; min-width:240px;">
          <div style="font-weight:700; font-size:13px; margin-bottom:4px;">${name}</div>
          <div style="font-size:12px; color:var(--text2);">${s.items_count} položek${s.sample_lead_time_days != null ? ' · lead time cca '+s.sample_lead_time_days+' dní' : ''}</div>
        </div>`;
    }).join('');

    // Sekce 2: Detail tabulka
    const itemsRows = rep.items.map(it => {
      const supplier = it.supplier ? escHtml(it.supplier.name) : '<em style="color:#f59e0b;">— bez —</em>';
      const contributors = it.contributors.map(c =>
        `${escHtml(c.batch_number)} (${c.shortage} ${escHtml(it.unit)})`
      ).join(', ');
      return `
        <tr>
          <td><strong>${escHtml(it.material?.code || '')}</strong></td>
          <td>${escHtml(it.material?.name || '—')}</td>
          <td class="col-num"><strong>${it.total_shortage}</strong> ${escHtml(it.unit)}</td>
          <td>${supplier}</td>
          <td>${it.lead_time_days != null ? it.lead_time_days + ' dní' : '—'}</td>
          <td>${it.expected_delivery || '—'}</td>
          <td style="font-size:11px; color:var(--text2);" title="${escHtml(contributors)}">${it.contributors.length} dávek</td>
        </tr>`;
    }).join('');

    document.getElementById('pr-content').innerHTML = `
      <div style="display:flex; gap:24px; font-size:13px; color:var(--text2); margin-bottom:14px; flex-wrap:wrap;">
        <div><strong style="color:var(--text);">Aktivních dávek:</strong> ${rep.batches_processed}</div>
        <div><strong style="color:var(--text);">Materiálů k objednání:</strong> ${rep.items_count}</div>
        <div><strong style="color:var(--text);">Dodavatelů:</strong> ${rep.by_supplier.length}</div>
      </div>

      <h3 style="font-size:13px; margin:14px 0 8px; color:var(--text2);">Souhrn podle dodavatele</h3>
      <div style="display:flex; flex-wrap:wrap; gap:10px; margin-bottom:18px;">${suppliersHtml}</div>

      <h3 style="font-size:13px; margin:14px 0 8px; color:var(--text2);">Materiály k objednání</h3>
      <div style="overflow-x:auto;">
        <table class="dense" style="width:100%;">
          <thead><tr class="head-titles">
            <th>Kód</th><th>Název</th><th>Objednat</th><th>Dodavatel</th><th>Lead time</th><th>Dodání</th><th>Pokrývá</th>
          </tr></thead>
          <tbody>${itemsRows}</tbody>
        </table>
      </div>`;
  }

  // ─── Pre-pick modal — F3.4 návrh transferů ──────────────────────────────
  function renderPrePickModal(pp) {
    const groups = pp.by_workstation || [];
    const summary = pp.summary || {};

    const actionLabel = {
      transfer_ok: '<span style="color:#22c55e;">✓ K přesunu</span>',
      on_location: '<span style="color:#14b8a6;">✓ Už na místě</span>',
      shortage: '<span style="color:#ef4444;">⚠️ Chybí</span>',
      no_source: '<span style="color:#f59e0b;">? Není kde brát</span>',
      no_target: '<span style="color:#a0a0a0;">? Pracoviště bez input lokace</span>',
    };

    const groupsHtml = groups.length === 0
      ? '<div style="text-align:center; color:var(--text2); padding:32px;">Dávka nemá BatchOperation nebo OperationMaterial. <br/>Vygeneruj operace tlačítkem „⚙️ Generuj op."</div>'
      : groups.map(g => {
          const ws = g.workstation;
          const target = g.input_location;
          const wsTitle = ws ? `${escHtml(ws.name)} ${ws.code ? '<span style="color:var(--text2);">('+escHtml(ws.code)+')</span>' : ''}` : '<em>(bez pracoviště)</em>';
          const targetLabel = target ? `${escHtml(target.code || '')} ${escHtml(target.name)}` : '<em style="color:#f59e0b;">⚠️ Pracoviště nemá input_location</em>';
          const rows = g.transfers.map(t => `
            <tr>
              <td><strong>${escHtml(t.material?.code || '')}</strong></td>
              <td>${escHtml(t.material?.name || '—')}</td>
              <td class="col-num"><strong>${t.needed}</strong> ${escHtml(t.unit)}</td>
              <td>${t.source_location ? escHtml(t.source_location.code || '') + ' ' + escHtml(t.source_location.name || '') : '<em>—</em>'}</td>
              <td class="col-num">${t.available_at_source}</td>
              <td>${actionLabel[t.action] || t.action}</td>
            </tr>`).join('');
          return `
            <div style="margin-bottom:18px; border:1px solid var(--border); border-radius:10px; overflow:hidden;">
              <div style="padding:10px 14px; background:var(--surface2); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:8px;">
                <div><strong style="font-size:14px;">🏭 ${wsTitle}</strong> → <span style="color:var(--text2);">${targetLabel}</span></div>
                <div style="font-size:12px; color:var(--text2);">${g.transfers.length} položek</div>
              </div>
              <table style="width:100%; border-collapse:collapse; font-size:12px;">
                <thead><tr style="background:rgba(160,160,160,0.05); text-transform:uppercase; font-size:10px; color:var(--text2);">
                  <th style="text-align:left; padding:6px 10px;">Kód</th>
                  <th style="text-align:left; padding:6px 10px;">Název</th>
                  <th style="text-align:right; padding:6px 10px;">Potřeba</th>
                  <th style="text-align:left; padding:6px 10px;">Zdroj</th>
                  <th style="text-align:right; padding:6px 10px;">Dostupné</th>
                  <th style="text-align:left; padding:6px 10px;">Akce</th>
                </tr></thead>
                <tbody>${rows}</tbody>
              </table>
            </div>`;
        }).join('');

    document.getElementById('modalRoot').innerHTML = `
      <div class="modal-backdrop" id="mb">
        <div class="modal" style="min-width:1100px; max-width:95vw;">
          <h2>🚚 Pre-pick — ${escHtml(pp.batch?.batch_number || '')}</h2>
          <div style="display:flex; gap:24px; font-size:13px; color:var(--text2); margin-bottom:14px; flex-wrap:wrap;">
            <div><strong style="color:var(--text);">Produkt:</strong> ${escHtml(pp.batch?.product?.code || '')} ${escHtml(pp.batch?.product?.name || '')}</div>
            <div><strong style="color:var(--text);">Pracovišť:</strong> ${summary.workstations_count || 0}</div>
            <div><strong style="color:var(--text);">Transferů:</strong> ${summary.transfers_total || 0}</div>
            <div><strong style="color:#22c55e;">OK:</strong> ${summary.transfers_ok || 0}</div>
            ${summary.on_location ? `<div><strong style="color:#14b8a6;">Už na místě:</strong> ${summary.on_location}</div>` : ''}
            ${summary.shortages ? `<div><strong style="color:#ef4444;">Chybí:</strong> ${summary.shortages}</div>` : ''}
            ${summary.no_target ? `<div><strong style="color:#a0a0a0;">Bez cílové lokace:</strong> ${summary.no_target}</div>` : ''}
          </div>
          ${groupsHtml}
          <p style="font-size:12px; color:var(--text2); margin-top:14px;">
            <em>V1: pouze návrh. Reálné transfery se vystavují ručně v modulu „Skladové doklady".</em>
          </p>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="document.getElementById('modalRoot').innerHTML=''">Zavřít</button>
          </div>
        </div>
      </div>`;
    document.getElementById('mb').addEventListener('click', e => {
      if (e.target.id === 'mb') document.getElementById('modalRoot').innerHTML = '';
    });
  }

  // ─── MRP modal — výsledek analýzy materiálu ─────────────────────────────
  function renderMrpModal(mrp) {
    const items = mrp.items || [];
    const proposals = mrp.po_proposals || [];

    const itemsRows = items.map(it => {
      const shortClass = it.shortage > 0 ? 'bool-no' : 'bool-yes';
      return `
        <tr>
          <td><strong>${escHtml(it.material?.code || '')}</strong></td>
          <td>${escHtml(it.material?.name || '—')}</td>
          <td class="col-num">${it.qty_per_ks} ${escHtml(it.unit)}</td>
          <td class="col-num"><strong>${it.needed}</strong></td>
          <td class="col-num">${it.stock?.available ?? '—'}</td>
          <td class="col-num bool-cell ${shortClass}">${it.shortage > 0 ? it.shortage : '✓'}</td>
          <td>${it.expected_delivery || '—'}</td>
          <td>${escHtml(it.supplier?.name || '—')}</td>
        </tr>`;
    }).join('');

    const proposalsRows = proposals.length === 0 ? '<tr><td colspan="6" style="text-align:center; color:var(--text2); padding:24px;">Žádné návrhy nákupních objednávek — všechen materiál je na skladě.</td></tr>' :
      proposals.map(p => `
        <tr>
          <td><strong>${escHtml(p.material?.code || '')}</strong></td>
          <td>${escHtml(p.material?.name || '')}</td>
          <td class="col-num"><strong>${p.quantity_to_order}</strong> ${escHtml(p.unit)}</td>
          <td class="col-num">${p.lead_time_days != null ? p.lead_time_days + ' dní' : '—'}</td>
          <td>${p.expected_delivery || '—'}</td>
          <td>${escHtml(p.supplier?.name || '—')}</td>
        </tr>`).join('');

    const okBadge = mrp.summary?.all_materials_ok
      ? '<span class="badge badge-released">✓ Vše na skladě</span>'
      : `<span class="badge badge-cancelled">⚠️ Chybí ${mrp.summary?.shortage_count || 0} materiálů</span>`;

    document.getElementById('modalRoot').innerHTML = `
      <div class="modal-backdrop" id="mb">
        <div class="modal" style="min-width:1100px; max-width:95vw;">
          <h2 style="display:flex; align-items:center; gap:14px;">
            📊 MRP — ${escHtml(mrp.batch?.batch_number || '')} ${okBadge}
          </h2>
          <div style="display:flex; gap:24px; font-size:13px; color:var(--text2); margin-bottom:14px; flex-wrap:wrap;">
            <div><strong style="color:var(--text);">Produkt:</strong> ${escHtml(mrp.batch?.product?.code || '')} ${escHtml(mrp.batch?.product?.name || '')}</div>
            <div><strong style="color:var(--text);">Množství:</strong> ${mrp.batch?.quantity || '?'} ks</div>
            <div><strong style="color:var(--text);">BOM zdroj:</strong> ${escHtml(mrp.bom_source)}</div>
            <div><strong style="color:var(--text);">Materiálů:</strong> ${mrp.summary?.items_count || 0}</div>
          </div>

          <h3 style="font-size:14px; margin:18px 0 8px;">Materiálové potřeby</h3>
          <div style="overflow-x:auto;">
            <table class="dense" style="width:100%;">
              <thead><tr class="head-titles">
                <th>Kód</th><th>Název</th><th>Per ks</th><th>Potřeba</th><th>Skladem</th><th>Chybí</th><th>Dodání</th><th>Dodavatel</th>
              </tr></thead>
              <tbody>${itemsRows || '<tr><td colspan="8" style="text-align:center; padding:24px;">Žádné položky BOM</td></tr>'}</tbody>
            </table>
          </div>

          <h3 style="font-size:14px; margin:22px 0 8px;">Návrhy nákupu</h3>
          <div style="overflow-x:auto;">
            <table class="dense" style="width:100%;">
              <thead><tr class="head-titles">
                <th>Kód</th><th>Název</th><th>Objednat</th><th>Lead time</th><th>Očekávané dodání</th><th>Dodavatel</th>
              </tr></thead>
              <tbody>${proposalsRows}</tbody>
            </table>
          </div>

          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="document.getElementById('modalRoot').innerHTML=''">Zavřít</button>
          </div>
        </div>
      </div>`;

    document.getElementById('mb').addEventListener('click', e => {
      if (e.target.id === 'mb') document.getElementById('modalRoot').innerHTML = '';
    });
  }

  // ─── Modal pro novou dávku ────────────────────────────────────────────────
  async function openCreateModal() {
    if (products.length === 0) {
      try {
        const r = await fetch('/api/production/products', { headers: authHeaders() });
        if (r.ok) products = await r.json();
      } catch (e) { /* ignore */ }
    }
    const productOpts = products.map(p => `<option value="${p.id}">${escHtml(p.code)} — ${escHtml(p.name)}</option>`).join('');
    const today = new Date().toISOString().slice(0, 10);

    document.getElementById('modalRoot').innerHTML = `
      <div class="modal-backdrop" id="mb">
        <div class="modal">
          <h2>Nová výrobní dávka</h2>
          <div class="form-row">
            <label>Produkt *</label>
            <select id="m-product">${productOpts || '<option value="">(nelze načíst seznam produktů)</option>'}</select>
          </div>
          <div class="form-row">
            <label>Množství (ks) *</label>
            <input type="number" id="m-qty" min="1" value="5">
          </div>
          <div class="form-row">
            <label>Typ dávky</label>
            <select id="m-type">
              <option value="main">Hlavní (montáž)</option>
              <option value="feeder">Feeder (předmontáž)</option>
              <option value="subassembly">Podsestava</option>
            </select>
          </div>
          <div class="form-row">
            <label>Variant key (volitelně)</label>
            <input type="text" id="m-variant" placeholder='např. "ram:nerez|barva:bila"'>
          </div>
          <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap:12px;">
            <div><label>Plán začátek</label><input type="date" id="m-start" value="${today}"></div>
            <div><label>Plán konec</label><input type="date" id="m-end"></div>
          </div>
          <div class="form-row">
            <label>Priorita (nižší = přednost)</label>
            <input type="number" id="m-prio" value="100">
          </div>
          <div class="form-row">
            <label>Poznámka</label>
            <textarea id="m-note"></textarea>
          </div>
          <div class="form-row" style="flex-direction:row; align-items:center; gap:8px;">
            <input type="checkbox" id="m-autogen" checked style="width:auto;">
            <label for="m-autogen" style="margin:0; cursor:pointer; text-transform:none; letter-spacing:normal; font-weight:500;">
              Automaticky vygenerovat operace z postupu produktu
            </label>
          </div>
          <div class="modal-actions">
            <button class="btn btn-secondary" onclick="document.getElementById('modalRoot').innerHTML=''">Zrušit</button>
            <button class="btn btn-primary" id="m-save">Vytvořit dávku</button>
          </div>
        </div>
      </div>`;

    document.getElementById('m-save').addEventListener('click', submitCreate);
    document.getElementById('mb').addEventListener('click', e => {
      if (e.target.id === 'mb') document.getElementById('modalRoot').innerHTML = '';
    });
  }
  window.openCreateModal = openCreateModal;
  window.applyFilters = applyFilters;
  window.loadAll = loadAll;

  async function submitCreate() {
    const productId = parseInt(document.getElementById('m-product').value, 10);
    const qty = parseInt(document.getElementById('m-qty').value, 10);
    if (!productId || !qty) { alert('Vyber produkt a zadej množství.'); return; }

    const body = {
      product_id: productId,
      quantity: qty,
      batch_type: document.getElementById('m-type').value,
      variant_key: document.getElementById('m-variant').value || null,
      planned_start: document.getElementById('m-start').value || null,
      planned_end: document.getElementById('m-end').value || null,
      priority: parseInt(document.getElementById('m-prio').value, 10) || 100,
      note: document.getElementById('m-note').value || null,
      auto_generate_operations: document.getElementById('m-autogen').checked,
    };

    const btn = document.getElementById('m-save');
    btn.disabled = true; btn.textContent = 'Vytvářím…';
    try {
      const r = await fetch('/api/production/batches', {
        method: 'POST', headers: authHeaders(), body: JSON.stringify(body),
      });
      if (!r.ok) throw new Error((await r.json()).error || 'HTTP ' + r.status);
      document.getElementById('modalRoot').innerHTML = '';
      await loadAll();
    } catch (err) {
      alert('Chyba: ' + err.message);
      btn.disabled = false; btn.textContent = 'Vytvořit dávku';
    }
  }

  // ─── Init ─────────────────────────────────────────────────────────────────
  loadAll();
})();
</script>

</body>
</html>
