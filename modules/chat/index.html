    function getToken() { return sessionStorage.getItem('token') || localStorage.getItem('token') || ''; }
    function auth() {
      const t = getToken();
      return t ? { 'Authorization': 'Bearer ' + t } : {};
    }

    // Moje user ID вАФ funguje i s HttpOnly cookie (fetch /api/auth/me)
    let _myId = null;

    function meIdFromJwt() {
      try {
        const t = getToken();
        if (!t) return null;
        const parts = t.split('.');
        if (parts.length < 2) return null;
        let b64 = parts[1].replace(/-/g, '+').replace(/_/g, '/');
        while (b64.length % 4) b64 += '=';
        const json = decodeURIComponent(Array.prototype.map.call(atob(b64),
          c => '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join(''));
        return JSON.parse(json).id || null;
      } catch (_) { return null; }
    }

    const MY_ID_KEY = 'holyos_my_id_v1';

    function primeMyIdFromCache() {
      if (_myId) return _myId;
      if (window.__holyosMyId) { _myId = window.__holyosMyId; return _myId; }
      const jwtId = meIdFromJwt();
      if (jwtId) { _myId = jwtId; window.__holyosMyId = jwtId; return _myId; }
      try {
        const stored = parseInt(localStorage.getItem(MY_ID_KEY));
        if (stored && !isNaN(stored)) { _myId = stored; window.__holyosMyId = stored; return _myId; }
      } catch (_) {}
      return null;
    }

    async function ensureMyId() {
      if (_myId) return _myId;
      primeMyIdFromCache();
      if (_myId) return _myId;
      if (!window.__holyosMyIdPromise) {
        window.__holyosMyIdPromise = fetch('/api/auth/me', { credentials: 'include' })
          .then(r => r.ok ? r.json() : null)
          .then(data => { const u = data?.user || data; return u?.id || null; })
          .catch(() => null);
      }
      _myId = await window.__holyosMyIdPromise;
      if (_myId) {
        window.__holyosMyId = _myId;
        try { localStorage.setItem(MY_ID_KEY, String(_myId)); } catch (_) {}
      }
      return _myId;
    }

    const CHAT_EMOJI_LAST_KEY = 'holyos_chat_emoji_category';

    function buildChatEmojiPopover(onPick) {
      const pop = document.createElement('div');
      pop.className = 'chat-emoji-popover';
      let activeKey = 'smileys';
      try { const k = localStorage.getItem(CHAT_EMOJI_LAST_KEY); if (k && CHAT_EMOJI_CATEGORIES.some(c => c.key === k)) activeKey = k; } catch (_) {}

      const tabs = document.createElement('div');
      tabs.className = 'chat-emoji-tabs';
      CHAT_EMOJI_CATEGORIES.forEach(cat => {
        const b = document.createElement('button');
        b.type = 'button'; b.className = 'chat-emoji-tab' + (cat.key === activeKey ? ' active' : '');
        b.dataset.category = cat.key; b.title = cat.title; b.textContent = cat.icon;
        b.addEventListener('click', () => {
          try { localStorage.setItem(CHAT_EMOJI_LAST_KEY, cat.key); } catch (_) {}
          pop.querySelectorAll('.chat-emoji-tab').forEach(x => x.classList.toggle('active', x.dataset.category === cat.key));
          renderGrid(cat.key);
        });
        tabs.appendChild(b);
      });
      pop.appendChild(tabs);

      const grid = document.createElement('div');
      grid.className = 'chat-emoji-grid';
      pop.appendChild(grid);

      function renderGrid(key) {
        const cat = CHAT_EMOJI_CATEGORIES.find(c => c.key === key) || CHAT_EMOJI_CATEGORIES[0];
        grid.innerHTML = cat.items.map(e =>
          `<button type="button" class="chat-emoji-btn-item" data-emoji="${e}" title="${e}">${e}</button>`
        ).join('');
        grid.querySelectorAll('.chat-emoji-btn-item').forEach(b => {
          b.addEventListener('click', () => onPick(b.dataset.emoji));
        });
      }
      renderGrid(activeKey);
      pop.addEventListener('click', e => e.stopPropagation());
      return pop;
    }

    function insertEmojiAtCursor(ta, text) {
      if (!ta) return;
      const s = ta.selectionStart || 0;
      const e = ta.selectionEnd || 0;
      ta.value = ta.value.slice(0, s) + text + ta.value.slice(e);
      const np = s + text.length;
      ta.selectionStart = ta.selectionEnd = np;
      ta.focus();
    }

    function fmtTime(iso) {
      const d = new Date(iso);
      const now = new Date();
      if (d.toDateString() === now.toDateString()) return d.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('cs-CZ', { day: '2-digit', month: '2-digit' });
    }

    function channelName(c) {
      if (c.type === 'direct') {
        const other = (c.members || []).find(m => m.user_id !== meId());
        return other?.user?.display_name || other?.user?.username || 'Konverzace';
      }
      return c.name || '(bez n√°zvu)';
    }

    function channelIcon(c) {
      if (c.type === 'direct') return 'рЯТђ';
      if (c.type === 'group') return 'рЯС•';
      if (c.type === 'task') return 'рЯУЛ';
      if (c.type === 'system') return 'вЪЩпЄП';
      return 'рЯТђ';
    }

    function avatarColor(seed) {
      const colors = ['#6c5ce7', '#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#ec4899', '#14b8a6', '#8b5cf6'];
      let h = 0;
      for (let i = 0; i < String(seed || '').length; i++) h = (h * 31 + String(seed).charCodeAt(i)) & 0xffff;
      return colors[h % colors.length];
    }

    function initials(user) {
      if (!user) return '?';
      const p = user.person;
      if (p && (p.first_name || p.last_name)) {
        return ((p.first_name?.[0] || '') + (p.last_name?.[0] || '')).toUpperCase() || '?';
      }
      const name = user.display_name || user.username || '?';
      const parts = name.trim().split(/\s+/);
      if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
      return name.slice(0, 2).toUpperCase();
    }

    function avatarHtml(user, size) {
      if (!user) return `<span class="chat-avatar ${size || ''}" style="background:#444">?</span>`;
      const cls = `chat-avatar ${size || ''}`;
      const photo = user.person?.photo_url;
      const seed = user.username || user.display_name || 'x';
      const color = avatarColor(seed);
      const online = user.id && isUserOnline(user.id);
      const wrapCls = `chat-avatar-wrap ${size || ''}${online ? ' online' : ''}`;
      const inner = photo
        ? `<span class="${cls}" style="background-image:url('${String(photo).replace(/'/g, "\\'")}');background-color:${color};"></span>`
        : `<span class="${cls}" style="background:${color};">${esc(initials(user))}</span>`;
      return `<span class="${wrapCls}" data-user-id="${user.id || ''}">${inner}<span class="online-dot"></span></span>`;
    }

    // вФАвФАвФА Presence вФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФАвФА
    const onlineUsers = new Set();
    function isUserOnline(uid) { return !!uid && onlineUsers.has(Number(uid)); }
    async function loadPresence() {
      try {
        const d = await fetch('/api/notifications/presence', { credentials: 'include', headers: auth() }).then(r => r.ok ? r.json() : null);
        if (!d) return;
        onlineUsers.clear();
        (d.online || []).forEach(id => onlineUsers.add(Number(id)));
        refreshPresenceInDom();
      } catch (_) {}
    }
    function refreshPresenceInDom() {
      document.querySelectorAll('.chat-avatar-wrap[data-user-id]').forEach(el => {
        const uid = Number(el.getAttribute('data-user-id'));
        if (!uid) return;
        el.classList.toggle('online', onlineUsers.has(uid));
      });
      updateHeaderPresence();
    }
    function updateHeaderPresence() {
      const el = document.querySelector('.chat-main-title .presence');
      if (!el) return;
      const other = channelOtherUser(state.active);
      if (!other || !state.active || state.active.type !== 'direct') {
        el.textContent = ''; el.className = 'presence'; return;
      }
      const on = isUserOnline(other.id);
      el.textContent = on ? 'online' : 'offline';
      el.className = 'presence ' + (on ? 'online' : 'offline');
    }

    function channelOtherUser(c) {
      if (!c || c.type !== 'direct') return null;
      const other = (c.members || []).find(m => m.user_id !== meId());
      return other?.user || null;
    }

    async function api(url, opts = {}) {
      const res = await fetch(url, {
        credentials: 'include',
        ...opts,
        headers: { ...auth(), ...(opts.headers || {}) },
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error || ('HTTP ' + res.status));
      }
      return res.json();
    }

    async function loadChannels() {
      await ensureMyId();
      state.channels = await api('/api/messages/channels');
      renderChannels();
    }

    async function loadMessages(id) {
      state.messages = await api('/api/messages/channels/' + id + '/messages?limit=100');
      state.active = state.channels.find(c => c.id === id);
      renderMessages();
      api('/api/messages/channels/' + id + '/read', { method: 'POST' }).catch(() => {});
      const ch = state.channels.find(c => c.id === id);
      if (ch) ch.unread = 0;
      renderChannels();
    }

    function renderChannels() {
      const el = document.getElementById('channels');
      const search = document.getElementById('search').value.toLowerCase().trim();
      const list = state.channels.filter(c => !search || channelName(c).toLowerCase().includes(search));

      if (list.length === 0) {
        el.innerHTML = '<div style="padding:40px 16px;text-align:center;color:var(--text2);font-size:12px;">≈љ√°dn√© konverzace.<br><br>Klikni na <strong>+ Nov√°</strong>.</div>';
        return;
      }

      el.innerHTML = list.map(c => {
        const name = channelName(c);
        const preview = c.last_message ? (c.last_message.content.length > 50 ? c.last_message.content.slice(0, 50) + 'вА¶' : c.last_message.content) : 'вАФ';
        const time = c.last_message_at ? fmtTime(c.last_message_at) : '';
        const other = channelOtherUser(c);
        const avatar = other
          ? avatarHtml(other)
          : `<span class="chat-avatar" style="background:#3b82f6">${channelIcon(c)}</span>`;
        return `
          <div class="chat-channel ${c.id === state.activeId ? 'active' : ''}" data-id="${esc(c.id)}">
            ${avatar}
            <div class="body">
              <div class="row">
                <span class="name">${esc(name)}</span>
                <span class="time">${esc(time)}</span>
              </div>
              <div class="row" style="margin-top:2px;">
                <span class="preview">${esc(preview)}</span>
                ${c.unread > 0 ? `<span class="unread-badge">${c.unread}</span>` : ''}
              </div>
            </div>
          </div>`;
      }).join('');

      el.querySelectorAll('.chat-channel').forEach(node => {
        node.addEventListener('click', () => {
          state.activeId = node.dataset.id;
          loadMessages(state.activeId);
        });
      });
    }

    function renderMessages() {
      const main = document.getElementById('main');
      if (!state.activeId) {
        main.innerHTML = `
          <div class="chat-empty">
            <div class="icon">рЯТђ</div>
            <h3>Vyber konverzaci</h3>
            <p>Ze seznamu vlevo nebo klikni na <strong>+ Nov√°</strong>.</p>
          </div>`;
        return;
      }

      const title = state.active ? channelName(state.active) : 'вА¶';
      const topic = state.active?.topic || '';
      const myId = meId();
      const other = channelOtherUser(state.active);
      const headerAvatar = other
        ? avatarHtml(other)
        : `<span class="chat-avatar" style="background:#3b82f6">${channelIcon(state.active || {})}</span>`;

      main.innerHTML = `
        <div class="chat-main-header">
          <div class="chat-main-title" style="display:flex;align-items:center;gap:12px;">
            ${headerAvatar}
            <div>
              <h2>${esc(title)}</h2>
              <div class="presence"></div>
              ${topic ? `<div class="topic">${esc(topic)}</div>` : ''}
            </div>
          </div>
        </div>
        <div class="chat-messages" id="msg-list"></div>
        <div class="chat-compose" style="position:relative;">
          <button class="chat-emoji-btn" id="btn-emoji" title="Vlo≈Њit smajl√≠ka">рЯШК</button>
          <textarea id="composer" placeholder="Napi≈° zpr√°vuвА¶ (Enter = odeslat, Shift+Enter = nov√љ ≈Щ√°dek)" rows="1"></textarea>
          <button class="send-btn" id="btn-send">Odeslat</button>
        </div>`;

      // Nejvy≈°≈°√≠ last_read_at protistran (pro вЬУвЬУ)
      const othersReadAt = (() => {
        const t = (state.active?.members || [])
          .filter(m => m.user_id !== myId && m.last_read_at)
          .map(m => new Date(m.last_read_at).getTime());
        return t.length ? Math.max(...t) : 0;
      })();

      const ml = document.getElementById('msg-list');
      ml.innerHTML = state.messages.map(m => {
        const mine = m.sender_type === 'user' && m.sender_id === myId;
        const cls = m.sender_type === 'system' ? 'system' : m.sender_type === 'ai' ? 'ai' : (mine ? 'mine' : 'other');
        const author = m.sender_type === 'user'
          ? (m.sender?.display_name || m.sender?.username || 'Nezn√°m√љ')
          : (m.sender_label || (m.sender_type === 'ai' ? 'Claude' : 'HolyOS'));
        let ticks = '';
        if (mine && !m._pending && !m._failed) {
          const sentAt = new Date(m.created_at).getTime();
          const isRead = othersReadAt >= sentAt;
          ticks = isRead
            ? '<span class="ticks read" title="P≈ЩeƒНteno">вЬУвЬУ</span>'
            : '<span class="ticks sent" title="Odesl√°no">вЬУ</span>';
        }
        return `
          <div class="chat-msg ${cls}">
            ${!mine && cls !== 'system' ? `<div class="author">${esc(author)}</div>` : ''}
            <div>${esc(m.content).replace(/\n/g, '<br>')}</div>
            <div class="time">${fmtTime(m.created_at)}${ticks}</div>
          </div>`;
      }).join('');
      ml.scrollTop = ml.scrollHeight;

      updateHeaderPresence();

      const ta = document.getElementById('composer');
      const sendBtn = document.getElementById('btn-send');

      const send = (useAi = false) => {
        const txt = ta.value.trim();
        if (!txt) return;
        ta.value = '';
        // Optimistic UI
        const tempId = 'temp_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
        const myIdVal = meId();
        const optimistic = {
          id: tempId,
          channel_id: state.activeId,
          sender_id: myIdVal,
          sender_type: 'user',
          content: txt,
          created_at: new Date().toISOString(),
          sender: { id: myIdVal, display_name: 'Vy', username: 'me' },
          _pending: true,
        };
        state.messages.push(optimistic);
        renderMessages();

        api('/api/messages/channels/' + state.activeId + '/messages', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ content: txt, ai: useAi }),
        }).then(real => {
          const idx = state.messages.findIndex(m => m.id === tempId);
          if (idx >= 0) {
            const exists = state.messages.some(m => m.id === real.id);
            if (exists) state.messages.splice(idx, 1);
            else state.messages[idx] = real;
            renderMessages();
          }
        }).catch(e => {
          const idx = state.messages.findIndex(m => m.id === tempId);
          if (idx >= 0) { state.messages[idx]._failed = true; renderMessages(); }
          alert('Chyba: ' + e.message);
        });
      };

      sendBtn.addEventListener('click', () => send(false));
      ta.addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(false); }
      });

      // Emoji picker
      const emojiBtn = document.getElementById('btn-emoji');
      const composeRow = emojiBtn.parentElement;
      let emojiPop = null;
      const closeEmojiPop = () => {
        if (emojiPop) { emojiPop.remove(); emojiPop = null; emojiBtn.classList.remove('active'); document.removeEventListener('click', onOutside); }
      };
      const onOutside = (e) => {
        if (emojiPop && !emojiPop.contains(e.target) && e.target !== emojiBtn) closeEmojiPop();
      };
      emojiBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (emojiPop) { closeEmojiPop(); return; }
        emojiPop = buildChatEmojiPopover(emoji => insertEmojiAtCursor(ta, emoji));
        composeRow.appendChild(emojiPop);
        emojiBtn.classList.add('active');
        setTimeout(() => document.addEventListener('click', onOutside), 0);
      });

      ta.focus();
    }

    // Modal pro novou konverzaci
    function openNewModal() {
      let tab = 'direct';
      const selectedUsers = new Set();
      let groupName = '';

      document.getElementById('modal-root').innerHTML = `
        <div class="chat-modal-overlay">
          <div class="chat-modal">
            <h3>Nov√° konverzace</h3>
            <div class="tabs">
              <button data-tab="direct" class="active">1:1 chat</button>
              <button data-tab="group">Skupina</button>
            </div>
            <div id="modal-body"></div>
            <div class="actions">
              <button class="secondary" id="btn-cancel">Zru≈°it</button>
              <button class="primary" id="btn-create">Vytvo≈Щit</button>
            </div>
          </div>
        </div>`;

      const overlay = document.querySelector('.chat-modal-overlay');
      overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

      document.querySelectorAll('.chat-modal .tabs button').forEach(b => {
        b.addEventListener('click', () => {
          document.querySelectorAll('.chat-modal .tabs button').forEach(x => x.classList.remove('active'));

          tab = b.dataset.tab;
          renderModalBody();

      document.getElementById('btn-cancel').addEventListener('click', closeModal);
      document.getElementById('btn-create').addEventListener('click', createChannel);

      async function renderModalBody() {
        const body = document.getElementById('modal-body');
        if (tab === 'direct') {
          body.innerHTML = `
            <input type="text" id="u-search" placeholder="Hledat u≈Њivatele...">
            <div class="user-list" id="u-list"></div>`;
          document.getElementById('u-search').addEventListener('input', refreshUsers);
          refreshUsers();
        } else {
          body.innerHTML = `
            <input type="text" id="g-name" placeholder="N√°zev skupiny" value="${esc(groupName)}">
            <input type="text" id="u-search" placeholder="Hledat u≈Њivatele...">
            <div class="user-list" id="u-list"></div>
            <div style="font-size:11px;color:var(--text2);margin-top:8px;">Vybran√љch: <span id="u-count">${selectedUsers.size}</span></div>`;
          document.getElementById('g-name').addEventListener('input', e => { groupName = e.target.value; });
          document.getElementById('u-search').addEventListener('input', refreshUsers);
          refreshUsers();
        }
      }

      async function refreshUsers() {
        const q = document.getElementById('u-search').value;
        const list = await api('/api/messages/users/searchable?q=' + encodeURIComponent(q));
        const ul = document.getElementById('u-list');
        ul.innerHTML = list.map(u => `
          <div class="user ${selectedUsers.has(u.id) ? 'selected' : ''}" data-id="${u.id}" style="display:flex;align-items:center;gap:10px;">
            ${avatarHtml(u, 'sm')}
            <span style="flex:1;">${esc(u.display_name || u.username)}</span>
            <span style="color:var(--text2);font-size:11px;">@${esc(u.username)}</span>
          </div>`).join('') || '<div style="padding:14px;text-align:center;color:var(--text2);font-size:12px;">Nic nenalezeno</div>';

        ul.querySelectorAll('.user').forEach(el => {
          el.addEventListener('click', async () => {
            const id = parseInt(el.dataset.id);
            if (tab === 'direct') {
              try {
                const ch = await api('/api/messages/channels/direct', {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ user_id: id }),
                });
                closeModal();
                await loadChannels();
                state.activeId = ch.id;
                loadMessages(ch.id);
              } catch (e) { alert('Chyba: ' + e.message); }
            } else {
              if (selectedUsers.has(id)) selectedUsers.delete(id); else selectedUsers.add(id);
              const cnt = document.getElementById('u-count');
              if (cnt) cnt.textContent = selectedUsers.size;
              el.classList.toggle('selected');
            }
          });
        });
      }

      async function createChannel() {
        if (tab === 'direct') {
          alert('Klikni na u≈Њivatele v seznamu pro vytvo≈Щen√≠ 1:1.');
          return;
        }
        if (!groupName.trim()) { alert('Zadej n√°zev skupiny'); return; }
        if (selectedUsers.size === 0) { alert('P≈Щidej alespo≈И jednoho ƒНlena'); return; }
        try {
          const ch = await api('/api/messages/channels/group', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: groupName.trim(), user_ids: [...selectedUsers] }),
          });
          closeModal();
          await loadChannels();
          state.activeId = ch.id;
          loadMessages(ch.id);
        } catch (e) { alert('Chyba: ' + e.message); }
      }

      renderModalBody();
    }

    function closeModal() {
      document.getElementById('modal-root').innerHTML = '';
    }

    // Init
    document.getElementById('btn-new').addEventListener('click', openNewModal);
    document.getElementById('search').addEventListener('input', renderChannels);

    loadChannels().then(() => {
      // URL param ?channel=... otev≈Щe konkr√©tn√≠ konverzaci
      const params = new URLSearchParams(window.location.search);
      const cid = params.get('channel');
      if (cid && state.channels.some(c => c.id === cid)) {
        state.activeId = cid;
        loadMessages(cid);
      }
    });

    // SSE live updaty
    (function setupSse() {
      function tryWire() {
        if (!window.HolyOSEvents) return setTimeout(tryWire, 200);
        window.HolyOSEvents.on('message', payload => {
          if (!payload) return;
          const { channel_id, message } = payload;
          if (channel_id === state.activeId) {
            // Dedup: backend publikuje SSE i odes√≠lateli a POST response u≈Њ zpr√°vu
            // vlo≈Њila. Pokud tam je stejn√© ID, ignoruj. Pokud ƒНek√° optimistick√°
            // se stejn√љm obsahem, nahraƒП ji.
            if (state.messages.some(m => m.id === message.id)) {
              return;
            }
            const pendingIdx = state.messages.findIndex(m =>
              m._pending && m.sender_id === message.sender_id && m.content === message.content
            );
            if (pendingIdx >= 0) {
              state.messages[pendingIdx] = message;
            } else {
              state.messages.push(message);
            }
            renderMessages();
            api('/api/messages/channels/' + channel_id + '/read', { method: 'POST' }).catch(() => {});
          } else {
            const ch = state.channels.find(c => c.id === channel_id);
            if (ch) {
              if (message.sender_id !== meId()) ch.unread = (ch.unread || 0) + 1;
              ch.last_message = message;
              ch.last_message_at = message.created_at;
              renderChannels();
            } else {
              loadChannels();
            }
          }
        });
        window.HolyOSEvents.on('channel_update', () => loadChannels());

        window.HolyOSEvents.on('presence', payload => {
          if (!payload || !payload.user_id) return;
          const uid = Number(payload.user_id);
          if (payload.online) onlineUsers.add(uid); else onlineUsers.delete(uid);
          refreshPresenceInDom();
        });

        window.HolyOSEvents.on('read', payload => {
          if (!payload || !payload.channel_id) return;
          const ch = state.channels.find(c => c.id === payload.channel_id);
          if (ch && Array.isArray(ch.members)) {
            const mm = ch.members.find(m => m.user_id === payload.reader_id);
            if (mm) mm.last_read_at = payload.last_read_at;
          }
          if (payload.channel_id === state.activeId) {
            renderMessages();
          }
        });
      }
      tryWire();
    })();

    // Prvotn√≠ naƒНten√≠ online u≈Њivatel≈ѓ
    loadPresence();
  </script>
