<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pracovní postup | HOLYOS</title>
  <link rel="icon" type="image/svg+xml" href="../../logo-holyos-icon.svg">
  <base href="../../">
  <link rel="stylesheet" href="css/dashboard.css">
  <link rel="stylesheet" href="modules/pracovni-postup/css/styles.css">
</head>
<body>
  <aside id="sidebar" class="sidebar"></aside>

  <div class="main-wrapper" style="display:flex;flex-direction:column;height:100vh;">

    <!-- Header s názvem výrobku -->
    <div class="detail-header">
      <a href="modules/pracovni-postup/index.html" class="back-btn" title="Zpět na seznam">←</a>
      <div class="detail-header-info">
        <h1 id="product-name">Načítám...</h1>
        <span class="detail-code" id="product-code"></span>
      </div>
      <div class="detail-header-right">
        <span class="status-dot disconnected" id="status-dot"></span>
        <span id="status-text">Načítám</span>
      </div>
    </div>

    <!-- Záložky -->
    <div class="tabs">
      <button class="tab active" data-tab="sestava" onclick="switchTab('sestava')">Sestava zboží</button>
      <button class="tab" data-tab="postup" onclick="switchTab('postup')">Pracovní postup</button>
      <button class="tab" data-tab="normovane" onclick="switchTab('normovane')">Normované</button>
      <button class="tab" data-tab="vizualizace" onclick="switchTab('vizualizace')">Vizualizace</button>
    </div>

    <!-- Tab content -->
    <div class="tab-content" id="tab-content">
      <div class="loading-state" id="loading">
        <div class="loading-spinner"></div>
        <p>Načítám data z Factorify...</p>
      </div>
    </div>

  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Skripty — pořadí je důležité -->
  <script src="js/sidebar.js"></script>
  <script src="modules/pracovni-postup/js/factorify-api.js"></script>
  <script src="modules/pracovni-postup/js/detail.js"></script>
  <script>renderSidebar('pracovni-postup');</script>
</body>
</html>
