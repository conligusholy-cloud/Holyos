    let _wizardSelected = []; // { type: 'op'|'mat', opId, opName, matId?, matCode?, matName?, matQty?, matUnit? }

    function cfgOpenWizard(optionId, optionName) {
      _wizardSelected = [];
      const ops = product.operations || [];
      const oName = optionName.replace(/'/g, "\\'");

      // Krok 1: Zobraz celý pracovní postup s materiály — zaškrtni dotčené
      const m = document.createElement('div');
      m.id = 'cfg-modal';
      m.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;';
      m.onclick = function(e) { if (e.target === m) m.remove(); };

      let html = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:800px;max-width:95vw;max-height:85vh;overflow-y:auto;">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
      html += '<h3 style="margin:0;">⚙️ Změny pro: <span style="color:#eab308;">' + esc(optionName) + '</span></h3>';
      html += '<span style="font-size:11px;background:rgba(139,92,246,0.15);color:#a78bfa;padding:3px 10px;border-radius:6px;">Krok 1 / 2</span>';
      html += '</div>';
      html += '<p style="font-size:12px;color:var(--text2);margin:4px 0 16px;">Zaškrtněte operace a materiály, které tato volba ovlivňuje. Pak klikněte "Pokračovat" pro definici změn.</p>';

      if (ops.length === 0) {
        html += '<div style="color:var(--text2);padding:20px;text-align:center;">Žádné operace v pracovním postupu.</div>';
      } else {
        for (const op of ops) {
          const mats = op.materials || [];
          const dur = op.duration || 0;
          const durUnit = op.duration_unit || 'MINUTE';
          const durStr = dur + ' ' + (durUnit === 'MINUTE' ? 'min' : durUnit === 'SECOND' ? 's' : 'h');
          const wsName = op.workstation ? op.workstation.name : '—';

          html += '<div style="border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;">';

          // Operace header — zaškrtávací
          html += '<label style="display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--bg);" onmouseover="this.style.background=\'rgba(139,92,246,0.06)\'" onmouseout="this.style.background=\'var(--bg)\'">';
          html += '<input type="checkbox" class="wiz-check" data-type="op" data-op-id="' + op.id + '" data-op-name="' + esc(op.name) + '" style="width:16px;height:16px;">';
          html += '<div style="flex:1;">';
          html += '<div style="font-weight:600;font-size:13px;">' + op.step_number + '. ' + esc(op.name) + '</div>';
          html += '<div style="font-size:11px;color:var(--text2);">🏭 ' + esc(wsName) + ' · ⏱ ' + durStr + ' · 👷 ' + op.workers_count + ' prac.</div>';
          html += '</div></label>';

          // Materiály pod operací
          if (mats.length > 0) {
            html += '<div style="padding:0 14px 8px;background:var(--surface);">';
            for (const om of mats) {
              const mat = om.material || {};
              html += '<label style="display:flex;align-items:center;gap:10px;padding:5px 0 5px 26px;cursor:pointer;font-size:12px;border-top:1px solid rgba(255,255,255,0.03);">';
              html += '<input type="checkbox" class="wiz-check" data-type="mat" data-op-id="' + op.id + '" data-op-name="' + esc(op.name) + '" data-mat-id="' + mat.id + '" data-mat-code="' + esc(mat.code || '') + '" data-mat-name="' + esc(mat.name || '') + '" data-mat-qty="' + om.quantity + '" data-mat-unit="' + esc(om.unit || 'ks') + '" style="width:14px;height:14px;">';
              html += '<span style="color:#3b82f6;font-family:monospace;">' + esc(mat.code || '') + '</span> ';
              html += '<span style="flex:1;">' + esc(mat.name || '') + '</span>';
              html += '<span style="color:var(--text2);">' + om.quantity + ' ' + esc(om.unit || 'ks') + '</span>';
              html += '</label>';
            }
            html += '</div>';
          }
          html += '</div>';
        }
      }

      html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;border-top:1px solid var(--border);padding-top:12px;">';

      m.innerHTML = html;
      document.body.appendChild(m);

    function cfgWizardStep2(optionId, optionName) {
      // Sesbírej zaškrtnuté položky
      _wizardSelected = [];
      document.querySelectorAll('.wiz-check:checked').forEach(chk => {
        _wizardSelected.push({
          type: chk.dataset.type,
          opId: parseInt(chk.dataset.opId),
          opName: chk.dataset.opName,
          matId: chk.dataset.matId ? parseInt(chk.dataset.matId) : null,
          matCode: chk.dataset.matCode || '',
          matName: chk.dataset.matName || '',
          matQty: chk.dataset.matQty || '',
          matUnit: chk.dataset.matUnit || 'ks',
        });
      });

      if (_wizardSelected.length === 0) {
        alert('Zaškrtněte alespoň jednu operaci nebo materiál.');
        return;
      }

      // Načti existující efekty pro tuto volbu
      let existingBom = [], existingOps = [];
      for (const g of _cfgGroups) {
        const o = g.options.find(x => x.id === optionId);
        if (o) { existingBom = o.bom_materials || []; existingOps = o.operation_effects || []; break; }
      }

      const modal = document.getElementById('cfg-modal');
      const matOpts = allMaterials.map(m => '<option value="' + m.id + '">' + m.code + ' — ' + m.name + '</option>').join('');
      const oName = optionName.replace(/'/g, "\\'");

      let html = '<div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;width:850px;max-width:95vw;max-height:85vh;overflow-y:auto;">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">';
      html += '<h3 style="margin:0;">⚙️ Definice změn: <span style="color:#eab308;">' + esc(optionName) + '</span></h3>';
      html += '<span style="font-size:11px;background:rgba(139,92,246,0.15);color:#a78bfa;padding:3px 10px;border-radius:6px;">Krok 2 / 2</span>';
      html += '</div>';
      html += '<p style="font-size:12px;color:var(--text2);margin:4px 0 16px;">Pro každou vybranou položku definujte, co se s ní stane při výběru volby "' + esc(optionName) + '".</p>';

      // Existující definované změny
      if (existingBom.length > 0 || existingOps.length > 0) {
        html += '<div style="background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;">';
        html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#eab308;">📌 Již definované změny</div>';
        existingOps.forEach(oe => {
          const actLbl = { add: '➕ Přidat', skip: '⏭️ Přeskočit', modify: '✏️ Upravit' };
          html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:2px 0;">';
          html += '<span>🏭 ' + (actLbl[oe.action] || oe.action) + ' operaci "' + esc(oe.operation.name) + '"' + (oe.modified_duration ? ' (' + oe.modified_duration + ' min)' : '') + '</span>';
          html += '<button class="btn" style="padding:2px 8px;font-size:10px;color:#ef4444;" onclick="cfgWizDelOp(' + oe.id + ',' + optionId + ',\'' + oName + '\')">✕</button></div>';
        });
        existingBom.forEach(bm => {
          html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:2px 0;">';
          html += '<span>📦 Materiál ' + esc(bm.material.code) + ' ' + esc(bm.material.name) + ' (' + bm.quantity + ' ' + bm.unit + ')</span>';
          html += '<button class="btn" style="padding:2px 8px;font-size:10px;color:#ef4444;" onclick="cfgWizDelBom(' + bm.id + ',' + optionId + ',\'' + oName + '\')">✕</button></div>';
        });
        html += '</div>';
      }

      // Tabulka nových změn
      html += '<table class="data-table" style="font-size:12px;"><thead><tr>';
      html += '<th>Položka</th><th style="width:140px;">Akce</th><th style="width:200px;">Detail</th>';
      html += '</tr></thead><tbody>';

      _wizardSelected.forEach((item, idx) => {
        if (item.type === 'op') {
          html += '<tr style="background:rgba(139,92,246,0.04);">';
          html += '<td><span style="color:#8b5cf6;">🏭</span> <strong>' + esc(item.opName) + '</strong></td>';
          html += '<td><select id="wiz-act-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;" onchange="wizToggleDetail(' + idx + ')">';
          html += '<option value="skip">⏭️ Přeskočit operaci</option>';
          html += '<option value="modify">✏️ Upravit dobu</option>';
          html += '<option value="add">➕ Přidat operaci</option>';
          html += '</select></td>';
          html += '<td><div id="wiz-det-' + idx + '"><span style="color:var(--text2);font-size:11px;">Operace bude přeskočena</span></div></td>';
          html += '</tr>';
        } else {
          html += '<tr>';
          html += '<td><span style="color:#3b82f6;">📦</span> <span style="font-family:monospace;font-size:11px;">' + esc(item.matCode) + '</span> ' + esc(item.matName) + ' <span style="color:var(--text2);">(' + item.matQty + ' ' + esc(item.matUnit) + ')</span></td>';
          html += '<td><select id="wiz-act-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;" onchange="wizToggleDetail(' + idx + ')">';
          html += '<option value="mat_swap">🔄 Záměna materiálu</option>';
          html += '<option value="mat_add">➕ Přidat materiál</option>';
          html += '<option value="mat_remove">🗑️ Odebrat materiál</option>';
          html += '<option value="mat_qty">📐 Změnit množství</option>';
          html += '</select></td>';
          html += '<td><div id="wiz-det-' + idx + '">';
          html += '<select id="wiz-swap-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;">' + matOpts + '</select>';
          html += '</div></td>';
          html += '</tr>';
        }
      });

      html += '</tbody></table>';

      html += '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px;border-top:1px solid var(--border);padding-top:12px;">';
      html += '<button class="btn" onclick="cfgOpenWizard(' + optionId + ',\'' + oName + '\')">← Zpět</button>';
      html += '<button class="btn" onclick="document.getElementById(\'cfg-modal\').remove()">Zrušit</button>';
      html += '<button class="btn" style="background:#10b981;color:white;border-color:#10b981;" onclick="cfgWizardSave(' + optionId + ',\'' + oName + '\')">✅ Uložit změny</button>';
      html += '</div></div>';

      modal.innerHTML = html;
    }

    function wizToggleDetail(idx) {
      const act = document.getElementById('wiz-act-' + idx).value;
      const det = document.getElementById('wiz-det-' + idx);
      const item = _wizardSelected[idx];
      const matOpts = allMaterials.map(m => '<option value="' + m.id + '">' + m.code + ' — ' + m.name + '</option>').join('');

      if (act === 'skip') {
        det.innerHTML = '<span style="color:var(--text2);font-size:11px;">Operace bude přeskočena</span>';
      } else if (act === 'modify') {
        det.innerHTML = '<div style="display:flex;gap:4px;align-items:center;"><input type="number" id="wiz-dur-' + idx + '" placeholder="min" style="width:70px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;"> min</div>';
      } else if (act === 'add') {
        det.innerHTML = '<span style="color:var(--text2);font-size:11px;">Operace bude přidána do postupu</span>';
      } else if (act === 'mat_swap') {
        det.innerHTML = '<select id="wiz-swap-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;">' + matOpts + '</select>';
      } else if (act === 'mat_add') {
        det.innerHTML = '<div style="display:flex;gap:4px;"><select id="wiz-swap-' + idx + '" style="flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;">' + matOpts + '</select><input type="number" id="wiz-qty-' + idx + '" value="1" min="0.001" step="0.001" style="width:60px;padding:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;"></div>';
      } else if (act === 'mat_remove') {
        det.innerHTML = '<span style="color:#ef4444;font-size:11px;">Materiál bude odebrán</span>';
      } else if (act === 'mat_qty') {
        det.innerHTML = '<div style="display:flex;gap:4px;align-items:center;"><input type="number" id="wiz-qty-' + idx + '" value="' + (item ? item.matQty : 1) + '" min="0.001" step="0.001" style="width:80px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;"> ' + (item ? esc(item.matUnit) : 'ks') + '</div>';
      }
    }

    async function cfgWizardSave(optionId, optionName) {
      let saved = 0;
      for (let idx = 0; idx < _wizardSelected.length; idx++) {
        const item = _wizardSelected[idx];
        const act = document.getElementById('wiz-act-' + idx)?.value;
        if (!act) continue;

        try {
          if (item.type === 'op') {
            // Operace: skip, modify, add
            const dur = document.getElementById('wiz-dur-' + idx)?.value || null;
            await api('/api/production/config-options/' + optionId + '/operations', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ operation_id: item.opId, action: act, modified_duration: dur }),
            });
            saved++;
          } else {
            // Materiál: mat_swap, mat_add, mat_remove, mat_qty
            if (act === 'mat_swap') {
              const newMatId = document.getElementById('wiz-swap-' + idx)?.value;
              if (newMatId) {
                // Přidej nový materiál jako náhradu
                await api('/api/production/config-options/' + optionId + '/materials', {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ material_id: parseInt(newMatId), quantity: parseFloat(item.matQty) || 1 }),
                });
                saved++;
              }
            } else if (act === 'mat_add') {
              const newMatId = document.getElementById('wiz-swap-' + idx)?.value;
              const qty = document.getElementById('wiz-qty-' + idx)?.value || 1;
              if (newMatId) {
                await api('/api/production/config-options/' + optionId + '/materials', {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ material_id: parseInt(newMatId), quantity: parseFloat(qty) }),
                });
                saved++;
              }
            } else if (act === 'mat_remove' || act === 'mat_qty') {
              // mat_remove: uložíme jako materiál s množstvím 0 (značka odebrání)
              // mat_qty: uložíme s novým množstvím
              const qty = act === 'mat_remove' ? 0 : (document.getElementById('wiz-qty-' + idx)?.value || 1);
              await api('/api/production/config-options/' + optionId + '/materials', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ material_id: item.matId, quantity: parseFloat(qty) }),
              });
              saved++;
            }
          }
        } catch(e) { console.error('Chyba ukládání:', e); }
      }

      document.getElementById('cfg-modal')?.remove();
      await renderKonfiguraceTab();
      toast('Uloženo ' + saved + ' změn pro "' + optionName + '"');
    }

    async function cfgWizDelOp(id, optionId, optionName) {
      await api('/api/production/config-option-operations/' + id, { method: 'DELETE' });
      document.getElementById('cfg-modal')?.remove();
      await renderKonfiguraceTab();
      cfgOpenWizard(optionId, optionName);
    }

    async function cfgWizDelBom(id, optionId, optionName) {
      await api('/api/production/config-option-materials/' + id, { method: 'DELETE' });
      document.getElementById('cfg-modal')?.remove();
      await renderKonfiguraceTab();
      cfgOpenWizard(optionId, optionName);
    }
  </script>
</body>
</html>
