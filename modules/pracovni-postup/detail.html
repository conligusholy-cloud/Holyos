    // =================================================================
    // TAB: Časový graf (Gantt) — operace seřazené v čase
    // Sekvenční layout: každá operace začíná tam, kde předchozí skončila.
    // Šířka baru = realMinutes (čas s pracovníky), reálné minuty počítá realMinutes().
    // =================================================================
    // Stav: zobrazovat sub-produkty (předmontáže/polotovary)?
    let _ganttShowSubs = true;
    window.toggleGanttSubs = function(checked) {
      _ganttShowSubs = !!checked;
      renderGanttTab();
    };

    // Pomocná: vrátí pole sub-produktů (z materiálů s linked_product mající operace)
    // ve formátu [{ subProduct, ops: [...sorted by step] }]
    function collectSubProducts(op) {
      const out = [];
      for (const m of (op.materials || [])) {
        const lp = m.linked_product;
        if (lp && Array.isArray(lp.operations) && lp.operations.length > 0) {
          out.push({
            subProduct: lp,
            material: m,
            ops: lp.operations.slice().sort((a, b) => (a.step_number || 0) - (b.step_number || 0)),
          });
        }
      }
      return out;
    }

    function renderGanttTab() {
      const content = document.getElementById('tab-content');
      const ops = (product.operations || []).slice().sort((a, b) => (a.step_number || 0) - (b.step_number || 0));

      if (ops.length === 0) {
        content.innerHTML = '<div class="empty-ops"><div class="icon">📊</div>' +
          '<p>Žádné operace k zobrazení</p>' +
          '<p style="font-size:12px;">Přidej operace v záložce „Pracovní postup"</p></div>';
        return;
      }

      // ── 1) Naplánuj rows: nejdřív hlavní ops, pak sub-produkty zarovnané na konec ──
      // mainCum = kumulativní čas hlavních operací (začíná na 0)
      // sub-produkt feeder končí přesně v okamžiku startu hlavní operace (musí být hotový)
      // Sub-produkty jednoho main opu běží "paralelně" — každý vlastní řádek, všechny končí
      // ve stejném okamžiku = main op start.
      const mainColorOf = (idx) => 'gantt-c' + (idx % 8);
      const subColorOf = (mainIdx, subIdx) => 'gantt-c' + ((mainIdx * 3 + subIdx + 5) % 8);

      const groups = [];  // [{ main: {op, idx, start, end}, subs: [{subProduct, op, start, end, mainIdx, subIdx}] }]
      let mainCum = 0;
      ops.forEach((op, mainIdx) => {
        const dur = realMinutes(op);
        const mainStart = mainCum;
        const mainEnd = mainCum + dur;
        const subs = [];
        if (_ganttShowSubs) {
          const subProds = collectSubProducts(op);
          subProds.forEach((sp, subIdx) => {
            const subTotal = sp.ops.reduce((s, o) => s + realMinutes(o), 0);
            // Tento sub-produkt končí v mainStart, jeho operace běží v sérii zpětně
            let subCum = mainStart - subTotal;
            sp.ops.forEach(subOp => {
              const sd = realMinutes(subOp);
              subs.push({
                subProduct: sp.subProduct,
                op: subOp,
                start: subCum,
                end: subCum + sd,
                mainIdx,
                subIdx,
              });
              subCum += sd;
            });
          });
        }
        groups.push({ main: { op, idx: mainIdx, start: mainStart, end: mainEnd }, subs });
        mainCum = mainEnd;
      });

      // Posun timeline tak, aby všechny starts >= 0
      const allStarts = groups.flatMap(g => [g.main.start, ...g.subs.map(s => s.start)]);
      const minStart = Math.min(0, ...allStarts);
      if (minStart < 0) {
        const shift = -minStart;
        groups.forEach(g => {
          g.main.start += shift; g.main.end += shift;
          g.subs.forEach(s => { s.start += shift; s.end += shift; });
        });
      }
      const totalEnd = Math.max(...groups.map(g => g.main.end), 0);

      // ── 2) Souhrnný panel ──
      const totalReal = ops.reduce((s, o) => s + realMinutes(o), 0);
      const totalNorm = ops.reduce((s, o) => s + normMinutes(o), 0);
      const totalPrep = ops.reduce((s, o) => s + (o.preparation_time || 0), 0);
      const takt = product.takt_time;
      const subOpCount = groups.reduce((s, g) => s + g.subs.length, 0);
      const subProdCount = new Set(groups.flatMap(g => g.subs.map(s => s.subProduct.id))).size;

      let html = '<div class="gantt-wrapper">';

      html += '<label class="gantt-toggle">' +
        '<input type="checkbox" ' + (_ganttShowSubs ? 'checked' : '') + ' onchange="toggleGanttSubs(this.checked)">' +
        '<span>Zobrazit i předmontáže / polotovary (jejich výroba musí skončit, než se spustí daná operace)</span>' +
        '</label>';

      html += '<div class="gantt-summary">' +
        '<div class="gantt-summary-item"><div class="label">Operací</div><div class="value">' + ops.length + (subOpCount ? ' + ' + subOpCount + ' sub' : '') + '</div></div>' +
        '<div class="gantt-summary-item"><div class="label">Celkem (s polotovary)</div><div class="value">' + formatDuration(totalEnd) + '</div></div>' +
        '<div class="gantt-summary-item"><div class="label">Hl. operace (reálně)</div><div class="value">' + formatDuration(totalReal) + '</div></div>' +
        '<div class="gantt-summary-item"><div class="label">Norma (1 os.)</div><div class="value">' + formatDuration(totalNorm) + '</div></div>' +
        (totalPrep > 0 ? '<div class="gantt-summary-item"><div class="label">Příprava</div><div class="value">' + totalPrep + ' min</div></div>' : '') +
        (subProdCount > 0 ? '<div class="gantt-summary-item"><div class="label">Polotovarů</div><div class="value">' + subProdCount + '</div></div>' : '') +
        (takt ? '<div class="gantt-summary-item"><div class="label">Linkový takt</div><div class="value">' + takt + ' min</div></div>' : '') +
        '</div>';

      // ── 3) Časová osa ──
      const safeTotal = totalEnd > 0 ? totalEnd : 1;
      const tickStep = safeTotal > 600 ? 60 : (safeTotal > 120 ? 30 : (safeTotal > 30 ? 10 : 5));
      const tickCount = Math.floor(safeTotal / tickStep) + 1;
      html += '<div class="gantt-row header">' +
        '<div></div>' +
        '<div class="gantt-axis-track">';
      for (let i = 0; i <= tickCount; i++) {
        const minAt = i * tickStep;
        if (minAt > safeTotal) break;
        const pct = (minAt / safeTotal) * 100;
        const label = minAt >= 60
          ? (Math.floor(minAt / 60) + 'h' + (minAt % 60 ? ' ' + (minAt % 60) + 'm' : ''))
          : (minAt + 'm');
        html += '<div class="gantt-tick" style="left:' + pct + '%;">' +
          '<span class="gantt-tick-label">' + label + '</span>' +
          '</div>';
      }
      html += '</div></div>';

      // ── 4) Řádky: pro každou skupinu nejprve sub-produkty, pak hlavní op ──
      groups.forEach((g, gIdx) => {
        if (gIdx > 0 && (g.subs.length > 0 || groups[gIdx - 1].subs.length > 0)) {
          html += '<div class="gantt-main-divider"></div>';
        }

        // Sub rows nejdřív (běží před main)
        g.subs.forEach((s) => {
          const startPct = (s.start / safeTotal) * 100;
          const widthPct = ((s.end - s.start) / safeTotal) * 100;
          const sd = s.end - s.start;
          const tooltip = s.subProduct.code + ' / ' + s.op.name + ' — ' + formatDuration(sd) +
            ' • běží ' + formatDuration(s.start) + ' → ' + formatDuration(s.end) +
            ' (musí skončit než začne hl. op ' + g.main.op.step_number + ')';
          html += '<div class="gantt-row sub-row">' +
            '<div class="gantt-label">' +
              '<span class="sub-prefix">' + esc(s.subProduct.code) + '</span>' +
              esc(s.op.name) +
            '</div>' +
            '<div class="gantt-track">' +
              '<div class="gantt-bar ' + subColorOf(s.mainIdx, s.subIdx) + '" ' +
                   'style="left:' + startPct + '%;width:' + widthPct + '%;" ' +
                   'title="' + esc(tooltip) + '">' +
                (widthPct > 4 ? formatDuration(sd) : '') +
              '</div>' +
            '</div>' +
            '</div>';
        });

        // Main op
        const m = g.main;
        const dur = m.end - m.start;
        const startPct = (m.start / safeTotal) * 100;
        const widthPct = (dur / safeTotal) * 100;
        const wsName = m.op.workstation ? m.op.workstation.name : '';
        const overTakt = takt && dur > takt;
        const tooltip = m.op.name + ' — ' + formatDuration(dur) +
          (wsName ? ' • ' + wsName : '') +
          ' • ' + formatDuration(m.start) + ' → ' + formatDuration(m.end);

        html += '<div class="gantt-row">' +
          '<div class="gantt-label">' +
            '<span class="step">' + (m.op.step_number || (m.idx + 1)) + '</span>' +
            esc(m.op.name) +
            (wsName ? ' <span class="ws">(' + esc(wsName) + ')</span>' : '') +
          '</div>' +
          '<div class="gantt-track">' +
            '<div class="gantt-bar ' + mainColorOf(m.idx) + (overTakt ? ' over-takt' : '') + '" ' +
                 'style="left:' + startPct + '%;width:' + widthPct + '%;" ' +
                 'title="' + esc(tooltip) + '">' +
              (widthPct > 4 ? formatDuration(dur) : '') +
            '</div>' +
          '</div>' +
          '</div>';
      });

      html += '</div>'; // .gantt-wrapper
      content.innerHTML = html;
    }

                    if (oe.action === 'add') { icon = '➕'; color = '#10b981'; label = 'Přidat operaci'; }
                    else if (oe.action === 'skip') { icon = '⏭️'; color = '#ef4444'; label = 'Přeskočit'; }
                    else if (oe.action === 'modify') { icon = '✏️'; color = '#f59e0b'; label = 'Upravit'; }

                    html += '<span>"' + esc(oe.operation.name) + '"</span>';
                    if (oe.modified_duration) html += '<span style="color:var(--text2);">(' + oe.modified_duration + ' min)</span>';
                    if (oe.note) html += '<span style="color:var(--text2);">— ' + esc(oe.note) + '</span>';
                    html += '</div>';
                  });
                }

                html += '</div>';
              } else if (!isDefault) {
                html += '<div style="margin-top:6px;font-size:11px;color:var(--text2);font-style:italic;">Žádné změny — klikněte "Definovat změny"</div>';
              }

              html += '</div>';
            }
          } else {
            html += '<div style="color:var(--text2);font-size:12px;padding:8px;">Žádné volby — přidejte možnosti výběru.</div>';
          }
          html += '</div>';
        }
      }
      html += '</div>';
      content.innerHTML = html;
    }

    let _wizardSelected = []; // { type: 'op'|'mat', opId, opName, matId?, matCode?, matName?, matQty?, matUnit? }

        const o = g.options.find(x => x.id === optionId);
        if (o) { existingBom = o.bom_materials || []; existingOps = o.operation_effects || []; break; }

      const modal = document.getElementById('cfg-modal');

      html += '<span style="font-size:11px;background:rgba(139,92,246,0.15);color:#a78bfa;padding:3px 10px;border-radius:6px;">Krok 2 / 2</span>';
      html += '</div>';
      html += '<p style="font-size:12px;color:var(--text2);margin:4px 0 16px;">Pro každou vybranou položku definujte, co se s ní stane při výběru volby "' + esc(optionName) + '".</p>';

        html += '<div style="background:rgba(234,179,8,0.06);border:1px solid rgba(234,179,8,0.2);border-radius:8px;padding:10px 14px;margin-bottom:12px;">';
        html += '<div style="font-size:12px;font-weight:600;margin-bottom:6px;color:#eab308;">📌 Již definované změny</div>';

          html += '<button class="btn" style="padding:2px 8px;font-size:10px;color:#ef4444;" onclick="cfgWizDelOp(' + oe.id + ',' + optionId + ',\'' + oName + '\')">✕</button></div>';
        });
        existingBom.forEach(bm => {
          html += '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:2px 0;">';
          html += '<span>📦 Materiál ' + esc(bm.material.code) + ' ' + esc(bm.material.name) + ' (' + bm.quantity + ' ' + bm.unit + ')</span>';
          html += '<button class="btn" style="padding:2px 8px;font-size:10px;color:#ef4444;" onclick="cfgWizDelBom(' + bm.id + ',' + optionId + ',\'' + oName + '\')">✕</button></div>';

      html += '<table class="data-table" style="font-size:12px;"><thead><tr>';

          html += '<td><span style="color:#8b5cf6;">🏭</span> <strong>' + esc(item.opName) + '</strong></td>';
          html += '<td><select id="wiz-act-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;" onchange="wizToggleDetail(' + idx + ')">';
          html += '<option value="skip">⏭️ Přeskočit operaci</option>';
          html += '<option value="modify">✏️ Upravit dobu</option>';
          html += '<option value="add">➕ Přidat operaci</option>';
          html += '</select></td>';
          html += '<td><div id="wiz-det-' + idx + '"><span style="color:var(--text2);font-size:11px;">Operace bude přeskočena</span></div></td>';
          html += '</tr>';
        } else {
          html += '<tr>';
          html += '<td><span style="color:#3b82f6;">📦</span> <span style="font-family:monospace;font-size:11px;">' + esc(item.matCode) + '</span> ' + esc(item.matName) + ' <span style="color:var(--text2);">(' + item.matQty + ' ' + esc(item.matUnit) + ')</span></td>';
          html += '<td><select id="wiz-act-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;" onchange="wizToggleDetail(' + idx + ')">';

          html += '<td><div id="wiz-det-' + idx + '">';
          html += '<select id="wiz-swap-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;">' + matOpts + '</select>';

    function wizToggleDetail(idx) {
      const act = document.getElementById('wiz-act-' + idx).value;
      const det = document.getElementById('wiz-det-' + idx);
      const item = _wizardSelected[idx];
      const matOpts = allMaterials.map(m => '<option value="' + m.id + '">' + m.code + ' — ' + m.name + '</option>').join('');

      if (act === 'skip') {
        det.innerHTML = '<span style="color:var(--text2);font-size:11px;">Operace bude přeskočena</span>';
      } else if (act === 'modify') {
        det.innerHTML = '<div style="display:flex;gap:4px;align-items:center;"><input type="number" id="wiz-dur-' + idx + '" placeholder="min" style="width:70px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;"> min</div>';
      } else if (act === 'add') {
        det.innerHTML = '<span style="color:var(--text2);font-size:11px;">Operace bude přidána do postupu</span>';
      } else if (act === 'mat_swap') {
        det.innerHTML = '<select id="wiz-swap-' + idx + '" style="width:100%;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;">' + matOpts + '</select>';
      } else if (act === 'mat_add') {
        det.innerHTML = '<div style="display:flex;gap:4px;"><select id="wiz-swap-' + idx + '" style="flex:1;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;">' + matOpts + '</select><input type="number" id="wiz-qty-' + idx + '" value="1" min="0.001" step="0.001" style="width:60px;padding:4px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:11px;"></div>';
      } else if (act === 'mat_remove') {
        det.innerHTML = '<span style="color:#ef4444;font-size:11px;">Materiál bude odebrán</span>';
      } else if (act === 'mat_qty') {
        det.innerHTML = '<div style="display:flex;gap:4px;align-items:center;"><input type="number" id="wiz-qty-' + idx + '" value="' + (item ? item.matQty : 1) + '" min="0.001" step="0.001" style="width:80px;padding:4px 8px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:12px;"> ' + (item ? esc(item.matUnit) : 'ks') + '</div>';
      }
    }

    async function cfgWizardSave(optionId, optionName) {
      let saved = 0;
      for (let idx = 0; idx < _wizardSelected.length; idx++) {
        const item = _wizardSelected[idx];
        const act = document.getElementById('wiz-act-' + idx)?.value;
        if (!act) continue;

        try {
          if (item.type === 'op') {
            // Operace: skip, modify, add
            const dur = document.getElementById('wiz-dur-' + idx)?.value || null;
            await api('/api/production/config-options/' + optionId + '/operations', {
              method: 'POST', headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ operation_id: item.opId, action: act, modified_duration: dur }),
            });
            saved++;
          } else {
            // Materiál: mat_swap, mat_add, mat_remove, mat_qty
            if (act === 'mat_swap') {
              const newMatId = document.getElementById('wiz-swap-' + idx)?.value;
              if (newMatId) {
                // Přidej nový materiál jako náhradu
                await api('/api/production/config-options/' + optionId + '/materials', {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ material_id: parseInt(newMatId), quantity: parseFloat(item.matQty) || 1 }),
                });
                saved++;
              }
            } else if (act === 'mat_add') {
              const newMatId = document.getElementById('wiz-swap-' + idx)?.value;
              const qty = document.getElementById('wiz-qty-' + idx)?.value || 1;
              if (newMatId) {
                await api('/api/production/config-options/' + optionId + '/materials', {
                  method: 'POST', headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify({ material_id: parseInt(newMatId), quantity: parseFloat(qty) }),
                });
                saved++;
              }
            } else if (act === 'mat_remove' || act === 'mat_qty') {
              // mat_remove: uložíme jako materiál s množstvím 0 (značka odebrání)
              // mat_qty: uložíme s novým množstvím
              const qty = act === 'mat_remove' ? 0 : (document.getElementById('wiz-qty-' + idx)?.value || 1);
              await api('/api/production/config-options/' + optionId + '/materials', {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ material_id: item.matId, quantity: parseFloat(qty) }),
              });
              saved++;
            }
          }
        } catch(e) { console.error('Chyba ukládání:', e); }
      }

      document.getElementById('cfg-modal')?.remove();
      await renderKonfiguraceTab();
      toast('Uloženo ' + saved + ' změn pro "' + optionName + '"');
    }

    async function cfgWizDelOp(id, optionId, optionName) {
      await api('/api/production/config-option-operations/' + id, { method: 'DELETE' });
      document.getElementById('cfg-modal')?.remove();
      await renderKonfiguraceTab();
      cfgOpenWizard(optionId, optionName);
    }

      'urove': 'level',
      'id zbozi': 'factorify_item_id',
      'zbozi': 'name',
      'mnozstvi': 'quantity',
      'jednotka': 'unit',
      'typ': 'item_type',
      'klicova slova': 'keywords',
      'stav': 'status',
      'fotografie': 'photo',
      'nehlidat dostupnost': 'ignore_stock',
      'pouzito v operacich': 'used_in_operations',
      'pouzito na pracovistich': 'used_at_workstations',
      'nakupovatelne': 'is_purchasable',
      'ma pracovni postup': 'has_workflow',
      'vykres': 'drawing',
      'vykres je navrh': 'drawing_is_draft',
      'definovano v': 'defined_in',
      'pozice': 'position',
    };

    function fyStripDiacritics(s) {
      return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '');
    }
    function fyNormHeader(h) {
      return fyStripDiacritics(h).trim().toLowerCase().replace(/\s+/g, ' ');
    }
    function fyToBool(v) {
      if (typeof v === 'boolean') return v;
      const s = String(v || '').trim().toLowerCase();
      return s === 'true' || s === 'ano' || s === '1' || s === 'yes';
    }
    function fyExtractCode(name) {
      const m = String(name || '').trim().match(/^(\S+)/);
      return m ? m[1].toUpperCase() : null;
    }

    // Set kodu vsech materialu v pracovnim postupu (rekurzivne pres polotovary).
    // Najde vsechny FY import operace v podstromu Productu (rekurzivne pres polotovary).
    // Vraci array { product: lp, operation: subOp } pro kazdou nalezenou operaci.
    function wfFindFyImportInSubtree(rootProduct, visited) {
      if (!rootProduct) return [];
      visited = visited || new Set();
      const result = [];
      function walk(p, depth) {
        if (!p || depth > 30) return;
        for (const op of (p.operations || [])) {
          for (const om of (op.materials || [])) {
            const lp = om.linked_product;
            if (!lp) continue;
            if (lp.id != null && visited.has(lp.id)) continue;
            if (lp.id != null) visited.add(lp.id);
            // Najdi FY import operace v tomto polotovaru
            for (const subOp of (lp.operations || [])) {
              if (/^FY import/i.test(subOp.name || '')) {
                result.push({ product: lp, operation: subOp });
              }
            }
            // Rekurze do hloubky
            walk(lp, depth + 1);
          }
        }
      }
      walk(rootProduct, 0);
      return result;
    }

    function fyBuildWorkflowCodeSet(rootProduct) {
      const codes = new Set();
      const visitedProducts = new Set();
      function walk(p, depth) {
        if (!p || depth > 30) return;
        const pid = p.id;
        if (pid != null) {
          if (visitedProducts.has(pid)) return;
          visitedProducts.add(pid);
        }
        if (depth > 0 && p.code) codes.add(String(p.code).toUpperCase());
        const ops = p.operations || [];
        for (const op of ops) {
          const mats = op.materials || [];
          for (const om of mats) {
            const mat = om.material;
            if (mat && mat.code) codes.add(String(mat.code).toUpperCase());
            if (om && om.linked_product) walk(om.linked_product, depth + 1);
          }
        }
      }
      walk(rootProduct, 0);
      return codes;
    }

    // Map<code(uppercase), { qty, unit }> — agregovany rekurzivni rozpad pres polotovary.
    // Pro porovnani s FY exportem (kontrola mnozstvi).
    function fyBuildWorkflowQtyMap(rootProduct) {
      const map = new Map();
      const visited = new Set();
      function walk(p, multiplier, depth) {
        if (!p || depth > 30) return;
        if (p.id != null) {
          if (visited.has(p.id)) return;
          visited.add(p.id);
        }
        // Pridej i sam polotovar (kdyby ho FY mel jako uroven 1.x)
        if (depth > 0 && p.code) {
          const k = String(p.code).toUpperCase();
          const cur = map.get(k);
          map.set(k, { qty: (cur ? cur.qty : 0) + multiplier, unit: cur ? cur.unit : 'ks' });
        }
        for (const op of (p.operations || [])) {
          for (const om of (op.materials || [])) {
            const mat = om.material;
            if (!mat || !mat.code) continue;
            const qty = parseFloat(om.quantity || 0) * multiplier;
            const unit = om.unit || mat.unit || 'ks';
            const lp = om.linked_product;
            const lpHasOps = lp && Array.isArray(lp.operations) && lp.operations.length > 0;

            const k = String(mat.code).toUpperCase();
            const cur = map.get(k);
            map.set(k, { qty: (cur ? cur.qty : 0) + qty, unit: cur ? cur.unit : unit });

            if (lpHasOps) walk(lp, qty, depth + 1);
          }
        }
      }
      walk(rootProduct, 1, 0);
      return map;
    }

    // === Workflow tree helpers (sdilene mezi Souhrn materialu a FY tabem) ===

    function wfIsCompositeType(type) {
      const t = String(type || '').toLowerCase();
      return t.includes('semi') || t.includes('polotovar') || t.includes('product') || t.includes('výrobek') || t.includes('vyrobek');
    }

    // Mapuje raw type z DB (semi_product, product, material, ...) na cesky text
    function wfTypeLabel(rawType) {
      const t = String(rawType || '').toLowerCase();
      if (t.includes('semi') || t.includes('polotovar')) return 'Polotovar';
      if (t.includes('product') || t.includes('výrobek') || t.includes('vyrobek')) return 'Výrobek';
      if (t.includes('material') || t.includes('materi')) return 'Materiál';
      return rawType || '';
    }

    function wfMakeRow(o, hasChildren, flags) {
      flags = flags || {};
      const qtyStr = o.qty != null && o.qty !== '' ? Number(o.qty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 }) : '';
      const unit = o.unit || '';
      const qtyCell = qtyStr ? (qtyStr + (unit ? ' ' + esc(unit) : '')) : '';
      let html = '';
      html += '<span class="wf-matid" title="Material.id (shoduje se se sloupcem ID v Nákup a sklad → Zboží)">' + (o.matId != null ? o.matId : '') + '</span>';
      html += '<span class="wf-code" title="' + esc(o.code || '') + '">' + esc(o.code || '') + '</span>';
      html += '<span class="wf-name">' + esc(o.name || '') + '</span>';
      html += '<span class="wf-qty">' + qtyCell + '</span>';
      // typ + pripadne broken indikator (s diagnostikou)
      const typeLabel = wfTypeLabel(o.type);
      let typeCell = '<span class="wf-type" data-t="' + esc(typeLabel) + '">' + esc(typeLabel) + '</span>';
      if (flags.broken) {
        const diag = (flags.matId != null ? 'mat.id=' + flags.matId : '')
          + (flags.lpId != null ? ' lp_id=' + flags.lpId : ' lp_id=null')
          + (flags.lpHasOps != null ? ' ops=' + flags.lpHasOps : '');
        typeCell = '<span style="display:flex;align-items:center;gap:4px;flex-wrap:wrap;">'
          + '<span class="wf-type" data-t="' + esc(typeLabel) + '">' + esc(typeLabel) + '</span>'
          + '<span title="Tento polotovar nemá v HolyOSu zadaný pracovní postup (žádné operace), nelze ho proto dál rozpadnout. Diagnostika: ' + esc(diag.trim()) + '" style="display:inline-block;background:rgba(239,68,68,0.15);color:#ef4444;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;cursor:help;">⚠ chybí postup</span>'
          + '</span>';
      } else if (flags.cycle) {
        typeCell += ' <span style="color:#eab308;font-size:10px;" title="Polotovar by se zacyklil — odkazuje na sám sebe. Strom dál nepokračuje.">↻ cyklus</span>';
      }
      html += typeCell;
      html += '<span class="wf-op" title="' + esc(o.op || '') + '">' + esc(o.op || '') + '</span>';
      html += '<span class="wf-ws" title="' + esc(o.ws || '') + '">' + esc(o.ws || '') + '</span>';
      return html;
    }

    // Vraci { html, broken, total }
    function wfRenderNode(material, omat, op, depth, visited) {
      if (!material) return { html: '', broken: 0, total: 0 };
      // POZOR: backend ukládá linked_product na OperationMaterial wrapper (omat), ne na Material.
      // Fallback na material.linked_product pro případ, že by někdo volal funkci jinak.
      const lp = (omat && omat.linked_product) || material.linked_product;
      const linkedId = lp ? lp.id : null;
      const lpHasOps = lp && Array.isArray(lp.operations) ? lp.operations.length : 0;
      const isCycle = linkedId != null && visited.has(linkedId);
      const hasChildren = !!lp && lpHasOps > 0 && !isCycle && depth < 30;
      const isComposite = wfIsCompositeType(material.type);
      // broken = polotovar typ ALE bud nema linked_product, nebo ma s prazdnym operations[]
      const isBroken = isComposite && (!lp || lpHasOps === 0) && !isCycle;

      const rowData = {
        matId: material.id,
        code: material.code,
        name: material.name,
        qty: omat ? omat.quantity : null,
        unit: (omat && omat.unit) || material.unit,
        type: material.type,
        op: op ? op.name : '',
        ws: op && op.workstation ? op.workstation.name : '',
      };

      let broken = isBroken ? 1 : 0;
      let total = isComposite ? 1 : 0;

      const diagFlags = {
        broken: isBroken,
        cycle: isCycle,
        matId: material.id,
        lpId: linkedId,
        lpHasOps: lpHasOps,
      };

      if (hasChildren) {
        const newVisited = new Set(visited);
        newVisited.add(linkedId);
        let childrenHtml = '';
        for (const sop of (lp.operations || [])) {
          for (const som of (sop.materials || [])) {
            if (!som.material) continue;
            const sub = wfRenderNode(som.material, som, sop, depth + 1, newVisited);
            childrenHtml += sub.html;
            broken += sub.broken;
            total += sub.total;
          }
        }
        if (!childrenHtml) {
          return { html: '<div class="wf-leaf"><span></span>' + wfMakeRow(rowData, false, diagFlags) + '</div>', broken: broken, total: total };
        }
        return {
          html: '<details open><summary>' + wfMakeRow(rowData, true, { broken: false }) + '</summary>'
              + '<div class="wf-children">' + childrenHtml + '</div></details>',
          broken: broken, total: total,
        };
      } else {
        return {
          html: '<div class="wf-leaf"><span></span>' + wfMakeRow(rowData, false, diagFlags) + '</div>',
          broken: broken, total: total,
        };
      }
    }

    // Najdi v allProductsList vsechny Product kandidaty, kteri by mohli byt
    // linked_product pro dany material (rozne strategy match)
    function wfFindProductCandidates(material, products) {
      if (!material || !Array.isArray(products)) return [];
      const code = String(material.code || '').toLowerCase();
      const name = String(material.name || '').toLowerCase();
      const stripCode = (s) => s.replace(/-[a-z0-9]{1,3}$/, '');
      const matStripped = stripCode(code);

      const out = [];
      for (const p of products) {
        const pCode = String(p.code || '').toLowerCase();
        const pName = String(p.name || '').toLowerCase();
        const pStripped = stripCode(pCode);
        const reasons = [];

        if (p.material_id === material.id) reasons.push('material_id matches');
        if (pCode && pCode === code) reasons.push('exact code');
        if (pName && pName === name) reasons.push('exact name');
        if (pStripped && pCode && pStripped !== pCode && pStripped === code) reasons.push('Product[' + p.code + '] → strip → matches Material[' + material.code + ']');
        if (matStripped && code && matStripped !== code && matStripped === pCode) reasons.push('Material[' + material.code + '] → strip → matches Product[' + p.code + ']');
        if (pCode && code && pCode !== code && pCode.includes(code)) reasons.push('Product code contains Material code');
        if (code && pCode && pCode !== code && code.includes(pCode)) reasons.push('Material code contains Product code');
        if (pName && name && pName !== name && (pName.includes(name) || name.includes(pName))) reasons.push('name partial match');

        if (reasons.length > 0) out.push({ product: p, reasons: reasons });
      }
      return out;
    }

    function wfRenderTree(rootProduct, opts) {
      opts = opts || {};
      if (!rootProduct) return '<div class="empty-ops"><p>Produkt nenacten.</p></div>';

      // DIAGNOSTIKA - vyhodit do F12 console stav linked_product + kandidaty z allProductsList
      try {
        console.groupCollapsed('[wfRenderTree] Diagnostika postupu', rootProduct.code, '-', rootProduct.name);
        console.log('Celkem Products v allProductsList:', (typeof allProductsList !== 'undefined' && Array.isArray(allProductsList)) ? allProductsList.length : 'N/A');
        const ops0 = rootProduct.operations || [];
        for (const op0 of ops0) {
          for (const om0 of (op0.materials || [])) {
            const m0 = om0.material;
            if (!m0) continue;
            const lp0 = m0.linked_product;
            const lpOps0 = lp0 && Array.isArray(lp0.operations) ? lp0.operations.length : 0;
            const isComp0 = wfIsCompositeType(m0.type);
            console.log(
              '[' + op0.name + '] ' + (m0.code || '?') + ' "' + (m0.name || '') + '"',
              '| type=' + (m0.type || '?'),
              '| composite=' + isComp0,
              '| linked_product=' + (lp0 ? '{id:' + lp0.id + ', code:' + lp0.code + ', ops:' + lpOps0 + '}' : 'NULL'),
              '| material.id=' + m0.id
            );
            // Pro polotovary bez linked_product zkus najit kandidaty
            if (isComp0 && !lp0 && typeof allProductsList !== 'undefined' && Array.isArray(allProductsList)) {
              const candidates = wfFindProductCandidates(m0, allProductsList);
              if (candidates.length > 0) {
                for (const cand of candidates) {
                  console.log('   ↳ kandidát: Product#' + cand.product.id, '"' + cand.product.code + '"', '"' + cand.product.name + '"', '— důvody:', cand.reasons.join(', '));
                }
              } else {
                console.warn('   ↳ ⚠️ ŽÁDNÝ kandidát v allProductsList — Product pro tento polotovar v DB neexistuje (musíš ho vytvořit)');
              }
            }
          }
        }
        console.groupEnd();
      } catch (e) { console.error('[wfRenderTree] Diag error:', e); }

      const visited = new Set();
      if (rootProduct.id != null) visited.add(rootProduct.id);

      let childrenHtml = '';
      let totalBroken = 0;
      let totalPolotovary = 0;
      const ops = rootProduct.operations || [];
      for (const op of ops) {
        for (const om of (op.materials || [])) {
          if (!om.material) continue;
          const sub = wfRenderNode(om.material, om, op, 1, visited);
          childrenHtml += sub.html;
          totalBroken += sub.broken;
          totalPolotovary += sub.total;
        }
      }

      const rootRow = wfMakeRow({
        matId: rootProduct.material_id || null,
        code: rootProduct.code,
        name: rootProduct.name,
        qty: 1,
        unit: 'ks',
        type: 'Výrobek',
        op: '',
        ws: '',
      }, !!childrenHtml);

      const wfCodes = fyBuildWorkflowCodeSet(rootProduct);

      let html = '<div class="wf-tree-container">';
      // Toolbar
      html += '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;flex-wrap:wrap;">';
      html += '<div style="font-size:12px;color:var(--text2);">🌳 Strom postupu — celkem <b style="color:var(--text);">' + wfCodes.size + '</b> unikátních kódů (vč. polotovarů)</div>';
      html += '<div style="display:flex;gap:6px;flex-wrap:wrap;">';
      html += '<button class="btn" onclick="wfRefreshFromServer(this)" title="Re-fetch produktu z /api/production/products/:id (cache-bust). Po změně dat na backendu (např. po --apply) obnoví strom" style="font-size:11px;padding:4px 10px;background:rgba(34,197,94,0.1);border-color:rgba(34,197,94,0.4);color:#22c55e;">🔄 Obnovit ze serveru</button>';
      html += '<button class="btn" onclick="wfTreeExpandAll(this)" title="Rozbalí všechny větve" style="font-size:11px;padding:4px 10px;">▼ Rozbalit vše</button>';
      html += '<button class="btn" onclick="wfTreeCollapseAll(this)" title="Sbalí všechny větve" style="font-size:11px;padding:4px 10px;">▶ Sbalit vše</button>';
      html += '</div>';
      html += '</div>';

      // Varovani o broken polotovarech
      if (totalBroken > 0) {
        html += '<div style="display:flex;gap:12px;align-items:flex-start;padding:10px 14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.35);border-radius:8px;margin:4px 0 10px;font-size:12px;">';
        html += '<span style="font-size:16px;line-height:1;">⚠️</span>';
        html += '<div>U <b style="color:#ef4444;">' + totalBroken + ' z ' + totalPolotovary + ' polotovarů</b> chybí pracovní postup. ';
        html += 'Tyto polotovary nemají v HolyOSu zadané operace, nelze je tedy dál rozpadnout. ';
        html += 'Polotovary označené <span style="color:#ef4444;font-weight:600;">⚠ chybí postup</span> ve stromě potřebují doplnit operace v záložce Pracovní postup, nebo vytvořit chybějící Product záznam.';
        html += '</div></div>';
      }

      // Sticky header
      html += '<div class="wf-tree-header"><span></span><span>ID</span><span>Kód</span><span>Název</span><span>Množství</span><span>Typ</span><span>Operace</span><span>Pracoviště</span></div>';
      // Root + children
      if (childrenHtml) {
        html += '<details open><summary>' + rootRow + '</summary><div class="wf-children">' + childrenHtml + '</div></details>';
      } else {
        html += '<div class="wf-leaf"><span></span>' + rootRow + '</div>';
      }
      html += '</div>';
      return html;
    }

    function wfTreeExpandAll(btn) {
      const root = btn.closest('.wf-tree-container') || document;
      root.querySelectorAll('details').forEach(d => d.open = true);
    }
    function wfTreeCollapseAll(btn) {
      const root = btn.closest('.wf-tree-container') || document;
      root.querySelectorAll('details').forEach((d, i) => { if (i > 0) d.open = false; });
    }

    // Re-fetch produktu ze serveru s cache-bust query, prepise globalni `product` a re-rendruje strom.
    // Pouziti: po `--apply` v scriptu, kdy chceme videt aktualni linked_product bez nutnosti hard refresh
    async function wfRefreshFromServer(btn) {
      if (!product || !product.id) return;
      const origText = btn ? btn.textContent : '';
      if (btn) { btn.textContent = '⏳ Načítám...'; btn.disabled = true; }
      try {
        const fresh = await api('/api/production/products/' + product.id + '?_t=' + Date.now());
        // Zachovaj odkaz, prepis fields (aby ostatni reference jako allMaterials zustaly funkcni)
        for (const k of Object.keys(product)) delete product[k];
        Object.assign(product, fresh);
        toast('Data obnovena ze serveru');
        // Re-render aktualne otevreneho tabu
        if (typeof renderTab === 'function') renderTab();
        else if (typeof renderMaterialSummary === 'function') renderMaterialSummary();
      } catch (err) {
        console.error('[wfRefreshFromServer] Chyba:', err);
        toast('Chyba při refresh: ' + err.message);
      } finally {
        if (btn) { btn.disabled = false; }
      }
    }

        content.innerHTML = '<div class="empty-ops"><p>Produkt nenacten.</p></div>';

        _fyBom = null;

      html += '<div><h3 style="margin:0;font-size:16px;">📥 Sestava zboží — export z Factorify</h3>';
      html += '<p style="font-size:12px;color:var(--text2);margin:4px 0 0;max-width:560px;">Referenční snímek. Naimportuj soubor <code>.xlsx</code> z Factorify (Sestava zboží). Nový import přepíše předchozí.</p></div>';
      html += '<div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">';
      html += '<input type="file" id="fy-file-input" accept=".xlsx,.xls" style="display:none;" onchange="fyHandleFile(this.files[0])">';
      const importLabel = _fyBom ? 'Nahrát novou sestavu z Factorify' : 'Nahrát sestavu z Factorify (.xlsx)';
      const importTitle = _fyBom
        ? 'Vyber .xlsx soubor exportovaný z Factorify (Sestava zboží). Stávající naimportovaná sestava bude přepsána.'
        : 'Vyber .xlsx soubor exportovaný z Factorify (Sestava zboží). Uloží se jako referenční snímek pro tento výrobek.';
      html += '<button class="btn btn-primary" onclick="document.getElementById(\'fy-file-input\').click()" title="' + esc(importTitle) + '">📤 ' + esc(importLabel) + '</button>';
      if (_fyBom) {
        html += '<button class="btn" onclick="fyDelete()" title="Odstraní naimportovanou Factorify sestavu z tohoto výrobku. Pracovní postup se tím nezmění." style="color:#ef4444;border-color:rgba(239,68,68,0.4);">🗑️ Smazat naimportovanou sestavu</button>';
      }
      html += '</div>';
      html += '</div>';

      // Drop zona
      html += '<div id="fy-drop-zone" ondragover="fyDragOver(event)" ondragleave="fyDragLeave(event)" ondrop="fyDrop(event)" ';
      html += 'style="border:2px dashed var(--border);border-radius:10px;padding:20px;text-align:center;color:var(--text2);font-size:13px;margin-bottom:16px;transition:all 0.2s;cursor:pointer;" ';
      html += 'onclick="document.getElementById(\'fy-file-input\').click()" title="Klikni nebo přetáhni .xlsx soubor">';
      html += '⬇️ Přetáhni sem <code>.xlsx</code> z Factorify nebo klikni pro výběr souboru';
      html += '</div>';

      // Strom HolyOS postupu - kolapsibilni sekce nad importem (vzdy viditelna, i bez FY snapshotu)
      html += '<details style="margin-bottom:16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;">';
      html += '<summary style="cursor:pointer;padding:12px 16px;font-size:13px;font-weight:600;list-style:none;display:flex;align-items:center;gap:8px;" title="Pracovní postup HolyOS — rozpad přes polotovary, pro porovnání s Factorify exportem">🌳 Pracovní postup HolyOS <span style="color:var(--text2);font-weight:400;font-size:12px;">(klikni pro rozbalení stromu)</span></summary>';
      html += '<div style="padding:0 16px 16px;">' + wfRenderTree(product) + '</div>';
      html += '</details>';

      if (!_fyBom) {
        html += '<div class="empty-ops" style="padding:40px;"><p style="font-size:36px;opacity:0.4;">📦</p><h3>Žádná sestava zatím není naimportována</h3><p>V Factorify otevři <em>Sestava zboží</em> pro tento výrobek a stáhni <code>.xlsx</code>.</p></div>';
      } else {
        const items = _fyBom.items || [];
        const importedAt = new Date(_fyBom.imported_at).toLocaleString('cs-CZ');
        const author = _fyBom.imported_by ? esc(_fyBom.imported_by) : '—';
        const fname = _fyBom.source_filename ? esc(_fyBom.source_filename) : '—';

        // Diff vuci pracovnimu postupu — kontrola kodu i mnozstvi
        const wfQtyMap = fyBuildWorkflowQtyMap(product);
        let missingCount = 0;
        let mismatchCount = 0;
        for (const it of items) {
          const lvl = String(it.level || '').replace(/\s+/g,'').trim();
          if (lvl === '1') continue;
          const code = fyExtractCode(it.name);
          if (!code) continue;
          const wfEntry = wfQtyMap.get(code);
          if (!wfEntry) {
            missingCount++;
          } else if (it.quantity != null && wfEntry.qty != null && !fyQtyMatch(it.quantity, wfEntry.qty)) {
            mismatchCount++;
          }
        }
        const totalNonRoot = items.length - (items.some(it => String(it.level || '').replace(/\s+/g,'').trim() === '1') ? 1 : 0);
        const presentCount = totalNonRoot - missingCount - mismatchCount;

        // Meta info
        html += '<div style="display:flex;gap:24px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:12px;font-size:12px;color:var(--text2);flex-wrap:wrap;">';
        html += '<div><b style="color:var(--text);">' + items.length + '</b> položek</div>';
        html += '<div>📅 Naimportováno: <b style="color:var(--text);">' + importedAt + '</b></div>';
        html += '<div>👤 Autor: <b style="color:var(--text);">' + author + '</b></div>';
        html += '<div>📄 Zdroj: <b style="color:var(--text);">' + fname + '</b></div>';
        html += '</div>';

        // Diff banner
        if (missingCount > 0 || mismatchCount > 0) {
          const bg = missingCount > 0 ? 'rgba(239,68,68,0.1)' : 'rgba(234,179,8,0.1)';
          const border = missingCount > 0 ? 'rgba(239,68,68,0.4)' : 'rgba(234,179,8,0.4)';
          html += '<div style="display:flex;justify-content:space-between;align-items:center;gap:16px;padding:12px 16px;background:' + bg + ';border:1px solid ' + border + ';border-radius:8px;margin-bottom:12px;font-size:13px;flex-wrap:wrap;">';
          html += '<div>';
          if (missingCount > 0) html += '❌ <b style="color:#ef4444;">' + missingCount + '</b> chybí v postupu';
          if (missingCount > 0 && mismatchCount > 0) html += ' &nbsp;·&nbsp; ';
          if (mismatchCount > 0) html += '⚠️ <b style="color:#eab308;">' + mismatchCount + '</b> jiné množství';
          html += ' &nbsp;·&nbsp; <span style="color:var(--text2);">✅ ' + presentCount + ' sedí</span>';
          html += '</div>';
          html += '<button class="btn" onclick="fyToggleOnlyMissing()" id="fy-toggle-missing" title="Filtruje tabulku jen na problémové položky (chybí nebo jiné množství)" style="font-size:12px;padding:5px 12px;">' + (_fyOnlyMissing ? '👁️ Zobrazit vše' : '🔎 Jen problémové') + '</button>';
          html += '</div>';
        } else {
          html += '<div style="padding:12px 16px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.4);border-radius:8px;margin-bottom:12px;font-size:13px;">';
          html += '✅ Všech ' + items.length + ' položek z exportu sedí s pracovním postupem (kód i množství).';
          html += '</div>';
        }

        // Toggle Strom / Tabulka
        const treeBtnCls = _fyViewMode === 'tree' ? 'btn-primary' : 'btn';
        const tableBtnCls = _fyViewMode === 'table' ? 'btn-primary' : 'btn';
        html += '<div style="display:flex;gap:6px;margin-bottom:8px;align-items:center;flex-wrap:wrap;">';
        html += '<button class="btn ' + treeBtnCls + '" onclick="setFyViewMode(\'tree\')" title="Hierarchický strom podle úrovní z Factorify (1, 1.1, 1.1.1, ...)" style="font-size:12px;padding:5px 12px;">🌳 Strom (jako Factorify)</button>';
        html += '<button class="btn ' + tableBtnCls + '" onclick="setFyViewMode(\'table\')" title="Plochá tabulka — všechny položky pod sebou bez hierarchie" style="font-size:12px;padding:5px 12px;">📋 Plochá tabulka</button>';
        html += '<input type="text" id="fy-filter" placeholder="🔍 Hledat v sestavě (název, ID, operace)..." oninput="fyApplyFilter()" style="flex:1;min-width:200px;max-width:400px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;">';
        html += '</div>';

        if (_fyViewMode === 'tree') {
          // Hierarchicky strom podle FY urovni
          html += '<div id="fy-view-container">' + fyRenderTreeView(items, wfQtyMap, _fyOnlyMissing) + '</div>';
        } else {
          // Plocha tabulka
          html += '<div id="fy-view-container" style="overflow-x:auto;border:1px solid var(--border);border-radius:8px;background:var(--surface);">';
          html += '<table class="data-table fy-table" style="width:100%;font-size:12px;border-collapse:collapse;">';
          html += '<thead><tr style="background:var(--surface2);">';
          html += '<th style="padding:8px 10px;text-align:left;width:60px;">Úroveň</th>';
          html += '<th style="padding:8px 10px;text-align:left;width:80px;">ID</th>';
          html += '<th style="padding:8px 10px;text-align:left;">Zboží</th>';
          html += '<th style="padding:8px 10px;text-align:right;width:80px;">Množství</th>';
          html += '<th style="padding:8px 10px;text-align:left;width:60px;">Jed.</th>';
          html += '<th style="padding:8px 10px;text-align:left;width:90px;">Typ</th>';
          html += '<th style="padding:8px 10px;text-align:center;width:80px;" title="Je tato položka v pracovním postupu (přímo nebo přes polotovar)?">V postupu</th>';
          html += '<th style="padding:8px 10px;text-align:left;">Použito v operacích</th>';
          html += '<th style="padding:8px 10px;text-align:left;width:90px;">Definováno</th>';
          html += '</tr></thead><tbody id="fy-tbody">';
          html += fyRenderRows(items, wfQtyMap, _fyOnlyMissing);
          html += '</tbody></table>';
          html += '</div>';
        }
      }

      html += '</div>';
      content.innerHTML = html;
    }

    // Parse FY level string (napr. "1. 1", "1.10", "1.76.70.20.1.1") na pole cisel
    function fyParseLevel(s) {
      if (!s) return [];
      const parts = String(s).split(/[\s.]+/).filter(p => p.length > 0);
      return parts.map(p => parseInt(p, 10)).filter(n => !Number.isNaN(n));
    }

    // Postavi tree z FY items podle level path
    function fyBuildTree(items) {
      const enriched = items.map(it => ({
        item: it,
        path: fyParseLevel(it.level),
        children: [],
      }));
      const byPath = new Map();
      for (const node of enriched) {
        byPath.set(JSON.stringify(node.path), node);
      }
      const roots = [];
      for (const node of enriched) {
        if (node.path.length === 0) {
          roots.push(node);
        } else if (node.path.length === 1) {
          roots.push(node);
        } else {
          const parentKey = JSON.stringify(node.path.slice(0, -1));
          const parent = byPath.get(parentKey);
          if (parent) parent.children.push(node);
          else roots.push(node); // orphan → root
        }
      }
      return roots;
    }

    // Render single FY tree node (rekurzivne s details)
    function fyRenderTreeNode(node, qtyMap, onlyMissing) {
      const it = node.item;
      const code = fyExtractCode(it.name);
      const isLevel1 = node.path.length <= 1;
      const wfEntry = code ? qtyMap.get(code) : null;
      const codeMatch = isLevel1 ? true : !!wfEntry;
      const fyQty = it.quantity != null ? Number(it.quantity) : null;
      const wfQty = wfEntry ? wfEntry.qty : null;
      let qtyMatch = true;
      let qtyDiffNote = '';
      if (codeMatch && !isLevel1 && wfEntry && fyQty != null) {
        qtyMatch = fyQtyMatch(fyQty, wfQty);
        if (!qtyMatch) {
          qtyDiffNote = 'FY: ' + Number(fyQty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 })
            + ' ' + (it.unit || '')
            + ' / Postup: ' + Number(wfQty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 })
            + ' ' + (wfEntry.unit || '');
        }
      }
      const missing = !codeMatch;
      const mismatch = codeMatch && !qtyMatch && !isLevel1;

      // Skryj kdyz onlyMissing zapnute a tento node ani jeho potomci nejsou problemove
      if (onlyMissing) {
        // rekurzivne zjisti jestli ma node nebo nejaky potomek problem
        function hasIssue(n) {
          if (n === node ? (missing || mismatch) : false) return true;
          const c = n.item;
          const cCode = fyExtractCode(c.name);
          const cIsRoot = n.path.length <= 1;
          const cEntry = cCode ? qtyMap.get(cCode) : null;
          const cMatch = cIsRoot ? true : !!cEntry;
          if (!cMatch) return true;
          if (cMatch && !cIsRoot && cEntry && c.quantity != null && !fyQtyMatch(c.quantity, cEntry.qty)) return true;
          for (const ch of n.children) if (hasIssue(ch)) return true;
          return false;
        }
        if (!hasIssue(node)) return '';
      }

      const typeLabel = wfTypeLabel(it.item_type);
      const qtyDisplay = it.quantity != null ? Number(it.quantity).toLocaleString('cs-CZ', { maximumFractionDigits: 4 }) : '';
      const rowClass = missing ? 'fy-row-missing' : (mismatch ? 'fy-row-mismatch' : '');
      let statCell = '';
      if (isLevel1) statCell = '<span class="fy-stat" style="color:var(--text2);font-size:10px;" title="Sám výrobek">—</span>';
      else if (mismatch) statCell = '<span class="fy-stat" style="color:#eab308;cursor:help;" title="Jiné množství. ' + esc(qtyDiffNote) + '">⚠️</span>';
      else if (codeMatch) statCell = '<span class="fy-stat" style="color:#10b981;" title="Kód v postupu' + (wfEntry ? ', množství: ' + Number(wfQty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 }) + ' ' + (wfEntry.unit || '') : '') + '">✅</span>';
      else statCell = '<span class="fy-stat" style="color:#ef4444;" title="Kód není v postupu">❌</span>';

      // Akce: u polotovaru/výrobku s dětmi tlačítko 📥 Import kusovníku
      const isComposite = (typeLabel === 'Polotovar' || typeLabel === 'Výrobek');
      const hasChildren = node.children && node.children.length > 0;
      let actionCell = '<span></span>';
      if (isComposite && hasChildren && !isLevel1) {
        const lvlEsc = String(it.level || '').replace(/'/g, '&#39;');
        const nameEsc = esc(it.name).replace(/'/g, '&#39;');
        actionCell = '<button class="btn fy-import-btn" onclick="event.stopPropagation();fyImportChildrenToWorkflow(\'' + lvlEsc + '\',\'' + nameEsc + '\',' + node.children.length + ')" title="Vytvoří v Pracovním postupu novou operaci FY import a doplní do ní ' + node.children.length + ' chybějících materiálů z FY kusovníku (s množstvím). Polotovar BS-X-XXXX dostane svůj postup, pokud ještě neexistuje." style="font-size:10px;padding:3px 8px;background:rgba(16,185,129,0.1);border:1px solid rgba(16,185,129,0.4);color:#10b981;border-radius:4px;cursor:pointer;">📥 Doplnit do postupu</button>';
      }

      function makeCells() {
        return '<span class="fy-level">' + esc(it.level || '') + '</span>'
          + '<span class="fy-fid">' + (it.factorify_item_id || '') + '</span>'
          + '<span class="fy-code">' + esc(code || '') + '</span>'
          + '<span class="fy-name">' + esc(it.name || '') + '</span>'
          + '<span class="fy-qty' + (mismatch ? '" style="color:#eab308;font-weight:600;"' : '"') + '>' + qtyDisplay + '</span>'
          + '<span class="fy-unit">' + esc(it.unit || '') + '</span>'
          + '<span class="fy-type" data-t="' + esc(typeLabel) + '">' + esc(typeLabel) + '</span>'
          + statCell
          + '<span class="fy-op" title="' + esc(it.used_in_operations || '') + '">' + esc(it.used_in_operations || '') + '</span>'
          + actionCell;
      }

      if (node.children && node.children.length > 0) {
        const childrenHtml = node.children.map(c => fyRenderTreeNode(c, qtyMap, onlyMissing)).join('');
        return '<details open><summary class="' + rowClass + '">' + makeCells() + '</summary>'
          + '<div class="fy-tree-children">' + childrenHtml + '</div></details>';
      }
      return '<div class="fy-tree-leaf ' + rowClass + '"><span></span>' + makeCells() + '</div>';
    }

    function fyRenderTreeView(items, qtyMap, onlyMissing) {
      const roots = fyBuildTree(items);
      const headerHtml = '<div class="fy-tree-header"><span></span><span>Úroveň</span><span>FY ID</span><span>Kód</span><span>Název</span><span>Množství</span><span>Jed.</span><span>Typ</span><span>V postupu</span><span>Použito v op.</span><span>Akce</span></div>';
      const body = roots.map(r => fyRenderTreeNode(r, qtyMap, onlyMissing)).join('');
      return '<div class="fy-tree-container">' + headerHtml + body + '</div>';
    }

    // Tolerance pri porovnani mnozstvi (FY vs postup) - 1 promile + min 0.001
    function fyQtyMatch(a, b) {
      if (a == null && b == null) return true;
      if (a == null || b == null) return false;
      const diff = Math.abs(Number(a) - Number(b));
      const tol = Math.max(0.001, Math.abs(Number(a)) * 0.001);
      return diff <= tol;
    }

    function fyRenderRows(items, wfQtyMap, onlyMissing) {
      if (!items || items.length === 0) {
        return '<tr><td colspan="9" style="padding:20px;text-align:center;color:var(--text2);">Žádné položky</td></tr>';
      }
      const qtyMap = (wfQtyMap instanceof Map) ? wfQtyMap : new Map();
      let out = '';
      let visible = 0;
      for (const it of items) {
        const code = fyExtractCode(it.name);
        const isLevel1 = String(it.level || '').replace(/\s+/g,'').trim() === '1';
        const wfEntry = code ? qtyMap.get(code) : null;
        const codeMatch = isLevel1 ? true : !!wfEntry;
        // Mnozstvi: FY hlasi quantity vzhledem k 1 ks rodicovskeho polotovaru.
        // Pro top-level (uroven 1.X primo pod vyrobkem) se to porovnava s wfEntry.qty.
        // Pro hlubsi urovne by to bylo komplikovanejsi (parent-relative); zatim porovname
        // jen kdyz je jednoznacny case (kod sedi a obe maji qty).
        const fyQty = it.quantity != null ? Number(it.quantity) : null;
        const wfQty = wfEntry ? wfEntry.qty : null;
        let qtyMatch = true;
        let qtyDiffNote = '';
        if (codeMatch && !isLevel1 && wfEntry && fyQty != null) {
          qtyMatch = fyQtyMatch(fyQty, wfQty);
          if (!qtyMatch) {
            qtyDiffNote = 'FY: ' + Number(fyQty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 })
              + ' ' + (it.unit || '')
              + ' / Postup: ' + Number(wfQty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 })
              + ' ' + (wfEntry.unit || '')
              + ' (rozdíl ' + (fyQty > wfQty ? '+' : '') + Number(fyQty - wfQty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 }) + ')';
          }
        }
        const missing = !codeMatch;
        const mismatch = codeMatch && !qtyMatch && !isLevel1;

        if (onlyMissing && !missing && !mismatch) continue;
        visible++;

        const typeLabel = wfTypeLabel(it.item_type);
        const typeColor = typeLabel === 'Výrobek' ? '#3b82f6' : (typeLabel === 'Polotovar' ? '#a855f7' : (typeLabel === 'Materiál' ? '#10b981' : 'var(--text2)'));
        const qtyDisplay = it.quantity != null ? Number(it.quantity).toLocaleString('cs-CZ', { maximumFractionDigits: 4 }) : '';
        let rowStyle = 'border-top:1px solid var(--border);';
        if (missing) rowStyle += 'background:rgba(239,68,68,0.08);box-shadow:inset 3px 0 0 #ef4444;';
        else if (mismatch) rowStyle += 'background:rgba(234,179,8,0.08);box-shadow:inset 3px 0 0 #eab308;';
        out += '<tr style="' + rowStyle + '">';
        out += '<td style="padding:6px 10px;color:var(--text2);font-family:monospace;">' + esc(it.level || '') + '</td>';
        out += '<td style="padding:6px 10px;color:var(--text2);font-family:monospace;">' + (it.factorify_item_id || '') + '</td>';
        out += '<td style="padding:6px 10px;">' + esc(it.name) + '</td>';
        out += '<td style="padding:6px 10px;text-align:right;font-variant-numeric:tabular-nums;' + (mismatch ? 'color:#eab308;font-weight:600;' : '') + '">' + qtyDisplay + '</td>';
        out += '<td style="padding:6px 10px;color:var(--text2);">' + esc(it.unit || '') + '</td>';
        out += '<td style="padding:6px 10px;color:' + typeColor + ';font-weight:600;">' + esc(typeLabel) + '</td>';
        if (isLevel1) {
          out += '<td style="padding:6px 10px;text-align:center;color:var(--text2);font-size:11px;" title="Toto je samotný výrobek">—</td>';
        } else if (mismatch) {
          out += '<td style="padding:6px 10px;text-align:center;color:#eab308;font-weight:700;cursor:help;" title="Kód ' + esc(code || '') + ' je v postupu, ale s jiným množstvím. ' + esc(qtyDiffNote) + '">⚠️</td>';
        } else if (codeMatch) {
          out += '<td style="padding:6px 10px;text-align:center;color:#10b981;font-weight:700;" title="Kód ' + esc(code || '') + ' je v pracovním postupu' + (wfEntry ? ' (množství: ' + Number(wfQty).toLocaleString('cs-CZ', { maximumFractionDigits: 4 }) + ' ' + (wfEntry.unit || '') + ')' : '') + '">✅</td>';
        } else {
          out += '<td style="padding:6px 10px;text-align:center;color:#ef4444;font-weight:700;" title="Kód ' + esc(code || '') + ' není v pracovním postupu">❌</td>';
        }
        out += '<td style="padding:6px 10px;color:var(--text2);font-size:11px;">' + esc(it.used_in_operations || '') + '</td>';
        out += '<td style="padding:6px 10px;color:var(--text2);font-size:11px;">' + esc(it.defined_in || '') + '</td>';
        out += '</tr>';
      }
      if (visible === 0) {
        return '<tr><td colspan="9" style="padding:20px;text-align:center;color:var(--text2);">Filtru neodpovídá žádná položka</td></tr>';
      }
      return out;
    }

    function fyToggleOnlyMissing() {
      _fyOnlyMissing = !_fyOnlyMissing;
      fyApplyFilter();
      const btn = document.getElementById('fy-toggle-missing');
      if (btn) btn.textContent = _fyOnlyMissing ? '👁️ Zobrazit vše' : '🔎 Jen problémové';
    }

    function fyApplyFilter() {
      if (!_fyBom) return;
      const filterEl = document.getElementById('fy-filter');
      const q = filterEl ? (filterEl.value || '').trim().toLowerCase() : '';
      const items = (_fyBom.items || []).filter(it => {
        if (!q) return true;
        const hay = [it.name, it.factorify_item_id, it.used_in_operations, it.item_type, it.level].join(' ').toLowerCase();
        return hay.includes(q);
      });
      const wfQtyMap = fyBuildWorkflowQtyMap(product);
      const container = document.getElementById('fy-view-container');
      if (!container) return;
      if (_fyViewMode === 'tree') {
        // Re-render strom
        container.innerHTML = fyRenderTreeView(items, wfQtyMap, _fyOnlyMissing).replace(/^<div class="fy-tree-container">|<\/div>$/g, '');
        // Vlastne lepsi: nahrad cely
        container.outerHTML = '<div id="fy-view-container">' + fyRenderTreeView(items, wfQtyMap, _fyOnlyMissing) + '</div>';
      } else {
        const tbody = document.getElementById('fy-tbody');
        if (tbody) tbody.innerHTML = fyRenderRows(items, wfQtyMap, _fyOnlyMissing);
      }
    }

    function fyDragOver(ev) {
      ev.preventDefault();
      const z = document.getElementById('fy-drop-zone');
      if (z) { z.style.borderColor = 'var(--accent)'; z.style.background = 'rgba(59,130,246,0.05)'; }
    }
    function fyDragLeave(ev) {
      ev.preventDefault();
      const z = document.getElementById('fy-drop-zone');
      if (z) { z.style.borderColor = 'var(--border)'; z.style.background = ''; }
    }
    function fyDrop(ev) {
      ev.preventDefault();
      fyDragLeave(ev);
      const f = ev.dataTransfer && ev.dataTransfer.files ? ev.dataTransfer.files[0] : null;
      if (f) fyHandleFile(f);
    }

    async function fyHandleFile(file) {
      if (!file) return;
      if (!/\.(xlsx|xls)$/i.test(file.name)) {
        toast('Vyber soubor .xlsx nebo .xls');
        return;
      }
      if (typeof XLSX === 'undefined') {
        toast('Knihovna SheetJS se nenacetla - zkontroluj internet');
        return;
      }

      try {
        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        if (!ws) { toast('Soubor neobsahuje zadne listy'); return; }

        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });
        if (rows.length < 2) { toast('Soubor je prazdny'); return; }

        const headers = rows[0].map(h => fyNormHeader(h));
        const colIdx = {};
        headers.forEach((h, i) => {
          const key = FY_HEADER_MAP[h];
          if (key && !(key in colIdx)) colIdx[key] = i;
        });

        if (!('name' in colIdx)) {
          toast('Sloupec "Zbozi" nebyl nalezen - zkontroluj export');
          return;
        }

        const items = [];
for (let r = 1; r < rows.length; r++) {
          const row = rows[r];
          if (!row || row.every(v => v == null || v === '')) continue;
          const get = k => colIdx[k] != null ? row[colIdx[k]] : null;
          const name = get('name');
          if (!name || String(name).trim() === '') continue;

          items.push({
            level: get('level') != null ? String(get('level')) : null,
            factorify_item_id: get('factorify_item_id') != null && get('factorify_item_id') !== '' ? Number(get('factorify_item_id')) : null,
            name: String(name),
            quantity: get('quantity') != null && get('quantity') !== '' ? Number(get('quantity')) : null,
            unit: get('unit') != null ? String(get('unit')) : null,
            item_type: get('item_type') != null ? String(get('item_type')) : null,
            keywords: get('keywords') != null ? String(get('keywords')) : null,
            status: get('status') != null ? String(get('status')) : null,
            photo: get('photo') != null ? String(get('photo')) : null,
            ignore_stock: fyToBool(get('ignore_stock')),
            used_in_operations: get('used_in_operations') != null ? String(get('used_in_operations')) : null,
            used_at_workstations: get('used_at_workstations') != null ? String(get('used_at_workstations')) : null,
            is_purchasable: fyToBool(get('is_purchasable')),
            has_workflow: fyToBool(get('has_workflow')),
            drawing: get('drawing') != null ? String(get('drawing')) : null,
            drawing_is_draft: fyToBool(get('drawing_is_draft')),
            defined_in: get('defined_in') != null ? String(get('defined_in')) : null,
            position: get('position') != null ? String(get('position')) : null,
          });
        }

        if (items.length === 0) { toast('Sestava neobsahuje zadne polozky'); return; }

const topRow = items.find(it => String(it.level || '').replace(/\s+/g,'').trim() === '1') || items[0];
        if (topRow) {
          if (product.factorify_id != null && topRow.factorify_item_id != null
              && Number(product.factorify_id) !== Number(topRow.factorify_item_id)) {
            alert('Sestava patří jinému výrobku!\nFY ID exportu: ' + topRow.factorify_item_id + '\nFY ID výrobku: ' + product.factorify_id);
            return;
          }
          const m = String(topRow.name || '').trim().match(/^(\S+)/);
          const importedCode = m ? m[1] : null;
          if (importedCode && product.code && importedCode.toLowerCase() !== product.code.toLowerCase()) {
            alert('Sestava patří jinému výrobku!\nKód v exportu: ' + importedCode + '\nKód výrobku: ' + product.code);
            return;
          }
        }

        if (_fyBom && !confirm('Existujici sestava (' + (_fyBom.items ? _fyBom.items.length : 0) + ' polozek) bude prepsana. Pokracovat?')) return;

        toast('Nahravam ' + items.length + ' polozek...');
        await api('/api/production/products/' + product.id + '/fy-bom/import', {
          method: 'POST',
          body: JSON.stringify({ source_filename: file.name, items: items }),
        });
        toast('Import dokoncen - ' + items.length + ' polozek');
        await renderFyBomTab();
      } catch (err) {
        console.error('FY import error:', err);
        toast('Chyba importu: ' + err.message);
      }
    }

    async function fyDelete() {
      if (!_fyBom) return;
      if (!confirm('Opravdu smazat sestavu (' + (_fyBom.items ? _fyBom.items.length : 0) + ' polozek)?')) return;
      try {
        await api('/api/production/products/' + product.id + '/fy-bom', { method: 'DELETE' });
        _fyBom = null;
        toast('Sestava smazana');
        await renderFyBomTab();
      } catch (err) {
        toast('Chyba: ' + err.message);
      }
    }

    // === FY → HolyOS: doplnění kusovníku do pracovního postupu ===
    // Pro daný level (např. "1.49") pošle backendu request, který:
    //  1. Najde / vytvoří target Product odpovídající FY polotovaru/výrobku
    //  2. Vytvoří v něm operaci "FY import" (workstation = null)
    //  3. Doplní jen materiály které ještě v postupu chybí (s množstvím z FY)
    // === Drag&drop materiálu mezi operacemi v rámci postupu ===
    let _omDragData = null;

    function omDragStart(ev, omId, sourceOpId) {
      ev.stopPropagation();
      _omDragData = { omId, sourceOpId };
      try {
        ev.dataTransfer.setData('application/x-om', JSON.stringify(_omDragData));
        ev.dataTransfer.effectAllowed = 'move';
      } catch (e) { /* ignore */ }
      const tr = ev.currentTarget;
      if (tr) tr.classList.add('dragging-mat');
    }

    function omDragEnd(ev) {
      _omDragData = null;
      document.querySelectorAll('.dragging-mat').forEach(el => el.classList.remove('dragging-mat'));
      document.querySelectorAll('.mat-drop-target').forEach(el => el.classList.remove('mat-drop-target'));
    }

    function omDragOver(ev, targetOpId) {
      if (!_omDragData) return;
      if (_omDragData.sourceOpId === targetOpId) return;
      ev.preventDefault();
      ev.dataTransfer.dropEffect = 'move';
      const card = ev.currentTarget;
      if (card && !card.classList.contains('mat-drop-target')) card.classList.add('mat-drop-target');
    }

    function omDragLeave(ev, targetOpId) {
      const card = ev.currentTarget;
      const rel = ev.relatedTarget;
      if (card && (!rel || !card.contains(rel))) card.classList.remove('mat-drop-target');
    }

    async function omDrop(ev, targetOpId) {
      if (!_omDragData) return;
      ev.preventDefault();
      const { omId, sourceOpId } = _omDragData;
      _omDragData = null;
      document.querySelectorAll('.mat-drop-target').forEach(el => el.classList.remove('mat-drop-target'));
      document.querySelectorAll('.dragging-mat').forEach(el => el.classList.remove('dragging-mat'));
      if (sourceOpId === targetOpId) return;
      try {
        await api('/api/production/operation-materials/' + omId, {
          method: 'PUT',
          body: JSON.stringify({ operation_id: targetOpId }),
        });
        toast('Materiál přesunut do operace #' + targetOpId);
        await wfRefreshFromServer(null);
      } catch (err) {
        console.error('omDrop error:', err);
        toast('Chyba přesunu: ' + err.message);
      }
    }

    async function fyImportChildrenToWorkflow(level, name, childrenCount) {
      if (!product || !product.id) return;
      const ok = confirm('📥 Doplnit kusovník z Factorify do pracovního postupu?\n\nPolotovar: ' + name + '\nÚroveň: ' + level + '\nPoložek k vyhodnocení: ' + childrenCount + '\n\nVytvoří se nová operace "FY import" v odpovídajícím postupu (pokud ještě neexistuje), do které se doplní jen ty materiály, které v postupu chybí. Existující data se nepřepíšou.');
      if (!ok) return;
      try {
        toast('Doplňuji kusovník...');
        const result = await api('/api/production/products/' + product.id + '/fy-bom/import-children', {
          method: 'POST',
          body: JSON.stringify({ parent_level: level }),
        });
        let msg = '';
        if (result.added > 0) msg += '✅ Přidáno ' + result.added + ' spotřeb';
        if (result.already_existed > 0) msg += (msg ? ' · ' : '') + result.already_existed + ' už existovalo';
        if (result.skipped && result.skipped.length > 0) msg += (msg ? ' · ' : '') + '⚠️ ' + result.skipped.length + ' skipnuto (chybí Material)';
        if (!msg) msg = result.message || 'Hotovo';
        msg += '\n\nCíl: ' + result.target_product_code + (result.operation_name ? ' (operace: ' + result.operation_name + ')' : '');
        if (result.skipped && result.skipped.length > 0) {
          msg += '\n\nSkipnuté:\n' + result.skipped.slice(0, 10).map(s => '  • ' + (s.code || '?') + ' — ' + (s.reason || '')).join('\n');
          if (result.skipped.length > 10) msg += '\n  … a další ' + (result.skipped.length - 10);
        }
        if (result.target_product_id && result.target_product_id !== product.id) {
          msg += '\n\nOtevřít detail postupu ' + result.target_product_code + '?';
          if (confirm(msg)) {
            window.location.href = 'modules/pracovni-postup/detail.html?id=' + result.target_product_id;
            return;
          }
        } else {
          alert(msg);
          await wfRefreshFromServer(null);
        }
      } catch (err) {
        console.error('fyImportChildrenToWorkflow error:', err);
        alert('Chyba importu: ' + err.message);
      }
    }
  </script>
</body>
