<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f172a">
  <title>Normování | HOLYOS</title>
  <link rel="icon" type="image/svg+xml" href="../../logo-holyos-icon.svg">
  <base href="../../">
  <style>
    /* ─── Reset + base ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      -webkit-tap-highlight-color: transparent;
      overflow: hidden;
      user-select: none;
    }
    button { font-family: inherit; cursor: pointer; }
    input { font-family: inherit; }

    /* ─── Layout ───────────────────────────────────────────────── */
    .app {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .topbar {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      padding: 14px 16px;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }
    .topbar h1 { font-size: 18px; font-weight: 700; margin: 0; flex: 1; }
    .topbar .step {
      font-size: 11px;
      background: #6366f1;
      padding: 4px 10px;
      border-radius: 999px;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .topbar .person {
      font-size: 13px; color: #cbd5e1;
      max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .topbar button.back {
      background: transparent; color: #94a3b8; border: none;
      font-size: 22px; padding: 4px 10px; border-radius: 6px;
    }
    .topbar button.back:active { background: #334155; }

    .content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px;
      /* Když je viditelný footer-bar, dáme dolů místo navíc, ať se k poslednímu
         dílu dá doscrollovat i s velkým tlačítkem ve spodní liště. */
      padding-bottom: 16px;
    }
    /* Rezerva pod posledním řádkem v měření = výška footer-baru
       (12px top + cca 54px tlačítko + 12px bottom) + safe-area Android navbar
       + ~16px vizuální mezera. Pokud byt u stop překrývá, zvyš tady. */
    .app.has-footer .content { padding-bottom: calc(110px + env(safe-area-inset-bottom)); }

    /* ─── Sticky footer bar (jen na obrazovce měření) ──────────── */
    .footer-bar {
      display: none;
      position: fixed;
      left: 0; right: 0; bottom: 0;
      padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, #0f172a 70%, rgba(15, 23, 42, 0));
      z-index: 50;
      pointer-events: none; /* gradient nesmí blokovat scroll */
    }
    .footer-bar > * { pointer-events: auto; }
    .app.has-footer .footer-bar { display: block; }
    .footer-bar .btn { margin-top: 0; }

    /* ─── Screen base ─────────────────────────────────────────── */
    .screen { display: none; }
    .screen.active { display: block; }

    .field-label {
      font-size: 12px;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .input-big {
      width: 100%;
      padding: 18px 20px;
      font-size: 28px;
      font-weight: 700;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      color: #f1f5f9;
      text-align: center;
      letter-spacing: 2px;
    }
    .input-big:focus {
      outline: none;
      border-color: #6366f1;
      background: #1e2a3e;
    }

    .input-text {
      width: 100%;
      padding: 14px 16px;
      font-size: 16px;
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
    }
    .input-text:focus { outline: none; border-color: #6366f1; }

    .btn {
      display: block;
      width: 100%;
      padding: 18px;
      font-size: 18px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      transition: transform 0.05s, background 0.15s;
      margin-top: 12px;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background: #6366f1; color: white; }
    .btn-primary:active { background: #4f46e5; }
    .btn-secondary { background: #334155; color: #e2e8f0; }
    .btn-ghost { background: transparent; color: #94a3b8; border: 1px solid #334155; }
    .btn-danger { background: #dc2626; color: white; }

    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 16px;
    }
    .key {
      aspect-ratio: 1.6 / 1;
      background: #1e293b;
      color: #f1f5f9;
      border: 2px solid #334155;
      border-radius: 12px;
      font-size: 26px;
      font-weight: 600;
    }
    .key:active { background: #6366f1; border-color: #6366f1; }

    /* ─── Operation list ──────────────────────────────────────── */
    .op-list { display: flex; flex-direction: column; gap: 10px; margin-top: 8px; }
    .op-card {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 16px;
      display: flex; gap: 12px; align-items: center;
    }
    .op-card:active { transform: scale(0.99); border-color: #6366f1; }
    .op-position {
      width: 48px; height: 48px;
      background: #6366f1; color: white;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700;
      flex-shrink: 0;
    }
    .op-info { flex: 1; min-width: 0; }
    .op-name { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .op-meta { font-size: 12px; color: #94a3b8; }
    .op-bom-count {
      background: #334155;
      color: #cbd5e1;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 600;
      flex-shrink: 0;
    }

    /* ─── Item list (měření) ──────────────────────────────────── */
    .toolbar {
      display: flex; gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .toolbar .input-text { flex: 1; padding: 10px 14px; font-size: 14px; }
    .icon-btn {
      flex-shrink: 0;
      width: 44px; height: 44px;
      background: #1e293b; border: 2px solid #334155; border-radius: 10px;
      color: #cbd5e1;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
    }
    .icon-btn:active { background: #6366f1; }

    .item-list { display: flex; flex-direction: column; gap: 8px; }
    .item-card {
      background: #1e293b;
      border: 2px solid #334155;
      border-radius: 12px;
      padding: 12px;
    }
    .item-card.in-progress { border-color: #f59e0b; background: #2a2415; }
    .item-card.done { border-color: #10b981; background: #16332b; opacity: 0.85; }

    .item-header { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 10px; }
    .item-code {
      font-family: 'SF Mono', Consolas, monospace;
      font-size: 13px; font-weight: 700;
      color: #fbbf24;
      flex-shrink: 0;
    }
    .item-name {
      flex: 1; min-width: 0;
      font-size: 14px;
      line-height: 1.3;
      word-break: break-word;
    }
    .item-qty {
      font-size: 12px; color: #94a3b8;
      flex-shrink: 0;
      background: #334155; padding: 3px 8px; border-radius: 6px;
      font-weight: 600;
    }

    .item-buttons { display: flex; gap: 8px; }
    .item-buttons .btn {
      flex: 1; margin-top: 0;
      padding: 14px 8px;
      font-size: 15px;
    }
    .btn-start { background: #10b981; color: white; }
    .btn-start:active { background: #059669; }
    .btn-end { background: #f59e0b; color: white; }
    .btn-end:active { background: #d97706; }
    .btn-disabled { background: #334155; color: #64748b; pointer-events: none; }

    /* ─── Status bar nad měřením ─────────────────────────────── */
    .session-bar {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 14px;
      margin-bottom: 12px;
      display: flex; gap: 12px; align-items: center;
    }
    .session-bar .icon { font-size: 24px; }
    .session-bar .info { flex: 1; min-width: 0; }
    .session-bar .info .title { font-size: 13px; font-weight: 700; }
    .session-bar .info .sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }

    /* ─── Toast ──────────────────────────────────────────────── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1e293b;
      border: 1px solid #6366f1;
      color: white;
      padding: 12px 20px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      z-index: 1000;
      animation: slideUp 0.2s ease;
    }
    .toast.error { border-color: #dc2626; background: #2a1515; }
    .toast.success { border-color: #10b981; background: #16332b; }
    @keyframes slideUp {
      from { transform: translate(-50%, 20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }

    /* ─── QR scanner overlay ─────────────────────────────────── */
    .scanner-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.95);
      display: none;
      flex-direction: column;
      z-index: 1500;
    }
    .scanner-overlay.active { display: flex; }
    .scanner-overlay video {
      flex: 1;
      width: 100%;
      object-fit: cover;
    }
    .scanner-overlay .scanner-bar {
      padding: 16px;
      display: flex; gap: 12px; align-items: center;
      background: #0f172a;
    }
    .scanner-overlay .scanner-bar .info { flex: 1; font-size: 13px; color: #cbd5e1; }

    /* ─── Loading spinner ────────────────────────────────────── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #334155;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 32px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Empty / error state ────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 16px;
      color: #94a3b8;
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state .msg { font-size: 14px; }

    /* ─── Mobile portrait optimalizace ───────────────────────── */
    @media (max-width: 380px) {
      .input-big { font-size: 24px; padding: 14px 16px; }
      .key { font-size: 22px; }
      .topbar h1 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <button class="back" id="back-btn" style="display:none;" aria-label="Zpět">←</button>
      <h1 id="screen-title">Normování</h1>
      <span class="step" id="step-badge">1/4</span>
      <span class="person" id="person-name"></span>
    </header>

    <main class="content">
      <!-- ─── Obrazovka 1: Auth bootstrap (HolyOS login) ──────── -->
      <!-- Identifikace probíhá přes JWT cookie HolyOSu — pokud nejsi přihlášen,
           tahle obrazovka tě přesměruje na /login.html. Když jsi přihlášený, ale
           tvůj User nemá vázaného Person, ukážeme srozumitelnou chybu. -->
      <section class="screen active" id="screen-identify">
        <div class="empty-state" id="auth-loading">
          <div class="spinner"></div>
          <div class="msg">Načítám účet…</div>
        </div>
        <div id="auth-error" style="display:none; padding: 24px 0;">
          <div class="empty-state">
            <div class="icon">⚠️</div>
            <div class="msg" id="auth-error-msg">Nepodařilo se ověřit přihlášení.</div>
          </div>
          <button class="btn btn-primary" id="auth-login-btn">Přihlásit se</button>
        </div>
      </section>

      <!-- ─── Obrazovka 2: Zadání čísla dávky ──────────────── -->
      <section class="screen" id="screen-batch">
        <div class="field-label">Číslo výrobní dávky</div>
        <input type="tel" class="input-big" id="batch-input" inputmode="numeric" pattern="[0-9]*" placeholder="22965" autocomplete="off">
        <button class="btn btn-primary" id="batch-find-btn">Najít dávku</button>
        <button class="btn btn-secondary" id="batch-scan-btn">Naskenovat QR dávky</button>
        <button class="btn btn-ghost" id="batch-back-btn">Změnit pracovníka</button>
      </section>

      <!-- ─── Obrazovka 3: Výběr operace ──────────────────── -->
      <section class="screen" id="screen-operations">
        <div id="batch-info" class="session-bar"></div>
        <div class="field-label">Vyber operaci</div>
        <div class="op-list" id="op-list"></div>
      </section>

      <!-- ─── Obrazovka 4: Měření času na dílech ──────────── -->
      <section class="screen" id="screen-measure">
        <div id="session-info" class="session-bar"></div>
        <div class="toolbar">
          <input type="text" class="input-text" id="item-search" placeholder="Hledat díl...">
          <button class="icon-btn" id="item-scan-btn" aria-label="Skenovat QR dílu">⤓</button>
        </div>
        <div class="item-list" id="item-list"></div>
      </section>
    </main>

    <!-- Sticky footer bar — viditelný jen na obrazovce měření -->
    <footer class="footer-bar" id="footer-bar">
      <button class="btn btn-danger" id="end-session-btn">Ukončit měření</button>
    </footer>
  </div>

  <!-- QR scanner overlay -->
  <div class="scanner-overlay" id="scanner-overlay">
    <video id="scanner-video" playsinline autoplay></video>
    <div class="scanner-bar">
      <span class="info" id="scanner-info">Naskenuj QR kód…</span>
      <button class="icon-btn" id="scanner-close-btn">✕</button>
    </div>
  </div>

  <script src="modules/normovani-fy/app.js"></script>
</body>
</html>

</body>
</html>
