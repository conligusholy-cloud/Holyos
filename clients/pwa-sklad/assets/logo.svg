<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e1e2e"/>
      <stop offset="100%" stop-color="#282840"/>
    </linearGradient>
    <linearGradient id="fg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c8cff"/>
      <stop offset="100%" stop-color="#4ecdc4"/>
    </linearGradient>
  </defs>
  <!-- safe area for maskable: vnitřní 80% -->
  <rect x="0" y="0" width="512" height="512" fill="url(#bg)"/>
  <!-- stylizované „H" z HolyOS, posazené do bezpečné zóny -->
  <g transform="translate(256 256)">
    <rect x="-108" y="-140" width="52" height="280" rx="8" fill="url(#fg)"/>
    <rect x="56" y="-140" width="52" height="280" rx="8" fill="url(#fg)"/>
    <rect x="-108" y="-24" width="216" height="48" rx="8" fill="url(#fg)"/>
    <!-- krabička v H — odkaz na sklad -->
    <rect x="-26" y="-20" width="52" height="40" rx="4" fill="#1e1e2e" opacity="0.4"/>
  </g>
</svg>
